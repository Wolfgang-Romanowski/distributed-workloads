name: Snyk Dockerfile Security Scan

on:
  push:
    branches: [ main ]
    paths:
      - 'images/runtime/training/*/Dockerfile'
  pull_request_target:
    types: [ labeled ]
  pull_request:
    paths:
      - 'images/runtime/training/*/Dockerfile'
  schedule:
    - cron: '0 3 * * *'  # Run nightly at 3:00 UTC
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      target_dir:
        description: 'Specific directory to scan (leave empty for all)'
        required: false
        default: ''
        type: string

jobs:
  snyk-dockerfile-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request_target' || 
      github.event.label.name == 'safe-to-test' || 
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.ref || '' }}
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || '' }}

      - name: Setup Snyk
        uses: snyk/actions/setup@master

      - name: Configure Snyk Authentication
        id: verify_token
        run: |
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "::error::SNYK_TOKEN secret is not configured"
            exit 1
          fi
          
          snyk auth "${{ secrets.SNYK_TOKEN }}"
          
          SNYK_VERSION=$(snyk --version)
          echo "version=$SNYK_VERSION" >> $GITHUB_OUTPUT
          echo "Snyk authenticated successfully - Version: $SNYK_VERSION"

      - name: Execute Dockerfile Security Scans
        id: scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          DEBUG_MODE: ${{ github.event.inputs.debug == 'true' }}
          TARGET_DIR: ${{ github.event.inputs.target_dir }}
        run: |
          set -e
          
          # Configuration
          TRAINING_DIR="images/runtime/training"
          RESULTS_DIR="scan_results"
          mkdir -p "$RESULTS_DIR"
          
          # Global counters
          TOTAL_SCANNED=0
          BASE_PASSED=0
          BASE_FAILED=0
          DOCKERFILE_PASSED=0
          DOCKERFILE_FAILED=0
          SCAN_ERRORS=0
          
          # Track unique base images with issues
          BASE_IMAGES_WITH_ISSUES=0
          
          # Track Dockerfiles that introduce new vulnerabilities
          DOCKERFILES_WITH_NEW_VULNS=""
          
          # Results storage
          SCAN_SUMMARY=""
          declare -A BASE_SCAN_RESULTS
          declare -A DOCKERFILE_SCAN_RESULTS
          declare -A BASE_IMAGES_SCANNED
          
          # Export variables and functions for use in subshells
          export DEBUG_MODE
          export -f extract_base_image
          export -f get_vuln_summary
          export -f get_top_vulnerabilities
          
          # Utility functions
          log_section() {
            echo ""
            echo "========================================================================"
            echo "  $1"
            echo "========================================================================"
          }
          
          extract_base_image() {
            local dockerfile="$1"
            local base_image
            
            # Extract FROM line
            base_image=$(grep -m 1 "^FROM" "$dockerfile" | awk '{print $2}' | sed 's/ AS .*//g')
            
            # Process ARG substitutions from the Dockerfile
            while IFS= read -r line; do
              if [[ "$line" =~ ^ARG[[:space:]]+([^=[:space:]]+)=(.+)$ ]]; then
                local var_name="${BASH_REMATCH[1]}"
                local var_value="${BASH_REMATCH[2]//\"/}"
                var_value="${var_value//\'/}"
                base_image="${base_image//\$\{$var_name\}/$var_value}"
                base_image="${base_image//\$$var_name/$var_value}"
              fi
            done < "$dockerfile"
            
            echo "$base_image"
          }
          
          get_vuln_summary() {
            local json_file="$1"
            local label="$2"
            
            if [ ! -f "$json_file" ] || [ ! -s "$json_file" ] || ! jq -e . "$json_file" >/dev/null 2>&1; then
              echo "Unable to parse"
              return
            fi
            
            local critical=$(jq '[.vulnerabilities[]? | select(.severity == "critical")] | length' "$json_file" 2>/dev/null || echo "0")
            local high=$(jq '[.vulnerabilities[]? | select(.severity == "high")] | length' "$json_file" 2>/dev/null || echo "0")
            local medium=$(jq '[.vulnerabilities[]? | select(.severity == "medium")] | length' "$json_file" 2>/dev/null || echo "0")
            local low=$(jq '[.vulnerabilities[]? | select(.severity == "low")] | length' "$json_file" 2>/dev/null || echo "0")
            local total=$(jq '.uniqueCount // 0' "$json_file" 2>/dev/null || echo "0")
            
            echo "${critical}C/${high}H/${medium}M/${low}L (Total: $total)"
          }
          
          get_top_vulnerabilities() {
            local json_file="$1"
            local count="${2:-5}"
            
            if [ ! -f "$json_file" ] || [ ! -s "$json_file" ] || ! jq -e . "$json_file" >/dev/null 2>&1; then
              echo ""
              return
            fi
            
            # Extract top critical/high vulnerabilities with details
            jq -r --arg count "$count" '
              [.vulnerabilities[]? | select(.severity == "critical" or .severity == "high")] 
              | sort_by(-.cvssScore) 
              | .[0:($count|tonumber)] 
              | .[] 
              | "- **\(.id // "Unknown")** (\(.severity|ascii_upcase)): \(.title // "No description") - Package: \(.packageName // "Unknown")@\(.version // "Unknown")"
            ' "$json_file" 2>/dev/null || echo ""
          }
          
          # Determine target directories
          if [ -n "$TARGET_DIR" ]; then
            if [ -d "$TRAINING_DIR/$TARGET_DIR" ]; then
              TARGET_DIRS=("$TARGET_DIR")
              echo "Scanning specific directory: $TARGET_DIR"
            else
              echo "Target directory $TRAINING_DIR/$TARGET_DIR does not exist"
              exit 1
            fi
          else
            TARGET_DIRS=(
              "py311-cuda121-torch241"
              "py311-cuda124-torch251" 
              "py311-rocm62-torch241"
              "py311-rocm62-torch251"
            )
            echo "Scanning all Dockerfile directories"
          fi
          
          # Process each target directory
          for DIR in "${TARGET_DIRS[@]}"; do
            log_section "Processing $DIR"
            
            DOCKERFILE="$TRAINING_DIR/$DIR/Dockerfile"
            TOTAL_SCANNED=$((TOTAL_SCANNED + 1))
            
            # Verify Dockerfile exists
            if [ ! -f "$DOCKERFILE" ]; then
              echo "ERROR: Dockerfile not found: $DOCKERFILE"
              SCAN_ERRORS=$((SCAN_ERRORS + 1))
              DOCKERFILE_SCAN_RESULTS[$DIR]="ERROR|Dockerfile not found|N/A"
              continue
            fi
            
            # Extract base image
            BASE_IMAGE=$(extract_base_image "$DOCKERFILE")
            echo "Base image: $BASE_IMAGE"
            
            # Phase 1: Scan base image only (if not already scanned)
            echo ""
            echo "Phase 1: Base Image Security Analysis"
            echo "-------------------------------------"
            
            BASE_SCAN_KEY="${BASE_IMAGE//[:\/]/_}"
            BASE_SCAN_JSON="$RESULTS_DIR/base_${BASE_SCAN_KEY}.json"
            BASE_SCAN_OUTPUT="$RESULTS_DIR/base_${BASE_SCAN_KEY}_output.txt"
            
            # Check if we've already scanned this base image
            if [ -z "${BASE_IMAGES_SCANNED[$BASE_SCAN_KEY]}" ]; then
              echo "Running Snyk base image scan..."
              
              # Run base image scan
              set +e
              snyk container test "$BASE_IMAGE" \
                --json \
                --severity-threshold=high \
                > "$BASE_SCAN_JSON" 2> "$BASE_SCAN_OUTPUT"
              BASE_EXIT_CODE=$?
              set -e
              
              # Get vulnerability summary
              BASE_VULN_SUMMARY=$(get_vuln_summary "$BASE_SCAN_JSON" "Base")
              
              # Determine base status
              case $BASE_EXIT_CODE in
                0)
                  BASE_STATUS="PASSED"
                  BASE_MSG="No high/critical vulnerabilities"
                  ;;
                1)
                  BASE_STATUS="FAILED"
                  BASE_MSG="High/critical vulnerabilities found"
                  ;;
                *)
                  BASE_STATUS="ERROR"
                  BASE_MSG="Scan error (exit: $BASE_EXIT_CODE)"
                  ;;
              esac
              
              # Store base image results
              BASE_IMAGES_SCANNED[$BASE_SCAN_KEY]="$BASE_STATUS|$BASE_MSG|$BASE_VULN_SUMMARY|$BASE_EXIT_CODE"
              
              echo "Base image scan completed"
              echo "  Status: $BASE_STATUS"
              echo "  Vulnerabilities: $BASE_VULN_SUMMARY"
            else
              echo "Using cached base image scan results"
              IFS='|' read -r BASE_STATUS BASE_MSG BASE_VULN_SUMMARY BASE_EXIT_CODE <<< "${BASE_IMAGES_SCANNED[$BASE_SCAN_KEY]}"
              echo "  Status: $BASE_STATUS"
              echo "  Vulnerabilities: $BASE_VULN_SUMMARY"
            fi
            
            # Store base results for this Dockerfile
            BASE_SCAN_RESULTS[$DIR]="$BASE_STATUS|$BASE_MSG|$BASE_VULN_SUMMARY"
            
            # Phase 2: Scan with Dockerfile context
            echo ""
            echo "Phase 2: Full Dockerfile Security Analysis"
            echo "------------------------------------------"
            echo "Running Snyk scan with Dockerfile context..."
            
            FULL_SCAN_JSON="$RESULTS_DIR/${DIR}_full_scan.json"
            FULL_SCAN_OUTPUT="$RESULTS_DIR/${DIR}_full_scan_output.txt"
            FULL_SCAN_HUMAN="$RESULTS_DIR/${DIR}_full_scan_human.txt"
            
            # Run full scan with Dockerfile
            set +e
            snyk container test "$BASE_IMAGE" \
              --file="$DOCKERFILE" \
              --json \
              --severity-threshold=high \
              > "$FULL_SCAN_JSON" 2> "$FULL_SCAN_OUTPUT"
            DOCKERFILE_EXIT_CODE=$?
            set -e
            
            # Also generate human-readable output
            set +e
            snyk container test "$BASE_IMAGE" \
              --file="$DOCKERFILE" \
              --severity-threshold=high \
              > "$FULL_SCAN_HUMAN" 2>&1
            set -e
            
            # Get vulnerability summary
            DOCKERFILE_VULN_SUMMARY=$(get_vuln_summary "$FULL_SCAN_JSON" "Full")
            
            # Determine Dockerfile scan status
            case $DOCKERFILE_EXIT_CODE in
              0)
                DOCKERFILE_STATUS="PASSED"
                DOCKERFILE_MSG="No high/critical vulnerabilities in full scan"
                DOCKERFILE_PASSED=$((DOCKERFILE_PASSED + 1))
                ;;
              1)
                DOCKERFILE_STATUS="FAILED"
                DOCKERFILE_MSG="High/critical vulnerabilities found in full scan"
                DOCKERFILE_FAILED=$((DOCKERFILE_FAILED + 1))
                
                # Check if this is due to Dockerfile introducing new vulnerabilities
                if [ "$BASE_STATUS" = "PASSED" ]; then
                  DOCKERFILE_MSG="Dockerfile introduces new vulnerabilities"
                  DOCKERFILES_WITH_NEW_VULNS="${DOCKERFILES_WITH_NEW_VULNS}${DIR}, "
                elif [ "$BASE_STATUS" = "FAILED" ]; then
                  base_total=$(echo "$BASE_VULN_SUMMARY" | grep -o "Total: [0-9]*" | grep -o "[0-9]*" || echo "0")
                  docker_total=$(echo "$DOCKERFILE_VULN_SUMMARY" | grep -o "Total: [0-9]*" | grep -o "[0-9]*" || echo "0")
                  if [ "$docker_total" -gt "$base_total" ]; then
                    diff=$((docker_total - base_total))
                    DOCKERFILE_MSG="Dockerfile adds $diff new vulnerabilities to base image"
                    DOCKERFILES_WITH_NEW_VULNS="${DOCKERFILES_WITH_NEW_VULNS}${DIR}, "
                  else
                    DOCKERFILE_MSG="Inherits vulnerabilities from base image"
                  fi
                fi
                ;;
              *)
                DOCKERFILE_STATUS="ERROR"
                DOCKERFILE_MSG="Scan error (exit: $DOCKERFILE_EXIT_CODE)"
                SCAN_ERRORS=$((SCAN_ERRORS + 1))
                ;;
            esac
            
            # Store Dockerfile results
            DOCKERFILE_SCAN_RESULTS[$DIR]="$DOCKERFILE_STATUS|$DOCKERFILE_MSG|$DOCKERFILE_VULN_SUMMARY"
            
            echo "Dockerfile scan completed"
            echo "  Status: $DOCKERFILE_STATUS"
            echo "  Vulnerabilities: $DOCKERFILE_VULN_SUMMARY"
            
            # Build summary for this Dockerfile
            SCAN_SUMMARY="${SCAN_SUMMARY}=== $DIR ===\n"
            SCAN_SUMMARY="${SCAN_SUMMARY}Base Image ($BASE_IMAGE):\n"
            SCAN_SUMMARY="${SCAN_SUMMARY}  Status: $BASE_STATUS (Exit: ${BASE_EXIT_CODE})\n"
            SCAN_SUMMARY="${SCAN_SUMMARY}  Vulnerabilities: $BASE_VULN_SUMMARY\n"
            SCAN_SUMMARY="${SCAN_SUMMARY}Full Dockerfile Scan:\n"
            SCAN_SUMMARY="${SCAN_SUMMARY}  Status: $DOCKERFILE_STATUS (Exit: ${DOCKERFILE_EXIT_CODE})\n"
            SCAN_SUMMARY="${SCAN_SUMMARY}  Vulnerabilities: $DOCKERFILE_VULN_SUMMARY\n"
            
            # Check if Dockerfile introduces new vulnerabilities
            if [ "$DOCKERFILE_STATUS" = "FAILED" ] && [ "$BASE_STATUS" = "PASSED" ]; then
              SCAN_SUMMARY="${SCAN_SUMMARY}  ⚠️ WARNING: Dockerfile introduces new vulnerabilities!\n"
            elif [ "$DOCKERFILE_STATUS" = "FAILED" ] && [ "$BASE_STATUS" = "FAILED" ]; then
              base_total=$(echo "$BASE_VULN_SUMMARY" | grep -o "Total: [0-9]*" | grep -o "[0-9]*" || echo "0")
              docker_total=$(echo "$DOCKERFILE_VULN_SUMMARY" | grep -o "Total: [0-9]*" | grep -o "[0-9]*" || echo "0")
              if [ "$docker_total" -gt "$base_total" ]; then
                diff=$((docker_total - base_total))
                SCAN_SUMMARY="${SCAN_SUMMARY}  ⚠️ WARNING: Dockerfile adds $diff new vulnerabilities!\n"
              fi
            fi
            SCAN_SUMMARY="${SCAN_SUMMARY}\n"
            
            # Generate analysis report
            {
              echo "SECURITY SCAN REPORT: $DIR"
              echo "=========================="
              echo ""
              echo "BASE IMAGE ANALYSIS"
              echo "Image: $BASE_IMAGE"
              echo "Snyk Status: $BASE_STATUS"
              echo "Vulnerabilities: $BASE_VULN_SUMMARY"
              echo ""
              echo "DOCKERFILE ANALYSIS"
              echo "Snyk Status: $DOCKERFILE_STATUS"
              echo "Total Vulnerabilities: $DOCKERFILE_VULN_SUMMARY"
              echo ""
              echo "INTERPRETATION GUIDE:"
              echo "- Base Image: Shows vulnerabilities present in the base image alone"
              echo "- Dockerfile: Shows total vulnerabilities when Dockerfile is applied"
              echo "- If Dockerfile scan has more vulnerabilities than base, your Dockerfile may be introducing them"
              echo "- Both scans use Snyk's --severity-threshold=high setting"
              echo ""
            } > "$RESULTS_DIR/${DIR}_analysis.txt"
          done
          
          # Count unique base images with issues
          for key in "${!BASE_IMAGES_SCANNED[@]}"; do
            IFS='|' read -r status msg vulns exit_code <<< "${BASE_IMAGES_SCANNED[$key]}"
            if [ "$status" = "FAILED" ]; then
              BASE_IMAGES_WITH_ISSUES=$((BASE_IMAGES_WITH_ISSUES + 1))
            fi
          done
          BASE_FAILED=$BASE_IMAGES_WITH_ISSUES
          
          # Clean up the list of Dockerfiles with new vulnerabilities
          DOCKERFILES_WITH_NEW_VULNS=$(echo "$DOCKERFILES_WITH_NEW_VULNS" | sed 's/, $//')
          
          # Calculate overall status based on Dockerfile scans (not base image scans)
          # In debug mode, we report failures for any issues
          if [ "$DEBUG_MODE" = "true" ]; then
            # Debug mode: fail if ANY scan has issues
            if [ $SCAN_ERRORS -gt 0 ]; then
              OVERALL_STATUS="ERROR"
              OVERALL_MSG="Scan errors encountered (Debug Mode)"
            elif [ $DOCKERFILE_FAILED -gt 0 ] && [ $BASE_FAILED -gt 0 ]; then
              OVERALL_STATUS="FAILED"
              if [ -n "$DOCKERFILES_WITH_NEW_VULNS" ]; then
                OVERALL_MSG="Issues in: $DOCKERFILES_WITH_NEW_VULNS + base image issues (Debug)"
              else
                OVERALL_MSG="Dockerfile and base image vulnerabilities detected (Debug)"
              fi
            elif [ $DOCKERFILE_FAILED -gt 0 ]; then
              OVERALL_STATUS="FAILED"
              if [ -n "$DOCKERFILES_WITH_NEW_VULNS" ]; then
                OVERALL_MSG="Dockerfile issues in: $DOCKERFILES_WITH_NEW_VULNS (Debug)"
              else
                OVERALL_MSG="Dockerfile vulnerabilities detected (Debug)"
              fi
            elif [ $BASE_FAILED -gt 0 ]; then
              OVERALL_STATUS="FAILED"
              OVERALL_MSG="Base image vulnerabilities detected (Debug Mode)"
            elif [ $DOCKERFILE_PASSED -eq $TOTAL_SCANNED ]; then
              OVERALL_STATUS="PASSED"
              OVERALL_MSG="All scans passed (Debug Mode)"
            else
              OVERALL_STATUS="ERROR"
              OVERALL_MSG="Unexpected state (Debug Mode)"
            fi
          else
            # Normal mode: only fail on Dockerfile issues, base image issues are informational
            if [ $SCAN_ERRORS -gt 0 ]; then
              OVERALL_STATUS="ERROR"
              OVERALL_MSG="Scan errors encountered"
            elif [ $DOCKERFILE_FAILED -gt 0 ]; then
              OVERALL_STATUS="FAILED"
              if [ -n "$DOCKERFILES_WITH_NEW_VULNS" ]; then
                OVERALL_MSG="Security issues in: $DOCKERFILES_WITH_NEW_VULNS"
              else
                OVERALL_MSG="Dockerfile security issues found (inherited from base)"
              fi
            elif [ $DOCKERFILE_PASSED -eq $TOTAL_SCANNED ]; then
              OVERALL_STATUS="PASSED"
              if [ $BASE_FAILED -gt 0 ]; then
                OVERALL_MSG="All Dockerfiles clean (base image has issues - informational only)"
              else
                OVERALL_MSG="All scans passed - no security issues"
              fi
            else
              OVERALL_STATUS="ERROR"
              OVERALL_MSG="Unexpected state"
            fi
          fi
          
          # Generate GitHub Step Summary
          {
            echo "# 🔒 Snyk Dockerfile Security Scan Results"
            echo ""
            echo "## Executive Summary"
            echo ""
            
            # Status badge
            case "$OVERALL_STATUS" in
              "PASSED")
                echo "### ✅ Status: PASSED"
                ;;
              "FAILED")
                echo "### ❌ Status: FAILED"
                ;;
              "ERROR")
                echo "### ⚠️ Status: ERROR"
                ;;
            esac
            
            echo ""
            echo "**Summary:** $OVERALL_MSG"
            echo ""
            echo "| Metric | Value |"
            echo "|:-------|:------|"
            echo "| **Scan Date** | $(date -u '+%B %d, %Y at %H:%M UTC') |"
            echo "| **Snyk Version** | ${{ steps.verify_token.outputs.version }} |"
            echo "| **Severity Threshold** | High (Critical + High) |"
            echo "| **Mode** | $([ "$DEBUG_MODE" = "true" ] && echo "Debug" || echo "Normal") |"
            echo ""
            
            # Quick Stats
            echo "### 📊 Scan Statistics"
            echo ""
            echo "| Category | Total | Passed | Failed | Errors |"
            echo "|:---------|:-----:|:------:|:------:|:------:|"
            echo "| **Dockerfiles** | $TOTAL_SCANNED | $DOCKERFILE_PASSED | $DOCKERFILE_FAILED | $SCAN_ERRORS |"
            
            # Count unique base images
            UNIQUE_BASE_COUNT=0
            if [ ${#BASE_IMAGES_SCANNED[@]} -gt 0 ]; then
              UNIQUE_BASE_COUNT=${#BASE_IMAGES_SCANNED[@]}
            fi
            BASE_PASSED_COUNT=0
            BASE_FAILED_COUNT=0
            for key in "${!BASE_IMAGES_SCANNED[@]}"; do
              IFS='|' read -r status msg vulns exit_code <<< "${BASE_IMAGES_SCANNED[$key]}"
              if [ "$status" = "PASSED" ]; then
                BASE_PASSED_COUNT=$((BASE_PASSED_COUNT + 1))
              elif [ "$status" = "FAILED" ]; then
                BASE_FAILED_COUNT=$((BASE_FAILED_COUNT + 1))
              fi
            done
            echo "| **Base Images** | $UNIQUE_BASE_COUNT | $BASE_PASSED_COUNT | $BASE_FAILED_COUNT | 0 |"
            echo ""
            
            # Base Image Results (Informational)
            echo "## 📦 Base Image Security Status"
            echo "> **Note:** Base image vulnerabilities are informational only and do not fail the build"
            echo ""
            
            if [ ${#BASE_IMAGES_SCANNED[@]} -eq 0 ]; then
              echo "*No base images were scanned*"
              echo ""
            else
              for key in "${!BASE_IMAGES_SCANNED[@]}"; do
                IFS='|' read -r status msg vulns exit_code <<< "${BASE_IMAGES_SCANNED[$key]}"
                base_name=$(echo "$key" | sed 's/_/\//g' | sed 's/\//:/2')
                
                case "$status" in
                  "PASSED") 
                    echo "### ✅ $base_name"
                    echo "**Status:** No high/critical vulnerabilities found"
                    ;;
                  "FAILED") 
                    echo "### ⚠️ $base_name"
                    echo "**Status:** High/critical vulnerabilities detected (informational)"
                    echo "**Vulnerabilities:** $vulns"
                    
                    # Show top vulnerabilities if available
                    BASE_SCAN_JSON="$RESULTS_DIR/base_${key}.json"
                    TOP_VULNS=$(get_top_vulnerabilities "$BASE_SCAN_JSON" 3)
                    if [ -n "$TOP_VULNS" ]; then
                      echo ""
                      echo "<details>"
                      echo "<summary>View top vulnerabilities</summary>"
                      echo ""
                      echo "$TOP_VULNS"
                      echo ""
                      echo "</details>"
                    fi
                    ;;
                  "ERROR") 
                    echo "### ❌ $base_name"
                    echo "**Status:** Scan error occurred"
                    ;;
                esac
                echo ""
              done
            fi
            
            # Dockerfile Results (These determine pass/fail)
            echo "## 🐳 Dockerfile Scan Results"
            echo "> **Important:** These results determine the build pass/fail status"
            echo ""
            
            # Summary table
            echo "| Dockerfile | Status | Vulnerabilities | Assessment |"
            echo "|:-----------|:-------|:----------------|:-----------|"
            
            for DIR in "${TARGET_DIRS[@]}"; do
              if [ -n "${DOCKERFILE_SCAN_RESULTS[$DIR]}" ]; then
                IFS='|' read -r dockerfile_status dockerfile_msg dockerfile_vulns <<< "${DOCKERFILE_SCAN_RESULTS[$DIR]}"
                IFS='|' read -r base_status base_msg base_vulns <<< "${BASE_SCAN_RESULTS[$DIR]}"
                
                # Status icon
                case "$dockerfile_status" in
                  "PASSED") icon="✅" ;;
                  "FAILED") icon="❌" ;;
                  *) icon="⚠️" ;;
                esac
                
                # Assessment
                if [ "$dockerfile_status" = "FAILED" ] && [ "$base_status" = "PASSED" ]; then
                  assessment="**Dockerfile introduces vulnerabilities**"
                elif [ "$dockerfile_status" = "FAILED" ] && [ "$base_status" = "FAILED" ]; then
                  # Check if vulnerabilities increased
                  base_total=$(echo "$base_vulns" | grep -o "Total: [0-9]*" | grep -o "[0-9]*" || echo "0")
                  docker_total=$(echo "$dockerfile_vulns" | grep -o "Total: [0-9]*" | grep -o "[0-9]*" || echo "0")
                  if [ "$docker_total" -gt "$base_total" ]; then
                    assessment="**New vulnerabilities introduced**"
                  else
                    assessment="Inherits base image issues"
                  fi
                elif [ "$dockerfile_status" = "PASSED" ]; then
                  assessment="Clean - no issues"
                else
                  assessment="Check logs"
                fi
                
                echo "| **$DIR** | $icon $dockerfile_status | $dockerfile_vulns | $assessment |"
              fi
            done
            echo ""
            
            # Detailed vulnerability information for failed Dockerfiles
            FAILED_DOCKERFILES=()
            for DIR in "${TARGET_DIRS[@]}"; do
              if [ -n "${DOCKERFILE_SCAN_RESULTS[$DIR]}" ]; then
                IFS='|' read -r dockerfile_status dockerfile_msg dockerfile_vulns <<< "${DOCKERFILE_SCAN_RESULTS[$DIR]}"
                if [ "$dockerfile_status" = "FAILED" ]; then
                  FAILED_DOCKERFILES+=("$DIR")
                fi
              fi
            done
            
            if [ ${#FAILED_DOCKERFILES[@]} -gt 0 ]; then
              echo "### 🔍 Vulnerability Details"
              echo ""
              
              for DIR in "${FAILED_DOCKERFILES[@]}"; do
                echo "<details>"
                echo "<summary>📋 $DIR - Vulnerability Details</summary>"
                echo ""
                
                # Get base and full scan vulnerability details
                FULL_SCAN_JSON="$RESULTS_DIR/${DIR}_full_scan.json"
                TOP_VULNS=$(get_top_vulnerabilities "$FULL_SCAN_JSON" 5)
                
                if [ -n "$TOP_VULNS" ]; then
                  echo "#### Top Critical/High Vulnerabilities:"
                  echo ""
                  echo "$TOP_VULNS"
                else
                  echo "No detailed vulnerability information available."
                fi
                
                echo ""
                echo "</details>"
                echo ""
              done
            fi
            
            # Comparison table
            echo "## 📊 Vulnerability Comparison"
            echo ""
            echo "| Dockerfile | Base Image | → | Full Scan | Change |"
            echo "|:-----------|:-----------|:-:|:----------|:-------|"
            
            for DIR in "${TARGET_DIRS[@]}"; do
              if [ -n "${DOCKERFILE_SCAN_RESULTS[$DIR]}" ] && [ -n "${BASE_SCAN_RESULTS[$DIR]}" ]; then
                IFS='|' read -r dockerfile_status dockerfile_msg dockerfile_vulns <<< "${DOCKERFILE_SCAN_RESULTS[$DIR]}"
                IFS='|' read -r base_status base_msg base_vulns <<< "${BASE_SCAN_RESULTS[$DIR]}"
                
                # Extract totals for comparison
                base_total=$(echo "$base_vulns" | grep -o "Total: [0-9]*" | grep -o "[0-9]*" || echo "0")
                docker_total=$(echo "$dockerfile_vulns" | grep -o "Total: [0-9]*" | grep -o "[0-9]*" || echo "0")
                
                if [ "$base_total" = "$docker_total" ]; then
                  change="No change"
                elif [ "$docker_total" -gt "$base_total" ]; then
                  diff=$((docker_total - base_total))
                  change="**+${diff} vulnerabilities**"
                else
                  diff=$((base_total - docker_total))
                  change="-${diff} vulnerabilities"
                fi
                
                echo "| $DIR | $base_vulns | → | $dockerfile_vulns | $change |"
              fi
            done
            echo ""
            
            # Action items
            if [ "$OVERALL_STATUS" = "FAILED" ] || ([ "$DEBUG_MODE" = "true" ] && [ $BASE_FAILED -gt 0 ]); then
              echo "## ⚠️ Action Required"
              echo ""
              
              if [ $DOCKERFILE_FAILED -gt 0 ]; then
                echo "### Dockerfile Issues:"
                echo "One or more Dockerfiles are introducing security vulnerabilities."
                echo ""
                echo "**Recommended Actions:**"
                echo "1. Review the vulnerability details above"
                echo "2. Update package versions in affected Dockerfiles"
                echo "3. Consider using more secure base images"
                echo "4. Re-run the scan after making changes"
                echo ""
              fi
              
              if [ "$DEBUG_MODE" = "true" ] && [ $BASE_FAILED -gt 0 ]; then
                echo "### Base Image Issues (Debug Mode):"
                echo "Base images contain vulnerabilities. In normal mode, these are informational only."
                echo ""
              fi
            elif [ $BASE_FAILED -gt 0 ]; then
              echo "## 📋 Recommendations"
              echo ""
              echo "While your Dockerfiles are clean, the base images contain vulnerabilities."
              echo "Consider updating to newer base image versions when available."
              echo ""
            fi
            
            echo "---"
            echo "*Scan performed by Snyk Container Security | Results based on Snyk's security intelligence*"
          } >> $GITHUB_STEP_SUMMARY
          
          # Set outputs
          {
            echo "overall_status=$OVERALL_STATUS"
            echo "scan_status=$OVERALL_MSG"
            echo "total_scanned=$TOTAL_SCANNED"
            echo "dockerfile_passed=$DOCKERFILE_PASSED"
            echo "dockerfile_failed=$DOCKERFILE_FAILED"
            echo "base_failed=$BASE_FAILED"
            echo "scan_errors=$SCAN_ERRORS"
            echo "summary<<EOF"
            echo -e "$SCAN_SUMMARY"
            echo "EOF"
            
            # Create a detailed summary for Slack
            SLACK_SUMMARY=""
            if [ $DOCKERFILE_FAILED -gt 0 ]; then
              if [ -n "$DOCKERFILES_WITH_NEW_VULNS" ]; then
                SLACK_SUMMARY="⚠️ New vulnerabilities in: $DOCKERFILES_WITH_NEW_VULNS"
              else
                SLACK_SUMMARY="⚠️ ${DOCKERFILE_FAILED} Dockerfile(s) inherit base image vulnerabilities"
              fi
            elif [ $BASE_FAILED -gt 0 ]; then
              SLACK_SUMMARY="✅ All Dockerfiles clean (${BASE_FAILED} base image(s) have issues - informational)"
            else
              SLACK_SUMMARY="✅ All scans passed - no security issues found"
            fi
            echo "slack_summary<<EOF" >> $GITHUB_OUTPUT
            echo "$SLACK_SUMMARY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "dockerfiles_with_new_vulns<<EOF" >> $GITHUB_OUTPUT
            echo "$DOCKERFILES_WITH_NEW_VULNS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          } >> $GITHUB_OUTPUT
          
          # Final status
          log_section "FINAL SCAN RESULTS"
          echo "Overall Status: $OVERALL_STATUS"
          echo "Message: $OVERALL_MSG"
          echo "Mode: $([ "$DEBUG_MODE" = "true" ] && echo "Debug" || echo "Normal")"
          echo ""
          echo "Base Image Results:"
          echo "  Unique Images: $([ ${#BASE_IMAGES_SCANNED[@]} -gt 0 ] && echo ${#BASE_IMAGES_SCANNED[@]} || echo "0")"
          echo "  With Issues: $BASE_FAILED (informational only)"
          echo ""
          echo "Dockerfile Scan Results:"
          echo "  Passed: $DOCKERFILE_PASSED"
          echo "  Failed: $DOCKERFILE_FAILED"
          if [ -n "$DOCKERFILES_WITH_NEW_VULNS" ]; then
            echo "  Introducing New Vulnerabilities: $DOCKERFILES_WITH_NEW_VULNS"
          fi
          echo "  Errors: $SCAN_ERRORS"
          echo ""
          echo "Total Dockerfiles Scanned: $TOTAL_SCANNED"
          
          # Exit based on mode and results
          if [ "$DEBUG_MODE" = "true" ]; then
            # Debug mode: fail on any issues
            if [ "$OVERALL_STATUS" != "PASSED" ]; then
              echo ""
              echo "Debug Mode: Workflow failed - Issues detected"
              exit 1
            fi
          else
            # Normal mode: only fail on Dockerfile issues
            if [ $DOCKERFILE_FAILED -gt 0 ] || [ $SCAN_ERRORS -gt 0 ]; then
              echo ""
              echo "Workflow failed - Dockerfile security issues found"
              exit 1
            elif [ $BASE_FAILED -gt 0 ]; then
              echo ""
              echo "Workflow passed - Base image issues are informational only"
            fi
          fi

      - name: Upload Scan Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-scan-results-${{ github.run_number }}
          path: scan_results/
          retention-days: 30

      - name: Slack Notification
        if: |
          always() && (
            (github.event.inputs.debug == 'true') ||
            (github.event_name == 'schedule' && steps.scan.outputs.overall_status != 'PASSED') ||
            (github.event_name != 'schedule' && steps.scan.outputs.dockerfile_failed != '0')
          )
        continue-on-error: true
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: repo,workflow,ref
          custom_payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.scan.outputs.overall_status == 'PASSED' && 'good' || steps.scan.outputs.overall_status == 'FAILED' && 'danger' || 'warning' }}",
                  "title": "🔒 Snyk Dockerfile Security Scan",
                  "fields": [
                    {
                      "title": "Status",
                      "value": "${{ steps.scan.outputs.overall_status }}",
                      "short": true
                    },
                    {
                      "title": "Mode",
                      "value": "${{ github.event.inputs.debug == 'true' && 'Debug' || 'Normal' }}",
                      "short": true
                    },
                    {
                      "title": "Summary",
                      "value": "${{ steps.scan.outputs.slack_summary }}",
                      "short": false
                    },
                    {
                      "title": "Dockerfile Results",
                      "value": "✅ Passed: ${{ steps.scan.outputs.dockerfile_passed }}\n❌ Failed: ${{ steps.scan.outputs.dockerfile_failed }}\n⚠️ Errors: ${{ steps.scan.outputs.scan_errors }}",
                      "short": true
                    },
                    {
                      "title": "Base Image Results",
                      "value": "${{ steps.scan.outputs.base_failed }} base image(s) with vulnerabilities (informational)",
                      "short": true
                    },
                    {
                      "title": "Trigger",
                      "value": "${{ github.event_name == 'schedule' && '🕐 Nightly Scan' || github.event_name == 'workflow_dispatch' && '👤 Manual Run' || github.event_name == 'push' && '📤 Push to Main' || github.event_name == 'pull_request' && '🔀 Pull Request' || github.event_name == 'pull_request_target' && '🔀 PR (External)' || '🔄 Other' }}",
                      "short": true
                    },
                    {
                      "title": "View Details",
                      "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Full Report>",
                      "short": true
                    }
                  ],
                  "footer": "Snyk Container Security",
                  "footer_icon": "https://res.cloudinary.com/snyk/image/upload/v1537345894/press-kit/brand/logo-black.png",
                  "ts": ${{ github.event.head_commit.timestamp && 'new Date(github.event.head_commit.timestamp).getTime() / 1000' || 'Math.floor(Date.now() / 1000)' }}
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || '' }}