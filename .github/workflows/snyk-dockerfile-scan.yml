# .github/workflows/snyk-dockerfile-scan.yml
name: Snyk Dockerfile Scan

on:
  schedule:
    - cron: '0 3 * * *'
  push:  # <-- Trigger on every push (for testing purposes)
    branches:
      - main
    paths:
      - '**/Dockerfile*'
      - '.github/workflows/snyk-dockerfile-scan.yml'
  pull_request_target:
    types: [labeled]

jobs:
  snyk-dockerfile-scan:
    name: Snyk Dockerfile Scan
    runs-on: ubuntu-latest

    # Run for scheduled, push events, or labeled PRs from forks
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request_target' && github.event.label.name == 'run-snyk-scan')

    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Check out code (for schedule and push)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'push' }}
        uses: actions/checkout@v3

      - name: Check out PR code (for labeled fork PR)
        if: ${{ github.event_name == 'pull_request_target' }}
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk scans on Dockerfiles
        run: |
          set +e

          images=(
            "py311-cuda121-torch241"
            "py311-cuda124-torch251"
            "py311-rocm62-torch241"
            "py311-rocm62-torch251"
          )

          echo "| Image                     | Scan Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ------------------------- | ----------- |" >> "$GITHUB_STEP_SUMMARY"

          for img in "${images[@]}"; do
            echo "🔎 Scanning Dockerfile for $img..."
            snyk container test --file="images/runtime/training/$img/Dockerfile"
            exit_code=$?

            if [ $exit_code -eq 0 ]; then
              status="passed"
            elif [ $exit_code -eq 1 ]; then
              status="failed"
            else
              status="error"
            fi

            echo "| $img | $status |" >> "$GITHUB_STEP_SUMMARY"

            if [ $exit_code -ne 0 ]; then
              echo "Snyk scan for $img completed with status: $status (exit code $exit_code)"
            fi
          done

          exit 0
        shell: bash

      - name: Finalize Summary
        run: echo "**Snyk Dockerfile scan completed**. See the table above for results." >> "$GITHUB_STEP_SUMMARY"
