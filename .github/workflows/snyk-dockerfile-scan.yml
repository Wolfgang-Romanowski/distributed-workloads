name: Snyk Dockerfile Security Scan

on:
  push:
    branches: [ main ]
    paths:
      - 'images/runtime/training/*/Dockerfile'
  pull_request:
    paths:
      - 'images/runtime/training/*/Dockerfile'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      target_dir:
        description: 'Specific directory to scan (leave empty for all)'
        required: false
        default: ''
        type: string

jobs:
  snyk-scan:
    name: Snyk Security Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Snyk
        uses: snyk/actions/setup@master

      - name: Authenticate Snyk
        run: |
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "::error::SNYK_TOKEN secret is not configured"
            exit 1
          fi
          snyk auth "${{ secrets.SNYK_TOKEN }}"

      - name: Discover and Scan Components
        id: scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          TARGET_DIR: ${{ github.event.inputs.target_dir }}
        run: |
          set -e
          mkdir -p results
          
          # Target directories
          TRAINING_DIR="images/runtime/training"
          if [ -n "$TARGET_DIR" ]; then
            if [ -d "$TRAINING_DIR/$TARGET_DIR" ]; then
              TARGET_DIRS=("$TARGET_DIR")
            else
              echo "::error::Directory $TARGET_DIR not found"
              exit 1
            fi
          else
            TARGET_DIRS=($(find "$TRAINING_DIR" -name "Dockerfile" -exec dirname {} \; | xargs -I {} basename {}))
          fi
          
          echo "Scanning directories: ${TARGET_DIRS[*]}"
          
          # Step 1: Discover unique base images
          declare -A BASE_IMAGES
          declare -A DOCKERFILE_BASE_MAP
          
          for DIR in "${TARGET_DIRS[@]}"; do
            DOCKERFILE="$TRAINING_DIR/$DIR/Dockerfile"
            if [ ! -f "$DOCKERFILE" ]; then
              echo "::warning::Dockerfile not found: $DOCKERFILE"
              continue
            fi
            
            # Extract base image (simple approach)
            BASE_IMAGE=$(grep -m 1 "^FROM" "$DOCKERFILE" | awk '{print $2}' | cut -d' ' -f1)
            if [ -n "$BASE_IMAGE" ]; then
              BASE_IMAGES["$BASE_IMAGE"]=1
              DOCKERFILE_BASE_MAP["$DIR"]="$BASE_IMAGE"
              echo "Dockerfile $DIR uses base image: $BASE_IMAGE"
            fi
          done
          
          # Step 2: Scan each unique base image once
          declare -A BASE_RESULTS
          echo "Scanning ${#BASE_IMAGES[@]} unique base images..."
          
          for BASE_IMAGE in "${!BASE_IMAGES[@]}"; do
            echo "Scanning base image: $BASE_IMAGE"
            BASE_KEY=$(echo "$BASE_IMAGE" | tr '/:' '_')
            BASE_FILE="results/base_${BASE_KEY}.json"
            
            # Scan base image
            if snyk container test "$BASE_IMAGE" --json > "$BASE_FILE" 2>/dev/null; then
              BASE_EXIT=0
            else
              BASE_EXIT=$?
            fi
            
            # Count vulnerabilities by severity
            if [ -f "$BASE_FILE" ] && jq -e . "$BASE_FILE" >/dev/null 2>&1; then
              CRITICAL=$(jq '[.vulnerabilities[]? | select(.severity == "critical")] | length' "$BASE_FILE")
              HIGH=$(jq '[.vulnerabilities[]? | select(.severity == "high")] | length' "$BASE_FILE")
              MEDIUM=$(jq '[.vulnerabilities[]? | select(.severity == "medium")] | length' "$BASE_FILE")
              LOW=$(jq '[.vulnerabilities[]? | select(.severity == "low")] | length' "$BASE_FILE")
              TOTAL=$(jq '.vulnerabilities | length' "$BASE_FILE" 2>/dev/null || echo "0")
            else
              CRITICAL=0; HIGH=0; MEDIUM=0; LOW=0; TOTAL=0
            fi
            
            BASE_RESULTS["$BASE_IMAGE"]="$BASE_EXIT|$CRITICAL|$HIGH|$MEDIUM|$LOW|$TOTAL"
            echo "Base image $BASE_IMAGE: $TOTAL vulnerabilities (C:$CRITICAL H:$HIGH M:$MEDIUM L:$LOW)"
          done
          
          # Step 3: Analyze Dockerfiles using Snyk's --file flag
          declare -A DOCKERFILE_RESULTS
          FAILED_DOCKERFILES=""
          TOTAL_SCANNED=0
          CLEAN_COUNT=0
          WARNING_COUNT=0
          FAILED_COUNT=0
          
          echo "Analyzing Dockerfiles for additional vulnerabilities..."
          
          for DIR in "${TARGET_DIRS[@]}"; do
            DOCKERFILE="$TRAINING_DIR/$DIR/Dockerfile"
            BASE_IMAGE="${DOCKERFILE_BASE_MAP[$DIR]}"
            
            if [ ! -f "$DOCKERFILE" ] || [ -z "$BASE_IMAGE" ]; then
              continue
            fi
            
            TOTAL_SCANNED=$((TOTAL_SCANNED + 1))
            echo "Analyzing Dockerfile: $DIR (base: $BASE_IMAGE)"
            
            # Scan Dockerfile to see what it would add
            DOCKERFILE_FILE="results/${DIR}_dockerfile.json"
            if snyk container test "$BASE_IMAGE" --file="$DOCKERFILE" --json > "$DOCKERFILE_FILE" 2>/dev/null; then
              DOCKERFILE_EXIT=0
            else
              DOCKERFILE_EXIT=$?
            fi
            
            # Get base image results
            IFS='|' read -r BASE_EXIT BASE_CRIT BASE_HIGH BASE_MED BASE_LOW BASE_TOTAL <<< "${BASE_RESULTS[$BASE_IMAGE]}"
            
            # Count Dockerfile scan results
            if [ -f "$DOCKERFILE_FILE" ] && jq -e . "$DOCKERFILE_FILE" >/dev/null 2>&1; then
              DF_CRITICAL=$(jq '[.vulnerabilities[]? | select(.severity == "critical")] | length' "$DOCKERFILE_FILE")
              DF_HIGH=$(jq '[.vulnerabilities[]? | select(.severity == "high")] | length' "$DOCKERFILE_FILE")
              DF_MEDIUM=$(jq '[.vulnerabilities[]? | select(.severity == "medium")] | length' "$DOCKERFILE_FILE")
              DF_LOW=$(jq '[.vulnerabilities[]? | select(.severity == "low")] | length' "$DOCKERFILE_FILE")
              DF_TOTAL=$(jq '.vulnerabilities | length' "$DOCKERFILE_FILE" 2>/dev/null || echo "0")
            else
              DF_CRITICAL=0; DF_HIGH=0; DF_MEDIUM=0; DF_LOW=0; DF_TOTAL=0
            fi
            
            # Calculate new vulnerabilities (simple subtraction)
            NEW_CRITICAL=$((DF_CRITICAL > BASE_CRIT ? DF_CRITICAL - BASE_CRIT : 0))
            NEW_HIGH=$((DF_HIGH > BASE_HIGH ? DF_HIGH - BASE_HIGH : 0))
            NEW_MEDIUM=$((DF_MEDIUM > BASE_MED ? DF_MEDIUM - BASE_MED : 0))
            NEW_LOW=$((DF_LOW > BASE_LOW ? DF_LOW - BASE_LOW : 0))
            NEW_TOTAL=$((NEW_CRITICAL + NEW_HIGH + NEW_MEDIUM + NEW_LOW))
            
            # Determine status
            if [ $NEW_CRITICAL -gt 0 ] || [ $NEW_HIGH -gt 0 ]; then
              STATUS="FAILED"
              FAILED_COUNT=$((FAILED_COUNT + 1))
              FAILED_DOCKERFILES="$FAILED_DOCKERFILES$DIR "
              MESSAGE="Introduces $NEW_CRITICAL critical, $NEW_HIGH high vulnerabilities"
            elif [ $NEW_TOTAL -gt 0 ]; then
              STATUS="WARNING"
              WARNING_COUNT=$((WARNING_COUNT + 1))
              MESSAGE="Introduces $NEW_TOTAL medium/low vulnerabilities"
            else
              STATUS="PASSED"
              CLEAN_COUNT=$((CLEAN_COUNT + 1))
              MESSAGE="No new vulnerabilities"
            fi
            
            DOCKERFILE_RESULTS["$DIR"]="$STATUS|$MESSAGE|$NEW_CRITICAL|$NEW_HIGH|$NEW_MEDIUM|$NEW_LOW|$NEW_TOTAL|$DF_CRITICAL|$DF_HIGH|$DF_MEDIUM|$DF_LOW|$DF_TOTAL"
            echo "Dockerfile $DIR: $STATUS - $MESSAGE"
          done
          
          # Overall status
          if [ $FAILED_COUNT -gt 0 ]; then
            OVERALL_STATUS="FAILED"
            OVERALL_MESSAGE="$FAILED_COUNT Dockerfile(s) introduce critical/high vulnerabilities"
          elif [ $WARNING_COUNT -gt 0 ]; then
            OVERALL_STATUS="WARNING"
            OVERALL_MESSAGE="$WARNING_COUNT Dockerfile(s) introduce medium/low vulnerabilities"
          else
            OVERALL_STATUS="PASSED"
            OVERALL_MESSAGE="All Dockerfiles are clean"
          fi
          
          # Save results for summary
          {
            echo "OVERALL_STATUS=$OVERALL_STATUS"
            echo "OVERALL_MESSAGE=$OVERALL_MESSAGE"
            echo "TOTAL_SCANNED=$TOTAL_SCANNED"
            echo "CLEAN_COUNT=$CLEAN_COUNT"
            echo "WARNING_COUNT=$WARNING_COUNT"
            echo "FAILED_COUNT=$FAILED_COUNT"
            echo "FAILED_DOCKERFILES=$FAILED_DOCKERFILES"
          } > results/summary.env
          
          # Save detailed results
          for key in "${!BASE_RESULTS[@]}"; do
            echo "$key=${BASE_RESULTS[$key]}" >> results/base_results.txt
          done
          
          for key in "${!DOCKERFILE_RESULTS[@]}"; do
            echo "$key=${DOCKERFILE_RESULTS[$key]}" >> results/dockerfile_results.txt
          done
          
          for key in "${!DOCKERFILE_BASE_MAP[@]}"; do
            echo "$key=${DOCKERFILE_BASE_MAP[$key]}" >> results/dockerfile_base_map.txt
          done
          
          # Set outputs
          echo "status=$OVERALL_STATUS" >> $GITHUB_OUTPUT
          echo "message=$OVERALL_MESSAGE" >> $GITHUB_OUTPUT
          echo "failed_count=$FAILED_COUNT" >> $GITHUB_OUTPUT
          
          # Exit with failure if critical/high vulnerabilities found
          if [ $FAILED_COUNT -gt 0 ]; then
            echo "Build failed: Critical/high vulnerabilities detected"
            exit 1
          fi

      - name: Generate Security Report
        if: always()
        run: |
          if [ ! -f results/summary.env ]; then
            echo "# Security Scan Failed" >> $GITHUB_STEP_SUMMARY
            echo "No scan results available." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          
          source results/summary.env
          
          # Load results
          declare -A BASE_RESULTS DOCKERFILE_RESULTS DOCKERFILE_BASE_MAP
          [ -f results/base_results.txt ] && while IFS='=' read -r key value; do BASE_RESULTS["$key"]="$value"; done < results/base_results.txt
          [ -f results/dockerfile_results.txt ] && while IFS='=' read -r key value; do DOCKERFILE_RESULTS["$key"]="$value"; done < results/dockerfile_results.txt
          [ -f results/dockerfile_base_map.txt ] && while IFS='=' read -r key value; do DOCKERFILE_BASE_MAP["$key"]="$value"; done < results/dockerfile_base_map.txt
          
          {
            echo "# 🛡️ Snyk Security Scan Results"
            echo ""
            case "$OVERALL_STATUS" in
              "PASSED") echo "✅ **Status: PASSED** - All Dockerfiles are secure" ;;
              "WARNING") echo "⚠️ **Status: WARNING** - Some medium/low vulnerabilities found" ;;
              "FAILED") echo "❌ **Status: FAILED** - Critical/high vulnerabilities detected" ;;
            esac
            echo ""
            echo "**Summary:** $OVERALL_MESSAGE"
            echo ""
            
            # Overview table
            echo "## 📊 Scan Overview"
            echo ""
            echo "| Metric | Count |"
            echo "|:-------|:------|"
            echo "| Dockerfiles Scanned | $TOTAL_SCANNED |"
            echo "| Clean (No new vulnerabilities) | $CLEAN_COUNT |"
            echo "| Warning (Medium/Low vulnerabilities) | $WARNING_COUNT |"
            echo "| Failed (Critical/High vulnerabilities) | $FAILED_COUNT |"
            echo "| Unique Base Images | ${#BASE_RESULTS[@]} |"
            echo ""
            
            # Base images section
            if [ ${#BASE_RESULTS[@]} -gt 0 ]; then
              echo "## 🐳 Base Image Analysis"
              echo ""
              echo "| Base Image | Critical | High | Medium | Low | Total |"
              echo "|:-----------|:---------|:-----|:-------|:----|:------|"
              
              for base_image in "${!BASE_RESULTS[@]}"; do
                IFS='|' read -r exit_code critical high medium low total <<< "${BASE_RESULTS[$base_image]}"
                echo "| \`${base_image}\` | $critical | $high | $medium | $low | $total |"
              done
              echo ""
            fi
            
            # Dockerfile analysis
            echo "## 📝 Dockerfile Analysis"
            echo ""
            echo "| Dockerfile | Status | New Vulnerabilities | Base Image |"
            echo "|:-----------|:-------|:-------------------|:-----------|"
            
            for dockerfile in "${!DOCKERFILE_RESULTS[@]}"; do
              IFS='|' read -r status message new_crit new_high new_med new_low new_total df_crit df_high df_med df_low df_total <<< "${DOCKERFILE_RESULTS[$dockerfile]}"
              base_image="${DOCKERFILE_BASE_MAP[$dockerfile]}"
              
              case "$status" in
                "PASSED") status_icon="✅" ;;
                "WARNING") status_icon="⚠️" ;;
                "FAILED") status_icon="❌" ;;
              esac
              
              echo "| \`$dockerfile\` | $status_icon $status | C:$new_crit H:$new_high M:$new_med L:$new_low | \`${base_image}\` |"
            done
            echo ""
            
            # Failed Dockerfiles details
            if [ -n "$FAILED_DOCKERFILES" ]; then
              echo "## ⚠️ Failed Dockerfiles - Action Required"
              echo ""
              for dockerfile in $FAILED_DOCKERFILES; do
                if [ -n "${DOCKERFILE_RESULTS[$dockerfile]}" ]; then
                  IFS='|' read -r status message new_crit new_high new_med new_low new_total df_crit df_high df_med df_low df_total <<< "${DOCKERFILE_RESULTS[$dockerfile]}"
                  base_image="${DOCKERFILE_BASE_MAP[$dockerfile]}"
                  
                  echo "### 🔴 $dockerfile"
                  echo ""
                  echo "- **Issue:** $message"
                  echo "- **Base Image:** \`$base_image\`"
                  echo "- **New Critical:** $new_crit"
                  echo "- **New High:** $new_high"
                  echo ""
                  
                  # Show actual vulnerabilities if available
                  dockerfile_file="results/${dockerfile}_dockerfile.json"
                  if [ -f "$dockerfile_file" ] && jq -e . "$dockerfile_file" >/dev/null 2>&1; then
                    echo "<details>"
                    echo "<summary>View detailed vulnerabilities</summary>"
                    echo ""
                    echo "\`\`\`"
                    jq -r '.vulnerabilities[]? | select(.severity == "critical" or .severity == "high") | "• \(.severity | ascii_upcase) - \(.id // "Unknown") - \(.title // "No description") [\(.packageName // "Unknown")]"' "$dockerfile_file" | head -10
                    echo "\`\`\`"
                    echo ""
                    echo "</details>"
                    echo ""
                  fi
                fi
              done
              
              echo "### 🔧 Recommended Actions"
              echo ""
              echo "1. **Update base images** to newer versions with security patches"
              echo "2. **Review package installations** in Dockerfiles"
              echo "3. **Use minimal base images** when possible"
              echo "4. **Consider alternative packages** without known vulnerabilities"
              echo ""
            fi
            
            echo "---"
            echo "*Scan completed at $(date -u '+%Y-%m-%d %H:%M UTC') | Powered by Snyk*"
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-scan-results-${{ github.run_number }}
          path: results/
          retention-days: 7

      - name: Notify on Failures
        if: failure() && steps.scan.outputs.failed_count > 0
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            🚨 Security vulnerabilities detected in Dockerfiles
            Failed: ${{ steps.scan.outputs.failed_count }} Dockerfile(s)
            Message: ${{ steps.scan.outputs.message }}
            View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}