name: Snyk Dockerfile Security Scan
on:
  push:
    branches: [ main ]
    paths:
      - 'images/runtime/training/*/Dockerfile'
  pull_request_target:
    types: [ labeled ]
  pull_request:
    paths:
      - 'images/runtime/training/*/Dockerfile'
  schedule:
    - cron: '0 3 * * *'  # Run nightly at 3:00 UTC as discussed in Slack
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      target_dir:
        description: 'Specific directory within training to scan (leave empty for all)'
        required: false
        default: ''
        type: string

jobs:
  snyk-dockerfile-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    # Only run PR scans if they have the appropriate label or are from the same repo
    # This addresses the security concern mentioned in Slack about PR secrets access
    if: >
      github.event_name != 'pull_request_target' || 
      github.event.label.name == 'safe-to-test' || 
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          # For pull_request_target, checkout the PR code
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.ref || '' }}
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || '' }}

      - name: Setup Snyk
        uses: snyk/actions/setup@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Verify Snyk Token
        id: verify_token
        run: |
          # Check if SNYK_TOKEN is set
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "::error::SNYK_TOKEN is not set. Please add the SNYK_TOKEN secret to your repository."
            echo "token_present=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "::notice::SNYK_TOKEN is set."
            echo "token_present=true" >> $GITHUB_OUTPUT
          fi

      - name: Get Snyk Version
        id: snyk_version
        run: |
          SNYK_VERSION=$(snyk --version || echo "Unknown")
          echo "version=$SNYK_VERSION" >> $GITHUB_OUTPUT
          echo "Snyk Version: $SNYK_VERSION"

      - name: Verify Snyk Authentication
        run: |
          echo "Verifying Snyk authentication..."
          snyk auth || echo "Snyk authentication may not be properly configured"
          snyk config get api || echo "Failed to get Snyk API configuration"

      - name: Scan Dockerfiles
        id: scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          DEBUG_MODE: ${{ github.event.inputs.debug == 'true' }}
          TARGET_DIR: ${{ github.event.inputs.target_dir }}
        run: |
          set -euo pipefail
          
          if [ "$DEBUG_MODE" = "true" ]; then
            set -x
            echo "Running in debug mode"
          fi
          
          # Base directory for training Dockerfiles
          TRAINING_DIR="images/runtime/training"
          
          # Track results for summary and outputs
          HAS_HIGH_SEVERITY=false
          HAS_ISSUES=false
          ROWS=""
          PASSED_COUNT=0
          ISSUES_COUNT=0
          HIGH_COUNT=0
          SCAN_FAILURES=0
          
          # Define image types for reporting
          declare -A IMAGE_TYPES
          IMAGE_TYPES["py311-cuda121-torch241"]="CUDA 12.1 + PyTorch 2.4.1"
          IMAGE_TYPES["py311-cuda124-torch251"]="CUDA 12.4 + PyTorch 2.5.1"
          IMAGE_TYPES["py311-rocm62-torch241"]="ROCm 6.2 + PyTorch 2.4.1"
          IMAGE_TYPES["py311-rocm62-torch251"]="ROCm 6.2 + PyTorch 2.5.1"
          
          # Determine which directories to scan
          if [ -n "$TARGET_DIR" ]; then
            # Single directory mode - only scan the specified directory
            DOCKERFILE_DIRS=("$TARGET_DIR")
            echo "Scanning single directory: $TRAINING_DIR/$TARGET_DIR"
          else
            # Default - scan all training directories
            DOCKERFILE_DIRS=(
              "py311-cuda121-torch241"
              "py311-cuda124-torch251"
              "py311-rocm62-torch241"
              "py311-rocm62-torch251"
            )
            echo "Scanning all training Dockerfiles"
          fi
          
          REPORT_ROWS=()
          
          # Create results directory for scans
          mkdir -p scan_results
          
          # Function to print section headers for better readability in logs
          print_section() {
            echo "============================================================"
            echo "  $1"
            echo "============================================================"
          }
          
          # Function to extract and interpolate base image from Dockerfile
          extract_base_image() {
            local dockerfile="$1"
            local dir_name="$2"
            
            # Extract all ARG definitions and their values
            declare -A arg_values
            
            # First path: extract all ARG definitions with default values
            while IFS= read -r line; do
              if [[ "$line" =~ ^ARG[[:space:]]+([^=[:space:]]+)=(.+)$ ]]; then
                var_name="${BASH_REMATCH[1]}"
                var_value="${BASH_REMATCH[2]}"
                # Remove any quotes from value
                var_value="${var_value//\"/}"
                var_value="${var_value//\'/}"
                arg_values["$var_name"]="$var_value"
                echo "Extracted ARG $var_name = ${arg_values[$var_name]}"
              fi
            done < "$dockerfile"
            
            # Extract the FROM line
            from_line=$(grep -m 1 "^FROM" "$dockerfile" || echo "FROM ubuntu:latest")
            echo "Original FROM line: $from_line"
            
            # Extract base image with potential variables
            base_image=$(echo "$from_line" | awk '{print $2}')
            echo "Base image with variables: $base_image"
            
            # Replace variables in base image
            resolved_image="$base_image"
            for var_name in "${!arg_values[@]}"; do
              resolved_image="${resolved_image//\$\{$var_name\}/${arg_values[$var_name]}}"
              resolved_image="${resolved_image//\$$var_name/${arg_values[$var_name]}}"
            done
            
            # Special case: Fixed replacements for the known directory structure
            # This ensures we get useful known base images even if ARG extraction fails
            case "$dir_name" in
              py311-cuda121-torch241)
                if [[ "$resolved_image" == *"\$"* ]] || [[ "$resolved_image" == *"{"* ]]; then
                  echo "Falling back to known base image for $dir_name"
                  resolved_image="registry.access.redhat.com/ubi9/python-311:9.5-1741671866"
                fi
                ;;
              py311-cuda124-torch251)
                if [[ "$resolved_image" == *"\$"* ]] || [[ "$resolved_image" == *"{"* ]]; then
                  echo "Falling back to known base image for $dir_name"
                  resolved_image="registry.access.redhat.com/ubi9/python-311:9.5-1741671866"
                fi
                ;;
              py311-rocm62-torch241)
                if [[ "$resolved_image" == *"\$"* ]] || [[ "$resolved_image" == *"{"* ]]; then
                  echo "Falling back to known base image for $dir_name"
                  resolved_image="registry.access.redhat.com/ubi9/python-311:9.5-1741671866"
                fi
                ;;
              py311-rocm62-torch251)
                if [[ "$resolved_image" == *"\$"* ]] || [[ "$resolved_image" == *"{"* ]]; then
                  echo "Falling back to known base image for $dir_name"
                  resolved_image="registry.access.redhat.com/ubi9/python-311:9.5-1741671866"
                fi
                ;;
            esac
            
            echo "Resolved base image: $resolved_image"
            echo "$resolved_image"
          }
          
          # Function to check for common security issues in Dockerfile
          check_dockerfile_security() {
            local dockerfile="$1"
            local issues=()
            
            # Check for 'latest' tag in FROM
            if grep -i "FROM.*latest" "$dockerfile" >/dev/null; then
              issues+=("Using 'latest' tag (use specific versions)")
            fi
            
            # Check for potential secrets in ENV
            if grep -E "ENV.*(PASSWORD|SECRET|KEY|TOKEN).*=" "$dockerfile" >/dev/null; then
              issues+=("Potential secrets in ENV")
            fi
            
            # Check for missing USER instruction
            if ! grep -q "USER" "$dockerfile" >/dev/null; then
              issues+=("Missing USER instruction (runs as root)")
            fi
            
            # Check for insecure downloads
            if grep -i "RUN.*curl.*http:" "$dockerfile" >/dev/null || grep -i "RUN.*wget.*http:" "$dockerfile" >/dev/null; then
              issues+=("Insecure downloads (HTTP)")
            fi
            
            # Check for missing cleanup after package install
            if grep -i "RUN.*apt-get.*-y" "$dockerfile" >/dev/null && ! grep -i "apt-get clean" "$dockerfile" >/dev/null; then
              issues+=("Missing cleanup after package install")
            fi
            
            # Check for unpinned pip packages
            if grep -i "RUN.*pip install" "$dockerfile" >/dev/null && ! grep -i "pip install.*==.*" "$dockerfile" >/dev/null; then
              issues+=("Unpinned pip packages")
            fi
            
            echo "${issues[@]}"
          }
          
          # Create a temporary directory to store processed Dockerfiles
          mkdir -p "processed_dockerfiles"
          
          # Scan each Dockerfile
          for DIR in "${DOCKERFILE_DIRS[@]}"; do
            DOCKERFILE_PATH="$TRAINING_DIR/${DIR}/Dockerfile"
            print_section "Scanning ${DIR} Dockerfile"
            
            # Check if directory exists
            if [ ! -d "$TRAINING_DIR/${DIR}" ]; then
              echo "Directory $TRAINING_DIR/${DIR} does not exist."
              REPORT_ROWS+=("${DIR}|${IMAGE_TYPES[$DIR]}|❌ Fail|Directory not found|N/A")
              ROWS+=$'\n'"• ${DIR}: ❌ Failed (directory not found)"
              HAS_ISSUES=true
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
              continue
            fi
            
            # Check if Dockerfile exists
            if [ ! -f "$DOCKERFILE_PATH" ]; then
              echo "Dockerfile $DOCKERFILE_PATH does not exist."
              REPORT_ROWS+=("${DIR}|${IMAGE_TYPES[$DIR]}|❌ Fail|Dockerfile not found|N/A")
              ROWS+=$'\n'"• ${DIR}: ❌ Failed (not found)"
              HAS_ISSUES=true
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
              continue
            fi
            
            # Set up variables for this file's results
            VULN_ISSUES="None"
            CONFIG_ISSUES=()
            SCAN_RESULTS_DIR="scan_results/${DIR}"
            mkdir -p "$SCAN_RESULTS_DIR"
            
            # Show Dockerfile path and first few lines in debug mode
            if [ "$DEBUG_MODE" = "true" ]; then
              echo "Dockerfile path: $DOCKERFILE_PATH"
              echo "First few lines of Dockerfile:"
              head -n 10 "$DOCKERFILE_PATH"
              echo "..."
            fi
            
            # Extract and resolve the base image with variables
            BASE_IMAGE=$(extract_base_image "$DOCKERFILE_PATH" "$DIR")
            if [[ "$BASE_IMAGE" == *"\$"* ]] || [[ "$BASE_IMAGE" == *"{"* ]]; then
              echo "Warning: Base image still contains unresolved variables: $BASE_IMAGE"
              echo "Using ubuntu:latest as fallback"
              BASE_IMAGE="ubuntu:latest"
            fi
            
            # Create a processed Dockerfile for scanning
            PROCESSED_DOCKERFILE="processed_dockerfiles/${DIR}_Dockerfile"
            
            # Create a simplified Dockerfile with the resolved base image
            {
              echo "FROM $BASE_IMAGE"
              echo "# The rest of the Dockerfile is included below but simplified for scanning"
              grep -v "^FROM" "$DOCKERFILE_PATH" | grep -v "^ARG" >> "$PROCESSED_DOCKERFILE"
            }
            
            echo "Created processed Dockerfile at $PROCESSED_DOCKERFILE for scanning"
            
            echo "Running Snyk container test..."
            
            # Method 1: Use snyk container test with file
            echo "Using Snyk container test with processed Dockerfile..."
            snyk container test "$BASE_IMAGE" --file="$PROCESSED_DOCKERFILE" --severity-threshold=medium > "${SCAN_RESULTS_DIR}/scan_results.txt" 2>&1 || true
            CONTAINER_SCAN_EXIT_CODE=$?
            
            if [ "$DEBUG_MODE" = "true" ]; then
              echo "Snyk container test exit code: $CONTAINER_SCAN_EXIT_CODE"
              echo "First 20 lines of container test output:"
              head -n 20 "${SCAN_RESULTS_DIR}/scan_results.txt"
              echo "..."
            fi
            
            # Check if container scan worked or failed
            if [ $CONTAINER_SCAN_EXIT_CODE -gt 1 ] || grep -q "FATAL" "${SCAN_RESULTS_DIR}/scan_results.txt" || grep -q "ERROR" "${SCAN_RESULTS_DIR}/scan_results.txt"; then
              echo "Container scan failed. Trying IaC scan method..."
              
              # Method 2: Use snyk iac test for Dockerfile analysis
              echo "Using snyk iac test for Dockerfile analysis..."
              snyk iac test "$PROCESSED_DOCKERFILE" --severity-threshold=medium > "${SCAN_RESULTS_DIR}/iac_scan.txt" 2>&1 || true
              IAC_SCAN_EXIT_CODE=$?
              
              if [ "$DEBUG_MODE" = "true" ]; then
                echo "Snyk IaC test exit code: $IAC_SCAN_EXIT_CODE"
                echo "First 20 lines of IaC test output:"
                head -n 20 "${SCAN_RESULTS_DIR}/iac_scan.txt"
                echo "..."
              fi
              
              # If IaC scan worked, use its results
              if [ $IAC_SCAN_EXIT_CODE -eq 0 ] || [ $IAC_SCAN_EXIT_CODE -eq 1 ] && ! grep -q "FATAL" "${SCAN_RESULTS_DIR}/iac_scan.txt" && ! grep -q "ERROR" "${SCAN_RESULTS_DIR}/iac_scan.txt"; then
                echo "IaC scan successful, using results"
                cp "${SCAN_RESULTS_DIR}/iac_scan.txt" "${SCAN_RESULTS_DIR}/scan_results.txt"
              else
                echo "Both scanning methods failed. Performing enhanced Dockerfile analysis."
                
                # Method 3: Enhanced Dockerfile analysis
                echo "Performing enhanced Dockerfile analysis..."
                
                # Get security issues from custom function
                security_issues=($(check_dockerfile_security "$DOCKERFILE_PATH"))
                
                {
                  echo "Enhanced Dockerfile Analysis:"
                  echo ""
                  echo "Base image: $BASE_IMAGE"
                  echo ""
                  echo "Security findings:"
                  
                  if [ ${#security_issues[@]} -eq 0 ]; then
                    echo "No security issues found in basic analysis."
                  else
                    for issue in "${security_issues[@]}"; do
                      echo "- WARNING: $issue"
                      CONFIG_ISSUES+=("$issue")
                    done
                  fi
                  
                  echo ""
                  echo "NOTE: This is an enhanced analysis performed because Snyk scanning failed."
                } > "${SCAN_RESULTS_DIR}/scan_results.txt"
                
                # Set the status for enhanced scan
                if [ ${#CONFIG_ISSUES[@]} -gt 0 ]; then
                  VULN_ISSUES="Enhanced scan found issues"
                else
                  VULN_ISSUES="Scan failed, enhanced check passed"
                fi
                
                # Mark as an issue
                HAS_ISSUES=true
                ISSUES_COUNT=$((ISSUES_COUNT + 1))
                SCAN_FAILURES=$((SCAN_FAILURES + 1))
              fi
            fi
            
            # Show scan output in debug mode or on failure
            if [ "$DEBUG_MODE" = "true" ] || [ "$VULN_ISSUES" = "Scan failed" ] || [ "$SCAN_FAILURES" -gt 0 ]; then
              echo "Scan output (first 15 lines):"
              head -n 15 "${SCAN_RESULTS_DIR}/scan_results.txt" || true
              echo "..."
            fi
            
            # Parse Snyk results to determine severity
            if grep -qi "critical vulnerability" "${SCAN_RESULTS_DIR}/scan_results.txt" 2>/dev/null; then
              VULN_ISSUES="Critical severity"
              HAS_HIGH_SEVERITY=true
              HIGH_COUNT=$((HIGH_COUNT + 1))
            elif grep -qi "high severity" "${SCAN_RESULTS_DIR}/scan_results.txt" 2>/dev/null; then
              VULN_ISSUES="High severity"
              HAS_HIGH_SEVERITY=true
              HIGH_COUNT=$((HIGH_COUNT + 1))
            elif grep -qi "medium severity" "${SCAN_RESULTS_DIR}/scan_results.txt" 2>/dev/null; then
              VULN_ISSUES="Medium severity"
              HAS_ISSUES=true
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
            elif grep -qi "low severity" "${SCAN_RESULTS_DIR}/scan_results.txt" 2>/dev/null; then
              VULN_ISSUES="Low severity"
            elif grep -qi "no vulnerable paths found" "${SCAN_RESULTS_DIR}/scan_results.txt" 2>/dev/null || grep -qi "no issues found" "${SCAN_RESULTS_DIR}/scan_results.txt" 2>/dev/null; then
              VULN_ISSUES="No vulnerabilities"
            elif grep -qi "FATAL" "${SCAN_RESULTS_DIR}/scan_results.txt" || grep -qi "ERROR" "${SCAN_RESULTS_DIR}/scan_results.txt"; then
              # Mark scanning errors if not already set
              if [ "$VULN_ISSUES" = "None" ]; then
                VULN_ISSUES="Scan failed"
                CONFIG_ISSUES+=("Snyk scan failed - check logs")
                HAS_ISSUES=true
                ISSUES_COUNT=$((ISSUES_COUNT + 1))
                SCAN_FAILURES=$((SCAN_FAILURES + 1))
              fi
            fi
            
            # Get configuration issues from Snyk results
            if grep -q "Recommendations for base image" "${SCAN_RESULTS_DIR}/scan_results.txt" 2>/dev/null; then
              CONFIG_ISSUES+=("Base image recommendations available")
            fi
            
            if grep -q "Dockerfile best practices" "${SCAN_RESULTS_DIR}/scan_results.txt" 2>/dev/null; then
              # Extract best practice issues if present
              BEST_PRACTICES=$(grep -A 10 "Dockerfile best practices" "${SCAN_RESULTS_DIR}/scan_results.txt" | grep -v "Dockerfile best practices" | grep -v "^$" | head -n 3 | sed 's/^[[:space:]]*//' || echo "")
              if [ -n "$BEST_PRACTICES" ]; then
                CONFIG_ISSUES+=("$BEST_PRACTICES")
              fi
            fi
            
            # Determine final status based on results
            if [ ${#CONFIG_ISSUES[@]} -eq 0 ]; then
              CONFIG_ISSUES_STR="None"
            else
              CONFIG_ISSUES_STR=$(printf "%s; " "${CONFIG_ISSUES[@]}" | sed 's/; $//')
            fi
            
            if [ "$VULN_ISSUES" = "None" ] || [ "$VULN_ISSUES" = "No vulnerabilities" ] && [ "$CONFIG_ISSUES_STR" = "None" ]; then
              STATUS="✅ Pass"
              PASSED_COUNT=$((PASSED_COUNT + 1))
            elif [ "$VULN_ISSUES" = "Critical severity" ] || [ "$VULN_ISSUES" = "High severity" ] || [ "$VULN_ISSUES" = "Scan failed" ]; then
              STATUS="❌ Fail"
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
            else
              STATUS="⚠️ Warning"
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
            fi
            
            REPORT_ROWS+=("${DIR}|${IMAGE_TYPES[$DIR]}|${STATUS}|${VULN_ISSUES}|${CONFIG_ISSUES_STR}")
            ROWS+=$'\n'"• ${DIR}: ${STATUS}"
            
            echo "Scan completed for $DIR with status: $STATUS"
          done
          
          print_section "Scan Summary"
          
          # Determine overall status
          if [ $SCAN_FAILURES -gt 0 ]; then
            SCAN_STATUS="⚠️ Scan failures: $SCAN_FAILURES"
            HAS_ISSUES=true
          elif $HAS_HIGH_SEVERITY; then
            SCAN_STATUS="❌ Security issues found"
          elif $HAS_ISSUES; then 
            SCAN_STATUS="⚠️ Issues found"
          else
            SCAN_STATUS="✅ All secure"
          fi
          
          if $HAS_HIGH_SEVERITY; then
            OVERALL_STATUS="❌ Failed"
          elif $HAS_ISSUES; then 
            OVERALL_STATUS="⚠️ Issues Found"
          else
            OVERALL_STATUS="✅ All Secure"
          fi
          
          # Set timezone for consistent reporting
          TZ=Europe/London
          export TZ
          LON_DATE="$(date '+%a %d %b %Y %T %Z')"
          
          # Create GitHub step summary
          echo "# Dockerfile Security Scan Results" > "$GITHUB_STEP_SUMMARY"
          
          echo "## Summary Overview" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|:-------|:------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Scan Date** | $LON_DATE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Status** | $OVERALL_STATUS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Scan Status** | $SCAN_STATUS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Snyk Version** | ${{ steps.snyk_version.outputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Scanner Mode** | Dockerfile Analysis (no build) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Total Images** | ${#DOCKERFILE_DIRS[@]} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Passed** | $PASSED_COUNT |" >> "$GITHUB_STEP_SUMMARY" 
          echo "| **Issues** | $ISSUES_COUNT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Critical/High** | $HIGH_COUNT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Scan Failures** | $SCAN_FAILURES |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "## Detailed Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "<table>" >> "$GITHUB_STEP_SUMMARY"
          echo "  <tr>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Dockerfile</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Image Type</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='center'>Status</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Security Issues</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Configuration Issues</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "  </tr>" >> "$GITHUB_STEP_SUMMARY"
          
          for ROW in "${REPORT_ROWS[@]}"; do
            IFS='|' read -r DIR IMAGE_TYPE STATUS VULN CONFIG <<< "$ROW"
            echo "  <tr>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${DIR}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${IMAGE_TYPE}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td align='center'>${STATUS}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${VULN}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${CONFIG}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "  </tr>" >> "$GITHUB_STEP_SUMMARY"
          done
          
          echo "</table>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "## Security Checks Performed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check Type | Description | Severity |" >> "$GITHUB_STEP_SUMMARY"
          echo "|:-----------|:------------|:---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Container Analysis** | Snyk container test with resolved base image | Critical/High = Fail |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **IaC Analysis** | Snyk IaC test for processed Dockerfile | Critical/High = Fail |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Best Practices** | Identifies Dockerfile best practices issues | Warning |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Enhanced Analysis** | Custom security pattern detection | Warning |" >> "$GITHUB_STEP_SUMMARY"
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Notes" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow resolves base image variables before scanning to handle ARG/ENV usage" >> "$GITHUB_STEP_SUMMARY"
          echo "- Avoids building Docker images while still performing security scanning" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scans run nightly at 03:00 UTC to catch newly discovered vulnerabilities" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR scans only run on labeled PRs ('safe-to-test') to maintain security" >> "$GITHUB_STEP_SUMMARY"
          
          if [ $SCAN_FAILURES -gt 0 ]; then
            echo "- **⚠️ Some scans failed.** Enhanced analysis was performed instead." >> "$GITHUB_STEP_SUMMARY"
          fi
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details>" >> "$GITHUB_STEP_SUMMARY"
          echo "<summary>Technical Scan Information</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Scanner:** Snyk" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Primary Method:** \`snyk container test <resolved-base-image> --file=Dockerfile\`" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Secondary Method:** \`snyk iac test Dockerfile\`" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Fallback Method:** Enhanced Dockerfile pattern analysis" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Workflow Run ID:** \`${{ github.run_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          
          # If debug mode is enabled, print detailed logs
          if [ "$DEBUG_MODE" = "true" ]; then
            print_section "Debug: Processed Dockerfiles"
            echo "Contents of processed Dockerfiles:"
            for DIR in "${DOCKERFILE_DIRS[@]}"; do
              PROCESSED_DOCKERFILE="processed_dockerfiles/${DIR}_Dockerfile"
              if [ -f "$PROCESSED_DOCKERFILE" ]; then
                echo "Processed Dockerfile for $DIR:"
                cat "$PROCESSED_DOCKERFILE"
                echo ""
              fi
            done
            
            print_section "Debug: Scan Results Details"
            for DIR in "${DOCKERFILE_DIRS[@]}"; do
              if [ -f "scan_results/${DIR}/scan_results.txt" ]; then
                echo "Results for ${DIR}:"
                cat "scan_results/${DIR}/scan_results.txt"
                echo ""
              fi
            done
          fi
          
          # Output results for use in later steps
          echo "results<<EOF" >> $GITHUB_OUTPUT
          echo -e "${ROWS}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Output status for Slack notification
          if $HAS_HIGH_SEVERITY; then
            echo "status=high_severity" >> $GITHUB_OUTPUT
          elif $HAS_ISSUES; then
            echo "status=issues_found" >> $GITHUB_OUTPUT
          else
            echo "status=secure" >> $GITHUB_OUTPUT
          fi
          
          echo "debug_mode=$DEBUG_MODE" >> $GITHUB_OUTPUT
          echo "snyk_version=${{ steps.snyk_version.outputs.version }}" >> $GITHUB_OUTPUT
          echo "scanner_mode=dockerfile" >> $GITHUB_OUTPUT
          echo "scan_failures=$SCAN_FAILURES" >> $GITHUB_OUTPUT
          
          # Print final scan summary to logs
          print_section "Final Results"
          echo "Scan completed with status: $OVERALL_STATUS"
          echo "Total images: ${#DOCKERFILE_DIRS[@]}"
          echo "Passed: $PASSED_COUNT"
          echo "Issues: $ISSUES_COUNT"
          echo "Critical/High: $HIGH_COUNT"
          echo "Scan Failures: $SCAN_FAILURES"
          
          # Fail the workflow if high severity issues are found
          if $HAS_HIGH_SEVERITY; then
            echo "❌ High/Critical security issues detected — failing the workflow."
            exit 1
          fi

      - name: Summarize Scan Results
        if: always() && github.event.inputs.debug == 'true'
        run: |
          # Output important scan information to the logs for debugging
          echo "============================================================"
          echo "  SCAN RESULTS SUMMARY"
          echo "============================================================"
          
          # Check if scan_results directory exists
          if [ -d "scan_results" ]; then
            echo "Found scan results directory. Summarizing scan findings:"
            
            # List all scan result directories
            echo "Scan directories:"
            ls -la scan_results/
            
            # List processed Dockerfiles
            echo "Processed Dockerfiles:"
            ls -la processed_dockerfiles/
            
            # Show brief summary of each scan result
            for DIR in scan_results/*; do
              if [ -d "$DIR" ]; then
                DIRNAME=$(basename "$DIR")
                echo "------------------------------------------------------------"
                echo "Summary for $DIRNAME:"
                
                # Show scan result file if it exists
                if [ -f "$DIR/scan_results.txt" ]; then
                  echo "First 10 lines of scan results:"
                  head -n 10 "$DIR/scan_results.txt"
                  
                  # Check for specific patterns
                  if grep -q "FATAL" "$DIR/scan_results.txt" || grep -q "ERROR" "$DIR/scan_results.txt"; then
                    echo "⚠️ ERROR found in scan output"
                  elif grep -q "vulnerability" "$DIR/scan_results.txt"; then
                    echo "🔍 Vulnerabilities found in scan output"
                  elif grep -q "No vulnerabilities" "$DIR/scan_results.txt" || grep -q "no vulnerable paths found" "$DIR/scan_results.txt"; then
                    echo "✅ No vulnerabilities found"
                  fi
                else
                  echo "❌ No scan_results.txt file found"
                fi
                
                echo ""
              fi
            done
          else
            echo "❌ No scan_results directory found"
          fi
          
          echo "============================================================"
          echo "Debug information has been logged above and in the GitHub Step Summary"
          echo "============================================================"

      - name: Slack Notification
        if: >
          always() &&
          (steps.scan.outputs.status != 'secure' || 
          github.event.inputs.debug == 'true' || 
          github.event_name == 'schedule' ||
          job.status == 'failure' ||
          steps.scan.outputs.scan_failures != '0')
        continue-on-error: true
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: repo,workflow
          custom_payload: |
            {
              "attachments": [
                {
                  "color": "${{ job.status == 'failure' && 'danger' || steps.scan.outputs.status == 'secure' && 'good' || steps.scan.outputs.status == 'high_severity' && 'danger' || 'warning' }}",
                  "title": "Dockerfile Security Scan Results",
                  "text": "${{ job.status == 'failure' && '🚨 Workflow failed' || steps.scan.outputs.status == 'secure' && '✅ All Dockerfiles are secure' || steps.scan.outputs.status == 'high_severity' && '🚨 High severity issues detected' || steps.scan.outputs.scan_failures != '0' && '⚠️ Some scans failed' || '⚠️ Security issues detected' }}\n${{ steps.scan.outputs.results }}\n\n*Scanner:* Snyk | *Version:* ${{ steps.scan.outputs.snyk_version || 'Unknown' }}",
                  "mrkdwn_in": ["text"],
                  "footer": "Snyk Dockerfile Security Scan | Run ID: ${{ github.run_id }} | $(TZ=Europe/London date '+%d-%m-%Y %H:%M %Z')"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}