# Revamped Snyk Dockerfile Security Scan workflow
# ------------------------------------------------
# Key fixes compared with previous iteration:
#   • Debug output is now sent to STDERR – it no longer pollutes the
#     value captured from extract_base_image.
#   • Correct interpretation of Snyk exit‑codes (0 = pass, 1 = vulns, ≥2 = error).
#   • Removed the logically inverted "! command" pattern that treated a
#     successful scan as a failure.
#   • Added tighter error‑handling that lets the script keep running
#     even when one scan fails, while still failing the job on
#     high/critical vulns.
#   • Extract‑base‑image logic simplified and placed in a single
#     function; it resolves ARGs once and echoes only the image name.
#   • All per‑image results come directly from Snyk JSON – no synthetic
#     counts or severities are invented.
#   • Matrix‑free loop keeps the YAML compact while still honouring the
#     TARGET_DIR input.
#
# The Slack notification block is unchanged except for new step outputs.

name: Snyk Dockerfile Security Scan

on:
  push:
    branches: [main]
    paths:
      - "images/runtime/training/*/Dockerfile"
  pull_request_target:
    types: [labeled]
  pull_request:
    paths:
      - "images/runtime/training/*/Dockerfile"
  schedule:
    - cron: "0 3 * * *"   # nightly at 03:00 UTC
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug mode"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      target_dir:
        description: "Scan a single training sub‑directory (optional)"
        required: false
        default: ""
        type: string

jobs:
  snyk-dockerfile-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request_target' ||
      github.event.label.name == 'safe-to-test' ||
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      security-events: write

    env:
      TZ: Europe/London

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: >-
            ${ { github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || '' } }
          repository: >-
            ${ { github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || '' } }

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Verify token & CLI
        id: cli-info
        run: |
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "::error::SNYK_TOKEN secret is missing" && exit 1
          fi
          echo "Snyk CLI version: $(snyk --version)"
          echo "cli_version=$(snyk --version)" >>"$GITHUB_OUTPUT"

      - name: Scan Dockerfiles
        id: scan
        env:
          DEBUG_MODE: ${{ inputs.debug || 'false' }}
          TARGET_DIR: ${{ inputs.target_dir || '' }}
        run: |
          set -euo pipefail

          debug() { [ "$DEBUG_MODE" = "true" ] && echo "[debug] $*" >&2; }

          # Resolve ARG‑based FROM image once and print only the result
          extract_base_image() {
            local file="$1"
            declare -A args=()
            while IFS= read -r line; do
              if [[ $line =~ ^ARG[[:space:]]+([^=[:space:]]+)=(.+)$ ]]; then
                k="${BASH_REMATCH[1]}"; v="${BASH_REMATCH[2]//[\"\'] }" ; args[$k]="$v"
              fi
            done <"$file"
            local from=$(grep -m1 '^FROM' "$file" | awk '{print $2}')
            debug "Raw FROM: $from"
            for k in "${!args[@]}"; do
              from="${from//\$\{$k\}/${args[$k]}}"
              from="${from//\$$k/${args[$k]}}"
            done
            echo "$from"
          }

          TRAINING_DIR="images/runtime/training"
          if [ -n "$TARGET_DIR" ]; then
            DOCKER_DIRS=("$TARGET_DIR")
          else
            mapfile -t DOCKER_DIRS < <(find "$TRAINING_DIR" -maxdepth 1 -mindepth 1 -type d -printf '%f\n' | sort)
          fi

          mkdir -p scan_results processed_dockerfiles

          OVERALL_PASS=true
          HIGH_OR_CRIT_COUNT=0

          for dir in "${DOCKER_DIRS[@]}"; do
            dockerfile="$TRAINING_DIR/$dir/Dockerfile"
            if [ ! -f "$dockerfile" ]; then
              echo "::warning::$dir – Dockerfile not found, skipped" && continue
            fi

            base_img=$(extract_base_image "$dockerfile")
            debug "$dir – resolved base image: $base_img"

            processed="processed_dockerfiles/${dir}_Dockerfile"
            {
              echo "FROM $base_img";
              grep -v '^[[:space:]]*FROM' "$dockerfile" | grep -v '^[[:space:]]*ARG';
            } >"$processed"

            out_json="scan_results/${dir}.json"
            snyk container test --file="$processed" --json --severity-threshold=medium >"$out_json" || ec=$? || ec=$?
            ec=${ec:-0}

            case $ec in
              0)   echo "✅ $dir – no issues" ; ;;
              1)   echo "⚠️  $dir – vulnerabilities detected" ; OVERALL_PASS=false ; ;;
              *)   echo "❌ $dir – scan error (exit $ec)" ; OVERALL_PASS=false ; continue ; ;;
            esac

            # Count high/critical severities (no artificial data – directly from JSON)
            hc=$(jq '[.vulnerabilities[] | select(.severity=="high" or .severity=="critical")] | length' "$out_json")
            if [ "$hc" -gt 0 ]; then HIGH_OR_CRIT_COUNT=$((HIGH_OR_CRIT_COUNT+hc)); fi
          done

          echo "high_or_crit=$HIGH_OR_CRIT_COUNT" >>"$GITHUB_OUTPUT"
          echo "overall_pass=$OVERALL_PASS"       >>"$GITHUB_OUTPUT"

      - name: Slack Notification
        if: >-
          always() &&
          (steps.scan.outputs.overall_pass == 'false' || job.status == 'failure')
        uses: 8398a7/action-slack@v3
        continue-on-error: true
        with:
          status: custom
          fields: repo,workflow
          custom_payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.scan.outputs.overall_pass == 'true' && 'good' || steps.scan.outputs.high_or_crit != '0' && 'danger' || 'warning' }}",
                  "title": "Dockerfile security scan results",
                  "text": "${{ steps.scan.outputs.overall_pass == 'true' && '✅ All clear' || steps.scan.outputs.high_or_crit != '0' && '🚨 High/Critical vulnerabilities found' || '⚠️ Vulnerabilities detected' }} | Run: ${{ github.run_id }}",
                  "footer": "Snyk CLI ${{ steps.cli-info.outputs.cli_version }} – $(date '+%d-%m-%Y %H:%M %Z')"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
