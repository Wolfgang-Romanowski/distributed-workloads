name: Snyk Dockerfile Security Scan

on:
  push:
    branches: [ main ]
    paths:
      - 'images/runtime/training/*/Dockerfile'
  pull_request_target:
    types: [ labeled ]
  pull_request:
    paths:
      - 'images/runtime/training/*/Dockerfile'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      target_dir:
        description: 'Specific directory to scan (leave empty for all)'
        required: false
        default: ''
        type: string

jobs:
  snyk-dockerfile-scan:
    name: Snyk Dockerfile Security Scan
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request_target' || 
      github.event.label.name == 'safe-to-test' || 
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.ref || '' }}
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || '' }}

      - name: Setup Snyk
        uses: snyk/actions/setup@master

      - name: Configure Snyk Authentication
        id: verify_token
        run: |
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "::error::SNYK_TOKEN secret is not configured"
            exit 1
          fi
          
          snyk auth "${{ secrets.SNYK_TOKEN }}"
          SNYK_VERSION=$(snyk --version)
          echo "version=$SNYK_VERSION" >> $GITHUB_OUTPUT

      - name: Execute Dockerfile Security Scans
        id: scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          DEBUG_MODE: ${{ github.event.inputs.debug == 'true' }}
          TARGET_DIR: ${{ github.event.inputs.target_dir }}
          SNYK_VERSION: ${{ steps.verify_token.outputs.version }}
        run: |
          mkdir -p .github/scripts
          cat > .github/scripts/snyk-scan.sh << 'SCRIPT_EOF'
          #!/bin/bash
          set -e
          
          TRAINING_DIR="images/runtime/training"
          RESULTS_DIR="scan_results"
          mkdir -p "$RESULTS_DIR"
          
          # Global counters
          TOTAL_SCANNED=0
          BASE_IMAGES_WITH_ISSUES=0
          DOCKERFILE_CLEAN=0
          DOCKERFILE_WITH_NEW_ISSUES=0
          DOCKERFILE_INHERIT_ONLY=0
          SCAN_ERRORS=0
          
          # Results storage
          declare -A BASE_IMAGE_RESULTS
          declare -A DOCKERFILE_RESULTS
          declare -A VULNERABILITY_DETAILS
          declare -A BASE_IMAGE_NAMES
          DOCKERFILES_WITH_NEW_VULNS=""
          
          # Utility functions
          log_section() {
            echo -e "\n$1\n$(printf '=%.0s' {1..70})"
          }
          
          extract_base_image() {
            local dockerfile="$1"
            local base_image=$(grep -m 1 "^FROM" "$dockerfile" | awk '{print $2}' | sed 's/ AS .*//g')
            
            while IFS= read -r line; do
              if [[ "$line" =~ ^ARG[[:space:]]+([^=[:space:]]+)=(.+)$ ]]; then
                local var_name="${BASH_REMATCH[1]}"
                local var_value="${BASH_REMATCH[2]//[\"\']}"
                base_image="${base_image//\$\{$var_name\}/$var_value}"
                base_image="${base_image//\$$var_name/$var_value}"
              fi
            done < "$dockerfile"
            
            echo "$base_image"
          }
          
          get_vuln_counts() {
            local json_file="$1"
            
            if [ ! -f "$json_file" ] || [ ! -s "$json_file" ] || ! jq -e . "$json_file" >/dev/null 2>&1; then
              echo "0|0|0|0|0"
              return
            fi
            
            local counts=$(jq -r '[
              ([.vulnerabilities[]? | select(.severity == "critical")] | length),
              ([.vulnerabilities[]? | select(.severity == "high")] | length),
              ([.vulnerabilities[]? | select(.severity == "medium")] | length),
              ([.vulnerabilities[]? | select(.severity == "low")] | length),
              (.uniqueCount // 0)
            ] | join("|")' "$json_file" 2>/dev/null || echo "0|0|0|0|0")
            
            echo "$counts"
          }
          
          get_vulnerabilities() {
            local json_file="$1"
            local type="${2:-all}"
            local count="${3:-20}"
            
            [ ! -f "$json_file" ] && return
            
            local filter='.vulnerabilities[]?'
            case "$type" in
              "high") filter='.vulnerabilities[]? | select(.severity == "critical" or .severity == "high")' ;;
              "new") 
                local base_json="$4"
                [ ! -f "$base_json" ] && { get_vulnerabilities "$json_file" "high" "$count"; return; }
                local base_ids=$(jq -r '[.vulnerabilities[]?.id // empty] | join(",")' "$base_json" 2>/dev/null || echo "")
                filter=".vulnerabilities[]? | select(.severity == \"critical\" or .severity == \"high\") | select((.id // \"\") as \$id | (\"$base_ids\" | split(\",\") | index(\$id) | not))"
                ;;
            esac
            
            jq -r --arg count "$count" "$filter | . as \$v | 
              \"• \" + (\$v.severity|ascii_upcase) + \" | \" + 
              (\$v.id // \"Unknown\") + \" | \" + 
              (\$v.packageName // \"Unknown\") + \"@\" + (\$v.version // \"Unknown\") + \" | \" +
              \"CVSS: \" + ((\$v.cvssScore // 0)|tostring) + \" | \" +
              (\$v.title // \"No description\") + 
              (if \$v.fixedIn then \" | Fix: \" + (\$v.fixedIn|join(\", \")) else \"\" end)" \
              "$json_file" 2>/dev/null | sort -t'|' -k5 -nr | head -n "$count"
          }
          
          # Determine target directories
          if [ -n "$TARGET_DIR" ]; then
            if [ -d "$TRAINING_DIR/$TARGET_DIR" ]; then
              TARGET_DIRS=("$TARGET_DIR")
            else
              echo "Target directory $TRAINING_DIR/$TARGET_DIR does not exist"
              exit 1
            fi
          else
            TARGET_DIRS=("py311-cuda121-torch241" "py311-cuda124-torch251" "py311-rocm62-torch241" "py311-rocm62-torch251")
          fi
          
          printf "%s\n" "${TARGET_DIRS[@]}" > "$RESULTS_DIR/target_dirs.txt"
          
          # Process each target directory
          for DIR in "${TARGET_DIRS[@]}"; do
            log_section "Processing $DIR"
            
            DOCKERFILE="$TRAINING_DIR/$DIR/Dockerfile"
            TOTAL_SCANNED=$((TOTAL_SCANNED + 1))
            
            if [ ! -f "$DOCKERFILE" ]; then
              echo "ERROR: Dockerfile not found: $DOCKERFILE"
              SCAN_ERRORS=$((SCAN_ERRORS + 1))
              DOCKERFILE_RESULTS[$DIR]="ERROR|Dockerfile not found|0|0|0|0|0"
              continue
            fi
            
            BASE_IMAGE=$(extract_base_image "$DOCKERFILE")
            echo "Base image: $BASE_IMAGE"
            
            # Phase 1: Base image scan
            echo -e "\nPhase 1: Base Image Security Analysis"
            BASE_SCAN_KEY="${BASE_IMAGE//[:\/]/_}"
            BASE_SCAN_JSON="$RESULTS_DIR/base_${BASE_SCAN_KEY}.json"
            BASE_SCAN_OUTPUT="$RESULTS_DIR/base_${BASE_SCAN_KEY}_output.txt"
            
            BASE_IMAGE_NAMES[$BASE_SCAN_KEY]="$BASE_IMAGE"
            
            if [ -z "${BASE_IMAGE_RESULTS[$BASE_SCAN_KEY]}" ]; then
              echo "Running Snyk base image scan..."
              
              set +e
              snyk container test "$BASE_IMAGE" \
                --json \
                --severity-threshold=low \
                --exclude-base-image-vulns=false \
                --app-vulns \
                --nested-jars-depth=5 \
                --detection-depth=10 \
                --all-projects \
                > "$BASE_SCAN_JSON" 2> "$BASE_SCAN_OUTPUT"
              BASE_EXIT_CODE=$?
              set -e
              
              IFS='|' read -r base_critical base_high base_medium base_low base_total <<< "$(get_vuln_counts "$BASE_SCAN_JSON")"
              BASE_IMAGE_RESULTS[$BASE_SCAN_KEY]="$BASE_EXIT_CODE|$base_critical|$base_high|$base_medium|$base_low|$base_total"
              
              [ "$base_total" -gt 0 ] && BASE_IMAGES_WITH_ISSUES=$((BASE_IMAGES_WITH_ISSUES + 1))
            else
              echo "Using cached base image scan results"
              IFS='|' read -r BASE_EXIT_CODE base_critical base_high base_medium base_low base_total <<< "${BASE_IMAGE_RESULTS[$BASE_SCAN_KEY]}"
            fi
            
            echo "  Critical: $base_critical | High: $base_high | Medium: $base_medium | Low: $base_low | Total: $base_total"
            
            # Phase 2: Dockerfile scan
            echo -e "\nPhase 2: Full Dockerfile Security Analysis"
            FULL_SCAN_JSON="$RESULTS_DIR/${DIR}_full_scan.json"
            FULL_SCAN_OUTPUT="$RESULTS_DIR/${DIR}_full_scan_output.txt"
            
            set +e
            snyk container test "$BASE_IMAGE" \
              --file="$DOCKERFILE" \
              --json \
              --severity-threshold=low \
              --exclude-base-image-vulns=false \
              --app-vulns \
              --nested-jars-depth=5 \
              --detection-depth=10 \
              --all-projects \
              > "$FULL_SCAN_JSON" 2> "$FULL_SCAN_OUTPUT"
            DOCKERFILE_EXIT_CODE=$?
            set -e
            
            IFS='|' read -r docker_critical docker_high docker_medium docker_low docker_total <<< "$(get_vuln_counts "$FULL_SCAN_JSON")"
            echo "  Critical: $docker_critical | High: $docker_high | Medium: $docker_medium | Low: $docker_low | Total: $docker_total"
            
            # Analyze results
            NEW_CRITICAL=$((docker_critical - base_critical))
            NEW_HIGH=$((docker_high - base_high))
            NEW_TOTAL=$((docker_total - base_total))
            
            if [ $NEW_CRITICAL -gt 0 ] || [ $NEW_HIGH -gt 0 ]; then
              DOCKERFILE_STATUS="FAILED"
              DOCKERFILE_MSG="Introduces $NEW_CRITICAL critical, $NEW_HIGH high vulnerabilities"
              DOCKERFILES_WITH_NEW_VULNS="${DOCKERFILES_WITH_NEW_VULNS}${DIR}, "
              DOCKERFILE_WITH_NEW_ISSUES=$((DOCKERFILE_WITH_NEW_ISSUES + 1))
              VULNERABILITY_DETAILS[$DIR]="$(get_vulnerabilities "$FULL_SCAN_JSON" "new" 20 "$BASE_SCAN_JSON")"
            elif [ $NEW_TOTAL -gt 0 ]; then
              DOCKERFILE_STATUS="WARNING"
              DOCKERFILE_MSG="Introduces $NEW_TOTAL medium/low vulnerabilities"
              DOCKERFILE_INHERIT_ONLY=$((DOCKERFILE_INHERIT_ONLY + 1))
            else
              DOCKERFILE_STATUS="PASSED"
              DOCKERFILE_MSG="No new vulnerabilities introduced"
              DOCKERFILE_CLEAN=$((DOCKERFILE_CLEAN + 1))
            fi
            
            DOCKERFILE_RESULTS[$DIR]="$DOCKERFILE_STATUS|$DOCKERFILE_MSG|$docker_critical|$docker_high|$docker_medium|$docker_low|$docker_total"
            echo "  Status: $DOCKERFILE_STATUS - $DOCKERFILE_MSG"
          done
          
          DOCKERFILES_WITH_NEW_VULNS=$(echo "$DOCKERFILES_WITH_NEW_VULNS" | sed 's/, $//')
          
          # Calculate overall status
          DOCKERFILE_FAILURES_EXIST=false
          if [ $SCAN_ERRORS -gt 0 ]; then
            OVERALL_STATUS="ERROR"
            OVERALL_MSG="Scan errors encountered"
            DOCKERFILE_FAILURES_EXIST=true
          elif [ -n "$DOCKERFILES_WITH_NEW_VULNS" ]; then
            OVERALL_STATUS="FAILED"
            OVERALL_MSG="Dockerfiles introduce new critical/high vulnerabilities: $DOCKERFILES_WITH_NEW_VULNS"
            DOCKERFILE_FAILURES_EXIST=true
          elif [ $DOCKERFILE_CLEAN -eq $TOTAL_SCANNED ]; then
            OVERALL_STATUS="PASSED"
            OVERALL_MSG="All Dockerfiles clean - no new vulnerabilities introduced"
          else
            OVERALL_STATUS="WARNING"
            OVERALL_MSG="Dockerfiles introduce only medium/low vulnerabilities"
          fi
          
          if [ "$DEBUG_MODE" = "true" ] && [ $BASE_IMAGES_WITH_ISSUES -gt 0 ]; then
            OVERALL_STATUS="FAILED"
            OVERALL_MSG="$OVERALL_MSG (Debug Mode: Base images have vulnerabilities)"
            DOCKERFILE_FAILURES_EXIST=true
          fi
          
          # Save state
          cat > "$RESULTS_DIR/scan_state.env" << EOF
          OVERALL_STATUS="$OVERALL_STATUS"
          OVERALL_MSG="$OVERALL_MSG"
          TOTAL_SCANNED=$TOTAL_SCANNED
          BASE_IMAGES_WITH_ISSUES=$BASE_IMAGES_WITH_ISSUES
          DOCKERFILE_CLEAN=$DOCKERFILE_CLEAN
          DOCKERFILE_WITH_NEW_ISSUES=$DOCKERFILE_WITH_NEW_ISSUES
          DOCKERFILE_INHERIT_ONLY=$DOCKERFILE_INHERIT_ONLY
          SCAN_ERRORS=$SCAN_ERRORS
          DOCKERFILES_WITH_NEW_VULNS="$DOCKERFILES_WITH_NEW_VULNS"
          DOCKERFILE_FAILURES_EXIST=$DOCKERFILE_FAILURES_EXIST
          EOF
          
          # Save results
          for key in "${!BASE_IMAGE_RESULTS[@]}"; do
            echo "$key=${BASE_IMAGE_RESULTS[$key]}" >> "$RESULTS_DIR/base_images.data"
          done
          
          for key in "${!DOCKERFILE_RESULTS[@]}"; do
            echo "$key=${DOCKERFILE_RESULTS[$key]}" >> "$RESULTS_DIR/dockerfile_results.data"
          done
          
          for key in "${!VULNERABILITY_DETAILS[@]}"; do
            echo "$key=${VULNERABILITY_DETAILS[$key]}" >> "$RESULTS_DIR/vulnerability_details.data"
          done
          
          for key in "${!BASE_IMAGE_NAMES[@]}"; do
            echo "$key=${BASE_IMAGE_NAMES[$key]}" >> "$RESULTS_DIR/base_image_names.data"
          done
          
          # Set outputs
          echo "overall_status=$OVERALL_STATUS" >> $GITHUB_OUTPUT
          echo "scan_status=$OVERALL_MSG" >> $GITHUB_OUTPUT
          echo "dockerfile_failures_exist=$DOCKERFILE_FAILURES_EXIST" >> $GITHUB_OUTPUT
          echo "slack_msg=$OVERALL_MSG" >> $GITHUB_OUTPUT
          echo "base_issues_count=$BASE_IMAGES_WITH_ISSUES" >> $GITHUB_OUTPUT
          echo "dockerfile_clean_count=$DOCKERFILE_CLEAN" >> $GITHUB_OUTPUT
          echo "dockerfile_warning_count=$DOCKERFILE_INHERIT_ONLY" >> $GITHUB_OUTPUT
          echo "dockerfile_failed_count=$DOCKERFILE_WITH_NEW_ISSUES" >> $GITHUB_OUTPUT
          echo "scan_errors_count=$SCAN_ERRORS" >> $GITHUB_OUTPUT
          
          # Final status
          log_section "FINAL SCAN RESULTS"
          echo "Overall Status: $OVERALL_STATUS"
          echo "Message: $OVERALL_MSG"
          echo -e "\nDockerfile Scan Summary:"
          echo "  Clean: $DOCKERFILE_CLEAN | Warning: $DOCKERFILE_INHERIT_ONLY | Failed: $DOCKERFILE_WITH_NEW_ISSUES | Errors: $SCAN_ERRORS"
          echo -e "\nBase Image Summary:"
          echo "  Images with vulnerabilities: $BASE_IMAGES_WITH_ISSUES (report-only)"
          
          # Exit based on results
          if [ "$DEBUG_MODE" = "true" ] && [ "$DOCKERFILE_FAILURES_EXIST" = "true" ]; then
            exit 1
          elif [ "$DOCKERFILE_WITH_NEW_ISSUES" -gt 0 ] || [ $SCAN_ERRORS -gt 0 ]; then
            exit 1
          else
            exit 0
          fi
          SCRIPT_EOF
          
          chmod +x .github/scripts/snyk-scan.sh
          .github/scripts/snyk-scan.sh

      - name: Generate Enhanced GitHub Summary
        if: always()
        env:
          SNYK_VERSION: ${{ steps.verify_token.outputs.version }}
          DEBUG_MODE: ${{ github.event.inputs.debug == 'true' }}
        run: |
          cat > .github/scripts/generate-summary.sh << 'SUMMARY_EOF'
          #!/bin/bash
          
          RESULTS_DIR="scan_results"
          SNYK_VERSION="${SNYK_VERSION:-Unknown}"
          DEBUG_MODE="${DEBUG_MODE:-false}"
          
          # Helper functions
          get_package_summary() {
            local json_file="$1"
            [ ! -f "$json_file" ] && { echo "No package data available"; return; }
            
            local total_deps=$(jq '.dependencyCount // 0' "$json_file" 2>/dev/null)
            local vuln_deps=$(jq '[.vulnerabilities[]?.packageName] | unique | length' "$json_file" 2>/dev/null || echo "0")
            
            echo "Total Dependencies: $total_deps | Vulnerable: $vuln_deps"
          }
          
          get_remediation_summary() {
            local json_file="$1"
            [ ! -f "$json_file" ] && return
            
            jq -r '[.vulnerabilities[]? | select(.fixedIn)] | 
              group_by(.packageName) | 
              map({
                package: .[0].packageName,
                current: .[0].version,
                recommended: (.[0].fixedIn | sort | last),
                vulnCount: length
              }) | 
              sort_by(-.vulnCount) | 
              .[:5] | 
              map("• " + .package + ": " + .current + " → " + .recommended + " (fixes " + (.vulnCount|tostring) + " vulnerabilities)") | 
              join("\n")' "$json_file" 2>/dev/null || echo ""
          }
          
          get_vulnerabilities() {
            local json_file="$1"
            local type="${2:-all}"
            local count="${3:-20}"
            
            [ ! -f "$json_file" ] && return
            
            local filter='.vulnerabilities[]?'
            case "$type" in
              "high") filter='.vulnerabilities[]? | select(.severity == "critical" or .severity == "high")' ;;
              "new") 
                local base_json="$4"
                [ ! -f "$base_json" ] && { get_vulnerabilities "$json_file" "high" "$count"; return; }
                local base_ids=$(jq -r '[.vulnerabilities[]?.id // empty] | join(",")' "$base_json" 2>/dev/null || echo "")
                filter=".vulnerabilities[]? | select(.severity == \"critical\" or .severity == \"high\") | select((.id // \"\") as \$id | (\"$base_ids\" | split(\",\") | index(\$id) | not))"
                ;;
              *) filter=".vulnerabilities[]? | select(.severity == \"$type\")" ;;
            esac
            
            jq -r --arg count "$count" "$filter | . as \$v | 
              \"• \" + (\$v.severity|ascii_upcase) + \" | \" + 
              (\$v.id // \"Unknown\") + \" | \" + 
              (\$v.packageName // \"Unknown\") + \"@\" + (\$v.version // \"Unknown\") + \" | \" +
              \"CVSS: \" + ((\$v.cvssScore // 0)|tostring) + \" | \" +
              (\$v.title // \"No description\") + 
              (if \$v.fixedIn then \" | Fix: \" + (\$v.fixedIn|join(\", \")) else \"\" end)" \
              "$json_file" 2>/dev/null | sort -t'|' -k5 -nr | head -n "$count"
          }
          
          get_vuln_count() {
            local json_file="$1"
            local severity="${2:-all}"
            
            [ ! -f "$json_file" ] && { echo "0"; return; }
            
            local filter='.vulnerabilities[]?'
            case "$severity" in
              "high") filter='.vulnerabilities[]? | select(.severity == "critical" or .severity == "high")' ;;
              "all") filter='.vulnerabilities[]?' ;;
              *) filter=".vulnerabilities[]? | select(.severity == \"$severity\")" ;;
            esac
            
            jq "[$filter] | length" "$json_file" 2>/dev/null || echo "0"
          }
          
          # Read scan results
          if [ -f "$RESULTS_DIR/scan_state.env" ]; then
            source "$RESULTS_DIR/scan_state.env"
          else
            echo "# Snyk Dockerfile Security Scan Results" >> $GITHUB_STEP_SUMMARY
            echo "## ⚠️ Scan Results Not Found" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          
          # Read data arrays
          declare -A BASE_IMAGE_RESULTS
          declare -A DOCKERFILE_RESULTS
          declare -A VULNERABILITY_DETAILS
          declare -A BASE_IMAGE_NAMES
          
          [ -f "$RESULTS_DIR/base_images.data" ] && while IFS='=' read -r key value; do
            BASE_IMAGE_RESULTS["$key"]="$value"
          done < "$RESULTS_DIR/base_images.data"
          
          [ -f "$RESULTS_DIR/dockerfile_results.data" ] && while IFS='=' read -r key value; do
            DOCKERFILE_RESULTS["$key"]="$value"
          done < "$RESULTS_DIR/dockerfile_results.data"
          
          [ -f "$RESULTS_DIR/base_image_names.data" ] && while IFS='=' read -r key value; do
            BASE_IMAGE_NAMES["$key"]="$value"
          done < "$RESULTS_DIR/base_image_names.data"
          
          # Read target directories
          TARGET_DIRS=()
          [ -f "$RESULTS_DIR/target_dirs.txt" ] && while IFS= read -r dir; do
            TARGET_DIRS+=("$dir")
          done < "$RESULTS_DIR/target_dirs.txt"
          
          # Begin GitHub Summary
          {
            echo "# 🛡️ Snyk Container Security Analysis Report"
            echo ""
            
            # Status Badge
            case "$OVERALL_STATUS" in
              "PASSED") echo "![Security Status](https://img.shields.io/badge/Security%20Status-PASSED-brightgreen?style=for-the-badge)" ;;
              "WARNING") echo "![Security Status](https://img.shields.io/badge/Security%20Status-WARNING-yellow?style=for-the-badge)" ;;
              "FAILED") echo "![Security Status](https://img.shields.io/badge/Security%20Status-FAILED-red?style=for-the-badge)" ;;
              "ERROR") echo "![Security Status](https://img.shields.io/badge/Security%20Status-ERROR-darkred?style=for-the-badge)" ;;
            esac
            
            echo ""
            echo "## 📊 Executive Summary"
            echo ""
            echo "### Scan Result: **$OVERALL_STATUS**"
            echo "> $OVERALL_MSG"
            echo ""
            echo "| Metric | Value |"
            echo "|:-------|------:|"
            echo "| **Scan Timestamp** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |"
            echo "| **Snyk Version** | $SNYK_VERSION |"
            echo "| **Images Analyzed** | $TOTAL_SCANNED |"
            echo "| **Build Status** | $([ $DOCKERFILE_WITH_NEW_ISSUES -gt 0 ] && echo "🚫 Blocked" || echo "✅ Allowed") |"
            echo ""
            
            # Calculate totals
            TOTAL_CRITICAL=0
            TOTAL_HIGH=0
            TOTAL_MEDIUM=0
            TOTAL_LOW=0
            
            for DIR in "${TARGET_DIRS[@]}"; do
              if [ -n "${DOCKERFILE_RESULTS[$DIR]}" ]; then
                IFS='|' read -r status msg docker_critical docker_high docker_medium docker_low docker_total <<< "${DOCKERFILE_RESULTS[$DIR]}"
                
                DOCKERFILE_PATH="images/runtime/training/$DIR/Dockerfile"
                if [ -f "$DOCKERFILE_PATH" ]; then
                  BASE_IMAGE=$(grep -m 1 "^FROM" "$DOCKERFILE_PATH" | awk '{print $2}' | sed 's/ AS .*//g')
                  BASE_SCAN_KEY="${BASE_IMAGE//[:\/]/_}"
                  
                  if [ -n "${BASE_IMAGE_RESULTS[$BASE_SCAN_KEY]}" ]; then
                    IFS='|' read -r base_exit_code base_critical base_high base_medium base_low base_total <<< "${BASE_IMAGE_RESULTS[$BASE_SCAN_KEY]}"
                    
                    NEW_CRITICAL=$((docker_critical - base_critical))
                    NEW_HIGH=$((docker_high - base_high))
                    NEW_MEDIUM=$((docker_medium - base_medium))
                    NEW_LOW=$((docker_low - base_low))
                    
                    [ $NEW_CRITICAL -gt 0 ] && TOTAL_CRITICAL=$((TOTAL_CRITICAL + NEW_CRITICAL))
                    [ $NEW_HIGH -gt 0 ] && TOTAL_HIGH=$((TOTAL_HIGH + NEW_HIGH))
                    [ $NEW_MEDIUM -gt 0 ] && TOTAL_MEDIUM=$((TOTAL_MEDIUM + NEW_MEDIUM))
                    [ $NEW_LOW -gt 0 ] && TOTAL_LOW=$((TOTAL_LOW + NEW_LOW))
                  fi
                fi
              fi
            done
            
            echo "## 🔍 Vulnerability Analysis"
            echo ""
            echo "### New Vulnerabilities Introduced"
            echo "| Severity | Count | Impact |"
            echo "|:---------|------:|:-------|"
            echo "| **Critical** | $TOTAL_CRITICAL | $([ $TOTAL_CRITICAL -gt 0 ] && echo "🔴 Immediate action required" || echo "✅ None detected") |"
            echo "| **High** | $TOTAL_HIGH | $([ $TOTAL_HIGH -gt 0 ] && echo "🟠 Priority remediation needed" || echo "✅ None detected") |"
            echo "| **Medium** | $TOTAL_MEDIUM | $([ $TOTAL_MEDIUM -gt 0 ] && echo "🟡 Schedule for remediation" || echo "✅ None detected") |"
            echo "| **Low** | $TOTAL_LOW | $([ $TOTAL_LOW -gt 0 ] && echo "🟢 Monitor and track" || echo "✅ None detected") |"
            echo ""
            
            # Dockerfile Analysis
            echo "## 📦 Dockerfile Security Analysis"
            echo ""
            
            for DIR in "${TARGET_DIRS[@]}"; do
              if [ -n "${DOCKERFILE_RESULTS[$DIR]}" ]; then
                IFS='|' read -r status msg docker_critical docker_high docker_medium docker_low docker_total <<< "${DOCKERFILE_RESULTS[$DIR]}"
                
                DOCKERFILE_PATH="images/runtime/training/$DIR/Dockerfile"
                NEW_CRITICAL=0
                NEW_HIGH=0
                NEW_MEDIUM=0
                NEW_LOW=0
                NEW_TOTAL=0
                BASE_SCAN_KEY=""
                
                if [ -f "$DOCKERFILE_PATH" ]; then
                  BASE_IMAGE=$(grep -m 1 "^FROM" "$DOCKERFILE_PATH" | awk '{print $2}' | sed 's/ AS .*//g')
                  BASE_SCAN_KEY="${BASE_IMAGE//[:\/]/_}"
                  
                  if [ -n "${BASE_IMAGE_RESULTS[$BASE_SCAN_KEY]}" ]; then
                    IFS='|' read -r base_exit_code base_critical base_high base_medium base_low base_total <<< "${BASE_IMAGE_RESULTS[$BASE_SCAN_KEY]}"
                    
                    NEW_CRITICAL=$((docker_critical - base_critical))
                    NEW_HIGH=$((docker_high - base_high))
                    NEW_MEDIUM=$((docker_medium - base_medium))
                    NEW_LOW=$((docker_low - base_low))
                    NEW_TOTAL=$((docker_total - base_total))
                    
                    [ $NEW_CRITICAL -lt 0 ] && NEW_CRITICAL=0
                    [ $NEW_HIGH -lt 0 ] && NEW_HIGH=0
                    [ $NEW_MEDIUM -lt 0 ] && NEW_MEDIUM=0
                    [ $NEW_LOW -lt 0 ] && NEW_LOW=0
                    [ $NEW_TOTAL -lt 0 ] && NEW_TOTAL=0
                  fi
                fi
                
                STATUS_INDICATOR="✅"
                [ $NEW_CRITICAL -gt 0 ] || [ $NEW_HIGH -gt 0 ] && STATUS_INDICATOR="❌"
                [ $NEW_CRITICAL -eq 0 ] && [ $NEW_HIGH -eq 0 ] && [ $NEW_TOTAL -gt 0 ] && STATUS_INDICATOR="⚠️"
                
                FULL_SCAN_JSON="$RESULTS_DIR/${DIR}_full_scan.json"
                BASE_SCAN_JSON="$RESULTS_DIR/base_${BASE_SCAN_KEY}.json"
                
                echo "<details>"
                echo "<summary>"
                echo ""
                echo "### $STATUS_INDICATOR \`$DIR\`"
                echo ""
                echo "| Metric | Value |"
                echo "|:-------|------:|"
                echo "| **Status** | $status |"
                echo "| **New Vulnerabilities** | C:$NEW_CRITICAL H:$NEW_HIGH M:$NEW_MEDIUM L:$NEW_LOW |"
                echo "| **Total in Image** | $docker_total |"
                echo ""
                echo "</summary>"
                echo ""
                
                if [ -f "$FULL_SCAN_JSON" ]; then
                  echo "#### 📦 Package Analysis"
                  echo "\`\`\`"
                  get_package_summary "$FULL_SCAN_JSON"
                  echo "\`\`\`"
                  echo ""
                  
                  if [ $NEW_TOTAL -gt 0 ]; then
                    echo "#### 🚨 New Vulnerabilities Introduced"
                    echo ""
                    
                    for severity in critical high medium low; do
                      var_name="NEW_$(echo $severity | tr '[:lower:]' '[:upper:]')"
                      count=${!var_name}
                      
                      if [ $count -gt 0 ]; then
                        echo "**${severity^} Severity:**"
                        echo "\`\`\`"
                        get_vulnerabilities "$FULL_SCAN_JSON" "$severity" 10
                        echo "\`\`\`"
                        echo ""
                      fi
                    done
                    
                    REMEDIATION=$(get_remediation_summary "$FULL_SCAN_JSON")
                    if [ -n "$REMEDIATION" ]; then
                      echo "#### 🔧 Remediation Actions"
                      echo "\`\`\`"
                      echo "$REMEDIATION"
                      echo "\`\`\`"
                      echo ""
                    fi
                  else
                    echo "#### ✅ Security Assessment"
                    echo "No new vulnerabilities introduced. All vulnerabilities are inherited from base image."
                    echo ""
                  fi
                  
                  echo "#### 📋 Scan Metadata"
                  echo "| Property | Value |"
                  echo "|:---------|:------|"
                  echo "| **Base Image** | \`${BASE_IMAGE_NAMES[$BASE_SCAN_KEY]:-Unknown}\` |"
                  echo "| **Scan File** | \`$DOCKERFILE_PATH\` |"
                  echo ""
                fi
                
                echo "</details>"
                echo ""
              fi
            done
            
            # Base Image Analysis
            echo "## 🐳 Base Image Security Analysis"
            echo ""
            
            # Create mapping of base images to Dockerfiles
            declare -A BASE_TO_DOCKERFILES
            for DIR in "${TARGET_DIRS[@]}"; do
              if [ -f "images/runtime/training/$DIR/Dockerfile" ]; then
                BASE_IMAGE=$(grep -m 1 "^FROM" "images/runtime/training/$DIR/Dockerfile" | awk '{print $2}' | sed 's/ AS .*//g')
                BASE_SCAN_KEY="${BASE_IMAGE//[:\/]/_}"
                if [ -z "${BASE_TO_DOCKERFILES[$BASE_SCAN_KEY]}" ]; then
                  BASE_TO_DOCKERFILES[$BASE_SCAN_KEY]="$DIR"
                else
                  BASE_TO_DOCKERFILES[$BASE_SCAN_KEY]="${BASE_TO_DOCKERFILES[$BASE_SCAN_KEY]}, $DIR"
                fi
              fi
            done
            
            echo "### Base Images Summary"
            echo "| Base Image | Used By | Vulnerabilities |"
            echo "|:-----------|:--------|----------------:|"
            
            for key in "${!BASE_IMAGE_RESULTS[@]}"; do
              IFS='|' read -r exit_code critical high medium low total <<< "${BASE_IMAGE_RESULTS[$key]}"
              base_image_name="${BASE_IMAGE_NAMES[$key]:-Unknown}"
              dockerfiles="${BASE_TO_DOCKERFILES[$key]}"
              echo "| \`$base_image_name\` | $dockerfiles | $total |"
            done
            echo ""
            
            # Detailed base image analysis
            for key in "${!BASE_IMAGE_RESULTS[@]}"; do
              IFS='|' read -r exit_code critical high medium low total <<< "${BASE_IMAGE_RESULTS[$key]}"
              base_image_name="${BASE_IMAGE_NAMES[$key]:-Unknown}"
              
              BASE_SCAN_JSON="$RESULTS_DIR/base_${key}.json"
              HIGH_COUNT=$(get_vuln_count "$BASE_SCAN_JSON" "high")
              
              echo "<details>"
              echo "<summary>"
              echo ""
              echo "### 🐳 \`$base_image_name\`"
              echo ""
              echo "| Severity | Count |"
              echo "|:---------|------:|"
              echo "| **Critical** | $critical |"
              echo "| **High** | $high |"
              echo "| **Medium** | $medium |"
              echo "| **Low** | $low |"
              echo "| **Total** | $total |"
              echo ""
              echo "</summary>"
              echo ""
              
              if [ -f "$BASE_SCAN_JSON" ] && [ "$total" -gt 0 ]; then
                echo "#### 📦 Package Analysis"
                echo "\`\`\`"
                get_package_summary "$BASE_SCAN_JSON"
                echo "\`\`\`"
                echo ""
                
                echo "#### 🚨 Vulnerability Details"
                echo "\`\`\`"
                get_vulnerabilities "$BASE_SCAN_JSON" "high" 10
                echo "\`\`\`"
                echo ""
                
                if [ "$HIGH_COUNT" -gt 10 ]; then
                  echo "<details>"
                  echo "<summary><strong>▼ Show Remaining $((HIGH_COUNT - 10)) Critical/High Vulnerabilities</strong></summary>"
                  echo ""
                  echo "\`\`\`"
                  get_vulnerabilities "$BASE_SCAN_JSON" "high" 100 | tail -n +11
                  echo "\`\`\`"
                  echo "</details>"
                  echo ""
                fi
                
                REMEDIATION=$(get_remediation_summary "$BASE_SCAN_JSON")
                if [ -n "$REMEDIATION" ]; then
                  echo "#### 🔧 Recommended Updates"
                  echo "\`\`\`"
                  echo "$REMEDIATION"
                  echo "\`\`\`"
                  echo ""
                fi
                
                echo "#### 📊 Impact Analysis"
                echo "Updating this base image would improve security for:"
                for dockerfile in ${BASE_TO_DOCKERFILES[$key]//,/ }; do
                  echo "- \`$dockerfile\`"
                done
                echo ""
              fi
              
              echo "</details>"
              echo ""
            done
            
            echo "## 📋 Security Policy Compliance"
            echo ""
            echo "| Policy | Status |"
            echo "|:-------|:-------|"
            echo "| **No Critical/High in Dockerfiles** | $([ $DOCKERFILE_WITH_NEW_ISSUES -eq 0 ] && echo "✅ Compliant" || echo "❌ Non-compliant") |"
            echo "| **Build Gate Enforcement** | $([ "$OVERALL_STATUS" != "FAILED" ] && echo "✅ Active" || echo "🚫 Blocking") |"
            echo "| **Vulnerability Scanning** | ✅ Enabled |"
            echo ""
            
            if [ $DOCKERFILE_WITH_NEW_ISSUES -gt 0 ] || [ $SCAN_ERRORS -gt 0 ]; then
              echo "## ⚡ Required Actions"
              echo ""
              echo "1. **Review Failed Dockerfiles**: Check the detailed vulnerability reports above"
              echo "2. **Update Dependencies**: Use the remediation suggestions to update vulnerable packages"
              echo "3. **Re-run Scan**: Validate fixes with \`/rerun-security-scan\` comment"
              echo ""
              echo "### Resources"
              echo "- [Snyk Vulnerability Database](https://security.snyk.io/)"
              echo "- [CVE Details](https://www.cvedetails.com/)"
              echo "- [NIST NVD](https://nvd.nist.gov/)"
              echo ""
            fi
            
            echo "---"
            echo "<sub>Generated by [Snyk Container Security](https://snyk.io/) v$SNYK_VERSION on $(date -u '+%Y-%m-%d %H:%M:%S UTC')</sub>"
            echo "<sub>[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})</sub>"
            
          } >> $GITHUB_STEP_SUMMARY
          SUMMARY_EOF
          
          chmod +x .github/scripts/generate-summary.sh
          .github/scripts/generate-summary.sh

      - name: Upload Scan Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-scan-results-${{ github.run_number }}
          path: scan_results/
          retention-days: 30

      - name: Slack Notification
        if: |
          always() && 
          github.event_name != 'pull_request' && 
          steps.scan.outputs.dockerfile_failures_exist == 'true'
        continue-on-error: true
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: repo,workflow,ref
          custom_payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🛡️ Container Security Report"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status:* ${{ steps.scan.outputs.overall_status }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:* ${{ github.repository }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Summary:* ${{ steps.scan.outputs.slack_msg }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Dockerfile Results:*\n✅ Clean: ${{ steps.scan.outputs.dockerfile_clean_count }}\n⚠️ Medium/Low: ${{ steps.scan.outputs.dockerfile_warning_count }}\n❌ Critical/High: ${{ steps.scan.outputs.dockerfile_failed_count }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Base Images:*\n${{ steps.scan.outputs.base_issues_count }} with vulnerabilities (inherited)"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "📊 View Full Report"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "style": "primary"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || '' }}