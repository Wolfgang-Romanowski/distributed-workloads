name: Snyk Dockerfile Security Scan
on:
  push:
    branches: [ main ]
  pull_request_target:
    types: [ labeled ]
  pull_request:
    paths:
      - 'images/runtime/training/*/Dockerfile'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      snyk_version:
        description: 'Snyk CLI version (leave empty for latest)'
        required: false
        default: ''
        type: string

jobs:
  snyk-dockerfile-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Use a specific Snyk version or latest if not specified
      - name: Setup Snyk
        id: setup_snyk
        run: |
          echo "::group::Setting up Snyk"
          REQUESTED_VERSION="${{ github.event.inputs.snyk_version }}"
          
          if [ -z "$REQUESTED_VERSION" ]; then
            echo "Installing latest Snyk version"
            npm install -g snyk
          else
            echo "Installing Snyk version $REQUESTED_VERSION"
            npm install -g snyk@$REQUESTED_VERSION
          fi
          
          INSTALLED_VERSION=$(snyk --version)
          echo "Installed Snyk version: $INSTALLED_VERSION"
          echo "snyk_version=$INSTALLED_VERSION" >> $GITHUB_OUTPUT
          echo "::endgroup::"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Verify Snyk Token
        id: verify_token
        run: |
          echo "::group::Verifying Snyk Token"
          # Check if SNYK_TOKEN is set
          if [ -z "$SNYK_TOKEN" ]; then
            echo "::error::SNYK_TOKEN is not set. Please add the SNYK_TOKEN secret to your repository."
            echo "token_present=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "::notice::SNYK_TOKEN is set."
            echo "token_present=true" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Test Snyk Authentication
        id: test_auth
        run: |
          echo "::group::Testing Snyk Authentication"
          # Try to authenticate with Snyk
          if ! snyk auth "$SNYK_TOKEN" > /dev/null 2>&1; then
            echo "::error::Failed to authenticate with Snyk. Check your token."
            echo "authenticated=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Verify authentication status
          snyk config get api > /dev/null 2>&1
          AUTH_EXIT_CODE=$?
          
          if [ $AUTH_EXIT_CODE -ne 0 ]; then
            echo "::error::Snyk authentication failed. Verify your SNYK_TOKEN is correct and has proper permissions."
            echo "authenticated=false" >> $GITHUB_OUTPUT
            exit 1
          else 
            echo "::notice::Snyk authentication successful."
            echo "authenticated=true" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Verify Snyk Functionality
        id: verify_functionality
        run: |
          echo "::group::Verifying Snyk Functionality"
          # Check if Snyk is functioning properly
          if ! snyk --version > /dev/null 2>&1; then
            echo "::error::Snyk CLI is not functioning properly."
            echo "functional=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Test a basic Snyk command
          snyk --help > /dev/null 2>&1
          HELP_EXIT_CODE=$?
          
          if [ $HELP_EXIT_CODE -ne 0 ]; then
            echo "::error::Snyk CLI is not functioning properly."
            echo "functional=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "::notice::Snyk CLI is functioning properly."
            echo "functional=true" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Create Test Dockerfiles with Known Vulnerabilities
        id: test_vulnerability
        run: |
          echo "::group::Creating test Dockerfiles with known vulnerabilities"
          mkdir -p test_dockerfiles
          
          # Test file 1: Basic vulnerabilities
          cat > test_dockerfiles/test_basic_vuln.Dockerfile << 'EOF'
          # Use latest tag - bad practice
          FROM alpine:latest
          # Run as root - bad practice
          # Add a secret in env var - bad practice
          ENV MY_SECRET_TOKEN=1234567890abcdef
          # Use curl with insecure flag - bad practice
          RUN apk add --no-cache curl && \
              curl -k https://example.com
          EOF
          
          # Test file 2: More severe vulnerabilities
          cat > test_dockerfiles/test_severe_vuln.Dockerfile << 'EOF'
          # Use vulnerable Node.js version
          FROM node:14.0.0
          # Exposed secrets
          ENV AWS_ACCESS_KEY=AKIAIOSFODNN7EXAMPLE
          ENV AWS_SECRET_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          # Run as root
          USER root
          # Unsafe package installation
          RUN npm install --unsafe-perm
          # No USER directive
          EOF
          
          # List created test files
          echo "Created test Dockerfiles:"
          ls -la test_dockerfiles/
          echo "::endgroup::"
          
          # Create results directory
          mkdir -p test_results
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Test Vulnerability Detection (IaC)
        id: test_iac
        run: |
          echo "::group::Testing vulnerability detection with Snyk IaC"
          RESULTS_DIR="test_results/iac"
          mkdir -p "$RESULTS_DIR"
          
          # Test basic vulnerabilities file with verbose debugging
          echo "Testing basic vulnerabilities file..."
          snyk iac test test_dockerfiles/test_basic_vuln.Dockerfile --severity-threshold=low -d > "$RESULTS_DIR/basic_output.txt" 2> "$RESULTS_DIR/basic_error.txt" || true
          BASIC_EXIT_CODE=$?
          
          # Test severe vulnerabilities file
          echo "Testing severe vulnerabilities file..."
          snyk iac test test_dockerfiles/test_severe_vuln.Dockerfile --severity-threshold=low -d > "$RESULTS_DIR/severe_output.txt" 2> "$RESULTS_DIR/severe_error.txt" || true
          SEVERE_EXIT_CODE=$?
          
          # Check if tests detected vulnerabilities
          BASIC_DETECTED=false
          SEVERE_DETECTED=false
          
          if [ $BASIC_EXIT_CODE -eq 1 ] && (grep -q "severity" "$RESULTS_DIR/basic_output.txt" || grep -q "issue" "$RESULTS_DIR/basic_output.txt"); then
            echo "::notice::Successfully detected vulnerabilities in basic test file using IaC"
            BASIC_DETECTED=true
          else
            echo "::warning::Failed to detect vulnerabilities in basic test file using IaC"
          fi
          
          if [ $SEVERE_EXIT_CODE -eq 1 ] && (grep -q "severity" "$RESULTS_DIR/severe_output.txt" || grep -q "issue" "$RESULTS_DIR/severe_output.txt"); then
            echo "::notice::Successfully detected vulnerabilities in severe test file using IaC"
            SEVERE_DETECTED=true
          else
            echo "::warning::Failed to detect vulnerabilities in severe test file using IaC"
          fi
          
          if [ "$BASIC_DETECTED" = "true" ] || [ "$SEVERE_DETECTED" = "true" ]; then
            echo "iac_test_passed=true" >> $GITHUB_OUTPUT
          else
            echo "iac_test_passed=false" >> $GITHUB_OUTPUT
          fi
          
          # Display excerpts from results for debugging
          echo "Basic test exit code: $BASIC_EXIT_CODE"
          echo "Severe test exit code: $SEVERE_EXIT_CODE"
          echo "Basic test output excerpt:"
          head -n 20 "$RESULTS_DIR/basic_output.txt" || true
          echo "Severe test output excerpt:"
          head -n 20 "$RESULTS_DIR/severe_output.txt" || true
          echo "::endgroup::"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Test Vulnerability Detection (Container)
        id: test_container
        run: |
          echo "::group::Testing vulnerability detection with Snyk Container"
          RESULTS_DIR="test_results/container"
          mkdir -p "$RESULTS_DIR"
          
          # Build test images
          echo "Building test images..."
          docker build -t test-basic-vuln -f test_dockerfiles/test_basic_vuln.Dockerfile . || true
          docker build -t test-severe-vuln -f test_dockerfiles/test_severe_vuln.Dockerfile . || true
          
          # Test basic vulnerabilities file
          echo "Testing basic vulnerabilities image..."
          snyk container test test-basic-vuln --file=test_dockerfiles/test_basic_vuln.Dockerfile --severity-threshold=low -d > "$RESULTS_DIR/basic_output.txt" 2> "$RESULTS_DIR/basic_error.txt" || true
          BASIC_EXIT_CODE=$?
          
          # Test severe vulnerabilities file
          echo "Testing severe vulnerabilities image..."
          snyk container test test-severe-vuln --file=test_dockerfiles/test_severe_vuln.Dockerfile --severity-threshold=low -d > "$RESULTS_DIR/severe_output.txt" 2> "$RESULTS_DIR/severe_error.txt" || true
          SEVERE_EXIT_CODE=$?
          
          # Check if tests detected vulnerabilities
          BASIC_DETECTED=false
          SEVERE_DETECTED=false
          
          if [ $BASIC_EXIT_CODE -eq 1 ] && (grep -q "severity" "$RESULTS_DIR/basic_output.txt" || grep -q "vulnerabilit" "$RESULTS_DIR/basic_output.txt"); then
            echo "::notice::Successfully detected vulnerabilities in basic test image using Container"
            BASIC_DETECTED=true
          else
            echo "::warning::Failed to detect vulnerabilities in basic test image using Container"
          fi
          
          if [ $SEVERE_EXIT_CODE -eq 1 ] && (grep -q "severity" "$RESULTS_DIR/severe_output.txt" || grep -q "vulnerabilit" "$RESULTS_DIR/severe_output.txt"); then
            echo "::notice::Successfully detected vulnerabilities in severe test image using Container"
            SEVERE_DETECTED=true
          else
            echo "::warning::Failed to detect vulnerabilities in severe test image using Container"
          fi
          
          if [ "$BASIC_DETECTED" = "true" ] || [ "$SEVERE_DETECTED" = "true" ]; then
            echo "container_test_passed=true" >> $GITHUB_OUTPUT
          else
            echo "container_test_passed=false" >> $GITHUB_OUTPUT
          fi
          
          # Display excerpts from results for debugging
          echo "Basic test exit code: $BASIC_EXIT_CODE"
          echo "Severe test exit code: $SEVERE_EXIT_CODE"
          echo "Basic test output excerpt:"
          head -n 20 "$RESULTS_DIR/basic_output.txt" || true
          echo "Severe test output excerpt:"
          head -n 20 "$RESULTS_DIR/severe_output.txt" || true
          echo "::endgroup::"
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Determine Best Scanning Method
        id: determine_scan_method
        run: |
          echo "::group::Determining best scanning method"
          # Determine which scanning method to use based on test results
          IAC_TEST_PASSED="${{ steps.test_iac.outputs.iac_test_passed }}"
          CONTAINER_TEST_PASSED="${{ steps.test_container.outputs.container_test_passed }}"
          
          echo "IAC test passed: $IAC_TEST_PASSED"
          echo "Container test passed: $CONTAINER_TEST_PASSED"
          
          if [ "$CONTAINER_TEST_PASSED" = "true" ]; then
            echo "::notice::Using Snyk Container scanning as primary method (preferred)"
            echo "scan_method=container" >> $GITHUB_OUTPUT
            echo "test_passed=true" >> $GITHUB_OUTPUT
          elif [ "$IAC_TEST_PASSED" = "true" ]; then
            echo "::notice::Using Snyk IaC scanning as primary method"
            echo "scan_method=iac" >> $GITHUB_OUTPUT
            echo "test_passed=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::Both scanning methods failed verification. Using both methods with caution."
            echo "scan_method=both" >> $GITHUB_OUTPUT
            echo "test_passed=false" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"

      - name: Scan Dockerfiles
        id: scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          DEBUG_MODE: ${{ github.event.inputs.debug == 'true' }}
          TEST_PASSED: ${{ steps.determine_scan_method.outputs.test_passed }}
          SCAN_METHOD: ${{ steps.determine_scan_method.outputs.scan_method }}
          SNYK_VERSION: ${{ steps.setup_snyk.outputs.snyk_version }}
        run: |
          set -euo pipefail
          
          if [ "$DEBUG_MODE" = "true" ]; then
            set -x
            echo "Running in debug mode"
            echo "Using Snyk version: $SNYK_VERSION"
            echo "Selected scan method: $SCAN_METHOD"
            echo "Vulnerability detection test passed: $TEST_PASSED"
            
            if [ "$TEST_PASSED" != "true" ]; then
              echo "::warning::Vulnerability detection tests failed. Snyk may not be detecting vulnerabilities correctly."
            fi
          fi
          
          HAS_HIGH_SEVERITY=false
          HAS_ISSUES=false
          ROWS=""
          PASSED_COUNT=0
          ISSUES_COUNT=0
          HIGH_COUNT=0
          FAILED_SCANS=0
          
          declare -A IMAGE_TYPES
          IMAGE_TYPES["py311-cuda121-torch241"]="CUDA 12.1 + PyTorch 2.4.1"
          IMAGE_TYPES["py311-cuda124-torch251"]="CUDA 12.4 + PyTorch 2.5.1"
          IMAGE_TYPES["py311-rocm62-torch241"]="ROCm 6.2 + PyTorch 2.4.1"
          IMAGE_TYPES["py311-rocm62-torch251"]="ROCm 6.2 + PyTorch 2.5.1"
          
          DOCKERFILE_DIRS=(
            "py311-cuda121-torch241"
            "py311-cuda124-torch251"
            "py311-rocm62-torch241"
            "py311-rocm62-torch251"
          )
          
          REPORT_ROWS=()
          
          # Create results directory for scans
          mkdir -p scan_results
          
          for DIR in "${DOCKERFILE_DIRS[@]}"; do
            DOCKERFILE_PATH="images/runtime/training/${DIR}/Dockerfile"
            echo "Scanning ${DIR} Dockerfile..."
            
            if [ ! -f "$DOCKERFILE_PATH" ]; then
              REPORT_ROWS+=("${DIR}|${IMAGE_TYPES[$DIR]}|❌ Fail|Dockerfile not found|N/A")
              ROWS+=$'\n'"• ${DIR}: ❌ Failed (not found)"
              HAS_ISSUES=true
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
              continue
            fi
            
            VULN_ISSUES="None"
            CONFIG_ISSUES=()
            SCAN_RESULTS_DIR="scan_results/${DIR}"
            mkdir -p "$SCAN_RESULTS_DIR"
            
            # Perform scanning based on the determined method
            if [ "$SCAN_METHOD" = "container" ] || [ "$SCAN_METHOD" = "both" ]; then
              echo "Running Snyk Container test on ${DOCKERFILE_PATH}..."
              
              # Build the image first
              IMAGE_NAME="dockerfile-scan-${DIR}"
              docker build -t "$IMAGE_NAME" -f "$DOCKERFILE_PATH" $(dirname "$DOCKERFILE_PATH") > "$SCAN_RESULTS_DIR/build_output.txt" 2>&1 || true
              BUILD_EXIT_CODE=$?
              
              if [ $BUILD_EXIT_CODE -ne 0 ]; then
                echo "::warning::Failed to build image for ${DIR}. Container scan will be skipped."
                # Add to config issues
                CONFIG_ISSUES+=("Docker build failed")
              else
                # Run container test with 3 retries
                RETRY_COUNT=0
                MAX_RETRIES=3
                CONTAINER_SUCCESS=false
                
                while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$CONTAINER_SUCCESS" = "false" ]; do
                  echo "Running container scan (attempt $((RETRY_COUNT+1))/$MAX_RETRIES)..."
                  snyk container test "$IMAGE_NAME" --file="$DOCKERFILE_PATH" --severity-threshold=medium -d > "$SCAN_RESULTS_DIR/container_output.txt" 2> "$SCAN_RESULTS_DIR/container_error.txt" || true
                  CONTAINER_EXIT_CODE=$?
                  
                  # Check if scan was successful (not necessarily secure)
                  if [ $CONTAINER_EXIT_CODE -eq 0 ] || [ $CONTAINER_EXIT_CODE -eq 1 ]; then
                    CONTAINER_SUCCESS=true
                  else
                    RETRY_COUNT=$((RETRY_COUNT+1))
                    echo "Scan failed with exit code $CONTAINER_EXIT_CODE. Retrying..."
                    sleep 5
                  fi
                done
                
                if [ "$CONTAINER_SUCCESS" = "true" ]; then
                  # Parse container scan results
                  if [ $CONTAINER_EXIT_CODE -eq 0 ]; then
                    echo "✅ Snyk container scan passed with no security issues"
                  elif [ $CONTAINER_EXIT_CODE -eq 1 ]; then
                    # Check for different severity levels in the output
                    if grep -i "critical severity" "$SCAN_RESULTS_DIR/container_output.txt" >/dev/null; then
                      VULN_ISSUES="Critical severity (container)"
                      HAS_HIGH_SEVERITY=true
                      HIGH_COUNT=$((HIGH_COUNT + 1))
                    elif grep -i "high severity" "$SCAN_RESULTS_DIR/container_output.txt" >/dev/null; then
                      VULN_ISSUES="High severity (container)"
                      HAS_HIGH_SEVERITY=true
                      HIGH_COUNT=$((HIGH_COUNT + 1))
                    elif grep -i "medium severity" "$SCAN_RESULTS_DIR/container_output.txt" >/dev/null; then
                      VULN_ISSUES="Medium severity (container)"
                      HAS_ISSUES=true
                      ISSUES_COUNT=$((ISSUES_COUNT + 1))
                    elif grep -i "low severity" "$SCAN_RESULTS_DIR/container_output.txt" >/dev/null; then
                      VULN_ISSUES="Low severity (container)"
                    fi
                  fi
                else
                  echo "::warning::Failed to run container scan after $MAX_RETRIES attempts"
                  FAILED_SCANS=$((FAILED_SCANS+1))
                  CONFIG_ISSUES+=("Container scan failed")
                fi
              fi
            fi
            
            # If container scan failed or we're using both/iac methods, run IaC scan
            if [ "$SCAN_METHOD" = "iac" ] || [ "$SCAN_METHOD" = "both" ] || [ "${#CONFIG_ISSUES[@]}" -gt 0 ]; then
              echo "Running Snyk IaC test on ${DOCKERFILE_PATH}..."
              
              # Run IaC test with 3 retries
              RETRY_COUNT=0
              MAX_RETRIES=3
              IAC_SUCCESS=false
              
              while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$IAC_SUCCESS" = "false" ]; do
                echo "Running IaC scan (attempt $((RETRY_COUNT+1))/$MAX_RETRIES)..."
                snyk iac test "$DOCKERFILE_PATH" --severity-threshold=medium -d > "$SCAN_RESULTS_DIR/iac_output.txt" 2> "$SCAN_RESULTS_DIR/iac_error.txt" || true
                IAC_EXIT_CODE=$?
                
                # Check if scan was successful (not necessarily secure)
                if [ $IAC_EXIT_CODE -eq 0 ] || [ $IAC_EXIT_CODE -eq 1 ]; then
                  IAC_SUCCESS=true
                else
                  RETRY_COUNT=$((RETRY_COUNT+1))
                  echo "Scan failed with exit code $IAC_EXIT_CODE. Retrying..."
                  sleep 5
                fi
              done
              
              if [ "$IAC_SUCCESS" = "true" ]; then
                # Only use IaC results if container scan didn't find issues or we're not using container scanning
                if [ "$VULN_ISSUES" = "None" ]; then
                  if [ $IAC_EXIT_CODE -eq 0 ]; then
                    echo "✅ Snyk IaC scan passed with no security issues"
                  elif [ $IAC_EXIT_CODE -eq 1 ]; then
                    # Check for different severity levels in the output
                    if grep -i "critical severity" "$SCAN_RESULTS_DIR/iac_output.txt" >/dev/null; then
                      VULN_ISSUES="Critical severity (IaC)"
                      HAS_HIGH_SEVERITY=true
                      HIGH_COUNT=$((HIGH_COUNT + 1))
                    elif grep -i "high severity" "$SCAN_RESULTS_DIR/iac_output.txt" >/dev/null; then
                      VULN_ISSUES="High severity (IaC)"
                      HAS_HIGH_SEVERITY=true
                      HIGH_COUNT=$((HIGH_COUNT + 1))
                    elif grep -i "medium severity" "$SCAN_RESULTS_DIR/iac_output.txt" >/dev/null; then
                      VULN_ISSUES="Medium severity (IaC)"
                      HAS_ISSUES=true
                      ISSUES_COUNT=$((ISSUES_COUNT + 1))
                    elif grep -i "low severity" "$SCAN_RESULTS_DIR/iac_output.txt" >/dev/null; then
                      VULN_ISSUES="Low severity (IaC)"
                    fi
                  fi
                fi
              else
                echo "::warning::Failed to run IaC scan after $MAX_RETRIES attempts"
                FAILED_SCANS=$((FAILED_SCANS+1))
                if [ -z "${CONFIG_ISSUES[*]}" ]; then
                  CONFIG_ISSUES+=("IaC scan failed")
                elif [[ ! "${CONFIG_ISSUES[*]}" =~ "Container scan failed" ]]; then
                  CONFIG_ISSUES+=("IaC scan failed")
                fi
              fi
            fi
            
            # Always check for configuration issues in the Dockerfile
            if grep -E "ENV.*(PASSWORD|SECRET|KEY|TOKEN).*=" "$DOCKERFILE_PATH" >/dev/null; then
              CONFIG_ISSUES+=("Potential secrets in ENV")
            fi
            if ! grep -q "USER" "$DOCKERFILE_PATH" >/dev/null; then
              CONFIG_ISSUES+=("Missing USER instruction (runs as root)")
            fi
            
            if [ ${#CONFIG_ISSUES[@]} -eq 0 ]; then
              CONFIG_ISSUES_STR="None"
            else
              CONFIG_ISSUES_STR=$(IFS=", "; echo "${CONFIG_ISSUES[*]}")
            fi
            
            if [ "$VULN_ISSUES" = "None" ] && [ "$CONFIG_ISSUES_STR" = "None" ]; then
              STATUS="✅ Pass"
              PASSED_COUNT=$((PASSED_COUNT + 1))
            elif [[ "$VULN_ISSUES" == *"Critical severity"* ]] || [[ "$VULN_ISSUES" == *"High severity"* ]]; then
              STATUS="❌ Fail"
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
            else
              STATUS="⚠️ Warning"
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
            fi
            
            REPORT_ROWS+=("${DIR}|${IMAGE_TYPES[$DIR]}|${STATUS}|${VULN_ISSUES}|${CONFIG_ISSUES_STR}")
            ROWS+=$'\n'"• ${DIR}: ${STATUS}"
          done
          
          if $HAS_HIGH_SEVERITY; then
            OVERALL_STATUS="❌ Failed"
          elif [ $FAILED_SCANS -eq ${#DOCKERFILE_DIRS[@]} ]; then
            OVERALL_STATUS="❌ Failed (All Scans Failed)"
            HAS_ISSUES=true
          elif $HAS_ISSUES; then 
            OVERALL_STATUS="⚠️ Issues Found"
          else
            OVERALL_STATUS="✅ All Secure"
          fi
          
          # If test vulnerability detection failed, but we're passing everything, add a warning
          if [ "$TEST_PASSED" != "true" ] && [ "$OVERALL_STATUS" = "✅ All Secure" ]; then
            OVERALL_STATUS="✅ All Secure ⚠️ (Verification Failed)"
            echo "::warning::All images passed, but Snyk failed to detect vulnerabilities in the test files. Results may be unreliable."
          fi
          
          # Add a warning if some scans failed
          if [ $FAILED_SCANS -gt 0 ] && [ $FAILED_SCANS -lt ${#DOCKERFILE_DIRS[@]} ]; then
            OVERALL_STATUS="$OVERALL_STATUS ⚠️ ($FAILED_SCANS Scans Failed)"
            echo "::warning::$FAILED_SCANS scan(s) failed to complete. Some results may be missing."
          fi
          
          TZ=Europe/London
          export TZ
          LON_DATE="$(date '+%a %d %b %Y %T %Z')"
          
          echo "# Dockerfile Security Scan Results" > "$GITHUB_STEP_SUMMARY"
          
          echo "## Summary Overview" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|:-------|:------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Scan Date** | $LON_DATE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Status** | $OVERALL_STATUS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Snyk Version** | $SNYK_VERSION |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Scan Method** | $SCAN_METHOD |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Verification Status** | ${TEST_PASSED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Total Images** | ${#DOCKERFILE_DIRS[@]} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Passed** | $PASSED_COUNT |" >> "$GITHUB_STEP_SUMMARY" 
          echo "| **Issues** | $ISSUES_COUNT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Critical/High** | $HIGH_COUNT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Failed Scans** | $FAILED_SCANS |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "## Detailed Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "<table>" >> "$GITHUB_STEP_SUMMARY"
          echo "  <tr>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Dockerfile</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Image Type</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='center'>Status</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Security Issues</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Configuration Issues</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "  </tr>" >> "$GITHUB_STEP_SUMMARY"
          
          for ROW in "${REPORT_ROWS[@]}"; do
            IFS='|' read -r DIR IMAGE_TYPE STATUS VULN CONFIG <<< "$ROW"
            echo "  <tr>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${DIR}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${IMAGE_TYPE}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td align='center'>${STATUS}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${VULN}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${CONFIG}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "  </tr>" >> "$GITHUB_STEP_SUMMARY"
          done
          
          echo "</table>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "## Security Checks Performed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check Type | Description | Severity |" >> "$GITHUB_STEP_SUMMARY"
          echo "|:-----------|:------------|:---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Dockerfile Scan** | Detects security issues in Dockerfile configuration | Critical/High = Fail |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Container Scan** | Detects vulnerabilities in container image | Critical/High = Fail |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Secret Detection** | Identifies potential secrets in ENV variables | Warning |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **User Configuration** | Verifies non-root USER instruction | Warning |" >> "$GITHUB_STEP_SUMMARY"
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Verification Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test Type | Result | Details |" >> "$GITHUB_STEP_SUMMARY"
          echo "|:----------|:-------|:--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **IaC Test** | ${{ steps.test_iac.outputs.iac_test_passed }} | Tests if Snyk can detect issues using IaC scanning |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Container Test** | ${{ steps.test_container.outputs.container_test_passed }} | Tests if Snyk can detect issues using Container scanning |" >> "$GITHUB_STEP_SUMMARY"
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Notes" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow fails only on High or Critical security issues" >> "$GITHUB_STEP_SUMMARY"
          echo "- Medium and Low severity issues are reported but don't cause failure" >> "$GITHUB_STEP_SUMMARY"
          echo "- Missing USER instruction indicates container runs as root (security risk)" >> "$GITHUB_STEP_SUMMARY"
          echo "- When verification tests fail, scan results should be treated with caution" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scans run nightly at 03:00 UTC" >> "$GITHUB_STEP_SUMMARY"
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details>" >> "$GITHUB_STEP_SUMMARY"
          echo "<summary>Technical Scan Information</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Scanner:** Snyk IaC & Container" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** $SNYK_VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "**Scan Parameters:** \`--severity-threshold=medium -d\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Scan Method:** $SCAN_METHOD" >> "$GITHUB_STEP_SUMMARY" 
          echo "**Verification Status:** $TEST_PASSED" >> "$GITHUB_STEP_SUMMARY"
          echo "**Workflow Run ID:** \`${{ github.run_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          
          echo "results<<EOF" >> $GITHUB_OUTPUT
          echo -e "${ROWS}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          if $HAS_HIGH_SEVERITY; then
            echo "status=high_severity" >> $GITHUB_OUTPUT
          elif [ $FAILED_SCANS -eq ${#DOCKERFILE_DIRS[@]} ]; then
            echo "status=all_scans_failed" >> $GITHUB_OUTPUT
          elif $HAS_ISSUES; then
            echo "status=issues_found" >> $GITHUB_OUTPUT
          else
            echo "status=secure" >> $GITHUB_OUTPUT
          fi
          
          echo "debug_mode=$DEBUG_MODE" >> $GITHUB_OUTPUT
          echo "test_passed=$TEST_PASSED" >> $GITHUB_OUTPUT
          echo "scan_method=$SCAN_METHOD" >> $GITHUB_OUTPUT
          echo "snyk_version=$SNYK_VERSION" >> $GITHUB_OUTPUT
          echo "failed_scans=$FAILED_SCANS" >> $GITHUB_OUTPUT
          
          if $HAS_HIGH_SEVERITY; then
            echo "❌ High/Critical security issues detected — failing the workflow."
            exit 1
          elif [ $FAILED_SCANS -eq ${#DOCKERFILE_DIRS[@]} ]; then
            echo "❌ All scans failed to complete — failing the workflow."
            exit 1
          fi

      # Note: Artifact upload step has been removed due to compatibility issues
      # Results are still available in the job summary and Slack notifications

      - name: Slack Notification
        if: >
          always() &&
          (steps.scan.outputs.status != 'secure' || 
          steps.scan.outputs.failed_scans != '0' ||
          steps.scan.outputs.test_passed != 'true' ||
          steps.scan.outputs.debug_mode == 'true' || 
          github.event_name == 'schedule' ||
          job.status == 'failure')
        continue-on-error: true
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: repo,workflow
          custom_payload: |
            {
              "attachments": [
                {
                  "color": "${{ job.status == 'failure' && 'danger' || steps.scan.outputs.status == 'secure' && 'good' || steps.scan.outputs.status == 'high_severity' && 'danger' || steps.scan.outputs.status == 'all_scans_failed' && 'danger' || 'warning' }}",
                  "title": "Dockerfile Security Scan Results",
                  "text": "${{ job.status == 'failure' && '🚨 Workflow failed' || steps.scan.outputs.status == 'secure' && '✅ All Dockerfiles are secure' || steps.scan.outputs.status == 'high_severity' && '🚨 High severity issues detected' || steps.scan.outputs.status == 'all_scans_failed' && '🚨 All scans failed to complete' || '⚠️ Security issues detected' }}${{ steps.scan.outputs.test_passed == 'false' && ' (⚠️ Verification Failed)' || '' }}${{ steps.scan.outputs.failed_scans != '0' && ' (⚠️ ' || '' }}${{ steps.scan.outputs.failed_scans != '0' && steps.scan.outputs.failed_scans || '' }}${{ steps.scan.outputs.failed_scans != '0' && ' Scans Failed)' || '' }}\n${{ steps.scan.outputs.results }}\n\n*Scan Method:* ${{ steps.scan.outputs.scan_method || 'N/A' }}\n*Snyk Version:* ${{ steps.scan.outputs.snyk_version || 'Unknown' }}",
                  "mrkdwn_in": ["text"],
                  "footer": "Snyk Dockerfile Security Scan | Run ID: ${{ github.run_id }} | $(TZ=Europe/London date '+%d-%m-%Y %H:%M %Z')"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}