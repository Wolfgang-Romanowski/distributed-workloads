# Snyk scan for training‑runtime Dockerfiles
# push to main, nightly 03:00 UTC, fork PRs after label `run‑snyk`
# Fails on High/Critical CVEs

name: Snyk Dockerfile Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  pull_request_target:
    types: [labeled]
    branches: ["main"]
  schedule:
    - cron: "0 3 * * *"

jobs:
  snyk_scan:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) ||
      (github.event_name == 'pull_request_target' && contains(github.event.pull_request.labels.*.name, 'run-snyk'))
    permissions:
      contents: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: List Dockerfiles
        id: list
        run: |
          mapfile -t files < <(find images/runtime/training -type f -name Dockerfile)
          echo "files=${files[*]}" >> $GITHUB_OUTPUT

      - name: Build & scan Dockerfiles
        id: scan
        run: |
          IFS=' ' read -r -a dfs <<< "${{ steps.list.outputs.files }}"
          declare -A res; fail=0
          echo "::group::Build & Snyk scan"
          for f in "${dfs[@]}"; do
            dir=$(dirname "$f")
            tag="snyk-scan-${dir//\//-}"
            echo "▶ Building $tag"
            docker build "$dir" --file "$f" --tag "$tag"
            echo "▶ Scanning $tag"
            snyk container test "$tag" --severity-threshold=high --json > "out-${tag}.json" \
              && res["$f"]="PASS" || { res["$f"]="FAIL"; fail=1; }
            docker rmi "$tag"
          done
          echo "::endgroup::"
          for k in "${!res[@]}"; do echo "$k : ${res[$k]}"; done | tee summary.txt
          echo "failed=$fail" >> $GITHUB_OUTPUT
          exit $fail

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-dockerfile-results
          path: |
            summary.txt
            out-*.json

      - name: Slack failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: '#FF4500'
          SLACK_MESSAGE: |
            $(grep 'FAIL' summary.txt | sed 's/^/• /')
            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Details>

      - name: Slack success
        if: success() && github.event_name == 'push'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: '#2EB886'
          SLACK_MESSAGE: |
            All images clean on push to *main*.
            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Details>
