name: Snyk Dockerfile Security Scan

on:
  push:
    branches: [ main ]
    paths:
      - 'images/runtime/training/*/Dockerfile'
  pull_request:
    paths:
      - 'images/runtime/training/*/Dockerfile'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      target_dir:
        description: 'Specific directory to scan (leave empty for all)'
        required: false
        default: ''
        type: string

jobs:
  snyk-scan:
    name: Snyk Security Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Snyk
        uses: snyk/actions/setup@master

      - name: Authenticate Snyk
        run: |
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "::error::SNYK_TOKEN secret is not configured"
            exit 1
          fi
          snyk auth "${{ secrets.SNYK_TOKEN }}"

      - name: Discover and Scan Components
        id: scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          TARGET_DIR: ${{ github.event.inputs.target_dir }}
        run: |
          set -e
          mkdir -p results
          
          # Target directories
          TRAINING_DIR="images/runtime/training"
          if [ -n "$TARGET_DIR" ]; then
            if [ -d "$TRAINING_DIR/$TARGET_DIR" ]; then
              TARGET_DIRS=("$TARGET_DIR")
            else
              echo "::error::Directory $TARGET_DIR not found"
              exit 1
            fi
          else
            TARGET_DIRS=($(find "$TRAINING_DIR" -name "Dockerfile" -exec dirname {} \; | xargs -I {} basename {}))
          fi
          
          echo "Scanning directories: ${TARGET_DIRS[*]}"
          
          # Step 1: Discover unique base images with variable resolution
          declare -A BASE_IMAGES
          declare -A DOCKERFILE_BASE_MAP
          declare -A DOCKERFILE_BUILD_ARGS
          
          for DIR in "${TARGET_DIRS[@]}"; do
            DOCKERFILE="$TRAINING_DIR/$DIR/Dockerfile"
            if [ ! -f "$DOCKERFILE" ]; then
              echo "::warning::Dockerfile not found: $DOCKERFILE"
              continue
            fi
            
            # Extract base image and build args
            BASE_IMAGE_RAW=$(grep -m 1 "^FROM" "$DOCKERFILE" | awk '{print $2}' | cut -d' ' -f1)
            
            # Extract build args that might affect the base image
            BUILD_ARGS=$(grep -E "^ARG" "$DOCKERFILE" | awk '{print $2}' | cut -d'=' -f1 || echo "")
            
            # Try to resolve common variables from directory name or build context
            # Extract version info from directory name (e.g., py311-cuda124-torch251)
            if [[ "$DIR" =~ py([0-9]+)-.*-torch([0-9]+) ]]; then
              PYTHON_VER="${BASH_REMATCH[1]}"
              PYTHON_VERSION="${PYTHON_VER:0:1}.${PYTHON_VER:1}"
              TORCH_VER="${BASH_REMATCH[2]}"
              
              # Common image tag patterns
              if [[ "$DIR" =~ cuda ]]; then
                IMAGE_TAG="latest"  # or could be extracted from build args
              elif [[ "$DIR" =~ rocm ]]; then
                IMAGE_TAG="latest"
              else
                IMAGE_TAG="latest"
              fi
            else
              PYTHON_VERSION="3.11"  # default fallback
              IMAGE_TAG="latest"
            fi
            
            # Resolve variables in base image
            RESOLVED_BASE_IMAGE="$BASE_IMAGE_RAW"
            RESOLVED_BASE_IMAGE="${RESOLVED_BASE_IMAGE//\$\{PYTHON_VERSION\}/$PYTHON_VERSION}"
            RESOLVED_BASE_IMAGE="${RESOLVED_BASE_IMAGE//\$\{IMAGE_TAG\}/$IMAGE_TAG}"
            
            # If still contains variables, try different resolution strategies
            if [[ "$RESOLVED_BASE_IMAGE" =~ \$ ]]; then
              echo "::warning::Could not fully resolve base image variables in $DIR: $BASE_IMAGE_RAW"
              echo "         Using pattern-based resolution..."
              
              # Pattern-based resolution
              if [[ "$BASE_IMAGE_RAW" =~ python.*ubi9 ]] || [[ "$BASE_IMAGE_RAW" =~ ubi9.*python ]]; then
                RESOLVED_BASE_IMAGE="registry.access.redhat.com/ubi9/python-${PYTHON_VERSION}:${IMAGE_TAG}"
              fi
            fi
            
            echo "Dockerfile $DIR:"
            echo "  Raw base image: $BASE_IMAGE_RAW"
            echo "  Resolved base image: $RESOLVED_BASE_IMAGE"
            echo "  Extracted vars: PYTHON_VERSION=$PYTHON_VERSION, IMAGE_TAG=$IMAGE_TAG"
            
            if [ -n "$RESOLVED_BASE_IMAGE" ]; then
              BASE_IMAGES["$RESOLVED_BASE_IMAGE"]=1
              DOCKERFILE_BASE_MAP["$DIR"]="$RESOLVED_BASE_IMAGE"
              DOCKERFILE_BUILD_ARGS["$DIR"]="PYTHON_VERSION=$PYTHON_VERSION,IMAGE_TAG=$IMAGE_TAG"
            fi
          done
          
          echo ""
          echo "Summary of discovered base images:"
          for base_image in "${!BASE_IMAGES[@]}"; do
            echo "  - $base_image"
          done
          echo ""
          
          # Step 2: Scan each unique base image once with detailed analysis
          declare -A BASE_RESULTS
          declare -A BASE_VULNERABILITIES
          echo "Scanning ${#BASE_IMAGES[@]} unique base images..."
          
          for BASE_IMAGE in "${!BASE_IMAGES[@]}"; do
            echo "Scanning base image: $BASE_IMAGE"
            BASE_KEY=$(echo "$BASE_IMAGE" | tr '/:' '_')
            BASE_FILE="results/base_${BASE_KEY}.json"
            
            # Scan base image
            if snyk container test "$BASE_IMAGE" --json > "$BASE_FILE" 2>/dev/null; then
              BASE_EXIT=0
            else
              BASE_EXIT=$?
            fi
            
            # Count vulnerabilities by severity and extract details
            if [ -f "$BASE_FILE" ] && jq -e . "$BASE_FILE" >/dev/null 2>&1; then
              CRITICAL=$(jq '[.vulnerabilities[]? | select(.severity == "critical")] | length' "$BASE_FILE")
              HIGH=$(jq '[.vulnerabilities[]? | select(.severity == "high")] | length' "$BASE_FILE")
              MEDIUM=$(jq '[.vulnerabilities[]? | select(.severity == "medium")] | length' "$BASE_FILE")
              LOW=$(jq '[.vulnerabilities[]? | select(.severity == "low")] | length' "$BASE_FILE")
              TOTAL=$(jq '.vulnerabilities | length' "$BASE_FILE" 2>/dev/null || echo "0")
              
              # Extract top vulnerabilities for reporting
              BASE_VULN_SUMMARY=$(jq -r '
                [.vulnerabilities[]? | select(.severity == "critical" or .severity == "high")] |
                sort_by(.severity) | reverse |
                map("• \(.severity | ascii_upcase): \(.id // "Unknown") - \(.title // "No description")") |
                .[0:5] | join("\n")
              ' "$BASE_FILE" 2>/dev/null || echo "")
              
              BASE_VULNERABILITIES["$BASE_IMAGE"]="$BASE_VULN_SUMMARY"
            else
              CRITICAL=0; HIGH=0; MEDIUM=0; LOW=0; TOTAL=0
              BASE_VULNERABILITIES["$BASE_IMAGE"]=""
            fi
            
            BASE_RESULTS["$BASE_IMAGE"]="$BASE_EXIT|$CRITICAL|$HIGH|$MEDIUM|$LOW|$TOTAL"
            echo "Base image $BASE_IMAGE: $TOTAL vulnerabilities (C:$CRITICAL H:$HIGH M:$MEDIUM L:$LOW)"
            
            # Show critical/high vulnerabilities immediately
            if [ $CRITICAL -gt 0 ] || [ $HIGH -gt 0 ]; then
              echo "  ⚠️ Critical/High vulnerabilities found in base image:"
              echo "$BASE_VULN_SUMMARY" | head -3
            fi
          done
          
          # Step 3: Analyze Dockerfiles with enhanced vulnerability tracking
          declare -A DOCKERFILE_RESULTS
          declare -A DOCKERFILE_VULNERABILITIES
          FAILED_DOCKERFILES=""
          TOTAL_SCANNED=0
          CLEAN_COUNT=0
          WARNING_COUNT=0
          FAILED_COUNT=0
          
          echo "Analyzing Dockerfiles for additional vulnerabilities..."
          
          for DIR in "${TARGET_DIRS[@]}"; do
            DOCKERFILE="$TRAINING_DIR/$DIR/Dockerfile"
            BASE_IMAGE="${DOCKERFILE_BASE_MAP[$DIR]}"
            
            if [ ! -f "$DOCKERFILE" ] || [ -z "$BASE_IMAGE" ]; then
              continue
            fi
            
            TOTAL_SCANNED=$((TOTAL_SCANNED + 1))
            echo "Analyzing Dockerfile: $DIR (base: $BASE_IMAGE)"
            
            # Scan Dockerfile to see what it would add
            DOCKERFILE_FILE="results/${DIR}_dockerfile.json"
            if snyk container test "$BASE_IMAGE" --file="$DOCKERFILE" --json > "$DOCKERFILE_FILE" 2>/dev/null; then
              DOCKERFILE_EXIT=0
            else
              DOCKERFILE_EXIT=$?
            fi
            
            # Get base image results
            IFS='|' read -r BASE_EXIT BASE_CRIT BASE_HIGH BASE_MED BASE_LOW BASE_TOTAL <<< "${BASE_RESULTS[$BASE_IMAGE]}"
            
            # Count Dockerfile scan results and extract new vulnerabilities
            if [ -f "$DOCKERFILE_FILE" ] && jq -e . "$DOCKERFILE_FILE" >/dev/null 2>&1; then
              DF_CRITICAL=$(jq '[.vulnerabilities[]? | select(.severity == "critical")] | length' "$DOCKERFILE_FILE")
              DF_HIGH=$(jq '[.vulnerabilities[]? | select(.severity == "high")] | length' "$DOCKERFILE_FILE")
              DF_MEDIUM=$(jq '[.vulnerabilities[]? | select(.severity == "medium")] | length' "$DOCKERFILE_FILE")
              DF_LOW=$(jq '[.vulnerabilities[]? | select(.severity == "low")] | length' "$DOCKERFILE_FILE")
              DF_TOTAL=$(jq '.vulnerabilities | length' "$DOCKERFILE_FILE" 2>/dev/null || echo "0")
              
              # Extract new vulnerabilities introduced by Dockerfile
              if [ $DF_TOTAL -gt $BASE_TOTAL ]; then
                NEW_VULN_SUMMARY=$(jq -r --argjson base_total "$BASE_TOTAL" '
                  [.vulnerabilities[]? | select(.severity == "critical" or .severity == "high")] |
                  sort_by(.severity) | reverse |
                  if length > $base_total then .[($base_total):] else [] end |
                  map("• \(.severity | ascii_upcase): \(.id // "Unknown") - \(.title // "No description") [\(.packageName // "Unknown")]") |
                  .[0:3] | join("\n")
                ' "$DOCKERFILE_FILE" 2>/dev/null || echo "")
              else
                NEW_VULN_SUMMARY=""
              fi
              
              DOCKERFILE_VULNERABILITIES["$DIR"]="$NEW_VULN_SUMMARY"
            else
              DF_CRITICAL=0; DF_HIGH=0; DF_MEDIUM=0; DF_LOW=0; DF_TOTAL=0
              DOCKERFILE_VULNERABILITIES["$DIR"]=""
            fi
            
            # Calculate new vulnerabilities (simple subtraction)
            NEW_CRITICAL=$((DF_CRITICAL > BASE_CRIT ? DF_CRITICAL - BASE_CRIT : 0))
            NEW_HIGH=$((DF_HIGH > BASE_HIGH ? DF_HIGH - BASE_HIGH : 0))
            NEW_MEDIUM=$((DF_MEDIUM > BASE_MED ? DF_MEDIUM - BASE_MED : 0))
            NEW_LOW=$((DF_LOW > BASE_LOW ? DF_LOW - BASE_LOW : 0))
            NEW_TOTAL=$((NEW_CRITICAL + NEW_HIGH + NEW_MEDIUM + NEW_LOW))
            
            # Determine status with enhanced messaging
            if [ $NEW_CRITICAL -gt 0 ] || [ $NEW_HIGH -gt 0 ]; then
              STATUS="FAILED"
              FAILED_COUNT=$((FAILED_COUNT + 1))
              FAILED_DOCKERFILES="$FAILED_DOCKERFILES$DIR "
              MESSAGE="Introduces $NEW_CRITICAL critical, $NEW_HIGH high vulnerabilities"
              echo "  ❌ $DIR: $MESSAGE"
              if [ -n "$NEW_VULN_SUMMARY" ]; then
                echo "     New vulnerabilities:"
                echo "$NEW_VULN_SUMMARY" | head -2 | sed 's/^/     /'
              fi
            elif [ $NEW_TOTAL -gt 0 ]; then
              STATUS="WARNING"
              WARNING_COUNT=$((WARNING_COUNT + 1))
              MESSAGE="Introduces $NEW_TOTAL medium/low vulnerabilities"
              echo "  ⚠️ $DIR: $MESSAGE"
            else
              STATUS="PASSED"
              CLEAN_COUNT=$((CLEAN_COUNT + 1))
              MESSAGE="No new vulnerabilities"
              echo "  ✅ $DIR: $MESSAGE"
            fi
            
            DOCKERFILE_RESULTS["$DIR"]="$STATUS|$MESSAGE|$NEW_CRITICAL|$NEW_HIGH|$NEW_MEDIUM|$NEW_LOW|$NEW_TOTAL|$DF_CRITICAL|$DF_HIGH|$DF_MEDIUM|$DF_LOW|$DF_TOTAL"
          done
          
          # Overall status
          if [ $FAILED_COUNT -gt 0 ]; then
            OVERALL_STATUS="FAILED"
            OVERALL_MESSAGE="$FAILED_COUNT Dockerfile(s) introduce critical/high vulnerabilities"
          elif [ $WARNING_COUNT -gt 0 ]; then
            OVERALL_STATUS="WARNING"
            OVERALL_MESSAGE="$WARNING_COUNT Dockerfile(s) introduce medium/low vulnerabilities"
          else
            OVERALL_STATUS="PASSED"
            OVERALL_MESSAGE="All Dockerfiles are clean"
          fi
          
          # Debug: Show variable values before writing
          echo "DEBUG: Variables before writing to file:"
          echo "OVERALL_STATUS='$OVERALL_STATUS'"
          echo "OVERALL_MESSAGE='$OVERALL_MESSAGE'"
          echo "TOTAL_SCANNED='$TOTAL_SCANNED'"
          echo "CLEAN_COUNT='$CLEAN_COUNT'"
          echo "WARNING_COUNT='$WARNING_COUNT'"
          echo "FAILED_COUNT='$FAILED_COUNT'"
          echo "FAILED_DOCKERFILES='$FAILED_DOCKERFILES'"
          
          # Save results for summary - COMPLETELY REWRITTEN VERSION
          echo "OVERALL_STATUS=$OVERALL_STATUS" > results/summary.env
          echo "OVERALL_MESSAGE=$OVERALL_MESSAGE" >> results/summary.env
          echo "TOTAL_SCANNED=$TOTAL_SCANNED" >> results/summary.env
          echo "CLEAN_COUNT=$CLEAN_COUNT" >> results/summary.env
          echo "WARNING_COUNT=$WARNING_COUNT" >> results/summary.env
          echo "FAILED_COUNT=$FAILED_COUNT" >> results/summary.env
          echo "FAILED_DOCKERFILES=$FAILED_DOCKERFILES" >> results/summary.env
          
          # Debug: Show what was actually written to the file
          echo "DEBUG: Contents of results/summary.env:"
          cat results/summary.env
          
          # Verify file is valid
          echo "DEBUG: Testing if file can be sourced:"
          if source results/summary.env; then
            echo "DEBUG: File sourced successfully"
          else
            echo "DEBUG: File sourcing failed"
          fi
          
          # Save detailed results with vulnerability details
          for key in "${!BASE_RESULTS[@]}"; do
            echo "$key=${BASE_RESULTS[$key]}" >> results/base_results.txt
          done
          
          for key in "${!BASE_VULNERABILITIES[@]}"; do
            echo "$key=${BASE_VULNERABILITIES[$key]}" >> results/base_vulnerabilities.txt
          done
          
          for key in "${!DOCKERFILE_RESULTS[@]}"; do
            echo "$key=${DOCKERFILE_RESULTS[$key]}" >> results/dockerfile_results.txt
          done
          
          for key in "${!DOCKERFILE_VULNERABILITIES[@]}"; do
            echo "$key=${DOCKERFILE_VULNERABILITIES[$key]}" >> results/dockerfile_vulnerabilities.txt
          done
          
          for key in "${!DOCKERFILE_BASE_MAP[@]}"; do
            echo "$key=${DOCKERFILE_BASE_MAP[$key]}" >> results/dockerfile_base_map.txt
          done
          
          # Set outputs
          echo "status=$OVERALL_STATUS" >> $GITHUB_OUTPUT
          echo "message=$OVERALL_MESSAGE" >> $GITHUB_OUTPUT
          echo "failed_count=$FAILED_COUNT" >> $GITHUB_OUTPUT
          
          # Exit with failure if critical/high vulnerabilities found
          if [ $FAILED_COUNT -gt 0 ]; then
            echo "Build failed: Critical/high vulnerabilities detected"
            exit 1
          fi

      - name: Generate Security Report
        if: always()
        run: |
          echo "DEBUG: Starting report generation"
          echo "DEBUG: Checking if results/summary.env exists..."
          
          if [ ! -f results/summary.env ]; then
            echo "DEBUG: results/summary.env does not exist"
            echo "# Security Scan Failed" >> $GITHUB_STEP_SUMMARY
            echo "No scan results available." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          
          echo "DEBUG: File exists, showing contents:"
          cat results/summary.env
          
          echo "DEBUG: Attempting to source the file..."
          # Source the environment file with error handling
          set -a
          if source results/summary.env 2>&1; then
            echo "DEBUG: Successfully sourced environment file"
          else
            echo "DEBUG: Failed to source environment file"
            echo "# Security Scan Report Error" >> $GITHUB_STEP_SUMMARY
            echo "Failed to load environment variables from summary file." >> $GITHUB_STEP_SUMMARY
            echo "File contents:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat results/summary.env >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          set +a
          
          echo "DEBUG: Variables after sourcing:"
          echo "OVERALL_STATUS='$OVERALL_STATUS'"
          echo "OVERALL_MESSAGE='$OVERALL_MESSAGE'"
          echo "TOTAL_SCANNED='$TOTAL_SCANNED'"
          
          # Validate required variables are set
          if [ -z "$OVERALL_STATUS" ]; then
            echo "DEBUG: OVERALL_STATUS is empty"
            echo "# Security Scan Report Error" >> $GITHUB_STEP_SUMMARY
            echo "Environment variables not properly set from summary file." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          
          # Load results with vulnerability details
          declare -A BASE_RESULTS DOCKERFILE_RESULTS DOCKERFILE_BASE_MAP
          declare -A BASE_VULNERABILITIES DOCKERFILE_VULNERABILITIES
          
          if [ -f results/base_results.txt ]; then
            while IFS='=' read -r key value || [ -n "$key" ]; do
              [ -n "$key" ] && BASE_RESULTS["$key"]="$value"
            done < results/base_results.txt
          fi
          
          if [ -f results/base_vulnerabilities.txt ]; then
            while IFS='=' read -r key value || [ -n "$key" ]; do
              [ -n "$key" ] && BASE_VULNERABILITIES["$key"]="$value"
            done < results/base_vulnerabilities.txt
          fi
          
          if [ -f results/dockerfile_results.txt ]; then
            while IFS='=' read -r key value || [ -n "$key" ]; do
              [ -n "$key" ] && DOCKERFILE_RESULTS["$key"]="$value"
            done < results/dockerfile_results.txt
          fi
          
          if [ -f results/dockerfile_vulnerabilities.txt ]; then
            while IFS='=' read -r key value || [ -n "$key" ]; do
              [ -n "$key" ] && DOCKERFILE_VULNERABILITIES["$key"]="$value"
            done < results/dockerfile_vulnerabilities.txt
          fi
          
          if [ -f results/dockerfile_base_map.txt ]; then
            while IFS='=' read -r key value || [ -n "$key" ]; do
              [ -n "$key" ] && DOCKERFILE_BASE_MAP["$key"]="$value"
            done < results/dockerfile_base_map.txt
          fi
          
          echo "DEBUG: Starting report generation..."
          
          {
            echo "# 🛡️ Snyk Security Scan Results"
            echo ""
            case "$OVERALL_STATUS" in
              "PASSED") echo "✅ **Status: PASSED** - All Dockerfiles are secure" ;;
              "WARNING") echo "⚠️ **Status: WARNING** - Some medium/low vulnerabilities found" ;;
              "FAILED") echo "❌ **Status: FAILED** - Critical/high vulnerabilities detected" ;;
            esac
            echo ""
            echo "**Summary:** $OVERALL_MESSAGE"
            echo ""
            
            # Overview table
            echo "## 📊 Scan Overview"
            echo ""
            echo "| Metric | Count |"
            echo "|:-------|:------|"
            echo "| Dockerfiles Scanned | ${TOTAL_SCANNED:-0} |"
            echo "| Clean (No new vulnerabilities) | ${CLEAN_COUNT:-0} |"
            echo "| Warning (Medium/Low vulnerabilities) | ${WARNING_COUNT:-0} |"
            echo "| Failed (Critical/High vulnerabilities) | ${FAILED_COUNT:-0} |"
            echo "| Unique Base Images | ${#BASE_RESULTS[@]} |"
            echo ""
            
            # Base images section with detailed vulnerabilities
            if [ ${#BASE_RESULTS[@]} -gt 0 ]; then
              echo "## 🐳 Base Image Analysis"
              echo ""
              echo "| Base Image | Critical | High | Medium | Low | Total | Status |"
              echo "|:-----------|:---------|:-----|:-------|:----|:------|:-------|"
              
              for base_image in "${!BASE_RESULTS[@]}"; do
                IFS='|' read -r exit_code critical high medium low total <<< "${BASE_RESULTS[$base_image]}"
                
                if [ ${critical:-0} -gt 0 ] || [ ${high:-0} -gt 0 ]; then
                  status_icon="❌ High Risk"
                elif [ ${medium:-0} -gt 0 ]; then
                  status_icon="⚠️ Medium Risk"
                elif [ ${low:-0} -gt 0 ]; then
                  status_icon="🟡 Low Risk"
                else
                  status_icon="✅ Clean"
                fi
                
                echo "| \`${base_image}\` | ${critical:-0} | ${high:-0} | ${medium:-0} | ${low:-0} | ${total:-0} | $status_icon |"
              done
              echo ""
              
              # Show detailed vulnerabilities for problematic base images
              for base_image in "${!BASE_RESULTS[@]}"; do
                IFS='|' read -r exit_code critical high medium low total <<< "${BASE_RESULTS[$base_image]}"
                
                if [ ${critical:-0} -gt 0 ] || [ ${high:-0} -gt 0 ]; then
                  echo "### 🔍 Base Image: \`$base_image\`"
                  echo ""
                  base_vulns="${BASE_VULNERABILITIES[$base_image]}"
                  if [ -n "$base_vulns" ]; then
                    echo "**Critical/High Vulnerabilities:**"
                    echo "\`\`\`"
                    echo "$base_vulns"
                    echo "\`\`\`"
                    echo ""
                    echo "💡 **Recommendation:** Consider updating to a newer version of this base image or switching to an alternative base image with fewer vulnerabilities."
                    echo ""
                  fi
                fi
              done
            fi
            
            # Dockerfile analysis
            echo "## 📝 Dockerfile Analysis"
            echo ""
            echo "| Dockerfile | Status | New Vulnerabilities | Base Image |"
            echo "|:-----------|:-------|:-------------------|:-----------|"
            
            for dockerfile in "${!DOCKERFILE_RESULTS[@]}"; do
              IFS='|' read -r status message new_crit new_high new_med new_low new_total df_crit df_high df_med df_low df_total <<< "${DOCKERFILE_RESULTS[$dockerfile]}"
              base_image="${DOCKERFILE_BASE_MAP[$dockerfile]}"
              
              case "$status" in
                "PASSED") status_icon="✅" ;;
                "WARNING") status_icon="⚠️" ;;
                "FAILED") status_icon="❌" ;;
                *) status_icon="❓" ;;
              esac
              
              echo "| \`$dockerfile\` | $status_icon $status | C:${new_crit:-0} H:${new_high:-0} M:${new_med:-0} L:${new_low:-0} | \`${base_image}\` |"
            done
            echo ""
            
            # Failed Dockerfiles details with segregated vulnerability sources
            if [ -n "$FAILED_DOCKERFILES" ]; then
              echo "## ⚠️ Failed Dockerfiles - Action Required"
              echo ""
              for dockerfile in $FAILED_DOCKERFILES; do
                if [ -n "${DOCKERFILE_RESULTS[$dockerfile]}" ]; then
                  IFS='|' read -r status message new_crit new_high new_med new_low new_total df_crit df_high df_med df_low df_total <<< "${DOCKERFILE_RESULTS[$dockerfile]}"
                  base_image="${DOCKERFILE_BASE_MAP[$dockerfile]}"
                  
                  echo "### 🔴 $dockerfile"
                  echo ""
                  echo "- **Issue:** $message"
                  echo "- **Base Image:** \`$base_image\`"
                  echo "- **New Critical:** ${new_crit:-0}"
                  echo "- **New High:** ${new_high:-0}"
                  echo ""
                  
                  # Show vulnerability source breakdown
                  IFS='|' read -r base_exit base_crit base_high base_med base_low base_total <<< "${BASE_RESULTS[$base_image]}"
                  
                  echo "#### 📊 Vulnerability Source Breakdown"
                  echo ""
                  echo "| Source | Critical | High | Medium | Low | Total |"
                  echo "|:-------|:---------|:-----|:-------|:----|:------|"
                  echo "| Base Image | ${base_crit:-0} | ${base_high:-0} | ${base_med:-0} | ${base_low:-0} | ${base_total:-0} |"
                  echo "| Dockerfile Additions | ${new_crit:-0} | ${new_high:-0} | ${new_med:-0} | ${new_low:-0} | ${new_total:-0} |"
                  echo "| **Total** | **${df_crit:-0}** | **${df_high:-0}** | **${df_med:-0}** | **${df_low:-0}** | **${df_total:-0}** |"
                  echo ""
                  
                  # Show base image vulnerabilities if they exist
                  base_vulns="${BASE_VULNERABILITIES[$base_image]}"
                  if [ -n "$base_vulns" ] && [ ${base_crit:-0} -gt 0 -o ${base_high:-0} -gt 0 ]; then
                    echo "<details>"
                    echo "<summary>🐳 Base Image Vulnerabilities (inherited)</summary>"
                    echo ""
                    echo "\`\`\`"
                    echo "$base_vulns"
                    echo "\`\`\`"
                    echo ""
                    echo "</details>"
                    echo ""
                  fi
                  
                  # Show new vulnerabilities introduced by Dockerfile
                  dockerfile_vulns="${DOCKERFILE_VULNERABILITIES[$dockerfile]}"
                  if [ -n "$dockerfile_vulns" ] && [ ${new_crit:-0} -gt 0 -o ${new_high:-0} -gt 0 ]; then
                    echo "<details>"
                    echo "<summary>📝 New Vulnerabilities (introduced by Dockerfile)</summary>"
                    echo ""
                    echo "\`\`\`"
                    echo "$dockerfile_vulns"
                    echo "\`\`\`"
                    echo ""
                    echo "</details>"
                    echo ""
                  fi
                  
                  # Show complete vulnerability details if available
                  dockerfile_file="results/${dockerfile}_dockerfile.json"
                  if [ -f "$dockerfile_file" ] && jq -e . "$dockerfile_file" >/dev/null 2>&1; then
                    echo "<details>"
                    echo "<summary>🔍 Complete Vulnerability Report</summary>"
                    echo ""
                    echo "\`\`\`"
                    jq -r '.vulnerabilities[]? | select(.severity == "critical" or .severity == "high") | "• \(.severity | ascii_upcase) - \(.id // "Unknown") - \(.title // "No description") [\(.packageName // "Unknown")]"' "$dockerfile_file" | head -10
                    echo "\`\`\`"
                    echo ""
                    echo "</details>"
                    echo ""
                  fi
                fi
              done
              
              echo "### 🔧 Recommended Actions"
              echo ""
              echo "#### For Base Image Issues:"
              echo "1. **Update base images** to newer versions with security patches"
              echo "2. **Switch to alternative base images** with better security profiles"
              echo "3. **Use minimal/distroless images** when possible"
              echo ""
              echo "#### For Dockerfile Issues:"
              echo "1. **Review package installations** and remove unnecessary packages"
              echo "2. **Pin package versions** to known secure versions"
              echo "3. **Use multi-stage builds** to reduce final image attack surface"
              echo "4. **Consider alternative packages** without known vulnerabilities"
              echo ""
            fi
            
            echo "---"
            echo "*Scan completed at $(date -u '+%Y-%m-%d %H:%M UTC') | Powered by Snyk*"
          } >> $GITHUB_STEP_SUMMARY
          
          echo "DEBUG: Report generation completed successfully"

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-scan-results-${{ github.run_number }}
          path: results/
          retention-days: 7

      - name: Notify on Failures
        if: failure() && steps.scan.outputs.failed_count > 0
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            🚨 Security vulnerabilities detected in Dockerfiles
            Failed: ${{ steps.scan.outputs.failed_count }} Dockerfile(s)
            Message: ${{ steps.scan.outputs.message }}
            View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}