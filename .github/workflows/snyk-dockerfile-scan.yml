name: Snyk Dockerfile Security Scan

# Scans Dockerfiles for security vulnerabilities using Snyk
# Only scans training environment Dockerfiles, focuses on NEW vulnerabilities introduced by Dockerfiles
# Base image vulnerabilities are reported but don't fail the build

on:
  push:
    branches: [ main ]
    paths:
      - 'images/runtime/training/*/Dockerfile'
  pull_request_target:
    types: [ labeled ]
  pull_request:
    paths:
      - 'images/runtime/training/*/Dockerfile'
  schedule:
    - cron: '0 3 * * *' 
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug mode (fails on base image issues too)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      target_dir:
        description: 'Specific directory to scan (leave empty for all)'
        required: false
        default: ''
        type: string

jobs:
  snyk-dockerfile-scan:
    name: Snyk Dockerfile Security Scan
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request_target' || 
      github.event.label.name == 'safe-to-test' || 
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.ref || '' }}
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || '' }}

      - name: Setup Snyk
        uses: snyk/actions/setup@master

      - name: Configure Snyk Authentication
        id: verify_token
        run: |
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "::error::SNYK_TOKEN secret is not configured"
            exit 1
          fi
          
          snyk auth "${{ secrets.SNYK_TOKEN }}"
          
          SNYK_VERSION=$(snyk --version)
          echo "version=$SNYK_VERSION" >> $GITHUB_OUTPUT
          echo "Snyk authenticated successfully - Version: $SNYK_VERSION"

      - name: Execute Dockerfile Security Scans
        id: scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          DEBUG_MODE: ${{ github.event.inputs.debug == 'true' }}
          TARGET_DIR: ${{ github.event.inputs.target_dir }}
          SNYK_VERSION: ${{ steps.verify_token.outputs.version }}
        run: |
          mkdir -p .github/scripts
          
          cat > .github/scripts/snyk-scan.sh << 'SCRIPT_EOF'
          #!/bin/bash
          set -e
          
          # === CONFIGURATION ===
          TRAINING_DIR="images/runtime/training"
          RESULTS_DIR="scan_results"
          mkdir -p "$RESULTS_DIR"
          
          TOTAL_SCANNED=0
          BASE_IMAGES_WITH_ISSUES=0
          DOCKERFILE_CLEAN=0
          DOCKERFILE_WITH_NEW_ISSUES=0
          DOCKERFILE_INHERIT_ONLY=0
          SCAN_ERRORS=0
          
          declare -A BASE_IMAGE_RESULTS
          declare -A DOCKERFILE_RESULTS
          declare -A VULNERABILITY_DETAILS
          declare -A BASE_IMAGE_NAMES
          DOCKERFILES_WITH_NEW_VULNS=""
          
          # === UTILITY FUNCTIONS ===
          
          log_section() {
            echo ""
            echo "========================================================================"
            echo "  $1"
            echo "========================================================================"
          }
          
          # Extract base image from Dockerfile, handling ARG variables
          extract_base_image() {
            local dockerfile="$1"
            local base_image=$(grep -m 1 "^FROM" "$dockerfile" | awk '{print $2}' | sed 's/ AS .*//g')
            
            while IFS= read -r line; do
              if [[ "$line" =~ ^ARG[[:space:]]+([^=[:space:]]+)=(.+)$ ]]; then
                local var_name="${BASH_REMATCH[1]}"
                local var_value="${BASH_REMATCH[2]//[\"\']}"
                base_image="${base_image//\$\{$var_name\}/$var_value}"
                base_image="${base_image//\$var_name/$var_value}"
              fi
            done < "$dockerfile"
            
            echo "$base_image"
          }
          
          # Parse Snyk JSON output for vulnerability counts
          get_vuln_counts() {
            local json_file="$1"
            [ ! -f "$json_file" ] || [ ! -s "$json_file" ] || ! jq -e . "$json_file" >/dev/null 2>&1 && { echo "0|0|0|0|0"; return; }
            
            local critical=$(jq '[.vulnerabilities[]? | select(.severity == "critical")] | length' "$json_file" 2>/dev/null || echo "0")
            local high=$(jq '[.vulnerabilities[]? | select(.severity == "high")] | length' "$json_file" 2>/dev/null || echo "0")
            local medium=$(jq '[.vulnerabilities[]? | select(.severity == "medium")] | length' "$json_file" 2>/dev/null || echo "0")
            local low=$(jq '[.vulnerabilities[]? | select(.severity == "low")] | length' "$json_file" 2>/dev/null || echo "0")
            local total=$(jq '.uniqueCount // 0' "$json_file" 2>/dev/null || echo "0")
            
            echo "$critical|$high|$medium|$low|$total"
          }
          
          # Get formatted vulnerability list (optionally excluding base image vulns)
          get_vulnerabilities() {
            local json_file="$1" exclude_json="$2" count="${3:-5}" skip="${4:-0}"
            [ ! -f "$json_file" ] || [ ! -s "$json_file" ] || ! jq -e . "$json_file" >/dev/null 2>&1 && return
            
            local base_ids=""
            [ -n "$exclude_json" ] && [ -f "$exclude_json" ] && base_ids=$(jq -r '[.vulnerabilities[]?.id // empty] | join(",")' "$exclude_json" 2>/dev/null || echo "")
            
            jq -r --arg count "$count" --arg skip "$skip" --arg base_ids "$base_ids" '
              [.vulnerabilities[]? | select(.severity == "critical" or .severity == "high")] 
              | if $base_ids != "" then map(select((.id // "") as $id | ($base_ids | split(",") | index($id) | not))) else . end
              | sort_by(-.cvssScore) 
              | .[$skip|tonumber:($skip|tonumber + $count|tonumber)] 
              | map("• \(.severity|ascii_upcase) - \(.id // "Unknown CVE") - \(.title // "No description") [Package: \(.packageName // "Unknown")@\(.version // "Unknown")] (CVSS: \(.cvssScore // "N/A"))")
              | join("\n")
            ' "$json_file" 2>/dev/null || echo ""
          }
          
          # === DETERMINE SCAN TARGETS ===
          
          if [ -n "$TARGET_DIR" ]; then
            # Single directory mode (manual runs)
            [ -d "$TRAINING_DIR/$TARGET_DIR" ] || { echo "Target directory $TRAINING_DIR/$TARGET_DIR does not exist"; exit 1; }
            TARGET_DIRS=("$TARGET_DIR")
            echo "Scanning specific directory: $TARGET_DIR"
          else
            # All directories mode (normal CI runs)
            # UPDATE THIS LIST when adding new training environments
            TARGET_DIRS=("py311-cuda121-torch241" "py311-cuda124-torch251" "py311-rocm62-torch241" "py311-rocm62-torch251")
            echo "Scanning all Dockerfile directories"
          fi
          
          printf "%s\n" "${TARGET_DIRS[@]}" > "$RESULTS_DIR/target_dirs.txt"
          
          # === MAIN SCANNING LOOP ===
          
          for DIR in "${TARGET_DIRS[@]}"; do
            log_section "Processing $DIR"
            
            DOCKERFILE="$TRAINING_DIR/$DIR/Dockerfile"
            ((TOTAL_SCANNED++))
            
            if [ ! -f "$DOCKERFILE" ]; then
              echo "ERROR: Dockerfile not found: $DOCKERFILE"
              ((SCAN_ERRORS++))
              DOCKERFILE_RESULTS[$DIR]="ERROR|Dockerfile not found|0|0|0|0|0"
              continue
            fi
            
            BASE_IMAGE=$(extract_base_image "$DOCKERFILE")
            echo "Base image: $BASE_IMAGE"
            
            # --- PHASE 1: Scan base image alone ---
            echo -e "\nPhase 1: Base Image Security Analysis\n-------------------------------------"
            
            BASE_SCAN_KEY="${BASE_IMAGE//[:\/]/_}"  # Convert image name to safe filename
            BASE_SCAN_JSON="$RESULTS_DIR/base_${BASE_SCAN_KEY}.json"
            BASE_SCAN_OUTPUT="$RESULTS_DIR/base_${BASE_SCAN_KEY}_output.txt"
            BASE_IMAGE_NAMES[$BASE_SCAN_KEY]="$BASE_IMAGE"
            
            if [ -z "${BASE_IMAGE_RESULTS[$BASE_SCAN_KEY]}" ]; then
              echo "Running Snyk base image scan..."
              set +e
              snyk container test "$BASE_IMAGE" --json --severity-threshold=high > "$BASE_SCAN_JSON" 2> "$BASE_SCAN_OUTPUT"
              BASE_EXIT_CODE=$?
              set -e
              
              IFS='|' read -r base_critical base_high base_medium base_low base_total <<< "$(get_vuln_counts "$BASE_SCAN_JSON")"
              BASE_IMAGE_RESULTS[$BASE_SCAN_KEY]="$BASE_EXIT_CODE|$base_critical|$base_high|$base_medium|$base_low|$base_total"
              
              [ "$base_total" -gt 0 ] && ((BASE_IMAGES_WITH_ISSUES++))
              echo "Base image scan completed"
            else
              echo "Using cached base image scan results"
              IFS='|' read -r BASE_EXIT_CODE base_critical base_high base_medium base_low base_total <<< "${BASE_IMAGE_RESULTS[$BASE_SCAN_KEY]}"
            fi
            
            echo "  Critical: $base_critical | High: $base_high | Medium: $base_medium | Low: $base_low | Total: $base_total"
            
            # --- PHASE 2: Scan Dockerfile context (base + added layers) ---
            echo -e "\nPhase 2: Full Dockerfile Security Analysis\n------------------------------------------"
            echo "Running Snyk scan with Dockerfile context..."
            
            FULL_SCAN_JSON="$RESULTS_DIR/${DIR}_full_scan.json"
            FULL_SCAN_OUTPUT="$RESULTS_DIR/${DIR}_full_scan_output.txt"
            
            set +e
            snyk container test "$BASE_IMAGE" --file="$DOCKERFILE" --json --severity-threshold=high > "$FULL_SCAN_JSON" 2> "$FULL_SCAN_OUTPUT"
            set -e
            
            IFS='|' read -r docker_critical docker_high docker_medium docker_low docker_total <<< "$(get_vuln_counts "$FULL_SCAN_JSON")"
            echo "  Critical: $docker_critical | High: $docker_high | Medium: $docker_medium | Low: $docker_low | Total: $docker_total"
            
            # --- ANALYSIS: Compare base vs dockerfile to find NEW vulnerabilities ---
            NEW_CRITICAL=$((docker_critical - base_critical))
            NEW_HIGH=$((docker_high - base_high))
            NEW_TOTAL=$((docker_total - base_total))
            
            # Determine status based on NEW vulnerabilities only
            if [ $NEW_CRITICAL -gt 0 ] || [ $NEW_HIGH -gt 0 ]; then
              DOCKERFILE_STATUS="FAILED"
              DOCKERFILE_MSG="Introduces $NEW_CRITICAL critical, $NEW_HIGH high vulnerabilities"
              DOCKERFILES_WITH_NEW_VULNS="${DOCKERFILES_WITH_NEW_VULNS}${DIR}, "
              ((DOCKERFILE_WITH_NEW_ISSUES++))
              VULNERABILITY_DETAILS[$DIR]="$(get_vulnerabilities "$FULL_SCAN_JSON" "$BASE_SCAN_JSON" 10)"
            elif [ $NEW_TOTAL -gt 0 ]; then
              DOCKERFILE_STATUS="WARNING"
              DOCKERFILE_MSG="Introduces $NEW_TOTAL medium/low vulnerabilities"
              ((DOCKERFILE_INHERIT_ONLY++))
            else
              DOCKERFILE_STATUS="PASSED"
              DOCKERFILE_MSG="No new vulnerabilities introduced"
              ((DOCKERFILE_CLEAN++))
            fi
            
            DOCKERFILE_RESULTS[$DIR]="$DOCKERFILE_STATUS|$DOCKERFILE_MSG|$docker_critical|$docker_high|$docker_medium|$docker_low|$docker_total"
            echo "  Status: $DOCKERFILE_STATUS"
            echo "  Assessment: $DOCKERFILE_MSG"
          done
          
          # === CALCULATE OVERALL STATUS ===
          
          DOCKERFILES_WITH_NEW_VULNS=$(echo "$DOCKERFILES_WITH_NEW_VULNS" | sed 's/, $//')
          DOCKERFILE_FAILURES_EXIST=false
          
          if [ $SCAN_ERRORS -gt 0 ]; then
            OVERALL_STATUS="ERROR"; OVERALL_MSG="Scan errors encountered"; DOCKERFILE_FAILURES_EXIST=true
          elif [ -n "$DOCKERFILES_WITH_NEW_VULNS" ]; then
            OVERALL_STATUS="FAILED"; OVERALL_MSG="Dockerfiles introduce new critical/high vulnerabilities: $DOCKERFILES_WITH_NEW_VULNS"; DOCKERFILE_FAILURES_EXIST=true
          elif [ $DOCKERFILE_CLEAN -eq $TOTAL_SCANNED ]; then
            OVERALL_STATUS="PASSED"; OVERALL_MSG="All Dockerfiles clean - no new vulnerabilities introduced"
          else
            OVERALL_STATUS="WARNING"; OVERALL_MSG="Dockerfiles introduce only medium/low vulnerabilities"
          fi
          
          # Debug mode: fail on ANY issues (including base image problems)
          [ "$DEBUG_MODE" = "true" ] && [ $BASE_IMAGES_WITH_ISSUES -gt 0 ] && {
            OVERALL_STATUS="FAILED"; OVERALL_MSG="$OVERALL_MSG (Debug Mode: Base images have vulnerabilities)"; DOCKERFILE_FAILURES_EXIST=true
          }
          
          # === SAVE RESULTS FOR SUMMARY GENERATION ===
          
          cat > "$RESULTS_DIR/scan_state.env" << EOF
          OVERALL_STATUS="$OVERALL_STATUS"
          OVERALL_MSG="$OVERALL_MSG"
          TOTAL_SCANNED=$TOTAL_SCANNED
          BASE_IMAGES_WITH_ISSUES=$BASE_IMAGES_WITH_ISSUES
          DOCKERFILE_CLEAN=$DOCKERFILE_CLEAN
          DOCKERFILE_WITH_NEW_ISSUES=$DOCKERFILE_WITH_NEW_ISSUES
          DOCKERFILE_INHERIT_ONLY=$DOCKERFILE_INHERIT_ONLY
          SCAN_ERRORS=$SCAN_ERRORS
          DOCKERFILES_WITH_NEW_VULNS="$DOCKERFILES_WITH_NEW_VULNS"
          DOCKERFILE_FAILURES_EXIST=$DOCKERFILE_FAILURES_EXIST
          EOF
          
          # Save associative arrays to files
          for key in "${!BASE_IMAGE_RESULTS[@]}"; do echo "$key=${BASE_IMAGE_RESULTS[$key]}"; done > "$RESULTS_DIR/base_images.data"
          for key in "${!DOCKERFILE_RESULTS[@]}"; do echo "$key=${DOCKERFILE_RESULTS[$key]}"; done > "$RESULTS_DIR/dockerfile_results.data"
          for key in "${!VULNERABILITY_DETAILS[@]}"; do echo "$key=${VULNERABILITY_DETAILS[$key]}"; done > "$RESULTS_DIR/vulnerability_details.data"
          for key in "${!BASE_IMAGE_NAMES[@]}"; do echo "$key=${BASE_IMAGE_NAMES[$key]}"; done > "$RESULTS_DIR/base_image_names.data"
          
          # Set outputs for GitHub Actions
          cat >> $GITHUB_OUTPUT << EOF
          overall_status=$OVERALL_STATUS
          scan_status=$OVERALL_MSG
          dockerfile_failures_exist=$DOCKERFILE_FAILURES_EXIST
          slack_msg=$OVERALL_MSG
          base_issues_count=$BASE_IMAGES_WITH_ISSUES
          dockerfile_clean_count=$DOCKERFILE_CLEAN
          dockerfile_warning_count=$DOCKERFILE_INHERIT_ONLY
          dockerfile_failed_count=$DOCKERFILE_WITH_NEW_ISSUES
          scan_errors_count=$SCAN_ERRORS
          EOF
          
          # === FINAL SUMMARY AND EXIT ===
          
          log_section "FINAL SCAN RESULTS"
          echo "Overall Status: $OVERALL_STATUS"
          echo "Message: $OVERALL_MSG"
          echo -e "\nDockerfile Scan Summary:"
          echo "  Clean (no new vulnerabilities): $DOCKERFILE_CLEAN"
          echo "  With new medium/low vulnerabilities: $DOCKERFILE_INHERIT_ONLY"
          echo "  With new critical/high vulnerabilities: $DOCKERFILE_WITH_NEW_ISSUES"
          echo "  Scan errors: $SCAN_ERRORS"
          echo -e "\nBase Image Summary:"
          echo "  Images with vulnerabilities: $BASE_IMAGES_WITH_ISSUES (report-only)"
          
          # Exit logic: only fail if Dockerfiles introduce NEW critical/high vulnerabilities
          if [ "$DEBUG_MODE" = "true" ] && [ "$DOCKERFILE_FAILURES_EXIST" = "true" ]; then
            echo -e "\nDebug Mode: Workflow failed due to vulnerabilities"
            exit 1
          elif [ "$DOCKERFILE_WITH_NEW_ISSUES" -gt 0 ] || [ $SCAN_ERRORS -gt 0 ]; then
            echo -e "\nWorkflow failed - Dockerfiles introduce new critical/high vulnerabilities"
            exit 1
          else
            echo -e "\nWorkflow passed - No new critical/high vulnerabilities introduced by Dockerfiles"
            exit 0
          fi
          SCRIPT_EOF
          
          chmod +x .github/scripts/snyk-scan.sh
          .github/scripts/snyk-scan.sh

      - name: Generate Enhanced GitHub Summary
        if: always()
        env:
          SNYK_VERSION: ${{ steps.verify_token.outputs.version }}
        run: |
          cat > .github/scripts/generate-summary.sh << 'SUMMARY_EOF'
          #!/bin/bash
          
          RESULTS_DIR="scan_results"
          SNYK_VERSION="${SNYK_VERSION:-Unknown}"
          
          # === HELPER FUNCTIONS ===
          
          # Get formatted vulnerability list (optionally excluding base image vulns)
          get_vulnerabilities() {
            local json_file="$1" exclude_json="$2" count="${3:-10}" skip="${4:-0}"
            [ ! -f "$json_file" ] || [ ! -s "$json_file" ] || ! jq -e . "$json_file" >/dev/null 2>&1 && return
            
            local base_ids=""
            [ -n "$exclude_json" ] && [ -f "$exclude_json" ] && base_ids=$(jq -r '[.vulnerabilities[]?.id // empty] | join(",")' "$exclude_json" 2>/dev/null || echo "")
            
            jq -r --arg count "$count" --arg skip "$skip" --arg base_ids "$base_ids" '
              [.vulnerabilities[]? | select(.severity == "critical" or .severity == "high")] 
              | if $base_ids != "" then map(select((.id // "") as $id | ($base_ids | split(",") | index($id) | not))) else . end
              | sort_by(-.cvssScore) 
              | .[$skip|tonumber:($skip|tonumber + $count|tonumber)] 
              | map("• \(.severity|ascii_upcase) - \(.id // "Unknown CVE") - \(.title // "No description") [Package: \(.packageName // "Unknown")@\(.version // "Unknown")] (CVSS: \(.cvssScore // "N/A"))")
              | join("\n")
            ' "$json_file" 2>/dev/null || echo ""
          }
          
          # Count critical/high vulnerabilities in scan results
          get_vuln_count() {
            local json_file="$1" severity="${2:-total}"
            [ ! -f "$json_file" ] || [ ! -s "$json_file" ] || ! jq -e . "$json_file" >/dev/null 2>&1 && { echo "0"; return; }
            
            if [ "$severity" = "total" ]; then
              jq '[.vulnerabilities[]? | select(.severity == "critical" or .severity == "high")] | length' "$json_file" 2>/dev/null || echo "0"
            else
              jq --arg sev "$severity" '[.vulnerabilities[]? | select(.severity == $sev)] | length' "$json_file" 2>/dev/null || echo "0"
            fi
          }
          
          # Calculate NEW vulnerabilities for a specific Dockerfile
          calc_new_vulns() {
            local dir="$1"
            local dockerfile_path="images/runtime/training/$dir/Dockerfile"
            
            if [ -f "$dockerfile_path" ] && [ -n "${DOCKERFILE_RESULTS[$dir]}" ] && [ -n "${BASE_IMAGE_RESULTS[$base_scan_key]}" ]; then
              local base_image=$(grep -m 1 "^FROM" "$dockerfile_path" | awk '{print $2}' | sed 's/ AS .*//g')
              local base_scan_key="${base_image//[:\/]/_}"
              
              IFS='|' read -r status msg docker_critical docker_high docker_medium docker_low docker_total <<< "${DOCKERFILE_RESULTS[$dir]}"
              IFS='|' read -r base_exit_code base_critical base_high base_medium base_low base_total <<< "${BASE_IMAGE_RESULTS[$base_scan_key]}"
              
              local new_critical=$((docker_critical - base_critical))
              local new_high=$((docker_high - base_high))
              local new_medium=$((docker_medium - base_medium))
              local new_low=$((docker_low - base_low))
              local new_total=$((docker_total - base_total))
              
              # Only count positive differences (new vulnerabilities)
              [ $new_critical -lt 0 ] && new_critical=0
              [ $new_high -lt 0 ] && new_high=0
              [ $new_medium -lt 0 ] && new_medium=0
              [ $new_low -lt 0 ] && new_low=0
              [ $new_total -lt 0 ] && new_total=0
              
              echo "$new_critical|$new_high|$new_medium|$new_low|$new_total|$base_scan_key"
            else
              echo "0|0|0|0|0|"
            fi
          }
          
          # === LOAD SCAN RESULTS ===
          
          [ -f "$RESULTS_DIR/scan_state.env" ] && source "$RESULTS_DIR/scan_state.env" || {
            echo "# Snyk Dockerfile Security Scan Results" >> $GITHUB_STEP_SUMMARY
            echo -e "\n## Scan Failed\nThe security scan encountered an error. Please check the logs for details." >> $GITHUB_STEP_SUMMARY
            exit 0
          }
          
          declare -A BASE_IMAGE_RESULTS DOCKERFILE_RESULTS VULNERABILITY_DETAILS BASE_IMAGE_NAMES
          [ -f "$RESULTS_DIR/base_images.data" ] && while IFS='=' read -r key value; do BASE_IMAGE_RESULTS["$key"]="$value"; done < "$RESULTS_DIR/base_images.data"
          [ -f "$RESULTS_DIR/dockerfile_results.data" ] && while IFS='=' read -r key value; do DOCKERFILE_RESULTS["$key"]="$value"; done < "$RESULTS_DIR/dockerfile_results.data"
          [ -f "$RESULTS_DIR/vulnerability_details.data" ] && while IFS='=' read -r key value; do VULNERABILITY_DETAILS["$key"]="$value"; done < "$RESULTS_DIR/vulnerability_details.data"
          [ -f "$RESULTS_DIR/base_image_names.data" ] && while IFS='=' read -r key value; do BASE_IMAGE_NAMES["$key"]="$value"; done < "$RESULTS_DIR/base_image_names.data"
          
          TARGET_DIRS=()
          [ -f "$RESULTS_DIR/target_dirs.txt" ] && while IFS= read -r dir; do TARGET_DIRS+=("$dir"); done < "$RESULTS_DIR/target_dirs.txt"
          
          # === GENERATE GITHUB SUMMARY ===
          
          {
            echo "# Snyk Dockerfile Security Scan Results"
            echo -e "\n## Executive Summary\n"
            
            case "$OVERALL_STATUS" in
              "PASSED") echo "### ✅ Status: PASSED\n> All Dockerfiles are clean - no new critical/high vulnerabilities introduced" ;;
              "WARNING") echo "### ⚠️ Status: WARNING\n> Dockerfiles introduce only medium/low severity vulnerabilities" ;;
              "FAILED") echo "### ❌ Status: FAILED\n> Dockerfiles introduce new critical/high vulnerabilities that must be addressed" ;;
              "ERROR") echo "### Status: ERROR\n> Scan encountered errors - check logs for details" ;;
            esac
            
            echo -e "\n| Metric | Value |"
            echo "|:-------|:------|"
            echo "| **Scan Date** | $(date -u '+%B %d, %Y at %H:%M UTC') |"
            echo "| **Snyk Version** | $SNYK_VERSION |"
            echo "| **Dockerfiles Scanned** | $TOTAL_SCANNED |"
            echo "| **Build Impact** | $([ $DOCKERFILE_WITH_NEW_ISSUES -gt 0 ] && echo "❌ BLOCKED" || echo "✅ ALLOWED") |"
            
            echo -e "\n## Vulnerability Overview\n"
            
            # Calculate total base image vulnerabilities
            TOTAL_BASE_CRITICAL=0 TOTAL_BASE_HIGH=0 TOTAL_BASE_MEDIUM=0 TOTAL_BASE_LOW=0 TOTAL_BASE_TOTAL=0
            for key in "${!BASE_IMAGE_RESULTS[@]}"; do
              IFS='|' read -r exit_code critical high medium low total <<< "${BASE_IMAGE_RESULTS[$key]}"
              ((TOTAL_BASE_CRITICAL += critical, TOTAL_BASE_HIGH += high, TOTAL_BASE_MEDIUM += medium, TOTAL_BASE_LOW += low, TOTAL_BASE_TOTAL += total))
            done
            
            echo "| Component | Critical | High | Medium | Low | Total | Impact |"
            echo "|:----------|:---------|:-----|:-------|:----|:------|:-------|"
            echo "| **Base Images** | $TOTAL_BASE_CRITICAL | $TOTAL_BASE_HIGH | $TOTAL_BASE_MEDIUM | $TOTAL_BASE_LOW | $TOTAL_BASE_TOTAL | Report Only |"
            
            # Show NEW vulnerabilities for each Dockerfile
            for DIR in "${TARGET_DIRS[@]}"; do
              [ -n "${DOCKERFILE_RESULTS[$DIR]}" ] || continue
              
              IFS='|' read -r new_critical new_high new_medium new_low new_total base_scan_key <<< "$(calc_new_vulns "$DIR")"
              
              local impact_status="✅ Build Safe"
              [ $new_critical -gt 0 ] || [ $new_high -gt 0 ] && impact_status="❌ Fails Build"
              [ $new_total -gt 0 ] && [ "$impact_status" = "✅ Build Safe" ] && impact_status="⚠️ Warning"
              
              echo "| **$DIR** | $new_critical | $new_high | $new_medium | $new_low | $new_total | $impact_status |"
            done
            
            # Show critical failures that block builds
            [ -n "$DOCKERFILES_WITH_NEW_VULNS" ] && {
              echo -e "\n## ❌ New Vulnerabilities Detected\n> These vulnerabilities are introduced by Dockerfiles and block the build\n"
              
              for DIR in ${DOCKERFILES_WITH_NEW_VULNS//,/ }; do
                DIR=$(echo "$DIR" | xargs)
                [ -n "${VULNERABILITY_DETAILS[$DIR]}" ] && {
                  echo "### $DIR"
                  echo "\`\`\`"
                  echo "${VULNERABILITY_DETAILS[$DIR]}"
                  echo "\`\`\`"
                  echo ""
                }
              done
              
              echo "### Required Actions"
              echo "1. Update vulnerable packages in the affected Dockerfiles"
              echo "2. Consider alternative packages without known vulnerabilities"
              echo "3. Re-run the scan after making changes"
              echo ""
            }
            
            # Dockerfile Security Details - shows all Dockerfiles with expandable sections
            echo "## Dockerfile Security Details"
            echo "> Detailed analysis of each Dockerfile's security status"
            echo ""
            
            for DIR in "${TARGET_DIRS[@]}"; do
              [ -n "${DOCKERFILE_RESULTS[$DIR]}" ] || continue
              
              IFS='|' read -r new_critical new_high new_medium new_low new_total base_scan_key <<< "$(calc_new_vulns "$DIR")"
              
              local status_icon="✅" status_msg="Clean - No new vulnerabilities introduced"
              [ $new_critical -gt 0 ] || [ $new_high -gt 0 ] && { status_icon="❌"; status_msg="Introduces $new_critical critical, $new_high high vulnerabilities"; }
              [ $new_total -gt 0 ] && [ "$status_icon" = "✅" ] && { status_icon="⚠️"; status_msg="Introduces $new_total medium/low vulnerabilities"; }
              
              local full_scan_json="$RESULTS_DIR/${DIR}_full_scan.json"
              local base_scan_json="$RESULTS_DIR/base_${base_scan_key}.json"
              
              if [ $new_total -gt 0 ]; then
                # Expandable section for Dockerfiles with issues
                local new_crit_high=0
                [ -f "$full_scan_json" ] && [ -f "$base_scan_json" ] && {
                  new_crit_high=$(( $(get_vuln_count "$full_scan_json") - $(get_vuln_count "$base_scan_json") ))
                  [ $new_crit_high -lt 0 ] && new_crit_high=0
                }
                [ -f "$full_scan_json" ] && [ ! -f "$base_scan_json" ] && new_crit_high=$(get_vuln_count "$full_scan_json")
                
                echo "<details>"
                echo "<summary><strong>$status_icon $DIR</strong> - $status_msg</summary>"
                echo ""
                
                local top_10_vulns=$(get_vulnerabilities "$full_scan_json" "$base_scan_json" 10)
                [ -n "$top_10_vulns" ] && {
                  echo "**Top 10 New Vulnerabilities (by CVSS Score):**"
                  echo "\`\`\`"
                  echo "$top_10_vulns"
                  echo "\`\`\`"
                  echo ""
                  
                  # Nested expandable for remaining vulnerabilities
                  [ $new_crit_high -gt 10 ] && {
                    local remaining_count=$((new_crit_high - 10))
                    local remaining_vulns=$(get_vulnerabilities "$full_scan_json" "$base_scan_json" $remaining_count 10)
                    [ -n "$remaining_vulns" ] && {
                      echo "<details>"
                      echo "<summary><strong>▼ Show Remaining $remaining_count New Vulnerabilities</strong></summary>"
                      echo -e "\n\`\`\`"
                      echo "$remaining_vulns"
                      echo "\`\`\`"
                      echo -e "\n</details>"
                      echo ""
                    }
                  }
                } || echo "**No detailed vulnerability information available for new issues.**"
                
                echo "</details>"
              else
                echo "**$status_icon $DIR** - $status_msg"
              fi
              echo ""
            done
            
            # Base Image Details - shows inherited vulnerabilities (report-only)
            [ $BASE_IMAGES_WITH_ISSUES -gt 0 ] && {
              echo "## Base Image Security Details"
              echo "> Base image vulnerabilities are inherited and don't fail builds"
              echo ""
              
              for key in "${!BASE_IMAGE_RESULTS[@]}"; do
                IFS='|' read -r exit_code critical high medium low total <<< "${BASE_IMAGE_RESULTS[$key]}"
                [ "$total" -gt 0 ] || continue
                
                local base_image_name="${BASE_IMAGE_NAMES[$key]}"
                [ -z "$base_image_name" ] && base_image_name=$(echo "$key" | sed 's/_/\//g' | sed 's/\//:/2')
                
                local base_scan_json="$RESULTS_DIR/base_${key}.json"
                local total_crit_high=$(get_vuln_count "$base_scan_json")
                
                echo "<details>"
                echo "<summary><strong>$base_image_name</strong> - $total vulnerabilities detected ($critical critical, $high high)</summary>"
                echo ""
                
                local top_10_vulns=$(get_vulnerabilities "$base_scan_json" "" 10)
                [ -n "$top_10_vulns" ] && {
                  echo "**Top 10 Vulnerabilities (by CVSS Score):**"
                  echo "\`\`\`"
                  echo "$top_10_vulns"
                  echo "\`\`\`"
                  echo ""
                  
                  [ "$total_crit_high" -gt 10 ] && {
                    local remaining_count=$((total_crit_high - 10))
                    local remaining_vulns=$(get_vulnerabilities "$base_scan_json" "" $remaining_count 10)
                    [ -n "$remaining_vulns" ] && {
                      echo "<details>"
                      echo "<summary><strong>▼ Show Remaining $remaining_count Vulnerabilities</strong></summary>"
                      echo -e "\n\`\`\`"
                      echo "$remaining_vulns"
                      echo "\`\`\`"
                      echo -e "\n</details>"
                      echo ""
                    }
                  }
                } || echo "**Vulnerability details not available in scan results.**"
                
                echo "</details>"
                echo ""
              done
              
              echo "### Advisory"
              echo "Consider updating to newer base image versions when available."
              echo ""
            }
            
            echo "---"
            echo "*Powered by Snyk Container Security | [View Full Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"
          } >> $GITHUB_STEP_SUMMARY
          SUMMARY_EOF
          
          chmod +x .github/scripts/generate-summary.sh
          .github/scripts/generate-summary.sh

      - name: Upload Scan Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-scan-results-${{ github.run_number }}
          path: scan_results/
          retention-days: 30

      - name: Slack Notification
        if: |
          always() && 
          github.event_name != 'pull_request' && 
          steps.scan.outputs.dockerfile_failures_exist == 'true'
        continue-on-error: true
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: repo,workflow,ref
          custom_payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.scan.outputs.overall_status == 'PASSED' && 'good' || steps.scan.outputs.overall_status == 'WARNING' && 'warning' || 'danger' }}",
                  "title": "${{ steps.scan.outputs.overall_status == 'PASSED' && 'Snyk Security Scan Passed' || steps.scan.outputs.overall_status == 'WARNING' && 'Snyk Security Scan Warning' || steps.scan.outputs.overall_status == 'ERROR' && 'Snyk Security Scan Error' || 'Snyk Security Scan Failed' }}",
                  "fields": [
                    {
                      "title": "Status",
                      "value": "${{ steps.scan.outputs.overall_status }}",
                      "short": true
                    },
                    {
                      "title": "Repository",
                      "value": "${{ github.repository }}",
                      "short": true
                    },
                    {
                      "title": "Summary",
                      "value": "${{ steps.scan.outputs.slack_msg }}",
                      "short": false
                    },
                    {
                      "title": "Dockerfile Analysis",
                      "value": "Clean: ${{ steps.scan.outputs.dockerfile_clean_count }}\nNew Medium/Low: ${{ steps.scan.outputs.dockerfile_warning_count }}\nNew Critical/High: ${{ steps.scan.outputs.dockerfile_failed_count }}\nErrors: ${{ steps.scan.outputs.scan_errors_count }}",
                      "short": true
                    },
                    {
                      "title": "Base Image Security", 
                      "value": "${{ steps.scan.outputs.base_total_count }} vulnerabilities detected (${{ steps.scan.outputs.base_critical_count }} critical, ${{ steps.scan.outputs.base_high_count }} high) - report-only",
                      "short": true
                    },
                    {
                      "title": "Action Required",
                      "value": "Review Dockerfile vulnerabilities and update packages before merge",
                      "short": false
                    },
                    {
                      "title": "View Full Security Report",
                      "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Click here for detailed vulnerability analysis and recommendations>",
                      "short": false
                    }
                  ],
                  "footer": "Snyk Container Security | Only notifies on Dockerfile failures",
                  "footer_icon": "https://res.cloudinary.com/snyk/image/upload/v1537345894/press-kit/brand/logo-black.png",
                  "ts": ${{ github.event.head_commit.timestamp && 'new Date(github.event.head_commit.timestamp).getTime() / 1000' || 'Math.floor(Date.now() / 1000)' }}
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || '' }}