# Dockerfile security best practices scan
# Checks for Docker security best practices
name: Dockerfile Security Scan
on:
  push:
    branches: [ main ]
  pull_request_target:
    types: [ labeled ]
  pull_request:
    paths:
      - 'images/runtime/training/*/Dockerfile'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  dockerfile-scan:
    name: Dockerfile Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create Test Dockerfile with Known Issues
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.debug == 'true'
        id: test_dockerfile
        run: |
          echo "Creating test Dockerfile with known security issues..."
          
          # Create a test Dockerfile with multiple security issues
          cat > test_insecure.Dockerfile << 'EOF'
          FROM alpine:latest
          
          # No USER directive (will run as root)
          
          # Adding a secret in ENV
          ENV API_TOKEN=abcdef12345
          
          # Using curl insecurely
          RUN apk add --no-cache curl && \
              curl -k https://example.com
              
          # Using ADD instead of COPY
          ADD file.txt /app/
          
          CMD ["echo", "Insecure container"]
          EOF
          
          echo "Running test scan..."
          
          # Check security issues using simple grep commands
          ISSUES=()
          
          # Check for latest tag (high severity)
          if grep -E "FROM\s+\S+:latest" test_insecure.Dockerfile > /dev/null; then
            ISSUES+=("Latest tag detected")
          fi
          
          # Check for missing USER instruction
          if ! grep -q "USER" test_insecure.Dockerfile; then
            ISSUES+=("Missing USER instruction")
          fi
          
          # Check for secrets in ENV
          if grep -E "ENV.*(PASSWORD|SECRET|KEY|TOKEN).*=" test_insecure.Dockerfile > /dev/null; then
            ISSUES+=("Secrets in ENV variables")
          fi
          
          # Check if any issues were found
          if [ ${#ISSUES[@]} -gt 0 ]; then
            echo "Test scan results: Found ${#ISSUES[@]} issues"
            echo "Issues detected: ${ISSUES[*]}"
            echo "test_passed=true" >> $GITHUB_OUTPUT
          else
            echo "Test scan results: No issues found"
            echo "test_passed=false" >> $GITHUB_OUTPUT
          fi

      - name: Scan Dockerfiles
        id: scan
        env:
          DEBUG_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug == 'true' }}
          TEST_PASSED: ${{ steps.test_dockerfile.outputs.test_passed }}
        run: |
          set -euo pipefail
          
          if [ "$DEBUG_MODE" = "true" ]; then
            set -x
            echo "Running in debug mode"
            # If we ran the test, report the result
            if [ -n "${TEST_PASSED:-}" ]; then
              echo "Security check verification result: $TEST_PASSED"
              if [ "$TEST_PASSED" != "true" ]; then
                echo "::warning::Security check verification failed. Results may be unreliable."
              fi
            fi
          fi
          
          HAS_HIGH_SEVERITY=false
          HAS_ISSUES=false
          ROWS=""
          PASSED_COUNT=0
          ISSUES_COUNT=0
          HIGH_COUNT=0
          DETAILED_RESULTS=()
          
          declare -A IMAGE_TYPES
          IMAGE_TYPES["py311-cuda121-torch241"]="CUDA 12.1 + PyTorch 2.4.1"
          IMAGE_TYPES["py311-cuda124-torch251"]="CUDA 12.4 + PyTorch 2.5.1"
          IMAGE_TYPES["py311-rocm62-torch241"]="ROCm 6.2 + PyTorch 2.4.1"
          IMAGE_TYPES["py311-rocm62-torch251"]="ROCm 6.2 + PyTorch 2.5.1"
          
          DOCKERFILE_DIRS=(
            "py311-cuda121-torch241"
            "py311-cuda124-torch251"
            "py311-rocm62-torch241"
            "py311-rocm62-torch251"
          )
          
          REPORT_ROWS=()
          
          for DIR in "${DOCKERFILE_DIRS[@]}"; do
            DOCKERFILE_PATH="images/runtime/training/${DIR}/Dockerfile"
            echo "Scanning ${DIR} Dockerfile..."
            
            if [ ! -f "$DOCKERFILE_PATH" ]; then
              REPORT_ROWS+=("${DIR}|${IMAGE_TYPES[$DIR]}|❌ Fail|Dockerfile not found|N/A")
              ROWS+=$'\n'"• ${DIR}: ❌ Failed (not found)"
              HAS_ISSUES=true
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
              continue
            fi
            
            SECURITY_ISSUES="None"
            CONFIG_ISSUES=()
            
            # Perform security checks directly
            
            # Check for latest tag (high severity)
            if grep -E "FROM\s+\S+:latest" "$DOCKERFILE_PATH" > /dev/null; then
              SECURITY_ISSUES="High: Using 'latest' tag"
              HAS_HIGH_SEVERITY=true
              HIGH_COUNT=$((HIGH_COUNT + 1))
            fi
            
            # Check for missing USER instruction (medium severity)
            if ! grep -q "USER" "$DOCKERFILE_PATH"; then
              CONFIG_ISSUES+=("Missing USER instruction (runs as root)")
            fi
            
            # Check for secrets in ENV (medium severity)
            if grep -E "ENV.*(PASSWORD|SECRET|KEY|TOKEN).*=" "$DOCKERFILE_PATH" > /dev/null; then
              CONFIG_ISSUES+=("Potential secrets in ENV variables")
            fi
            
            # Check for curl with insecure flag (medium severity)
            if grep -E "curl\s+.*(-k|--insecure)" "$DOCKERFILE_PATH" > /dev/null; then
              CONFIG_ISSUES+=("Using curl with insecure flag")
            fi
            
            # Check for ADD instead of COPY (low severity)
            if grep -q "ADD" "$DOCKERFILE_PATH"; then
              CONFIG_ISSUES+=("Using ADD instead of COPY")
            fi
            
            # Generate the configuration issues string
            if [ ${#CONFIG_ISSUES[@]} -eq 0 ]; then
              CONFIG_ISSUES_STR="None"
            else
              CONFIG_ISSUES_STR=$(IFS=", "; echo "${CONFIG_ISSUES[*]}")
              HAS_ISSUES=true
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
            fi
            
            # Set status based on findings
            if [ "$SECURITY_ISSUES" = "None" ] && [ "$CONFIG_ISSUES_STR" = "None" ]; then
              STATUS="✅ Pass"
              PASSED_COUNT=$((PASSED_COUNT + 1))
            elif [[ "$SECURITY_ISSUES" == High* ]]; then
              STATUS="❌ Fail"
            else
              STATUS="⚠️ Warning"
            fi
            
            REPORT_ROWS+=("${DIR}|${IMAGE_TYPES[$DIR]}|${STATUS}|${SECURITY_ISSUES}|${CONFIG_ISSUES_STR}")
            ROWS+=$'\n'"• ${DIR}: ${STATUS}"
            
            if [ "$DEBUG_MODE" = "true" ]; then
              echo "Results for $DIR:"
              echo "  Status: $STATUS"
              echo "  Security Issues: $SECURITY_ISSUES"
              echo "  Config Issues: $CONFIG_ISSUES_STR"
            fi
          done

          # Set overall status
          if $HAS_HIGH_SEVERITY; then
            OVERALL_STATUS="❌ Failed"
          elif $HAS_ISSUES; then 
            OVERALL_STATUS="⚠️ Issues Found"
          else
            OVERALL_STATUS="✅ All Secure"
          fi

          # Generate the report
          TZ=Europe/London
          export TZ
          LON_DATE="$(date '+%a %d %b %Y %T %Z')"
          
          echo "# Dockerfile Security Scan Results" > "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Note: This scan checks for Docker security best practices, not for CVEs or vulnerabilities in the base images.**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "## Summary Overview" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|:-------|:------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Scan Date** | $LON_DATE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Status** | $OVERALL_STATUS |" >> "$GITHUB_STEP_SUMMARY"
          
          # If in debug mode and we ran the test, add the test result
          if [ "$DEBUG_MODE" = "true" ] && [ -n "${TEST_PASSED:-}" ]; then
            echo "| **Security Check Verification** | ${TEST_PASSED} |" >> "$GITHUB_STEP_SUMMARY"
          fi
          
          echo "| **Total Images** | 4 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Passed** | $PASSED_COUNT |" >> "$GITHUB_STEP_SUMMARY" 
          echo "| **Issues** | $ISSUES_COUNT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Critical/High** | $HIGH_COUNT |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "## Detailed Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "<table>" >> "$GITHUB_STEP_SUMMARY"
          echo "  <tr>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Dockerfile</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Image Type</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='center'>Status</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Security Issues</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Configuration Issues</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "  </tr>" >> "$GITHUB_STEP_SUMMARY"
          
          for ROW in "${REPORT_ROWS[@]}"; do
            IFS='|' read -r DIR IMAGE_TYPE STATUS VULN CONFIG <<< "$ROW"
            echo "  <tr>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${DIR}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${IMAGE_TYPE}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td align='center'>${STATUS}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${VULN}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${CONFIG}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "  </tr>" >> "$GITHUB_STEP_SUMMARY"
          done
          
          echo "</table>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "## Security Checks Performed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check Type | Description | Severity |" >> "$GITHUB_STEP_SUMMARY"
          echo "|:-----------|:------------|:---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Latest Tag** | Checks if Dockerfile uses ':latest' tag | High |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **User Directive** | Checks if Dockerfile includes USER instruction | Medium |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Secrets in ENV** | Checks for potential secrets in ENV variables | Medium |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Insecure Curl** | Checks for curl with -k/--insecure flags | Medium |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **ADD vs COPY** | Checks if Dockerfile uses ADD instead of COPY | Low |" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Notes" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- This scan **does not** check for vulnerabilities in base images" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow fails only on High severity issues" >> "$GITHUB_STEP_SUMMARY"
          echo "- Medium and Low severity issues are reported but don't cause failure" >> "$GITHUB_STEP_SUMMARY"
          echo "- Missing USER instruction indicates container runs as root (security risk)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scans run nightly at 03:00 UTC" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details>" >> "$GITHUB_STEP_SUMMARY"
          echo "<summary>Technical Scan Information</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Scanner:** Custom Dockerfile best-practices check  " >> "$GITHUB_STEP_SUMMARY"
          echo "**Scan Type:** Static analysis of Dockerfile syntax  " >> "$GITHUB_STEP_SUMMARY"
          echo "**Workflow Run ID:** \`${{ github.run_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

          echo "results<<EOF" >> $GITHUB_OUTPUT
          echo -e "${ROWS}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if $HAS_HIGH_SEVERITY; then
            echo "status=high_severity" >> $GITHUB_OUTPUT
          elif $HAS_ISSUES; then
            echo "status=issues_found" >> $GITHUB_OUTPUT
          else
            echo "status=secure" >> $GITHUB_OUTPUT
          fi

          if [ "$DEBUG_MODE" = "true" ]; then
            echo "debug_mode=true" >> $GITHUB_OUTPUT
          else
            echo "debug_mode=false" >> $GITHUB_OUTPUT
          fi
          
          # Add test_passed output if available
          if [ -n "${TEST_PASSED:-}" ]; then
            echo "test_passed=${TEST_PASSED}" >> $GITHUB_OUTPUT
          fi
          
          if $HAS_HIGH_SEVERITY; then
            echo "❌ High severity security issues detected — failing the workflow."
            exit 1
          fi

      - name: Slack Notification
        if: >
          always() &&
          (steps.scan.outputs.status != 'secure' || 
          steps.scan.outputs.debug_mode == 'true' || 
          github.event_name == 'schedule' ||
          job.status == 'failure')
        continue-on-error: true
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: repo,workflow
          custom_payload: |
            {
              "attachments": [
                {
                  "color": "${{ job.status == 'failure' && 'danger' || steps.scan.outputs.status == 'secure' && 'good' || steps.scan.outputs.status == 'high_severity' && 'danger' || 'warning' }}",
                  "title": "Dockerfile Security Scan Results",
                  "text": "${{ job.status == 'failure' && '🚨 Workflow failed' || steps.scan.outputs.status == 'secure' && '✅ All Dockerfiles follow security best practices' || steps.scan.outputs.status == 'high_severity' && '🚨 High severity security issues detected' || '⚠️ Security configuration issues detected' }}${{ steps.scan.outputs.test_passed == 'false' && ' (⚠️ Security check verification failed)' || '' }}\n${{ steps.scan.outputs.results }}",
                  "mrkdwn_in": ["text"],
                  "footer": "Dockerfile Security Scan | Run ID: ${{ github.run_id }} | $(TZ=Europe/London date '+%d-%m-%Y %H:%M %Z')"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}