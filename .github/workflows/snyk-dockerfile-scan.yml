name: Snyk Dockerfile Security Scan
on:
  push:
    branches: [ main ]
    paths:
      - 'images/runtime/training/*/Dockerfile'
  pull_request_target:
    types: [ labeled ]
  pull_request:
    paths:
      - 'images/runtime/training/*/Dockerfile'
  schedule:
    - cron: '0 3 * * *'  # Run nightly at 3:00 UTC
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      target_dir:
        description: 'Specific directory to scan (leave empty for all)'
        required: false
        default: ''
        type: string

jobs:
  snyk-dockerfile-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request_target' || 
      github.event.label.name == 'safe-to-test' || 
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.ref || '' }}
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || '' }}

      - name: Setup Snyk
        uses: snyk/actions/setup@master

      - name: Configure Snyk
        id: verify_token
        run: |
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "::error::SNYK_TOKEN is not set"
            exit 1
          fi
          
          mkdir -p ~/.config/configstore/
          echo "{\"api\": \"${{ secrets.SNYK_TOKEN }}\"}" > ~/.config/configstore/snyk.json
          chmod 600 ~/.config/configstore/snyk.json
          
          snyk auth "${{ secrets.SNYK_TOKEN }}"
          SNYK_VERSION=$(snyk --version)
          echo "version=$SNYK_VERSION" >> $GITHUB_OUTPUT
          echo "Snyk Version: $SNYK_VERSION"

      - name: Scan Dockerfiles
        id: scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          DEBUG_MODE: ${{ github.event.inputs.debug == 'true' }}
          TARGET_DIR: ${{ github.event.inputs.target_dir }}
        run: |
          # Base settings
          set -e
          TRAINING_DIR="images/runtime/training"
          mkdir -p scan_results
          
          # Initialize counters
          HAS_HIGH_SEVERITY=false
          PASSED_COUNT=0
          ISSUES_COUNT=0
          HIGH_COUNT=0
          SCAN_FAILURES=0
          SCAN_RESULTS=""
          
          # Section header function
          print_section() {
            echo "============================================================"
            echo "  $1"
            echo "============================================================"
          }
          
          # Determine directories to scan
          if [ -n "$TARGET_DIR" ]; then
            DIRS=("$TARGET_DIR")
            echo "Scanning single directory: $TRAINING_DIR/$TARGET_DIR"
          else
            DIRS=(
              "py311-cuda121-torch241"
              "py311-cuda124-torch251"
              "py311-rocm62-torch241"
              "py311-rocm62-torch251"
            )
            echo "Scanning all training Dockerfiles"
          fi
          
          # Process each directory
          for DIR in "${DIRS[@]}"; do
            DOCKERFILE="$TRAINING_DIR/${DIR}/Dockerfile"
            print_section "Scanning ${DIR} Dockerfile"
            
            # Check if file exists
            if [ ! -f "$DOCKERFILE" ]; then
              echo "Dockerfile $DOCKERFILE not found"
              SCAN_FAILURES=$((SCAN_FAILURES + 1))
              SCAN_RESULTS="${SCAN_RESULTS}* ${DIR}: FAILED (not found)"$'\n'
              continue
            fi
            
            # Extract base image
            BASE_IMAGE=$(grep -m 1 "^FROM" "$DOCKERFILE" | awk '{print $2}' | sed 's/ AS .*//g')
            echo "Base image: $BASE_IMAGE"
            
            # Extract ARG values
            while IFS= read -r line; do
              if [[ "$line" =~ ^ARG[[:space:]]+([^=[:space:]]+)=(.+)$ ]]; then
                var_name="${BASH_REMATCH[1]}"
                var_value="${BASH_REMATCH[2]//\"/}"
                var_value="${var_value//\'/}"
                BASE_IMAGE="${BASE_IMAGE//\$\{$var_name\}/$var_value}"
                BASE_IMAGE="${BASE_IMAGE//\$$var_name/$var_value}"
              fi
            done < "$DOCKERFILE"
            
            # Check if image still has variables
            if [[ "$BASE_IMAGE" == *"\$"* ]] || [[ "$BASE_IMAGE" == *"{"* ]]; then
              # Use fallback image based on directory name
              case "$DIR" in
                py311-cuda*)
                  BASE_IMAGE="registry.access.redhat.com/ubi9/python-311:9.5-1741671866"
                  ;;
                py311-rocm*)
                  BASE_IMAGE="registry.access.redhat.com/ubi9/python-311:9.5-1741671866"
                  ;;
                *)
                  BASE_IMAGE="ubuntu:latest"
                  ;;
              esac
              echo "Using fallback image: $BASE_IMAGE"
            fi
            
            # Step 1: Scan base image
            echo "Scanning base image..."
            BASE_SCAN_FILE="scan_results/${DIR}-base.json"
            BASE_CRITICAL=0
            BASE_HIGH=0
            BASE_MEDIUM=0
            BASE_LOW=0
            
            # Run the scan
            snyk container test "$BASE_IMAGE" --json --severity-threshold=medium > "$BASE_SCAN_FILE" || true
            
            # Get exit code and process
            if [ -f "$BASE_SCAN_FILE" ] && [ -s "$BASE_SCAN_FILE" ]; then
              if grep -q "vulnerabilities" "$BASE_SCAN_FILE"; then
                echo "Base image has vulnerabilities"
                BASE_CRITICAL=$(jq '[.vulnerabilities[] | select(.severity == "critical")] | length' "$BASE_SCAN_FILE" 2>/dev/null || echo 0)
                BASE_HIGH=$(jq '[.vulnerabilities[] | select(.severity == "high")] | length' "$BASE_SCAN_FILE" 2>/dev/null || echo 0)
                BASE_MEDIUM=$(jq '[.vulnerabilities[] | select(.severity == "medium")] | length' "$BASE_SCAN_FILE" 2>/dev/null || echo 0)
                BASE_LOW=$(jq '[.vulnerabilities[] | select(.severity == "low")] | length' "$BASE_SCAN_FILE" 2>/dev/null || echo 0)
              else
                echo "Base image scan: No vulnerabilities found"
              fi
            else
              echo "Base image scan failed to produce valid results"
              # Save error details
              snyk container test "$BASE_IMAGE" --severity-threshold=medium > "scan_results/${DIR}-base-error.txt" 2>&1 || true
            fi
            
            # Step 2: Scan Dockerfile
            echo "Scanning Dockerfile..."
            FULL_SCAN_FILE="scan_results/${DIR}-full.json"
            
            # Run the scan
            snyk container test "$BASE_IMAGE" --file="$DOCKERFILE" --json --severity-threshold=medium > "$FULL_SCAN_FILE" || true
            
            # Process results
            if [ -f "$FULL_SCAN_FILE" ] && [ -s "$FULL_SCAN_FILE" ]; then
              if grep -q "vulnerabilities" "$FULL_SCAN_FILE"; then
                echo "Dockerfile has vulnerabilities"
                # Calculate vulnerability counts
                TOTAL_CRITICAL=$(jq '[.vulnerabilities[] | select(.severity == "critical")] | length' "$FULL_SCAN_FILE" 2>/dev/null || echo 0)
                TOTAL_HIGH=$(jq '[.vulnerabilities[] | select(.severity == "high")] | length' "$FULL_SCAN_FILE" 2>/dev/null || echo 0)
                TOTAL_MEDIUM=$(jq '[.vulnerabilities[] | select(.severity == "medium")] | length' "$FULL_SCAN_FILE" 2>/dev/null || echo 0)
                TOTAL_LOW=$(jq '[.vulnerabilities[] | select(.severity == "low")] | length' "$FULL_SCAN_FILE" 2>/dev/null || echo 0)
                
                # Calculate Dockerfile-specific issues
                DOCKERFILE_CRITICAL=$((TOTAL_CRITICAL > BASE_CRITICAL ? TOTAL_CRITICAL - BASE_CRITICAL : 0))
                DOCKERFILE_HIGH=$((TOTAL_HIGH > BASE_HIGH ? TOTAL_HIGH - BASE_HIGH : 0))
                DOCKERFILE_MEDIUM=$((TOTAL_MEDIUM > BASE_MEDIUM ? TOTAL_MEDIUM - BASE_MEDIUM : 0))
                DOCKERFILE_LOW=$((TOTAL_LOW > BASE_LOW ? TOTAL_LOW - BASE_LOW : 0))
                
                # Save summary
                echo "Base image: ${BASE_CRITICAL} critical, ${BASE_HIGH} high, ${BASE_MEDIUM} medium, ${BASE_LOW} low" > "scan_results/${DIR}-summary.txt"
                echo "Dockerfile: ${DOCKERFILE_CRITICAL} critical, ${DOCKERFILE_HIGH} high, ${DOCKERFILE_MEDIUM} medium, ${DOCKERFILE_LOW} low" >> "scan_results/${DIR}-summary.txt"
                echo "Total: ${TOTAL_CRITICAL} critical, ${TOTAL_HIGH} high, ${TOTAL_MEDIUM} medium, ${TOTAL_LOW} low" >> "scan_results/${DIR}-summary.txt"
                
                # Set severity and status
                if [ "$TOTAL_CRITICAL" -gt 0 ] || [ "$TOTAL_HIGH" -gt 0 ]; then
                  HAS_HIGH_SEVERITY=true
                  HIGH_COUNT=$((HIGH_COUNT + 1))
                  STATUS="FAIL"
                  SCAN_RESULTS="${SCAN_RESULTS}* ${DIR}: FAIL (${TOTAL_CRITICAL} critical, ${TOTAL_HIGH} high)"$'\n'
                else
                  ISSUES_COUNT=$((ISSUES_COUNT + 1))
                  STATUS="WARN"
                  SCAN_RESULTS="${SCAN_RESULTS}* ${DIR}: WARN (${TOTAL_MEDIUM} medium, ${TOTAL_LOW} low)"$'\n'
                fi
              else
                echo "Dockerfile scan: No vulnerabilities found"
                PASSED_COUNT=$((PASSED_COUNT + 1))
                STATUS="PASS"
                SCAN_RESULTS="${SCAN_RESULTS}* ${DIR}: PASS (no vulnerabilities)"$'\n'
              fi
            else
              echo "Dockerfile scan failed to produce valid results"
              SCAN_FAILURES=$((SCAN_FAILURES + 1))
              STATUS="ERROR"
              SCAN_RESULTS="${SCAN_RESULTS}* ${DIR}: ERROR (scan failed)"$'\n'
              
              # Save error details
              snyk container test "$BASE_IMAGE" --file="$DOCKERFILE" --severity-threshold=medium > "scan_results/${DIR}-error.txt" 2>&1 || true
            fi
            
            # Create human-readable report if needed
            if [ "$STATUS" != "PASS" ]; then
              snyk container test "$BASE_IMAGE" --file="$DOCKERFILE" --severity-threshold=medium > "scan_results/${DIR}-readable.txt" 2>/dev/null || true
              if [ -f "scan_results/${DIR}-summary.txt" ]; then
                echo -e "\n--- Vulnerability Summary ---\n" >> "scan_results/${DIR}-readable.txt"
                cat "scan_results/${DIR}-summary.txt" >> "scan_results/${DIR}-readable.txt"
              fi
            fi
          done
          
          # Determine overall status
          if [ $SCAN_FAILURES -gt 0 ]; then
            OVERALL_STATUS="FAILED"
            SCAN_STATUS="Scan failures: $SCAN_FAILURES"
          elif $HAS_HIGH_SEVERITY; then
            OVERALL_STATUS="FAILED"
            SCAN_STATUS="Security issues found"
          elif [ $ISSUES_COUNT -gt 0 ]; then 
            OVERALL_STATUS="WARNING"
            SCAN_STATUS="Issues found"
          else
            OVERALL_STATUS="PASSED"
            SCAN_STATUS="All secure"
          fi
          
          # Create GitHub step summary - FIX: Make sure this is all handled safely
          {
            echo "# Dockerfile Security Scan Results"
            echo "## Summary"
            echo ""
            echo "| Metric | Value |"
            echo "|:-------|:------|"
            echo "| **Status** | $OVERALL_STATUS |"
            echo "| **Scan Status** | $SCAN_STATUS |"
            echo "| **Total Images** | ${#DIRS[@]} |"
            echo "| **Passed** | $PASSED_COUNT |"
            echo "| **Issues** | $ISSUES_COUNT |"
            echo "| **Critical/High** | $HIGH_COUNT |"
            echo "| **Scan Failures** | $SCAN_FAILURES |"
            echo ""
            echo "## Results"
            echo '```'
            echo "$SCAN_RESULTS"
            echo '```'
            echo ""
            echo "## Notes"
            echo "- Scans run directly using Snyk's container test functionality"
            echo "- Base image issues and Dockerfile-specific issues are segregated"
            echo "- No container images are built during this process"
          } > summary.md
          
          # Use GitHub's built-in way to set the step summary
          cat summary.md >> $GITHUB_STEP_SUMMARY
          
          # Save outputs for next steps
          {
            echo "scan_status=$SCAN_STATUS"
            echo "overall_status=$OVERALL_STATUS"
            echo "scan_failures=$SCAN_FAILURES"
            echo "high_severity=$HAS_HIGH_SEVERITY"
            echo "results<<EOF"
            echo "$SCAN_RESULTS"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          
          # Print final results
          print_section "Scan Summary"
          echo "Status: $OVERALL_STATUS"
          echo "Total images: ${#DIRS[@]}"
          echo "Passed: $PASSED_COUNT"
          echo "Issues: $ISSUES_COUNT"
          echo "Critical/High: $HIGH_COUNT"
          echo "Scan Failures: $SCAN_FAILURES"
          
          # Fail workflow on high severity issues
          if $HAS_HIGH_SEVERITY; then
            echo "High security issues found - failing workflow"
            exit 1
          fi

      - name: Slack Notification
        if: always() && (steps.scan.outputs.overall_status != 'PASSED' || github.event.inputs.debug == 'true')
        continue-on-error: true
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: repo,workflow
          custom_payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.scan.outputs.high_severity == 'true' && 'danger' || steps.scan.outputs.scan_failures != '0' && 'warning' || 'good' }}",
                  "title": "Dockerfile Security Scan",
                  "text": "${{ steps.scan.outputs.scan_status }}\n```\n${{ steps.scan.outputs.results }}```",
                  "footer": "Snyk Dockerfile Security Scan | Run ID: ${{ github.run_id }}"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || '' }}