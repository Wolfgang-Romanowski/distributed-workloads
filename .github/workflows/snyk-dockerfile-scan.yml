name: Container Security Scan

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * *"
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, labeled]

jobs:
  snyk-container-scan:
    if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'security-scan') }}
    runs-on: ubuntu-latest
    concurrency:
      group: snyk-container-scan
      cancel-in-progress: true

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Free up disk space
        run: |
          # Remove unnecessary large packages
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          
          # Display available disk space
          echo "Available disk space before scan:"
          df -h

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Scan Dockerfiles with Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set -u

          # Find all Dockerfiles but limit to a reasonable number
          mapfile -t ALL_DOCKERFILES < <(find . -type f -iname "Dockerfile*" -not -path "*/.*" | sort)
          
          # If we have too many Dockerfiles, only scan a subset
          MAX_FILES=10
          if [ ${#ALL_DOCKERFILES[@]} -gt $MAX_FILES ]; then
            echo "Found ${#ALL_DOCKERFILES[@]} Dockerfiles, limiting scan to $MAX_FILES files"
            # Take a representative sample - first few, last few, and some from the middle
            DOCKERFILES=("${ALL_DOCKERFILES[@]:0:3}" "${ALL_DOCKERFILES[@]:$((${#ALL_DOCKERFILES[@]}/2-2)):4}" "${ALL_DOCKERFILES[@]:$((${#ALL_DOCKERFILES[@]}-3)):3}")
          else
            DOCKERFILES=("${ALL_DOCKERFILES[@]}")
          fi
          
          [ ${#DOCKERFILES[@]} -eq 0 ] && { echo "No Dockerfiles found."; exit 0; }
          echo "Will scan ${#DOCKERFILES[@]} Dockerfiles"

          SUMMARY=""
          SUMMARY_TABLE="| Dockerfile | Base Image | Critical | High | Medium | Low | Status |\n|-----------|------------|----------|------|--------|-----|--------|\n"
          TOTAL_CRITICAL=0
          TOTAL_HIGH=0
          TOTAL_MEDIUM=0
          TOTAL_LOW=0
          SCAN_FAILURE=0

          for FILE in "${DOCKERFILES[@]}"; do
            echo "Scanning $FILE..."
            
            # Extract base image
            FINAL_FROM=$(grep -Ei '^FROM ' "${FILE}" | tail -1 || echo "FROM scratch")
            BASE_IMAGE_NAME=$(echo "$FINAL_FROM" | sed -E 's/^FROM[[:space:]]+//I' | cut -d' ' -f1)
            
            # Skip multi-stage builds that end with scratch
            if [[ "$BASE_IMAGE_NAME" == "scratch" ]]; then
              echo "Skipping scratch-based image in $FILE"
              SUMMARY="$SUMMARY- $FILE: Skipped (scratch-based image)"$'\n'
              SUMMARY_TABLE="$SUMMARY_TABLE| $FILE | scratch | - | - | - | - | Skipped |\n"
              continue
            fi
            
            # Handle ARG variables in FROM with a simplified approach
            if [[ "$BASE_IMAGE_NAME" == *'$'* || "$BASE_IMAGE_NAME" == *'{{'* || "$BASE_IMAGE_NAME" == *'}}'* ]]; then
              BASE_IMAGE_NAME="registry.access.redhat.com/ubi8/ubi-minimal:latest"
              echo "Using fallback image for $FILE: $BASE_IMAGE_NAME"
            fi

            # Run Snyk scan directly on the base image without creating a Dockerfile
            echo "Scanning base image: $BASE_IMAGE_NAME"
            snyk container test "$BASE_IMAGE_NAME" --json > "snyk-result.json" 2> "snyk-error.log" || true
            
            # Check if we got valid JSON results
            if jq -e 'has("vulnerabilities")' snyk-result.json &>/dev/null; then
              CRIT=$(jq -r '.vulnerabilities | if . == null then 0 else map(select(.severity=="critical")) | length end' snyk-result.json)
              HIGH=$(jq -r '.vulnerabilities | if . == null then 0 else map(select(.severity=="high")) | length end' snyk-result.json)
              MED=$(jq -r '.vulnerabilities | if . == null then 0 else map(select(.severity=="medium")) | length end' snyk-result.json)
              LOW=$(jq -r '.vulnerabilities | if . == null then 0 else map(select(.severity=="low")) | length end' snyk-result.json)

              SUMMARY="$SUMMARY- $FILE: ${CRIT}C ${HIGH}H ${MED}M ${LOW}L (base: $BASE_IMAGE_NAME)"$'\n'
              
              # Add status based on vulnerability counts
              STATUS="✅ Pass"
              if [ "$CRIT" -gt 0 ]; then
                STATUS="❌ Critical"
              elif [ "$HIGH" -gt 0 ]; then
                STATUS="⚠️ High"
              elif [ "$MED" -gt 5 ]; then
                STATUS="⚠️ Medium"
              fi
              
              SUMMARY_TABLE="$SUMMARY_TABLE| $FILE | $BASE_IMAGE_NAME | $CRIT | $HIGH | $MED | $LOW | $STATUS |\n"
              
              TOTAL_CRITICAL=$((TOTAL_CRITICAL + CRIT))
              TOTAL_HIGH=$((TOTAL_HIGH + HIGH))
              TOTAL_MEDIUM=$((TOTAL_MEDIUM + MED))
              TOTAL_LOW=$((TOTAL_LOW + LOW))
            else
              ERROR_MSG=$(head -n1 snyk-error.log || echo "Unknown error")
              SUMMARY="$SUMMARY- $FILE: Scan failed - $ERROR_MSG"$'\n'
              SUMMARY_TABLE="$SUMMARY_TABLE| $FILE | $BASE_IMAGE_NAME | - | - | - | - | ❌ Failed |\n"
              SCAN_FAILURE=1
            fi

            # Clean up immediately
            rm -f snyk-result.json snyk-error.log
            
            # Display disk space regularly
            echo "Available disk space during scan:"
            df -h
          done

          # Add totals row to summary table
          SUMMARY_TABLE="$SUMMARY_TABLE| **TOTAL** | **${#DOCKERFILES[@]} images** | **$TOTAL_CRITICAL** | **$TOTAL_HIGH** | **$TOTAL_MEDIUM** | **$TOTAL_LOW** | - |\n"

          echo "SUMMARY<<EOF" >> $GITHUB_ENV
          echo "Dockerfiles scanned: ${#DOCKERFILES[@]} (of ${#ALL_DOCKERFILES[@]} total)" >> $GITHUB_ENV
          echo "Critical: ${TOTAL_CRITICAL}, High: ${TOTAL_HIGH}, Medium: ${TOTAL_MEDIUM}, Low: ${TOTAL_LOW}" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "## Summary Table" >> $GITHUB_ENV
          echo "$SUMMARY_TABLE" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "## Details" >> $GITHUB_ENV
          echo "$SUMMARY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "SCAN_FAILURE=${SCAN_FAILURE}" >> $GITHUB_ENV

      - name: Slack Notification
        if: ${{ always() && env.SLACK_WEBHOOK_URL != '' }}
        env:
          SUMMARY: ${{ env.SUMMARY }}
          SCAN_FAILURE: ${{ env.SCAN_FAILURE }}
        run: |
          STATUS=":white_check_mark: *Scan successful*"
          [ "$SCAN_FAILURE" -ne 0 ] && STATUS=":x: *Scan completed with errors*"

          PAYLOAD="{\"text\":\"${STATUS}\n${SUMMARY}\"}"
          curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
