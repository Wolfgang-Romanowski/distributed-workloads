name: Snyk Dockerfile Security Scan

on:
  push:
    branches: [ main ]
    paths:
      - 'images/runtime/training/*/Dockerfile'
  pull_request_target:
    types: [ labeled ]
  pull_request:
    paths:
      - 'images/runtime/training/*/Dockerfile'
  schedule:
    - cron: '0 3 * * *'  # Run nightly at 3:00 UTC
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      target_dir:
        description: 'Specific directory to scan (leave empty for all)'
        required: false
        default: ''
        type: string

jobs:
  snyk-dockerfile-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request_target' || 
      github.event.label.name == 'safe-to-test' || 
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.ref || '' }}
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || '' }}

      - name: Setup Snyk
        uses: snyk/actions/setup@master

      - name: Configure Snyk Authentication
        id: verify_token
        run: |
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "::error::SNYK_TOKEN secret is not configured"
            exit 1
          fi
          
          snyk auth "${{ secrets.SNYK_TOKEN }}"
          
          SNYK_VERSION=$(snyk --version)
          echo "version=$SNYK_VERSION" >> $GITHUB_OUTPUT
          echo "Snyk authenticated successfully - Version: $SNYK_VERSION"

      - name: Execute Dockerfile Security Scans
        id: scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          DEBUG_MODE: ${{ github.event.inputs.debug == 'true' }}
          TARGET_DIR: ${{ github.event.inputs.target_dir }}
        run: |
          set -e
          
          # Configuration
          TRAINING_DIR="images/runtime/training"
          RESULTS_DIR="scan_results"
          mkdir -p "$RESULTS_DIR"
          
          # Global counters
          TOTAL_SCANNED=0
          BASE_PASSED=0
          BASE_FAILED=0
          DOCKERFILE_PASSED=0
          DOCKERFILE_FAILED=0
          SCAN_ERRORS=0
          
          # Results storage
          SCAN_SUMMARY=""
          declare -A BASE_SCAN_RESULTS
          declare -A DOCKERFILE_SCAN_RESULTS
          declare -A BASE_IMAGES_SCANNED
          
          # Utility functions
          log_section() {
            echo ""
            echo "========================================================================"
            echo "  $1"
            echo "========================================================================"
          }
          
          extract_base_image() {
            local dockerfile="$1"
            local base_image
            
            # Extract FROM line
            base_image=$(grep -m 1 "^FROM" "$dockerfile" | awk '{print $2}' | sed 's/ AS .*//g')
            
            # Process ARG substitutions from the Dockerfile
            while IFS= read -r line; do
              if [[ "$line" =~ ^ARG[[:space:]]+([^=[:space:]]+)=(.+)$ ]]; then
                local var_name="${BASH_REMATCH[1]}"
                local var_value="${BASH_REMATCH[2]//\"/}"
                var_value="${var_value//\'/}"
                base_image="${base_image//\$\{$var_name\}/$var_value}"
                base_image="${base_image//\$$var_name/$var_value}"
              fi
            done < "$dockerfile"
            
            echo "$base_image"
          }
          
          get_vuln_summary() {
            local json_file="$1"
            local label="$2"
            
            if [ ! -f "$json_file" ] || [ ! -s "$json_file" ] || ! jq -e . "$json_file" >/dev/null 2>&1; then
              echo "Unable to parse"
              return
            fi
            
            local critical=$(jq '[.vulnerabilities[]? | select(.severity == "critical")] | length' "$json_file" 2>/dev/null || echo "0")
            local high=$(jq '[.vulnerabilities[]? | select(.severity == "high")] | length' "$json_file" 2>/dev/null || echo "0")
            local medium=$(jq '[.vulnerabilities[]? | select(.severity == "medium")] | length' "$json_file" 2>/dev/null || echo "0")
            local low=$(jq '[.vulnerabilities[]? | select(.severity == "low")] | length' "$json_file" 2>/dev/null || echo "0")
            local total=$(jq '.uniqueCount // 0' "$json_file" 2>/dev/null || echo "0")
            
            echo "${critical}C/${high}H/${medium}M/${low}L (Total: $total)"
          }
          
          # Determine target directories
          if [ -n "$TARGET_DIR" ]; then
            if [ -d "$TRAINING_DIR/$TARGET_DIR" ]; then
              TARGET_DIRS=("$TARGET_DIR")
              echo "Scanning specific directory: $TARGET_DIR"
            else
              echo "Target directory $TRAINING_DIR/$TARGET_DIR does not exist"
              exit 1
            fi
          else
            TARGET_DIRS=(
              "py311-cuda121-torch241"
              "py311-cuda124-torch251" 
              "py311-rocm62-torch241"
              "py311-rocm62-torch251"
            )
            echo "Scanning all Dockerfile directories"
          fi
          
          # Process each target directory
          for DIR in "${TARGET_DIRS[@]}"; do
            log_section "Processing $DIR"
            
            DOCKERFILE="$TRAINING_DIR/$DIR/Dockerfile"
            TOTAL_SCANNED=$((TOTAL_SCANNED + 1))
            
            # Verify Dockerfile exists
            if [ ! -f "$DOCKERFILE" ]; then
              echo "ERROR: Dockerfile not found: $DOCKERFILE"
              SCAN_ERRORS=$((SCAN_ERRORS + 1))
              DOCKERFILE_SCAN_RESULTS[$DIR]="ERROR|Dockerfile not found|N/A"
              continue
            fi
            
            # Extract base image
            BASE_IMAGE=$(extract_base_image "$DOCKERFILE")
            echo "Base image: $BASE_IMAGE"
            
            # Phase 1: Scan base image only (if not already scanned)
            echo ""
            echo "Phase 1: Base Image Security Analysis"
            echo "-------------------------------------"
            
            BASE_SCAN_KEY="${BASE_IMAGE//[:\/]/_}"
            BASE_SCAN_JSON="$RESULTS_DIR/base_${BASE_SCAN_KEY}.json"
            BASE_SCAN_OUTPUT="$RESULTS_DIR/base_${BASE_SCAN_KEY}_output.txt"
            
            # Check if we've already scanned this base image
            if [ -z "${BASE_IMAGES_SCANNED[$BASE_SCAN_KEY]}" ]; then
              echo "Running Snyk base image scan..."
              
              # Run base image scan
              set +e
              snyk container test "$BASE_IMAGE" \
                --json \
                --severity-threshold=high \
                > "$BASE_SCAN_JSON" 2> "$BASE_SCAN_OUTPUT"
              BASE_EXIT_CODE=$?
              set -e
              
              # Get vulnerability summary
              BASE_VULN_SUMMARY=$(get_vuln_summary "$BASE_SCAN_JSON" "Base")
              
              # Determine base status
              case $BASE_EXIT_CODE in
                0)
                  BASE_STATUS="PASSED"
                  BASE_MSG="No high/critical vulnerabilities"
                  BASE_PASSED=$((BASE_PASSED + 1))
                  ;;
                1)
                  BASE_STATUS="FAILED"
                  BASE_MSG="High/critical vulnerabilities found"
                  BASE_FAILED=$((BASE_FAILED + 1))
                  ;;
                *)
                  BASE_STATUS="ERROR"
                  BASE_MSG="Scan error (exit: $BASE_EXIT_CODE)"
                  ;;
              esac
              
              # Store base image results
              BASE_IMAGES_SCANNED[$BASE_SCAN_KEY]="$BASE_STATUS|$BASE_MSG|$BASE_VULN_SUMMARY|$BASE_EXIT_CODE"
              
              echo "Base image scan completed"
              echo "  Status: $BASE_STATUS"
              echo "  Vulnerabilities: $BASE_VULN_SUMMARY"
            else
              echo "Using cached base image scan results"
              IFS='|' read -r BASE_STATUS BASE_MSG BASE_VULN_SUMMARY BASE_EXIT_CODE <<< "${BASE_IMAGES_SCANNED[$BASE_SCAN_KEY]}"
              echo "  Status: $BASE_STATUS"
              echo "  Vulnerabilities: $BASE_VULN_SUMMARY"
            fi
            
            # Store base results for this Dockerfile
            BASE_SCAN_RESULTS[$DIR]="$BASE_STATUS|$BASE_MSG|$BASE_VULN_SUMMARY"
            
            # Phase 2: Scan with Dockerfile context
            echo ""
            echo "Phase 2: Full Dockerfile Security Analysis"
            echo "------------------------------------------"
            echo "Running Snyk scan with Dockerfile context..."
            
            FULL_SCAN_JSON="$RESULTS_DIR/${DIR}_full_scan.json"
            FULL_SCAN_OUTPUT="$RESULTS_DIR/${DIR}_full_scan_output.txt"
            FULL_SCAN_HUMAN="$RESULTS_DIR/${DIR}_full_scan_human.txt"
            
            # Run full scan with Dockerfile
            set +e
            snyk container test "$BASE_IMAGE" \
              --file="$DOCKERFILE" \
              --json \
              --severity-threshold=high \
              > "$FULL_SCAN_JSON" 2> "$FULL_SCAN_OUTPUT"
            DOCKERFILE_EXIT_CODE=$?
            set -e
            
            # Also generate human-readable output
            set +e
            snyk container test "$BASE_IMAGE" \
              --file="$DOCKERFILE" \
              --severity-threshold=high \
              > "$FULL_SCAN_HUMAN" 2>&1
            set -e
            
            # Get vulnerability summary
            DOCKERFILE_VULN_SUMMARY=$(get_vuln_summary "$FULL_SCAN_JSON" "Full")
            
            # Determine Dockerfile scan status
            case $DOCKERFILE_EXIT_CODE in
              0)
                DOCKERFILE_STATUS="PASSED"
                DOCKERFILE_MSG="No high/critical vulnerabilities in full scan"
                DOCKERFILE_PASSED=$((DOCKERFILE_PASSED + 1))
                ;;
              1)
                DOCKERFILE_STATUS="FAILED"
                DOCKERFILE_MSG="High/critical vulnerabilities found in full scan"
                DOCKERFILE_FAILED=$((DOCKERFILE_FAILED + 1))
                ;;
              *)
                DOCKERFILE_STATUS="ERROR"
                DOCKERFILE_MSG="Scan error (exit: $DOCKERFILE_EXIT_CODE)"
                SCAN_ERRORS=$((SCAN_ERRORS + 1))
                ;;
            esac
            
            # Store Dockerfile results
            DOCKERFILE_SCAN_RESULTS[$DIR]="$DOCKERFILE_STATUS|$DOCKERFILE_MSG|$DOCKERFILE_VULN_SUMMARY"
            
            echo "Dockerfile scan completed"
            echo "  Status: $DOCKERFILE_STATUS"
            echo "  Vulnerabilities: $DOCKERFILE_VULN_SUMMARY"
            
            # Build summary for this Dockerfile
            SCAN_SUMMARY="${SCAN_SUMMARY}=== $DIR ===\n"
            SCAN_SUMMARY="${SCAN_SUMMARY}Base Image ($BASE_IMAGE):\n"
            SCAN_SUMMARY="${SCAN_SUMMARY}  Status: $BASE_STATUS (Exit: ${BASE_EXIT_CODE})\n"
            SCAN_SUMMARY="${SCAN_SUMMARY}  Vulnerabilities: $BASE_VULN_SUMMARY\n"
            SCAN_SUMMARY="${SCAN_SUMMARY}Full Dockerfile Scan:\n"
            SCAN_SUMMARY="${SCAN_SUMMARY}  Status: $DOCKERFILE_STATUS (Exit: ${DOCKERFILE_EXIT_CODE})\n"
            SCAN_SUMMARY="${SCAN_SUMMARY}  Vulnerabilities: $DOCKERFILE_VULN_SUMMARY\n\n"
            
            # Generate analysis report
            {
              echo "SECURITY SCAN REPORT: $DIR"
              echo "=========================="
              echo ""
              echo "BASE IMAGE ANALYSIS"
              echo "Image: $BASE_IMAGE"
              echo "Snyk Status: $BASE_STATUS"
              echo "Vulnerabilities: $BASE_VULN_SUMMARY"
              echo ""
              echo "DOCKERFILE ANALYSIS"
              echo "Snyk Status: $DOCKERFILE_STATUS"
              echo "Total Vulnerabilities: $DOCKERFILE_VULN_SUMMARY"
              echo ""
              echo "INTERPRETATION GUIDE:"
              echo "- Base Image: Shows vulnerabilities present in the base image alone"
              echo "- Dockerfile: Shows total vulnerabilities when Dockerfile is applied"
              echo "- If Dockerfile scan has more vulnerabilities than base, your Dockerfile may be introducing them"
              echo "- Both scans use Snyk's --severity-threshold=high setting"
              echo ""
            } > "$RESULTS_DIR/${DIR}_analysis.txt"
          done
          
          # Calculate overall status based on Dockerfile scans (not base image scans)
          if [ $SCAN_ERRORS -gt 0 ]; then
            OVERALL_STATUS="ERROR"
            OVERALL_MSG="Scan errors encountered"
          elif [ $DOCKERFILE_FAILED -gt 0 ]; then
            OVERALL_STATUS="FAILED"
            OVERALL_MSG="Snyk found vulnerabilities in Dockerfile scans"
          elif [ $DOCKERFILE_PASSED -eq $TOTAL_SCANNED ]; then
            OVERALL_STATUS="PASSED"
            OVERALL_MSG="All Dockerfile scans passed Snyk checks"
          else
            OVERALL_STATUS="ERROR"
            OVERALL_MSG="Unexpected state"
          fi
          
          # Generate GitHub Step Summary
          {
            echo "# Snyk Dockerfile Security Scan Results"
            echo ""
            echo "## Executive Summary"
            echo ""
            echo "| Metric | Result |"
            echo "|:-------|:-------|"
            echo "| **Overall Status** | **$OVERALL_STATUS** |"
            echo "| **Summary** | $OVERALL_MSG |"
            echo "| **Scan Date** | $(date -u '+%B %d, %Y at %H:%M UTC') |"
            echo "| **Snyk Version** | ${{ steps.verify_token.outputs.version }} |"
            echo "| **Severity Threshold** | High (Critical + High) |"
            echo ""
            echo "### Scan Statistics"
            echo ""
            echo "| Total Scanned | Dockerfile Passed | Dockerfile Failed | Errors |"
            echo "|:-------------:|:-----------------:|:-----------------:|:------:|"
            echo "| $TOTAL_SCANNED | $DOCKERFILE_PASSED | $DOCKERFILE_FAILED | $SCAN_ERRORS |"
            echo ""
            
            # Base Images Section
            echo "## Base Image Security Status"
            echo "*These results show vulnerabilities in base images before Dockerfile modifications*"
            echo ""
            echo "| Base Image | Snyk Status | Vulnerabilities | Details |"
            echo "|:-----------|:------------|:----------------|:--------|"
            
            # Show unique base images
            declare -A SHOWN_BASES
            for key in "${!BASE_IMAGES_SCANNED[@]}"; do
              IFS='|' read -r status msg vulns exit_code <<< "${BASE_IMAGES_SCANNED[$key]}"
              # Extract readable name from key
              base_name=$(echo "$key" | sed 's/_/\//g' | sed 's/\//:/2')
              
              case "$status" in
                "PASSED") icon="✅" ;;
                "FAILED") icon="⚠️" ;;
                "ERROR") icon="❌" ;;
                *) icon="❓" ;;
              esac
              
              echo "| $base_name | $icon $status | $vulns | $msg |"
            done
            echo ""
            
            # Dockerfile Results Section
            echo "## Dockerfile Scan Results"
            echo "*These show total vulnerabilities when Dockerfile is applied to base image*"
            echo ""
            echo "| Dockerfile | Base Status | Full Scan Status | Base Vulns | Total Vulns | Assessment |"
            echo "|:-----------|:------------|:-----------------|:-----------|:------------|:-----------|"
            
            for DIR in "${TARGET_DIRS[@]}"; do
              if [ -n "${DOCKERFILE_SCAN_RESULTS[$DIR]}" ]; then
                IFS='|' read -r dockerfile_status dockerfile_msg dockerfile_vulns <<< "${DOCKERFILE_SCAN_RESULTS[$DIR]}"
                IFS='|' read -r base_status base_msg base_vulns <<< "${BASE_SCAN_RESULTS[$DIR]}"
                
                # Icons
                case "$base_status" in
                  "PASSED") base_icon="✅" ;;
                  "FAILED") base_icon="⚠️" ;;
                  *) base_icon="❌" ;;
                esac
                
                case "$dockerfile_status" in
                  "PASSED") docker_icon="✅" ;;
                  "FAILED") docker_icon="❌" ;;
                  *) docker_icon="⚠️" ;;
                esac
                
                # Assessment
                if [ "$dockerfile_status" = "FAILED" ] && [ "$base_status" = "PASSED" ]; then
                  assessment="⚠️ Dockerfile may introduce vulnerabilities"
                elif [ "$dockerfile_status" = "FAILED" ] && [ "$base_status" = "FAILED" ]; then
                  assessment="Base image has issues"
                elif [ "$dockerfile_status" = "PASSED" ]; then
                  assessment="✅ Clean"
                else
                  assessment="Check logs"
                fi
                
                echo "| **$DIR** | $base_icon | $docker_icon $dockerfile_status | $base_vulns | $dockerfile_vulns | $assessment |"
              fi
            done
            echo ""
            
            # Interpretation Guide
            echo "## How to Interpret Results"
            echo ""
            echo "1. **Base Image Scan**: Shows vulnerabilities in the base image alone"
            echo "2. **Full Dockerfile Scan**: Shows total vulnerabilities when your Dockerfile is applied"
            echo "3. **If Full Scan has more vulnerabilities than Base**: Your Dockerfile may be introducing new vulnerabilities"
            echo "4. **If both have same vulnerabilities**: Your Dockerfile isn't adding new security issues"
            echo ""
            echo "### Status Meanings"
            echo "- ✅ **PASSED**: No high or critical vulnerabilities found by Snyk"
            echo "- ❌ **FAILED**: High or critical vulnerabilities detected by Snyk"
            echo "- ⚠️ **WARNING**: Base image has issues (informational)"
            echo ""
            
            if [ $DOCKERFILE_FAILED -gt 0 ]; then
              echo "## ⚠️ Action Required"
              echo ""
              echo "One or more Dockerfile scans failed Snyk's security checks."
              echo ""
              echo "**Next Steps:**"
              echo "1. Review the scan artifacts to see detailed vulnerability reports"
              echo "2. Check if vulnerabilities are from base image or introduced by Dockerfile"
              echo "3. Update base images or modify Dockerfile as needed"
              echo "4. Re-run scan to verify fixes"
              echo ""
            fi
            
            echo "---"
            echo "*All results provided directly by Snyk Container Security scanning*"
          } >> $GITHUB_STEP_SUMMARY
          
          # Set outputs
          {
            echo "overall_status=$OVERALL_STATUS"
            echo "scan_status=$OVERALL_MSG"
            echo "total_scanned=$TOTAL_SCANNED"
            echo "dockerfile_passed=$DOCKERFILE_PASSED"
            echo "dockerfile_failed=$DOCKERFILE_FAILED"
            echo "base_failed=$BASE_FAILED"
            echo "scan_errors=$SCAN_ERRORS"
            echo "summary<<EOF"
            echo -e "$SCAN_SUMMARY"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          
          # Final status
          log_section "FINAL SCAN RESULTS"
          echo "Overall Status: $OVERALL_STATUS"
          echo "Message: $OVERALL_MSG"
          echo ""
          echo "Base Image Results:"
          echo "  Failed: $BASE_FAILED (informational)"
          echo ""
          echo "Dockerfile Scan Results:"
          echo "  Passed: $DOCKERFILE_PASSED"
          echo "  Failed: $DOCKERFILE_FAILED"
          echo "  Errors: $SCAN_ERRORS"
          echo ""
          echo "Total Dockerfiles Scanned: $TOTAL_SCANNED"
          
          # Exit based on Dockerfile scan results only
          if [ "$OVERALL_STATUS" != "PASSED" ]; then
            echo ""
            echo "Workflow failed - Check Snyk scan results above"
            exit 1
          fi

      - name: Upload Scan Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-scan-results-${{ github.run_number }}
          path: scan_results/
          retention-days: 30

      - name: Slack Notification
        if: always() && (github.event_name == 'schedule' || steps.scan.outputs.overall_status != 'PASSED' || github.event.inputs.debug == 'true')
        continue-on-error: true
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: repo,workflow,ref
          custom_payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.scan.outputs.overall_status == 'PASSED' && 'good' || steps.scan.outputs.overall_status == 'FAILED' && 'danger' || 'warning' }}",
                  "title": "Snyk Dockerfile Security Scan",
                  "fields": [
                    {
                      "title": "Status",
                      "value": "${{ steps.scan.outputs.overall_status }}",
                      "short": true
                    },
                    {
                      "title": "Summary",
                      "value": "${{ steps.scan.outputs.scan_status }}",
                      "short": false
                    },
                    {
                      "title": "Dockerfile Scans",
                      "value": "Passed: ${{ steps.scan.outputs.dockerfile_passed }}\nFailed: ${{ steps.scan.outputs.dockerfile_failed }}",
                      "short": true
                    },
                    {
                      "title": "Base Images",
                      "value": "${{ steps.scan.outputs.base_failed }} with high/critical vulns",
                      "short": true
                    }
                  ],
                  "footer": "Snyk Security Scanner",
                  "footer_icon": "https://res.cloudinary.com/snyk/image/upload/v1537345894/press-kit/brand/logo-black.png",
                  "ts": ${{ github.event.head_commit.timestamp && 'new Date(github.event.head_commit.timestamp).getTime() / 1000' || 'Math.floor(Date.now() / 1000)' }}
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || '' }}