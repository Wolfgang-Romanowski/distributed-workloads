name: Snyk Dockerfile Security Scan
on:
  push:
    branches: [ main ]
  pull_request_target:
    types: [ labeled ]
  pull_request:
    paths:
      - 'images/runtime/training/*/Dockerfile'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      target_dir:
        description: 'Specific directory to scan (leave empty for all)'
        required: false
        default: ''
        type: string

jobs:
  snyk-dockerfile-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Snyk
        uses: snyk/actions/setup@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Verify Snyk Token
        id: verify_token
        run: |
          # Check if SNYK_TOKEN is set
          if [ -z "$SNYK_TOKEN" ]; then
            echo "::error::SNYK_TOKEN is not set. Please add the SNYK_TOKEN secret to your repository."
            echo "token_present=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "::notice::SNYK_TOKEN is set."
            echo "token_present=true" >> $GITHUB_OUTPUT
          fi
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Setup Docker
        uses: docker/setup-buildx-action@v2

      # Setup CUDA repositories for Docker builds that need NVIDIA components
      - name: Setup CUDA Docker Support
        run: |
          # Add NVIDIA repository for CUDA support
          wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2004/x86_64/cuda-keyring_1.0-1_all.deb
          sudo dpkg -i cuda-keyring_1.0-1_all.deb
          sudo apt-get update

      # Create test image with KNOWN vulnerabilities
      - name: Create Test Dockerfile with Known Vulnerability
        if: success() && github.event.inputs.debug == 'true'
        id: test_vulnerability
        run: |
          echo "Creating test Dockerfile with known vulnerabilities..."
          
          # Create test directory
          mkdir -p test_vulnerability
          
          # Create a test Dockerfile with SPECIFICALLY VULNERABLE image
          # Debian 9 stretch has numerous known CVEs
          cat > test_vulnerability/Dockerfile << 'EOF'
          FROM debian:9-slim
          
          # Install ImageMagick which has known vulnerabilities in Debian 9
          RUN apt-get update && \
              apt-get install -y imagemagick && \
              apt-get clean && \
              rm -rf /var/lib/apt/lists/*
          
          # Add a secret in env var - bad practice
          ENV MY_SECRET_TOKEN=1234567890abcdef
          
          # Run as root - bad practice
          USER root
          
          CMD ["bash"]
          EOF
          
          # Build test image
          echo "Building test vulnerability image..."
          docker build -t test-vuln-image test_vulnerability/
          
          # Scan with Snyk
          echo "Running vulnerability scan on test image..."
          snyk container test test-vuln-image --severity-threshold=low > test_scan_output.txt 2>&1 || true
          SCAN_EXIT_CODE=$?
          
          # Show test output
          echo "Test scan exit code: $SCAN_EXIT_CODE"
          echo "First 50 lines of test scan output:"
          head -n 50 test_scan_output.txt
          
          # Check if vulnerabilities were detected
          if [ $SCAN_EXIT_CODE -eq 1 ] && grep -q "vulnerability found" test_scan_output.txt; then
            echo "::notice::Test successful - security vulnerabilities detected in test image"
            echo "test_passed=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::Test failed - no security vulnerabilities detected in known vulnerable test image"
            echo "test_passed=false" >> $GITHUB_OUTPUT
            
            # Extra diagnostics
            echo "Running Snyk debug..."
            snyk --version
            snyk diagnose > snyk_diagnose.txt
            echo "See snyk_diagnose.txt for detailed Snyk environment info"
          fi
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Scan Dockerfiles
        id: scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          DEBUG_MODE: ${{ github.event.inputs.debug == 'true' }}
          TEST_PASSED: ${{ steps.test_vulnerability.outputs.test_passed || 'unknown' }}
          TARGET_DIR: ${{ github.event.inputs.target_dir }}
        run: |
          set -euo pipefail
          
          if [ "$DEBUG_MODE" = "true" ]; then
            set -x
            echo "Running in debug mode"
            echo "Vulnerability test scan result: $TEST_PASSED"
            if [ "$TEST_PASSED" != "true" ]; then
              echo "::warning::Vulnerability detection test failed. Snyk may not be detecting vulnerabilities correctly."
            fi
          fi
          
          HAS_HIGH_SEVERITY=false
          HAS_ISSUES=false
          ROWS=""
          PASSED_COUNT=0
          ISSUES_COUNT=0
          HIGH_COUNT=0
          FAILED_SCANS=0
          
          declare -A IMAGE_TYPES
          IMAGE_TYPES["py311-cuda121-torch241"]="CUDA 12.1 + PyTorch 2.4.1"
          IMAGE_TYPES["py311-cuda124-torch251"]="CUDA 12.4 + PyTorch 2.5.1"
          IMAGE_TYPES["py311-rocm62-torch241"]="ROCm 6.2 + PyTorch 2.4.1"
          IMAGE_TYPES["py311-rocm62-torch251"]="ROCm 6.2 + PyTorch 2.5.1"
          
          if [ -n "$TARGET_DIR" ]; then
            # Single directory mode
            DOCKERFILE_DIRS=("$TARGET_DIR")
            echo "Scanning single directory: $TARGET_DIR"
          else
            # Default - scan all directories
            DOCKERFILE_DIRS=(
              "py311-cuda121-torch241"
              "py311-cuda124-torch251"
              "py311-rocm62-torch241"
              "py311-rocm62-torch251"
            )
          fi
          
          REPORT_ROWS=()
          
          # Create results directory for scans
          mkdir -p scan_results
          
          # Check if we should skip building and use direct file scanning
          # Note: This is a fallback in case Docker builds fail
          if [ "$TEST_PASSED" != "true" ]; then
            echo "::notice::Using Snyk file scanning mode since test verification failed"
            USE_DIRECT_SCANNING=true
          else
            USE_DIRECT_SCANNING=false
          fi
          
          for DIR in "${DOCKERFILE_DIRS[@]}"; do
            DOCKERFILE_PATH="images/runtime/training/${DIR}/Dockerfile"
            CONTEXT_PATH="images/runtime/training/${DIR}"
            echo "Scanning ${DIR} Dockerfile..."
            
            if [ ! -f "$DOCKERFILE_PATH" ]; then
              REPORT_ROWS+=("${DIR}|${IMAGE_TYPES[$DIR]}|❌ Fail|Dockerfile not found|N/A")
              ROWS+=$'\n'"• ${DIR}: ❌ Failed (not found)"
              HAS_ISSUES=true
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
              continue
            fi
            
            VULN_ISSUES="None"
            CONFIG_ISSUES=()
            SCAN_RESULTS_DIR="scan_results/${DIR}"
            mkdir -p "$SCAN_RESULTS_DIR"
            
            # Always check Dockerfile directly first - this works even if build fails
            echo "Analyzing Dockerfile for best practices..."
            
            # Direct file scanning - checks Dockerfile configuration
            if grep -E "ENV.*(PASSWORD|SECRET|KEY|TOKEN).*=" "$DOCKERFILE_PATH" >/dev/null; then
              CONFIG_ISSUES+=("Potential secrets in ENV")
            fi
            if ! grep -q "USER" "$DOCKERFILE_PATH" >/dev/null; then
              CONFIG_ISSUES+=("Missing USER instruction (runs as root)")
            fi
            
            # Use container scanning if possible, otherwise fallback to direct file scanning
            if [ "$USE_DIRECT_SCANNING" = "true" ]; then
              echo "Using direct file scanning for ${DIR}..."
              # Try Snyk IaC scanning (limited but better than nothing)
              for ATTEMPT in {1..2}; do
                echo "File scan attempt $ATTEMPT of 2..."
                snyk iac test "$DOCKERFILE_PATH" --severity-threshold=medium > "${SCAN_RESULTS_DIR}/file_scan.txt" 2>&1 || true
                SCAN_EXIT_CODE=$?
                
                if [ $SCAN_EXIT_CODE -eq 0 ] || [ $SCAN_EXIT_CODE -eq 1 ]; then
                  break
                fi
                sleep 2
              done
              
              # Show output
              if [ "$DEBUG_MODE" = "true" ]; then
                echo "File scan exit code: $SCAN_EXIT_CODE"
                echo "File scan output:"
                cat "${SCAN_RESULTS_DIR}/file_scan.txt"
              fi
              
              # Try basic file scanning
              echo "Checking for other common security issues..."
              if grep -i "FROM.*latest" "$DOCKERFILE_PATH" >/dev/null; then
                CONFIG_ISSUES+=("Using 'latest' tag")
              fi
              
              if grep -i "RUN.*curl.*\|\|.*wget.*http:" "$DOCKERFILE_PATH" >/dev/null; then
                CONFIG_ISSUES+=("Insecure downloads (HTTP)")
              fi
              
              if grep -i "RUN.*apt-get.*-y" "$DOCKERFILE_PATH" >/dev/null && ! grep -i "apt-get clean" "$DOCKERFILE_PATH" >/dev/null; then
                CONFIG_ISSUES+=("Missing cleanup after package install")
              fi
              
              # No vulnerabilities detected in direct file scanning
              VULN_ISSUES="Not scanned (used file analysis)"
            else
              # Try building and scanning with container scanner
              echo "Building Docker image for ${DIR}..."
              IMAGE_TAG="snyk-scan-${DIR}:latest"
              DOCKER_BUILD_OUTPUT="${SCAN_RESULTS_DIR}/docker_build.log"
              
              # Build with timeout and capture output
              if timeout 480s docker build -t "$IMAGE_TAG" -f "$DOCKERFILE_PATH" "$CONTEXT_PATH" > "$DOCKER_BUILD_OUTPUT" 2>&1; then
                echo "✅ Docker build successful"
                BUILD_SUCCESS=true
              else
                BUILD_EXIT_CODE=$?
                if [ $BUILD_EXIT_CODE -eq 124 ]; then
                  echo "::warning::Docker build timed out after 8 minutes"
                  CONFIG_ISSUES+=("Build timeout (>8min)")
                else
                  echo "::warning::Docker build failed with exit code $BUILD_EXIT_CODE"
                  CONFIG_ISSUES+=("Build failed")
                  
                  # Extract error messages from build
                  echo "Build error details:" >> "${SCAN_RESULTS_DIR}/build_errors.txt"
                  grep -A 10 "error:" "$DOCKER_BUILD_OUTPUT" >> "${SCAN_RESULTS_DIR}/build_errors.txt" || true
                  grep -A 10 "ERROR:" "$DOCKER_BUILD_OUTPUT" >> "${SCAN_RESULTS_DIR}/build_errors.txt" || true
                  grep -A 10 "failed:" "$DOCKER_BUILD_OUTPUT" >> "${SCAN_RESULTS_DIR}/build_errors.txt" || true
                  
                  if [ "$DEBUG_MODE" = "true" ]; then
                    echo "Docker build error summary:"
                    cat "${SCAN_RESULTS_DIR}/build_errors.txt" || true
                  fi
                fi
                BUILD_SUCCESS=false
              fi
              
              # If build successful, run Snyk container scan
              if [ "$BUILD_SUCCESS" = "true" ]; then
                echo "Running Snyk container scan on ${DIR}..."
                
                # Try multiple times in case of transient errors
                for ATTEMPT in {1..3}; do
                  echo "Scan attempt $ATTEMPT of 3..."
                  
                  # Run with debug flag in debug mode
                  if [ "$DEBUG_MODE" = "true" ]; then
                    snyk container test "$IMAGE_TAG" --file="$DOCKERFILE_PATH" --severity-threshold=medium -d > "${SCAN_RESULTS_DIR}/output.txt" 2> "${SCAN_RESULTS_DIR}/error.txt" || true
                  else
                    snyk container test "$IMAGE_TAG" --file="$DOCKERFILE_PATH" --severity-threshold=medium > "${SCAN_RESULTS_DIR}/output.txt" 2> "${SCAN_RESULTS_DIR}/error.txt" || true
                  fi
                  
                  SCAN_EXIT_CODE=$?
                  
                  # Exit code 0 means no vulnerabilities, 1 means vulnerabilities found, anything else is an error
                  if [ $SCAN_EXIT_CODE -eq 0 ] || [ $SCAN_EXIT_CODE -eq 1 ]; then
                    break
                  fi
                  
                  # If this was the last attempt and it failed, mark as a failed scan
                  if [ $ATTEMPT -eq 3 ]; then
                    FAILED_SCANS=$((FAILED_SCANS+1))
                    echo "::warning::Failed to scan ${DIR} after 3 attempts"
                    CONFIG_ISSUES+=("Scan failed after 3 attempts")
                  else
                    # Wait before retrying
                    sleep 5
                  fi
                done
                
                # Print Snyk output for debugging
                if [ "$DEBUG_MODE" = "true" ]; then
                  echo "Snyk exit code: $SCAN_EXIT_CODE"
                  echo "Snyk stdout (first 20 lines):"
                  head -n 20 "${SCAN_RESULTS_DIR}/output.txt" || true
                  echo "Snyk stderr (first 20 lines):"
                  head -n 20 "${SCAN_RESULTS_DIR}/error.txt" || true
                fi
                
                # Parse the results based on exit code and output
                if [ $SCAN_EXIT_CODE -eq 0 ]; then
                  echo "✅ Snyk scan passed with no security issues"
                elif [ $SCAN_EXIT_CODE -eq 1 ]; then
                  # Parse vulnerabilities from the output
                  if grep -i "critical severity" "${SCAN_RESULTS_DIR}/output.txt" >/dev/null; then
                    VULN_ISSUES="Critical severity"
                    HAS_HIGH_SEVERITY=true
                    HIGH_COUNT=$((HIGH_COUNT + 1))
                  elif grep -i "high severity" "${SCAN_RESULTS_DIR}/output.txt" >/dev/null; then
                    VULN_ISSUES="High severity"
                    HAS_HIGH_SEVERITY=true
                    HIGH_COUNT=$((HIGH_COUNT + 1))
                  elif grep -i "medium severity" "${SCAN_RESULTS_DIR}/output.txt" >/dev/null; then
                    VULN_ISSUES="Medium severity"
                    HAS_ISSUES=true
                    ISSUES_COUNT=$((ISSUES_COUNT + 1))
                  elif grep -i "low severity" "${SCAN_RESULTS_DIR}/output.txt" >/dev/null; then
                    VULN_ISSUES="Low severity"
                  fi
                else
                  # Check for errors
                  if grep -i "authentication failed" "${SCAN_RESULTS_DIR}/output.txt" >/dev/null || grep -i "not authorized" "${SCAN_RESULTS_DIR}/output.txt" >/dev/null; then
                    VULN_ISSUES="Authentication error"
                    echo "::warning::Snyk authentication error detected during scan"
                  else
                    VULN_ISSUES="Scan error (see logs)"
                  fi
                fi
                
                # Clean up Docker image
                docker rmi "$IMAGE_TAG" || true
              else
                # If build failed, mark as failed scan
                VULN_ISSUES="Build failed"
                FAILED_SCANS=$((FAILED_SCANS+1))
              fi
            fi
            
            # Determine final status
            if [ ${#CONFIG_ISSUES[@]} -eq 0 ]; then
              CONFIG_ISSUES_STR="None"
            else
              CONFIG_ISSUES_STR=$(IFS=", "; echo "${CONFIG_ISSUES[*]}")
            fi
            
            if [ "$VULN_ISSUES" = "None" ] && [ "$CONFIG_ISSUES_STR" = "None" ]; then
              STATUS="✅ Pass"
              PASSED_COUNT=$((PASSED_COUNT + 1))
            elif [ "$VULN_ISSUES" = "Critical severity" ] || [ "$VULN_ISSUES" = "High severity" ]; then
              STATUS="❌ Fail"
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
            else
              STATUS="⚠️ Warning"
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
            fi
            
            REPORT_ROWS+=("${DIR}|${IMAGE_TYPES[$DIR]}|${STATUS}|${VULN_ISSUES}|${CONFIG_ISSUES_STR}")
            ROWS+=$'\n'"• ${DIR}: ${STATUS}"
          done
          
          if $HAS_HIGH_SEVERITY; then
            OVERALL_STATUS="❌ Failed"
          elif [ $FAILED_SCANS -eq ${#DOCKERFILE_DIRS[@]} ]; then 
            OVERALL_STATUS="❌ Failed (All Scans Failed)"
            HAS_ISSUES=true
          elif $HAS_ISSUES; then 
            OVERALL_STATUS="⚠️ Issues Found"
          else
            OVERALL_STATUS="✅ All Secure"
          fi
          
          # If test vulnerability detection failed, but we're passing everything, add a warning
          if [ "$TEST_PASSED" != "true" ] && [ "$OVERALL_STATUS" = "✅ All Secure" ]; then
            OVERALL_STATUS="✅ All Secure ⚠️ (Verification Failed)"
            echo "::warning::All images passed, but Snyk failed to detect vulnerabilities in the test image. Results may be unreliable."
          fi
          
          # Add a warning if some scans failed
          if [ $FAILED_SCANS -gt 0 ] && [ $FAILED_SCANS -lt ${#DOCKERFILE_DIRS[@]} ]; then
            OVERALL_STATUS="$OVERALL_STATUS ⚠️ ($FAILED_SCANS Scans Failed)"
            echo "::warning::$FAILED_SCANS scan(s) failed to complete. Some results may be missing."
          fi
          
          SNYK_VERSION=$(snyk --version || echo "Unknown")
          
          TZ=Europe/London
          export TZ
          LON_DATE="$(date '+%a %d %b %Y %T %Z')"
          
          echo "# Dockerfile Security Scan Results" > "$GITHUB_STEP_SUMMARY"
          
          echo "## Summary Overview" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|:-------|:------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Scan Date** | $LON_DATE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Status** | $OVERALL_STATUS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Snyk Version** | $SNYK_VERSION |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Scanner Mode** | $([ "$USE_DIRECT_SCANNING" = "true" ] && echo "File Analysis" || echo "Container") |" >> "$GITHUB_STEP_SUMMARY"
          
          # If in debug mode and we ran the test, add the test result
          if [ "$TEST_PASSED" != "unknown" ]; then
            echo "| **Test Vulnerability Detection** | ${TEST_PASSED} |" >> "$GITHUB_STEP_SUMMARY"
          fi
          
          echo "| **Total Images** | ${#DOCKERFILE_DIRS[@]} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Passed** | $PASSED_COUNT |" >> "$GITHUB_STEP_SUMMARY" 
          echo "| **Issues** | $ISSUES_COUNT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Critical/High** | $HIGH_COUNT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Failed Scans** | $FAILED_SCANS |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "## Detailed Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "<table>" >> "$GITHUB_STEP_SUMMARY"
          echo "  <tr>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Dockerfile</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Image Type</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='center'>Status</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Security Issues</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Configuration Issues</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "  </tr>" >> "$GITHUB_STEP_SUMMARY"
          
          for ROW in "${REPORT_ROWS[@]}"; do
            IFS='|' read -r DIR IMAGE_TYPE STATUS VULN CONFIG <<< "$ROW"
            echo "  <tr>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${DIR}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${IMAGE_TYPE}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td align='center'>${STATUS}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${VULN}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${CONFIG}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "  </tr>" >> "$GITHUB_STEP_SUMMARY"
          done
          
          echo "</table>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "## Security Checks Performed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check Type | Description | Severity |" >> "$GITHUB_STEP_SUMMARY"
          echo "|:-----------|:------------|:---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Container/File Scan** | Detects vulnerabilities in images or Dockerfiles | Critical/High = Fail |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Secret Detection** | Identifies potential secrets in ENV variables | Warning |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **User Configuration** | Verifies non-root USER instruction | Warning |" >> "$GITHUB_STEP_SUMMARY"
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Notes" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow fails only on High or Critical security issues" >> "$GITHUB_STEP_SUMMARY"
          echo "- Medium and Low severity issues are reported but don't cause failure" >> "$GITHUB_STEP_SUMMARY"
          echo "- Missing USER instruction indicates container runs as root (security risk)" >> "$GITHUB_STEP_SUMMARY"
          echo "- When Docker builds fail, file analysis is used as a fallback (less comprehensive)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scans run nightly at 03:00 UTC" >> "$GITHUB_STEP_SUMMARY"
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details>" >> "$GITHUB_STEP_SUMMARY"
          echo "<summary>Technical Scan Information</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Scanner:** Snyk $([ "$USE_DIRECT_SCANNING" = "true" ] && echo "IaC/File Analysis" || echo "Container")" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** $SNYK_VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "**Scan Parameters:** \`--severity-threshold=medium\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Workflow Run ID:** \`${{ github.run_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          
          echo "results<<EOF" >> $GITHUB_OUTPUT
          echo -e "${ROWS}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          if $HAS_HIGH_SEVERITY; then
            echo "status=high_severity" >> $GITHUB_OUTPUT
          elif [ $FAILED_SCANS -eq ${#DOCKERFILE_DIRS[@]} ]; then
            echo "status=all_scans_failed" >> $GITHUB_OUTPUT
          elif $HAS_ISSUES; then
            echo "status=issues_found" >> $GITHUB_OUTPUT
          else
            echo "status=secure" >> $GITHUB_OUTPUT
          fi
          
          echo "debug_mode=$DEBUG_MODE" >> $GITHUB_OUTPUT
          echo "snyk_version=$SNYK_VERSION" >> $GITHUB_OUTPUT
          echo "failed_scans=$FAILED_SCANS" >> $GITHUB_OUTPUT
          echo "scanner_mode=$([ "$USE_DIRECT_SCANNING" = "true" ] && echo "file" || echo "container")" >> $GITHUB_OUTPUT
          
          if [ "$TEST_PASSED" != "unknown" ]; then
            echo "test_passed=${TEST_PASSED}" >> $GITHUB_OUTPUT
          fi
          
          if $HAS_HIGH_SEVERITY; then
            echo "❌ High/Critical security issues detected — failing the workflow."
            exit 1
          elif [ $FAILED_SCANS -eq ${#DOCKERFILE_DIRS[@]} ]; then
            echo "❌ All scans failed to complete — failing the workflow."
            exit 1
          fi

      - name: Slack Notification
        if: >
          always() &&
          (steps.scan.outputs.status != 'secure' || 
          steps.scan.outputs.failed_scans != '0' ||
          github.event.inputs.debug == 'true' || 
          github.event_name == 'schedule' ||
          job.status == 'failure')
        continue-on-error: true
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: repo,workflow
          custom_payload: |
            {
              "attachments": [
                {
                  "color": "${{ job.status == 'failure' && 'danger' || steps.scan.outputs.status == 'secure' && 'good' || steps.scan.outputs.status == 'high_severity' && 'danger' || steps.scan.outputs.status == 'all_scans_failed' && 'danger' || 'warning' }}",
                  "title": "Dockerfile Security Scan Results",
                  "text": "${{ job.status == 'failure' && '🚨 Workflow failed' || steps.scan.outputs.status == 'secure' && '✅ All Dockerfiles are secure' || steps.scan.outputs.status == 'high_severity' && '🚨 High severity issues detected' || steps.scan.outputs.status == 'all_scans_failed' && '🚨 All scans failed to complete' || '⚠️ Security issues detected' }}${{ steps.scan.outputs.test_passed == 'false' && ' (⚠️ Verification Failed)' || '' }}${{ steps.scan.outputs.failed_scans != '0' && ' (⚠️ ' || '' }}${{ steps.scan.outputs.failed_scans != '0' && steps.scan.outputs.failed_scans || '' }}${{ steps.scan.outputs.failed_scans != '0' && ' Scans Failed)' || '' }}\n${{ steps.scan.outputs.results }}\n\n*Scanner:* ${{ steps.scan.outputs.scanner_mode }} | *Snyk Version:* ${{ steps.scan.outputs.snyk_version || 'Unknown' }}",
                  "mrkdwn_in": ["text"],
                  "footer": "Snyk Dockerfile Security Scan | Run ID: ${{ github.run_id }} | $(TZ=Europe/London date '+%d-%m-%Y %H:%M %Z')"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}