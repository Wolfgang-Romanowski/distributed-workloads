# .github/workflows/snyk-dockerfile-scan.yml
name: Snyk Dockerfile Scan

on:
  schedule:
    - cron: '0 3 * * *'          # nightly
  push:                           # every push to main (testing)
    branches: [main]
    paths:
      - '**/Dockerfile*'
      - '.github/workflows/snyk-dockerfile-scan.yml'
  pull_request_target:            # fork PRs once label added
    types: [labeled]

jobs:
  snyk-dockerfile-scan:
    runs-on: ubuntu-latest
    name: Snyk Dockerfile Scan

    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'push'     ||
      (github.event_name == 'pull_request_target' && github.event.label.name == 'run-snyk-scan')

    env:
      SNYK_TOKEN:    ${{ secrets.SNYK_TOKEN }}
      PY_DEF:        "3.11"   # default PYTHON_VERSION
      TAG_DEF:       "latest" # default IMAGE_TAG

    steps:
      - name: Checkout (schedule / push)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'push' }}
        uses: actions/checkout@v3

      - name: Checkout PR code (labeled fork PR)
        if: ${{ github.event_name == 'pull_request_target' }}
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk scans on Dockerfiles
        shell: bash
        run: |
          set +e   # keep going even if individual scans fail

          images=(
            "py311-cuda121-torch241"
            "py311-cuda124-torch251"
            "py311-rocm62-torch241"
            "py311-rocm62-torch251"
          )

          echo "| Image                     | Scan Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ------------------------- | ----------- |" >> "$GITHUB_STEP_SUMMARY"

          for img in "${images[@]}"; do
            dockerfile="images/runtime/training/$img/Dockerfile"
            echo "🔎  Scanning $dockerfile"

            # Verify Dockerfile exists
            if [[ ! -f "$dockerfile" ]]; then
              echo "❌  Dockerfile not found"
              echo "| $img | missing |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            # Defaults (can be overridden by ARG lines)
            PYTHON_VERSION="$PY_DEF"
            IMAGE_TAG="$TAG_DEF"

            # Override from ARG lines if present
            arg_py=$(grep -E '^ARG[[:space:]]+PYTHON_VERSION=' "$dockerfile" | tail -1 | cut -d'=' -f2)
            arg_tag=$(grep -E '^ARG[[:space:]]+IMAGE_TAG='     "$dockerfile" | tail -1 | cut -d'=' -f2)
            [[ -n "$arg_py"  ]] && PYTHON_VERSION="$arg_py"
            [[ -n "$arg_tag" ]] && IMAGE_TAG="$arg_tag"

            # Extract last FROM image
            base_image=$(grep -Ei '^FROM ' "$dockerfile" | tail -1 | awk '{print $2}')

            # Substitute known vars
            resolved_image=$(echo "$base_image" \
              | sed "s/\${PYTHON_VERSION}/$PYTHON_VERSION/g" \
              | sed "s/\${IMAGE_TAG}/$IMAGE_TAG/g")

            # Skip if still unresolved
            if [[ "$resolved_image" == *'${'* || "$resolved_image" == *'$'* ]]; then
              echo "⚠️  Skipping – unresolved base image ($resolved_image)"
              echo "| $img | skipped |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            # Run Snyk scan
            snyk container test "$resolved_image" --file="$dockerfile"
            exit_code=$?

            # Map exit code to status
            if   [ $exit_code -eq 0 ]; then status="passed"
            elif [ $exit_code -eq 1 ]; then status="failed"
            else                           status="error"; fi

            echo "| $img | $status |" >> "$GITHUB_STEP_SUMMARY"

            if [ $exit_code -ne 0 ]; then
              echo "Snyk scan for $img -> $status (exit $exit_code)"
            fi
          done

          exit 0  # always succeed (informational only)

      - name: Finalize Summary
        run: echo "**Snyk Dockerfile scan completed – see table above for results.**" >> "$GITHUB_STEP_SUMMARY"
