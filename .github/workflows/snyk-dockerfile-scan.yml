name: Snyk Dockerfile Security Scan

on:
  push:
    branches: [ main ]
    paths:
      - 'images/runtime/training/*/Dockerfile'
  pull_request_target:
    types: [ labeled ]
  pull_request:
    paths:
      - 'images/runtime/training/*/Dockerfile'
  schedule:
    - cron: '0 3 * * *'  # Run nightly at 3:00 UTC
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      target_dir:
        description: 'Specific directory to scan (leave empty for all)'
        required: false
        default: ''
        type: string

jobs:
  snyk-dockerfile-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request_target' || 
      github.event.label.name == 'safe-to-test' || 
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.ref || '' }}
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || '' }}

      - name: Setup Snyk
        uses: snyk/actions/setup@master

      - name: Configure Snyk Authentication
        id: verify_token
        run: |
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "::error::SNYK_TOKEN secret is not configured"
            exit 1
          fi
          
          snyk auth "${{ secrets.SNYK_TOKEN }}"
          
          SNYK_VERSION=$(snyk --version)
          echo "version=$SNYK_VERSION" >> $GITHUB_OUTPUT
          echo "Snyk authenticated successfully - Version: $SNYK_VERSION"

      - name: Execute Dockerfile Security Scans
        id: scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          DEBUG_MODE: ${{ github.event.inputs.debug == 'true' }}
          TARGET_DIR: ${{ github.event.inputs.target_dir }}
        run: |
          set -e
          
          # Configuration
          TRAINING_DIR="images/runtime/training"
          RESULTS_DIR="scan_results"
          mkdir -p "$RESULTS_DIR"
          
          # Global counters
          TOTAL_SCANNED=0
          PASSED_COUNT=0
          FAILED_COUNT=0
          SCAN_ERRORS=0
          
          # Results storage
          SCAN_SUMMARY=""
          DOCKERFILE_BREAKDOWN=""
          BASE_IMAGE_BREAKDOWN=""
          HUMAN_READABLE_REPORTS=""
          
          # Track unique base images
          declare -A BASE_IMAGES
          
          # Utility functions
          log_section() {
            echo ""
            echo "========================================================================"
            echo "  $1"
            echo "========================================================================"
          }
          
          extract_base_image() {
            local dockerfile="$1"
            local base_image
            
            # Extract FROM line and handle build args
            base_image=$(grep -m 1 "^FROM" "$dockerfile" | awk '{print $2}' | sed 's/ AS .*//g')
            
            # Process ARG substitutions from the Dockerfile
            while IFS= read -r line; do
              if [[ "$line" =~ ^ARG[[:space:]]+([^=[:space:]]+)=(.+)$ ]]; then
                local var_name="${BASH_REMATCH[1]}"
                local var_value="${BASH_REMATCH[2]//\"/}"
                var_value="${var_value//\'/}"
                base_image="${base_image//\$\{$var_name\}/$var_value}"
                base_image="${base_image//\$$var_name/$var_value}"
              fi
            done < "$dockerfile"
            
            # If variables remain unresolved, use fallback based on directory
            if [[ "$base_image" == *"\$"* ]] || [[ "$base_image" == *"{"* ]]; then
              case "$2" in
                py311-cuda*)
                  base_image="registry.access.redhat.com/ubi9/python-311:9.5-1741671866"
                  ;;
                py311-rocm*)
                  base_image="registry.access.redhat.com/ubi9/python-311:9.5-1741671866"
                  ;;
                *)
                  base_image="ubuntu:22.04"
                  ;;
              esac
              echo "Using fallback base image: $base_image"
            fi
            
            echo "$base_image"
          }
          
          run_snyk_scan() {
            local target="$1"
            local dockerfile="$2"
            local output_file="$3"
            local scan_type="$4"
            
            echo "Running Snyk $scan_type scan..."
            
            if [ "$scan_type" = "base" ]; then
              # Scan base image only
              snyk container test "$target" --json --severity-threshold=low > "$output_file" 2>/dev/null || true
            else
              # Scan with Dockerfile context
              snyk container test "$target" --file="$dockerfile" --json --severity-threshold=low > "$output_file" 2>/dev/null || true
            fi
            
            # Validate scan results
            if [ -s "$output_file" ] && jq -e . "$output_file" >/dev/null 2>&1; then
              return 0
            else
              echo "Scan failed or produced invalid JSON"
              return 1
            fi
          }
          
          extract_vulnerabilities() {
            local json_file="$1"
            local output_prefix="$2"
            
            if [ ! -s "$json_file" ] || ! jq -e . "$json_file" >/dev/null 2>&1; then
              echo "0,0,0,0" > "${output_prefix}_counts.txt"
              echo "No valid scan data" > "${output_prefix}_summary.txt"
              return 1
            fi
            
            # Extract vulnerability counts by severity
            local critical=$(jq '[.vulnerabilities[]? | select(.severity == "critical")] | length' "$json_file" 2>/dev/null || echo 0)
            local high=$(jq '[.vulnerabilities[]? | select(.severity == "high")] | length' "$json_file" 2>/dev/null || echo 0)
            local medium=$(jq '[.vulnerabilities[]? | select(.severity == "medium")] | length' "$json_file" 2>/dev/null || echo 0)
            local low=$(jq '[.vulnerabilities[]? | select(.severity == "low")] | length' "$json_file" 2>/dev/null || echo 0)
            
            # Save counts
            echo "$critical,$high,$medium,$low" > "${output_prefix}_counts.txt"
            
            # Generate human-readable summary
            {
              echo "Vulnerability Summary:"
              echo "  Critical: $critical"
              echo "  High: $high"  
              echo "  Medium: $medium"
              echo "  Low: $low"
              echo "  Total: $((critical + high + medium + low))"
            } > "${output_prefix}_summary.txt"
            
            # Extract sample of high/critical vulnerabilities only
            if [ $((critical + high)) -gt 0 ]; then
              {
                echo ""
                echo "Top Critical/High Vulnerabilities (first 5):"
                echo "============================================"
                jq -r '.vulnerabilities[]? | select(.severity == "critical" or .severity == "high") | "• \(.title // .id) (\(.severity | ascii_upcase))\n  Package: \(.packageName // "Unknown")@\(.version // "Unknown")\n"' "$json_file" 2>/dev/null | head -n 15 || echo "Unable to parse vulnerability details"
              } >> "${output_prefix}_summary.txt"
            fi
            
            return 0
          }
          
          # Determine target directories
          if [ -n "$TARGET_DIR" ]; then
            if [ -d "$TRAINING_DIR/$TARGET_DIR" ]; then
              TARGET_DIRS=("$TARGET_DIR")
              echo "Scanning specific directory: $TARGET_DIR"
            else
              echo "Target directory $TRAINING_DIR/$TARGET_DIR does not exist"
              exit 1
            fi
          else
            TARGET_DIRS=(
              "py311-cuda121-torch241"
              "py311-cuda124-torch251" 
              "py311-rocm62-torch241"
              "py311-rocm62-torch251"
            )
            echo "Scanning all Dockerfile directories"
          fi
          
          # Process each target directory
          for DIR in "${TARGET_DIRS[@]}"; do
            log_section "Processing $DIR"
            
            DOCKERFILE="$TRAINING_DIR/$DIR/Dockerfile"
            TOTAL_SCANNED=$((TOTAL_SCANNED + 1))
            
            # Verify Dockerfile exists
            if [ ! -f "$DOCKERFILE" ]; then
              echo "Dockerfile not found: $DOCKERFILE"
              SCAN_ERRORS=$((SCAN_ERRORS + 1))
              SCAN_SUMMARY="${SCAN_SUMMARY}FAILED - $DIR: DOCKERFILE NOT FOUND\n"
              DOCKERFILE_BREAKDOWN="${DOCKERFILE_BREAKDOWN}| $DIR | Error | FAILED |\n"
              continue
            fi
            
            # Extract base image
            BASE_IMAGE=$(extract_base_image "$DOCKERFILE" "$DIR")
            echo "Base image: $BASE_IMAGE"
            
            # Define result files
            BASE_SCAN="$RESULTS_DIR/${DIR}_base.json"
            FULL_SCAN="$RESULTS_DIR/${DIR}_full.json"
            
            # Step 1: Scan base image only
            echo ""
            echo "Phase 1: Base Image Analysis"
            echo "----------------------------"
            if run_snyk_scan "$BASE_IMAGE" "" "$BASE_SCAN" "base"; then
              extract_vulnerabilities "$BASE_SCAN" "$RESULTS_DIR/${DIR}_base"
              BASE_COUNTS=$(cat "$RESULTS_DIR/${DIR}_base_counts.txt")
              echo "Base image scan completed"
            else
              echo "Base image scan failed"
              BASE_COUNTS="0,0,0,0"
              echo "Base image scan failed" > "$RESULTS_DIR/${DIR}_base_summary.txt"
            fi
            
            # Step 2: Scan with Dockerfile context
            echo ""
            echo "Phase 2: Full Dockerfile Analysis"
            echo "--------------------------------"
            if run_snyk_scan "$BASE_IMAGE" "$DOCKERFILE" "$FULL_SCAN" "dockerfile"; then
              extract_vulnerabilities "$FULL_SCAN" "$RESULTS_DIR/${DIR}_full"
              FULL_COUNTS=$(cat "$RESULTS_DIR/${DIR}_full_counts.txt")
              echo "Dockerfile scan completed"
            else
              echo "Dockerfile scan failed"
              SCAN_ERRORS=$((SCAN_ERRORS + 1))
              SCAN_SUMMARY="${SCAN_SUMMARY}FAILED - $DIR: SCAN FAILED\n"
              DOCKERFILE_BREAKDOWN="${DOCKERFILE_BREAKDOWN}| $DIR | Error | FAILED |\n"
              continue
            fi
            
            # Parse vulnerability counts
            IFS=',' read -r base_crit base_high base_med base_low <<< "$BASE_COUNTS"
            IFS=',' read -r full_crit full_high full_med full_low <<< "$FULL_COUNTS"
            
            # Store base image info (avoid duplicates)
            BASE_IMAGE_KEY="${BASE_IMAGE//\//_}"
            BASE_IMAGE_KEY="${BASE_IMAGE_KEY//[:.]/_}"
            if [ -z "${BASE_IMAGES[$BASE_IMAGE_KEY]}" ]; then
              BASE_IMAGES[$BASE_IMAGE_KEY]="$BASE_IMAGE|${base_crit}C/${base_high}H/${base_med}M/${base_low}L"
            fi
            
            # Calculate Dockerfile-specific vulnerabilities
            dockerfile_crit=$((full_crit - base_crit > 0 ? full_crit - base_crit : 0))
            dockerfile_high=$((full_high - base_high > 0 ? full_high - base_high : 0))
            dockerfile_med=$((full_med - base_med > 0 ? full_med - base_med : 0))
            dockerfile_low=$((full_low - base_low > 0 ? full_low - base_low : 0))
            
            # Determine status based ONLY on Dockerfile-specific vulnerabilities
            if [ "$dockerfile_crit" -gt 0 ] || [ "$dockerfile_high" -gt 0 ]; then
              STATUS="FAILED"
              FAILED_COUNT=$((FAILED_COUNT + 1))
            elif [ "$dockerfile_med" -gt 0 ]; then
              STATUS="WARNING"
            else
              STATUS="PASSED"
              PASSED_COUNT=$((PASSED_COUNT + 1))
            fi
            
            # Build summary line
            SCAN_SUMMARY="${SCAN_SUMMARY}$STATUS - $DIR\n"
            SCAN_SUMMARY="${SCAN_SUMMARY}  Base: ${base_crit}C/${base_high}H/${base_med}M/${base_low}L (informational)\n"
            SCAN_SUMMARY="${SCAN_SUMMARY}  Dockerfile: ${dockerfile_crit}C/${dockerfile_high}H/${dockerfile_med}M/${dockerfile_low}L\n"
            SCAN_SUMMARY="${SCAN_SUMMARY}  Total: ${full_crit}C/${full_high}H/${full_med}M/${full_low}L\n"
            
            # Build dockerfile breakdown (only dockerfile vulnerabilities affect status)
            if [ $((dockerfile_crit + dockerfile_high + dockerfile_med + dockerfile_low)) -eq 0 ]; then
              DOCKERFILE_BREAKDOWN="${DOCKERFILE_BREAKDOWN}| $DIR | No vulnerabilities | $STATUS |\n"
            else
              DOCKERFILE_BREAKDOWN="${DOCKERFILE_BREAKDOWN}| $DIR | ${dockerfile_crit}C/${dockerfile_high}H/${dockerfile_med}M/${dockerfile_low}L | $STATUS |\n"
            fi
            
            # Generate concise human-readable report for GitHub summary
            {
              echo "=========================================="
              echo "SECURITY SCAN REPORT: $DIR"
              echo "=========================================="
              echo ""
              echo "SCAN OVERVIEW"
              echo "Status: $STATUS"
              echo "Base Image: $BASE_IMAGE"
              echo "Scan Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
              echo ""
              echo "VULNERABILITY SUMMARY"
              echo "Base Image: ${base_crit}C/${base_high}H/${base_med}M/${base_low}L (informational)"
              echo "Dockerfile Impact: ${dockerfile_crit}C/${dockerfile_high}H/${dockerfile_med}M/${dockerfile_low}L"
              echo "Total: ${full_crit}C/${full_high}H/${full_med}M/${full_low}L"
              echo ""
              if [ $((dockerfile_crit + dockerfile_high)) -gt 0 ]; then
                echo "ACTION REQUIRED: Dockerfile introduces Critical/High vulnerabilities"
                echo "Review detailed scan results in artifacts for remediation steps"
              elif [ $((dockerfile_med)) -gt 0 ]; then
                echo "ADVISORY: Dockerfile introduces Medium vulnerabilities - monitor for updates"
              else
                echo "RESULT: Dockerfile introduces no additional vulnerabilities"
              fi
              echo ""
            } > "$RESULTS_DIR/${DIR}_brief_report.txt"
            
            # Generate detailed report for artifacts only
            {
              echo "=========================================="
              echo "DETAILED SECURITY SCAN REPORT: $DIR"
              echo "=========================================="
              echo ""
              echo "SCAN OVERVIEW"
              echo "Status: $STATUS"
              echo "Base Image: $BASE_IMAGE"
              echo "Scan Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
              echo ""
              echo "VULNERABILITY BREAKDOWN"
              echo ""
              echo "Base Image Vulnerabilities:"
              cat "$RESULTS_DIR/${DIR}_base_summary.txt" | sed 's/^/  /'
              echo ""
              echo "Full Analysis (Base + Dockerfile):"
              cat "$RESULTS_DIR/${DIR}_full_summary.txt" | sed 's/^/  /'
              echo ""
              echo "Dockerfile-Specific Impact:"
              echo "  Critical: $dockerfile_crit"
              echo "  High: $dockerfile_high"
              echo "  Medium: $dockerfile_med"
              echo "  Low: $dockerfile_low"
              echo ""
              echo "NOTE: Status determined by Dockerfile impact only."
              echo "Base image vulnerabilities are informational."
              echo ""
            } > "$RESULTS_DIR/${DIR}_detailed_report.txt"
            
            HUMAN_READABLE_REPORTS="${HUMAN_READABLE_REPORTS}\n<details>\n<summary>Security Report: $DIR</summary>\n\n\`\`\`\n$(cat "$RESULTS_DIR/${DIR}_brief_report.txt")\n\`\`\`\n\n</details>\n"
            
            echo ""
            echo "Results Summary for $DIR:"
            echo "  Status: $STATUS (based on Dockerfile impact only)"
            echo "  Base vulnerabilities: ${base_crit}C/${base_high}H/${base_med}M/${base_low}L (informational)"
            echo "  Dockerfile impact: ${dockerfile_crit}C/${dockerfile_high}H/${dockerfile_med}M/${dockerfile_low}L"
            echo "  Total vulnerabilities: ${full_crit}C/${full_high}H/${full_med}M/${full_low}L"
          done
          
          # Build base image breakdown from collected data
          for key in "${!BASE_IMAGES[@]}"; do
            IFS='|' read -r image_name image_vulns <<< "${BASE_IMAGES[$key]}"
            BASE_IMAGE_BREAKDOWN="${BASE_IMAGE_BREAKDOWN}| $image_name | $image_vulns |\n"
          done
          
          # Calculate final status
          if [ $SCAN_ERRORS -gt 0 ]; then
            OVERALL_STATUS="FAILED"
            SCAN_STATUS="Scan errors encountered"
          elif [ $FAILED_COUNT -gt 0 ]; then
            OVERALL_STATUS="FAILED"
            SCAN_STATUS="Dockerfile vulnerabilities found"
          elif [ $PASSED_COUNT -eq $TOTAL_SCANNED ]; then
            OVERALL_STATUS="PASSED"
            SCAN_STATUS="All Dockerfiles clean"
          else
            OVERALL_STATUS="WARNING"
            SCAN_STATUS="Dockerfile warnings found"
          fi
          
          # Generate GitHub Step Summary
          {
            echo "# Dockerfile Security Scan Results"
            echo ""
            echo "## Executive Summary"
            echo ""
            # Create status badge style
            if [ "$OVERALL_STATUS" = "PASSED" ]; then
              STATUS_BADGE="**PASSED**"
              STATUS_COLOR="✅"
            elif [ "$OVERALL_STATUS" = "WARNING" ]; then
              STATUS_BADGE="**WARNING**"
              STATUS_COLOR="⚠️"
            else
              STATUS_BADGE="**FAILED**"
              STATUS_COLOR="❌"
            fi
            
            echo "| Metric | Result |"
            echo "|:-------|:-------|"
            echo "| **Status** | $STATUS_COLOR $STATUS_BADGE |"
            echo "| **Summary** | $SCAN_STATUS |"
            echo "| **Scan Date** | $(date -u '+%B %d, %Y at %H:%M UTC') |"
            echo "| **Snyk Version** | ${{ steps.verify_token.outputs.version }} |"
            echo ""
            echo "### Scan Metrics"
            echo ""
            echo "| Dockerfiles | Passed | Failed | Errors |"
            echo "|:-----------:|:------:|:------:|:------:|"
            echo "| **$TOTAL_SCANNED** | $PASSED_COUNT | $FAILED_COUNT | $SCAN_ERRORS |"
            echo ""
            
            # Base Image Section
            echo "## Base Image Security Overview"
            echo "*For informational purposes - does not affect build status*"
            echo ""
            
            for key in "${!BASE_IMAGES[@]}"; do
              IFS='|' read -r image_name image_vulns <<< "${BASE_IMAGES[$key]}"
              # Extract just the image name without registry
              SHORT_NAME=$(echo "$image_name" | sed 's|.*/||' | sed 's|:.*||')
              IMAGE_TAG=$(echo "$image_name" | sed 's|.*:||')
              
              # Parse vulnerability counts
              CRIT_COUNT=$(echo "$image_vulns" | sed 's|.*\([0-9]\+\)C.*|\1|')
              HIGH_COUNT=$(echo "$image_vulns" | sed 's|.*\([0-9]\+\)H.*|\1|')
              MED_COUNT=$(echo "$image_vulns" | sed 's|.*\([0-9]\+\)M.*|\1|')
              LOW_COUNT=$(echo "$image_vulns" | sed 's|.*\([0-9]\+\)L.*|\1|')
              
              echo "### $SHORT_NAME:$IMAGE_TAG"
              echo ""
              if [ "$HIGH_COUNT" -gt 0 ] || [ "$CRIT_COUNT" -gt 0 ]; then
                echo "| Severity | Count | Status |"
                echo "|:---------|:-----:|:-------|"
                echo "| Critical | $CRIT_COUNT | $([ "$CRIT_COUNT" -gt 0 ] && echo "Needs attention" || echo "Clean") |"
                echo "| High | $HIGH_COUNT | $([ "$HIGH_COUNT" -gt 0 ] && echo "Needs attention" || echo "Clean") |"
                echo "| Medium | $MED_COUNT | Informational |"
                echo "| Low | $LOW_COUNT | Informational |"
              else
                echo "**No critical or high severity vulnerabilities**"
                echo ""
                echo "| Medium: $MED_COUNT | Low: $LOW_COUNT |"
                echo "|:------------------|:----------------|"
              fi
              echo ""
            done
            
            # Dockerfile Analysis Section  
            echo "## Dockerfile Security Analysis"
            echo "*This section determines build pass/fail status*"
            echo ""
            
            # Count clean dockerfiles for summary
            CLEAN_COUNT=0
            echo "| Dockerfile | Security Impact | Build Status |"
            echo "|:-----------|:----------------|:-------------|"
            
            # Parse DOCKERFILE_BREAKDOWN to create clean output
            echo -e "$DOCKERFILE_BREAKDOWN" | while IFS='|' read -r _ dockerfile impact status _; do
              if [ -n "$dockerfile" ] && [ "$dockerfile" != " Dockerfile " ]; then
                # Clean up the values
                dockerfile=$(echo "$dockerfile" | xargs)
                impact=$(echo "$impact" | xargs)
                status=$(echo "$status" | xargs)
                
                # Format status with minimal icons
                case "$status" in
                  "PASSED") formatted_status="✅ Passed" ;;
                  "WARNING") formatted_status="⚠️ Warning" ;;
                  "FAILED") formatted_status="❌ Failed" ;;
                  *) formatted_status="$status" ;;
                esac
                
                # Format impact
                if [ "$impact" = "No vulnerabilities" ]; then
                  formatted_impact="No issues detected"
                elif [ "$impact" = "Error" ]; then
                  formatted_impact="Scan error"
                else
                  formatted_impact="$impact"
                fi
                
                echo "| **$dockerfile** | $formatted_impact | $formatted_status |"
              fi
            done
            
            echo ""
            
            # Results Summary Section
            echo "## Detailed Results"
            echo ""
            echo "<details>"
            echo "<summary>Click to view detailed scan results</summary>"
            echo ""
            echo "\`\`\`"
            echo -e "$SCAN_SUMMARY"
            echo "\`\`\`"
            echo ""
            echo "</details>"
            echo ""
            
            # Action Items Section
            if [ $FAILED_COUNT -gt 0 ]; then
              echo "## Action Required"
              echo ""
              echo "> **Warning:** One or more Dockerfiles are introducing security vulnerabilities."
              echo ""
              echo "### Next Steps:"
              echo "1. Download the detailed scan artifacts below"
              echo "2. Review the specific vulnerabilities introduced by each Dockerfile"
              echo "3. Update package versions or Dockerfile instructions"
              echo "4. Re-run the scan to verify fixes"
              echo ""
              echo "**Note:** Base image vulnerabilities shown above are informational only and don't affect build status."
              echo ""
            elif [ $PASSED_COUNT -eq $TOTAL_SCANNED ]; then
              echo "## All Clear"
              echo ""
              echo "> **Result:** All Dockerfiles are clean and introduce no additional security vulnerabilities."
              echo ""
              echo "While the base image contains some vulnerabilities (shown above for awareness), your Dockerfiles are not adding any new security risks."
              echo ""
            fi
            
            # Configuration Details
            echo "## Scan Configuration"
            echo ""
            echo "| Setting | Value |"
            echo "|:--------|:------|"
            echo "| **Security Scanner** | Snyk Container Security |"
            echo "| **Analysis Method** | Dockerfile + Base Image Context |"
            echo "| **Vulnerability Threshold** | All Severities |"
            echo "| **Image Building** | None (Static Analysis Only) |"
            echo "| **Pass/Fail Criteria** | Dockerfile Impact Only |"
            echo "| **Base Image Reporting** | Informational Only |"
            echo ""
            echo "---"
            echo "*Report generated on $(date -u '+%B %d, %Y at %H:%M UTC') • Powered by Snyk Security*"
          } >> $GITHUB_STEP_SUMMARY
          
          # Set outputs for subsequent steps
          {
            echo "overall_status=$OVERALL_STATUS"
            echo "scan_status=$SCAN_STATUS"
            echo "total_scanned=$TOTAL_SCANNED"
            echo "passed_count=$PASSED_COUNT"
            echo "failed_count=$FAILED_COUNT"
            echo "scan_errors=$SCAN_ERRORS"
            echo "summary<<EOF"
            echo -e "$SCAN_SUMMARY"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          
          # Final status
          log_section "FINAL SCAN RESULTS"
          echo "Overall Status: $OVERALL_STATUS"
          echo "Total Dockerfiles: $TOTAL_SCANNED"
          echo "Passed: $PASSED_COUNT"
          echo "Failed: $FAILED_COUNT"
          echo "Scan Errors: $SCAN_ERRORS"
          
          # Exit with appropriate code
          if [ "$OVERALL_STATUS" = "FAILED" ]; then
            echo ""
            echo "Workflow failed due to security issues or scan errors"
            exit 1
          fi

      - name: Upload Scan Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-scan-results-${{ github.run_number }}
          path: scan_results/
          retention-days: 30

      - name: Slack Notification
        if: always() && (steps.scan.outputs.overall_status != 'PASSED' || github.event.inputs.debug == 'true')
        continue-on-error: true
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: repo,workflow,ref
          custom_payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.scan.outputs.overall_status == 'FAILED' && 'danger' || steps.scan.outputs.overall_status == 'WARNING' && 'warning' || 'good' }}",
                  "title": "Dockerfile Security Scan Results",
                  "fields": [
                    {
                      "title": "Status",
                      "value": "${{ steps.scan.outputs.overall_status }}",
                      "short": true
                    },
                    {
                      "title": "Scanned",
                      "value": "${{ steps.scan.outputs.total_scanned }} Dockerfiles",
                      "short": true
                    },
                    {
                      "title": "Results",
                      "value": "${{ steps.scan.outputs.passed_count }} passed, ${{ steps.scan.outputs.failed_count }} failed",
                      "short": true
                    },
                    {
                      "title": "Repository",
                      "value": "${{ github.repository }}",
                      "short": true
                    }
                  ],
                  "text": "```\n${{ steps.scan.outputs.summary }}```",
                  "footer": "Snyk Dockerfile Security Scanner",
                  "footer_icon": "https://res.cloudinary.com/snyk/image/upload/v1537345894/press-kit/brand/logo-black.png",
                  "ts": ${{ github.event.head_commit.timestamp && 'new Date(github.event.head_commit.timestamp).getTime() / 1000' || 'Math.floor(Date.now() / 1000)' }}
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || '' }}