# .github/workflows/snyk-dockerfile-scan.yml
name: Snyk Dockerfile Scan

on:
  # For testing, let's make it manually triggerable
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'
  push:
    branches: [main]
    paths:
      - '**/Dockerfile*'
      - '.github/workflows/snyk-dockerfile-scan.yml'
  pull_request_target:
    types: [labeled]

jobs:
  snyk-dockerfile-diagnostic:
    runs-on: ubuntu-latest
    name: Snyk Dockerfile Diagnostic
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      # Step 2: Initialize the diagnostic report
      - name: Initialize Diagnostic Report
        run: |
          echo "# Snyk Dockerfile Diagnostic Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This report will help identify which part of the scanning process is causing issues." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

      # Step 3: Check if SNYK_TOKEN is available and valid
      - name: Verify SNYK_TOKEN
        run: |
          echo "## SNYK_TOKEN Check" >> "$GITHUB_STEP_SUMMARY"
          
          if [ -z "$SNYK_TOKEN" ]; then
            echo "❌ SNYK_TOKEN is not set. This is required for Snyk authentication." >> "$GITHUB_STEP_SUMMARY"
            echo "::error::SNYK_TOKEN is not set."
            exit 1
          else
            echo "✅ SNYK_TOKEN is set." >> "$GITHUB_STEP_SUMMARY"
          fi
          
          # Test token format (should be UUID)
          if [[ ! "$SNYK_TOKEN" =~ ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$ ]]; then
            echo "⚠️ SNYK_TOKEN format doesn't match expected UUID pattern. This might be an issue." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "✅ SNYK_TOKEN format looks correct." >> "$GITHUB_STEP_SUMMARY"
          fi
          
          echo "" >> "$GITHUB_STEP_SUMMARY"

      # Step 4: Install Snyk CLI for diagnostic purposes
      - name: Install Snyk CLI
        run: |
          echo "## Snyk CLI Installation" >> "$GITHUB_STEP_SUMMARY"
          
          # Install Snyk CLI globally
          npm install -g snyk
          
          # Verify installation
          SNYK_VERSION=$(snyk --version)
          if [ $? -eq 0 ]; then
            echo "✅ Snyk CLI installed successfully: $SNYK_VERSION" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Failed to install Snyk CLI" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          
          echo "" >> "$GITHUB_STEP_SUMMARY"

      # Step 5: Check available Dockerfiles
      - name: Check Dockerfiles
        run: |
          echo "## Dockerfile Check" >> "$GITHUB_STEP_SUMMARY"
          
          images=(
            "py311-cuda121-torch241"
            "py311-cuda124-torch251"
            "py311-rocm62-torch241"
            "py311-rocm62-torch251"
          )
          
          for img in "${images[@]}"; do
            df="images/runtime/training/$img/Dockerfile"
            if [[ -f "$df" ]]; then
              echo "✅ $img: Dockerfile exists" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "❌ $img: Dockerfile not found at $df" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          
          echo "" >> "$GITHUB_STEP_SUMMARY"

      # Step 6: Test Snyk authentication (non-interactive)
      - name: Test Snyk Authentication
        run: |
          echo "## Snyk Authentication Test" >> "$GITHUB_STEP_SUMMARY"
          
          # Try to authenticate with Snyk using token (without browser)
          echo "Testing non-interactive authentication..."
          SNYK_RESULT=$(SNYK_TOKEN=$SNYK_TOKEN snyk config get api 2>&1)
          
          if [[ "$SNYK_RESULT" == *"Unauthorized"* ]]; then
            echo "❌ Authentication failed: Token appears to be invalid or expired" >> "$GITHUB_STEP_SUMMARY"
          elif [[ $? -eq 0 ]]; then
            echo "✅ Authentication successful" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Authentication test inconclusive: $SNYK_RESULT" >> "$GITHUB_STEP_SUMMARY"
          fi
          
          echo "" >> "$GITHUB_STEP_SUMMARY"

      # Step 7: Test each scanning method on a single Dockerfile
      - name: Test Scanning Methods
        run: |
          echo "## Scanning Method Tests" >> "$GITHUB_STEP_SUMMARY"
          
          # Use the first Dockerfile for testing
          TEST_DF="images/runtime/training/py311-cuda121-torch241/Dockerfile"
          
          if [[ ! -f "$TEST_DF" ]]; then
            echo "❌ Test Dockerfile not found at $TEST_DF" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          
          echo "### Method 1: snyk docker test" >> "$GITHUB_STEP_SUMMARY"
          SNYK_TOKEN=$SNYK_TOKEN snyk docker test --file="$TEST_DF" || true
          echo "Exit code: $?" >> "$GITHUB_STEP_SUMMARY"
          
          echo "### Method 2: snyk dockerfile test" >> "$GITHUB_STEP_SUMMARY"
          SNYK_TOKEN=$SNYK_TOKEN snyk dockerfile test "$TEST_DF" || true
          echo "Exit code: $?" >> "$GITHUB_STEP_SUMMARY"
          
          echo "### Method 3: snyk iac test" >> "$GITHUB_STEP_SUMMARY"
          SNYK_TOKEN=$SNYK_TOKEN snyk iac test "$TEST_DF" || true
          echo "Exit code: $?" >> "$GITHUB_STEP_SUMMARY"
          
          echo "" >> "$GITHUB_STEP_SUMMARY"

      # Step 8: Test Snyk GitHub Action on a single Dockerfile
      - name: Test Snyk GitHub Action
        id: test_action
        uses: snyk/actions/docker@master
        continue-on-error: true
        with:
          dockerfile: images/runtime/training/py311-cuda121-torch241/Dockerfile
          command: test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Report Action Test Results
        run: |
          echo "## Snyk GitHub Action Test" >> "$GITHUB_STEP_SUMMARY"
          
          if [ "${{ steps.test_action.outcome }}" == "success" ]; then
            echo "✅ Snyk GitHub Action succeeded" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.test_action.outcome }}" == "failure" ]; then
            echo "⚠️ Snyk GitHub Action failed but this might be expected if vulnerabilities were found" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Snyk GitHub Action encountered an error" >> "$GITHUB_STEP_SUMMARY"
          fi
          
          echo "" >> "$GITHUB_STEP_SUMMARY"

      # Step 9: Check if base images are accessible
      - name: Check Base Image Accessibility
        run: |
          echo "## Base Image Accessibility" >> "$GITHUB_STEP_SUMMARY"
          
          images=(
            "py311-cuda121-torch241"
            "py311-cuda124-torch251"
            "py311-rocm62-torch241"
            "py311-rocm62-torch251"
          )
          
          for img in "${images[@]}"; do
            df="images/runtime/training/$img/Dockerfile"
            if [[ ! -f "$df" ]]; then
              echo "⚠️ $img: Dockerfile not found, skipping" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi
            
            # Extract base image
            FROM_LINE=$(grep -E "^FROM" "$df" | tail -1)
            BASE_IMG=$(echo "$FROM_LINE" | awk '{print $2}' | sed 's/AS.*//')
            
            echo "Testing accessibility of base image for $img: $BASE_IMG" >> "$GITHUB_STEP_SUMMARY"
            
            # Try to resolve variables in base image
            if [[ "$BASE_IMG" == *"\$"* ]]; then
              echo "Base image contains variables, attempting to resolve..." >> "$GITHUB_STEP_SUMMARY"
              
              # Extract and resolve variables (simple version)
              PY_VERSION=$(grep -E "ARG[[:space:]]+PYTHON_VERSION=" "$df" | tail -1 | cut -d'=' -f2 || echo "311")
              IMAGE_TAG=$(grep -E "ARG[[:space:]]+IMAGE_TAG=" "$df" | tail -1 | cut -d'=' -f2 || echo "latest")
              
              BASE_IMG_RESOLVED=${BASE_IMG//\$\{PYTHON_VERSION\}/$PY_VERSION}
              BASE_IMG_RESOLVED=${BASE_IMG_RESOLVED//\$\{IMAGE_TAG\}/$IMAGE_TAG}
              
              echo "Resolved base image: $BASE_IMG_RESOLVED" >> "$GITHUB_STEP_SUMMARY"
              BASE_IMG="$BASE_IMG_RESOLVED"
            fi
            
            # Test if Docker can access this image
            docker pull "$BASE_IMG" > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "✅ Base image accessible" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "❌ Failed to access base image. This might be why Snyk scans are failing." >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
      # Step 10: Summary of findings
      - name: Diagnostic Summary
        run: |
          echo "## Diagnostic Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "Based on the tests above, the most likely issues could be:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "1. **Authentication issues**: If the Snyk token is invalid or doesn't have the right permissions" >> "$GITHUB_STEP_SUMMARY"
          echo "2. **Base image accessibility**: If Snyk can't access the base images mentioned in the Dockerfiles" >> "$GITHUB_STEP_SUMMARY"
          echo "3. **Snyk service issues**: If the Snyk service is experiencing downtime or rate-limiting" >> "$GITHUB_STEP_SUMMARY"
          echo "4. **Command compatibility**: If the Snyk commands are not compatible with the Dockerfiles' format" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Check the results above to identify which aspect is causing problems." >> "$GITHUB_STEP_SUMMARY"