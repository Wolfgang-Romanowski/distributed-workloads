# Snyk Dockerfile Security Scan — **v4**
# -------------------------------------------------------------
#  • Runs automatically on any branch whose name contains "snyk" in forks
#    (push trigger) so you can iterate freely.
#  • Keeps nightly run & manual dispatch.
#  • Debug mode is ON for push events by default; can still be toggled in
#    workflow‑dispatch.
#  • Duplicate `schedule` and `workflow_dispatch` blocks removed.

name: Snyk Dockerfile Security Scan

on:
  # Test automatically on branches that include "snyk" in their name
  # when you push in your fork.
  push:
    branches:
      - "**snyk**"
    paths:
      - "images/runtime/training/*/Dockerfile"

  pull_request_target:
    types: [labeled]

  pull_request:
    paths:
      - "images/runtime/training/*/Dockerfile"

  schedule:
    - cron: "0 3 * * *"   # nightly at 03:00 UTC

  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug mode"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      target_dir:
        description: "Scan a single training sub-directory (optional)"
        required: false
        default: ""
        type: string

jobs:
  snyk-dockerfile-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest

    if: >-
      github.event_name != 'pull_request_target' ||
      github.event.label.name == 'safe-to-test' ||
      github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read
      security-events: write

    env:
      TZ: Europe/London

    steps:
      # ------------------------------ checkout ------------------------------
      - name: Checkout (standard events)
        if: github.event_name != 'pull_request_target'
        uses: actions/checkout@v4

      - name: Checkout PR code (pull_request_target)
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref:        ${{ github.event.pull_request.head.sha }}
          token:      ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------ Snyk CLI ------------------------------
      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Verify token & CLI
        id: cli-info
        run: |
          token_present=true
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "::warning::SNYK_TOKEN secret is missing – security scan will be skipped."
            token_present=false
          fi

          echo "cli_version=$(snyk --version)" >>"$GITHUB_OUTPUT"
          echo "token_present=$token_present"    >>"$GITHUB_OUTPUT"
          echo "Snyk CLI version: $(snyk --version)"

      # ------------------------------ scan ------------------------------
      - name: Scan Dockerfiles
        if: steps.cli-info.outputs.token_present == 'true'
        id: scan
        env:
          DEBUG_MODE: ${{ github.event_name == 'push' && 'true' || github.event_name == 'workflow_dispatch' && github.event.inputs.debug || 'false' }}
          TARGET_DIR: ${{ github.event.inputs.target_dir || '' }}
        run: |
          set -euo pipefail

          debug() { [ "${DEBUG_MODE}" = "true" ] && echo "[debug] $*" >&2; }

          extract_base_image() {
            local file="$1"; declare -A args=()
            while IFS= read -r line; do
              if [[ $line =~ ^ARG[[:space:]]+([^=[:space:]]+)=(.+)$ ]]; then
                args["${BASH_REMATCH[1]}"]="${BASH_REMATCH[2]//["'] }"
              fi
            done <"$file"
            local img=$(grep -m1 '^FROM' "$file" | awk '{print $2}')
            for k in "${!args[@]}"; do
              img="${img//\$\{$k\}/${args[$k]}}"; img="${img//\$$k/${args[$k]}}"
            done
            echo "$img"
          }

          TRAINING_DIR="images/runtime/training"
          if [ -n "${TARGET_DIR}" ]; then
            DOCKER_DIRS=("$TARGET_DIR")
          else
            mapfile -t DOCKER_DIRS < <(find "$TRAINING_DIR" -maxdepth 1 -mindepth 1 -type d -printf '%f\n' | sort)
          fi

          mkdir -p scan_results processed_dockerfiles
          OVERALL_PASS=true; HIGH_OR_CRIT_COUNT=0

          for dir in "${DOCKER_DIRS[@]}"; do
            dockerfile="$TRAINING_DIR/$dir/Dockerfile"
            [ ! -f "$dockerfile" ] && echo "::warning::$dir – Dockerfile not found, skipped" && continue

            base_img=$(extract_base_image "$dockerfile"); debug "$dir base => $base_img"
            processed="processed_dockerfiles/${dir}_Dockerfile"
            { echo "FROM $base_img"; grep -vE '^[[:space:]]*(FROM|ARG)[[:space:]]' "$dockerfile"; } >"$processed"

            out_json="scan_results/${dir}.json"
            snyk container test --file="$processed" --json --severity-threshold=medium >"$out_json" || true; ec=$?

            if [ $ec -ge 2 ]; then echo "❌ $dir – Snyk error ($ec)"; OVERALL_PASS=false; continue; fi
            [ $ec -eq 1 ] && echo "⚠️  $dir – vulnerabilities detected" && OVERALL_PASS=false || echo "✅ $dir – clean"

            hc=$(jq '[.vulnerabilities[] | select(.severity=="high" or .severity=="critical")] | length' "$out_json"); [ "$hc" -gt 0 ] && HIGH_OR_CRIT_COUNT=$((HIGH_OR_CRIT_COUNT+hc))
          done

          echo "overall_pass=$OVERALL_PASS" >>"$GITHUB_OUTPUT"
          echo "high_or_crit=$HIGH_OR_CRIT_COUNT" >>"$GITHUB_OUTPUT"

      # ------------------------------ Slack ------------------------------
      - name: Slack Notification
        if: >-
          always() && (
            steps.cli-info.outputs.token_present == 'false' ||
            steps.scan.outputs.overall_pass == 'false' ||
            job.status == 'failure')
        uses: 8398a7/action-slack@v3
        continue-on-error: true
        with:
          status: custom
          fields: repo,workflow
          custom_payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.cli-info.outputs.token_present == 'false' && 'warning' || steps.scan.outputs.overall_pass == 'true' && 'good' || steps.scan.outputs.high_or_crit != '0' && 'danger' || 'warning' }}",
                  "title": "Dockerfile security scan results",
                  "text": "${{ steps.cli-info.outputs.token_present == 'false' && '⚠️ SNYK_TOKEN is missing – scan skipped' || steps.scan.outputs.overall_pass == 'true' && '✅ All clear' || steps.scan.outputs.high_or_crit != '0' && '🚨 High/Critical vulnerabilities found' || '⚠️ Vulnerabilities detected' }} | Run: ${{ github.run_id }}",
                  "footer": "Snyk CLI ${{ steps.cli-info.outputs.cli_version }} – $(date '+%d-%m-%Y %H:%M %Z')"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
