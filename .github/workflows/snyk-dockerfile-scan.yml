# Snyk scan for training‑runtime Dockerfiles
# push to main, nightly 03:00 UTC, fork PRs after label `security-scan`
# Fails on High/Critical CVEs

name: Snyk Dockerfile Scan

on:
  push:
    branches: ["main"]
    paths:
      - '**/Dockerfile*'
      - '.github/workflows/snyk-dockerfile-scan.yml'
  schedule:
    - cron: "0 3 * * *"
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, labeled]
    paths:
      - '**/Dockerfile*'

jobs:
  snyk-container-scan:
    if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'security-scan') }}
    runs-on: ubuntu-latest
    concurrency:
      group: snyk-container-scan
      cancel-in-progress: true

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Free up disk space
        run: |
          # Remove unnecessary large packages
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          
          # Display available disk space
          echo "Available disk space before scan:"
          df -h

      - name: Find Dockerfiles
        id: find-dockerfiles
        run: |
          set -eu
          
          echo "Finding Dockerfiles for analysis..."
          
          # Find all Dockerfiles but exclude examples and tests
          mapfile -t ALL_DOCKERFILES < <(find . -type f -iname "Dockerfile*" -not -path "*/.*" -not -path "*/examples/*" -not -path "*/tests/*" | sort)
          
          # If too many dockerfiles, only analyze a subset
          MAX_FILES=15
          if [ ${#ALL_DOCKERFILES[@]} -gt $MAX_FILES ]; then
            echo "Found ${#ALL_DOCKERFILES[@]} Dockerfiles, limiting analysis to $MAX_FILES files"
            # Take a representative sample - first few, last few, and some from the middle
            DOCKERFILES=("${ALL_DOCKERFILES[@]:0:5}" "${ALL_DOCKERFILES[@]:$((${#ALL_DOCKERFILES[@]}/2-2)):5}" "${ALL_DOCKERFILES[@]:$((${#ALL_DOCKERFILES[@]}-5)):5}")
          else
            DOCKERFILES=("${ALL_DOCKERFILES[@]}")
          fi
          
          # Check if any Dockerfiles were found
          if [ ${#DOCKERFILES[@]} -eq 0 ]; then
            echo "No Dockerfiles found."
            exit 0
          fi
          
          echo "Will analyze ${#DOCKERFILES[@]} Dockerfiles"
          
          # Create multiline output with proper escaping for each Dockerfile
          {
            echo "dockerfile_count=${#DOCKERFILES[@]}"
            
            # Store Dockerfiles as individual outputs
            for i in "${!DOCKERFILES[@]}"; do
              # Properly escape the path for use in GITHUB_OUTPUT
              ESCAPED_PATH="${DOCKERFILES[$i]//\\/\\\\}"
              ESCAPED_PATH="${ESCAPED_PATH//,/\\,}"
              echo "dockerfile_${i}=${ESCAPED_PATH}"
            done
          } >> "$GITHUB_OUTPUT"

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Authenticate with Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # Only attempt to authenticate if token is provided
          if [ -z "$SNYK_TOKEN" ]; then
            echo "::warning::SNYK_TOKEN not provided. Running in standalone mode."
          else
            echo "Authenticating with Snyk..."
            snyk auth "$SNYK_TOKEN"
          fi

      - name: Scan Dockerfiles with Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          DOCKERFILE_COUNT: ${{ steps.find-dockerfiles.outputs.dockerfile_count }}
        run: |
          set -eu
          
          echo "Starting Dockerfile security scan..."
          
          # No Dockerfiles to analyze
          if [ -z "${DOCKERFILE_COUNT:-}" ] || [ "${DOCKERFILE_COUNT:-0}" -eq 0 ]; then
            echo "No Dockerfiles to analyze."
            echo "SUMMARY=No Dockerfiles to analyze." >> $GITHUB_ENV
            exit 0
          fi
          
          # Collect Dockerfile paths from output variables
          DOCKERFILES=()
          for i in $(seq 0 $((DOCKERFILE_COUNT - 1))); do
            VAR_NAME="dockerfile_$i"
            DOCKERFILE_PATH=$(eval echo "\${steps.find-dockerfiles.outputs.$VAR_NAME}")
            DOCKERFILES+=("$DOCKERFILE_PATH")
          done
          
          # Initialize summary variables
          SUMMARY=""
          SUMMARY_TABLE=""
          TOTAL_CRITICAL=0
          TOTAL_HIGH=0
          TOTAL_MEDIUM=0
          TOTAL_LOW=0
          SCAN_FAILURE=0
          ISSUES_COUNT=0
          CURRENT_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          TRIGGER_EVENT="${{ github.event_name }}"
          
          # Create structured table headers
          SUMMARY_TABLE="| Dockerfile | Base Image | Status | Issues |\n"
          SUMMARY_TABLE+="|------------|------------|--------|--------|\n"

          # Check if Snyk token is available
          if [ -z "$SNYK_TOKEN" ]; then
            echo "::warning::SNYK_TOKEN not provided. Performing static analysis only."
            
            # Fallback to static analysis
            for FILE in "${DOCKERFILES[@]}"; do
              echo "Statically analyzing $FILE..."
              
              # Extract base image
              FINAL_FROM=$(grep -Ei '^FROM ' "${FILE}" | tail -1 || echo "FROM scratch")
              BASE_IMAGE_NAME=$(echo "$FINAL_FROM" | sed -E 's/^FROM[[:space:]]+//I' | cut -d' ' -f1)
              
              # Check for basic security issues
              ISSUES=0
              HIGH_ISSUES=0
              
              # Check for latest tag (HIGH)
              if [[ "$BASE_IMAGE_NAME" == *":latest"* ]]; then
                ISSUES=$((ISSUES + 1))
                HIGH_ISSUES=$((HIGH_ISSUES + 1))
              fi
              
              # Check for running as root (HIGH)
              if ! grep -q "USER " "$FILE" || grep -q "USER root" "$FILE" || grep -q "USER 0" "$FILE"; then
                ISSUES=$((ISSUES + 1))
                HIGH_ISSUES=$((HIGH_ISSUES + 1))
              fi
              
              # Determine status based on issues
              if [ "$HIGH_ISSUES" -gt 0 ]; then
                STATUS="🔴 High Risk"
                ISSUES_COUNT=$((ISSUES_COUNT + 1))
                TOTAL_HIGH=$((TOTAL_HIGH + HIGH_ISSUES))
              elif [ "$ISSUES" -gt 0 ]; then
                STATUS="🟡 Low Risk"
                ISSUES_COUNT=$((ISSUES_COUNT + 1))
              else
                STATUS="🟢 Secure"
              fi
              
              SUMMARY_TABLE+="| $FILE | $BASE_IMAGE_NAME | $STATUS | $ISSUES |\n"
            done
            
            echo "Static analysis completed."
          else
            # Test if Snyk works by scanning a small image
            echo "Testing Snyk with a simple image..."
            if ! snyk container test alpine:3.14 --json > /dev/null 2>&1; then
              echo "::warning::Snyk test failed. Falling back to static analysis."
              
              # Same static analysis as above
              for FILE in "${DOCKERFILES[@]}"; do
                echo "Statically analyzing $FILE..."
                
                # Extract base image
                FINAL_FROM=$(grep -Ei '^FROM ' "${FILE}" | tail -1 || echo "FROM scratch")
                BASE_IMAGE_NAME=$(echo "$FINAL_FROM" | sed -E 's/^FROM[[:space:]]+//I' | cut -d' ' -f1)
                
                # Simple scan for critical issues
                ISSUES=0
                HIGH_ISSUES=0
                
                if [[ "$BASE_IMAGE_NAME" == *":latest"* ]]; then
                  ISSUES=$((ISSUES + 1))
                  HIGH_ISSUES=$((HIGH_ISSUES + 1))
                fi
                
                if ! grep -q "USER " "$FILE" || grep -q "USER root" "$FILE" || grep -q "USER 0" "$FILE"; then
                  ISSUES=$((ISSUES + 1))
                  HIGH_ISSUES=$((HIGH_ISSUES + 1))
                fi
                
                if [ "$HIGH_ISSUES" -gt 0 ]; then
                  STATUS="🔴 High Risk"
                  ISSUES_COUNT=$((ISSUES_COUNT + 1))
                  TOTAL_HIGH=$((TOTAL_HIGH + HIGH_ISSUES))
                elif [ "$ISSUES" -gt 0 ]; then
                  STATUS="🟡 Low Risk"
                  ISSUES_COUNT=$((ISSUES_COUNT + 1))
                else
                  STATUS="🟢 Secure"
                fi
                
                SUMMARY_TABLE+="| $FILE | $BASE_IMAGE_NAME | $STATUS | $ISSUES |\n"
              done
            else
              echo "Snyk is working properly. Proceeding with base image analysis."
              
              # Scan each Dockerfile's base image
              for FILE in "${DOCKERFILES[@]}"; do
                echo "Analyzing $FILE..."
                
                # Extract base image
                FINAL_FROM=$(grep -Ei '^FROM ' "${FILE}" | tail -1 || echo "FROM scratch")
                BASE_IMAGE_NAME=$(echo "$FINAL_FROM" | sed -E 's/^FROM[[:space:]]+//I' | cut -d' ' -f1)
                
                # Skip scratch images or templates
                if [[ "$BASE_IMAGE_NAME" == "scratch" ]]; then
                  echo "Skipping scratch-based image"
                  SUMMARY_TABLE+="| $FILE | scratch | ⚪ Skipped | 0 |\n"
                  continue
                fi
                
                # Handle ARGs in FROM statements
                if [[ "$BASE_IMAGE_NAME" == *'$'* || "$BASE_IMAGE_NAME" == *'{{'* ]]; then
                  echo "Using fallback image for template"
                  BASE_IMAGE_NAME="alpine:3.14"
                fi
                
                echo "Scanning base image: $BASE_IMAGE_NAME"
                
                # Scan with retry logic
                MAX_RETRIES=2
                for ((RETRY=0; RETRY<=MAX_RETRIES; RETRY++)); do
                  if [ "$RETRY" -gt 0 ]; then
                    echo "Retry $RETRY/$MAX_RETRIES..."
                  fi
                  
                  if snyk container test "$BASE_IMAGE_NAME" --json > "snyk-result.json" 2> "snyk-error.log"; then
                    # Parse results
                    CRIT=$(jq -r '.vulnerabilities | map(select(.severity=="critical")) | length // 0' snyk-result.json)
                    HIGH=$(jq -r '.vulnerabilities | map(select(.severity=="high")) | length // 0' snyk-result.json)
                    MED=$(jq -r '.vulnerabilities | map(select(.severity=="medium")) | length // 0' snyk-result.json)
                    LOW=$(jq -r '.vulnerabilities | map(select(.severity=="low")) | length // 0' snyk-result.json)
                    
                    if [ "$CRIT" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
                      STATUS="🔴 Vulnerable"
                      ISSUES_COUNT=$((ISSUES_COUNT + 1))
                    elif [ "$MED" -gt 0 ] || [ "$LOW" -gt 0 ]; then
                      STATUS="🟡 Low Risk"
                      ISSUES_COUNT=$((ISSUES_COUNT + 1))
                    else
                      STATUS="🟢 Secure"
                    fi
                    
                    SUMMARY_TABLE+="| $FILE | $BASE_IMAGE_NAME | $STATUS | $HIGH high, $CRIT critical |\n"
                    
                    TOTAL_CRITICAL=$((TOTAL_CRITICAL + CRIT))
                    TOTAL_HIGH=$((TOTAL_HIGH + HIGH))
                    TOTAL_MEDIUM=$((TOTAL_MEDIUM + MED))
                    TOTAL_LOW=$((TOTAL_LOW + LOW))
                    
                    break
                  elif [ "$RETRY" -eq "$MAX_RETRIES" ]; then
                    echo "::warning::Failed to scan $BASE_IMAGE_NAME after $MAX_RETRIES retries"
                    ERROR_MSG=$(head -n1 snyk-error.log || echo "Unknown error")
                    SUMMARY_TABLE+="| $FILE | $BASE_IMAGE_NAME | ❓ Scan Failed | 0 |\n"
                    SCAN_FAILURE=$((SCAN_FAILURE + 1))
                  fi
                done
                
                # Remove temp files
                rm -f snyk-result.json snyk-error.log
              done
            fi
          fi

          # Create report
          REPORT="# Dockerfile Security Analysis Results\n\n"
          
          # Executive summary
          REPORT+="## Executive Overview\n\n"
          REPORT+="* **Dockerfiles Analyzed:** ${#DOCKERFILES[@]}\n"
          REPORT+="* **Dockerfiles with Issues:** $ISSUES_COUNT\n"
          REPORT+="* **Total Vulnerabilities:** $TOTAL_HIGH high, $TOTAL_CRITICAL critical\n"
          if [ "$SCAN_FAILURE" -gt 0 ]; then
            REPORT+="* **Scans Failed:** $SCAN_FAILURE\n"
          fi
          REPORT+="* **Analysis Date:** $CURRENT_DATE\n"
          REPORT+="* **Triggered by:** $TRIGGER_EVENT\n\n"
          
          # Results table
          REPORT+="## Results\n\n"
          REPORT+="$SUMMARY_TABLE\n"
          
          # Recommendations
          REPORT+="## Security Recommendations\n\n"
          
          if [ "$SCAN_FAILURE" -eq "${#DOCKERFILES[@]}" ]; then
            REPORT+="⚠️ **All scans failed to complete.** Please check Snyk configuration.\n\n"
          elif [ "$TOTAL_CRITICAL" -gt 0 ] || [ "$TOTAL_HIGH" -gt 0 ]; then
            REPORT+="⚠️ **Critical security issues detected.** Immediate attention required.\n\n"
            REPORT+="* Update base images to newer versions with security patches\n"
            REPORT+="* Avoid using 'latest' tags in Dockerfiles\n"
            REPORT+="* Use non-root users in containers\n"
          elif [ "$SCAN_FAILURE" -gt 0 ]; then
            REPORT+="⚠️ **Some scans failed to complete.** Review the logs for more information.\n\n"
          elif [ "$TOTAL_MEDIUM" -gt 0 ] || [ "$TOTAL_LOW" -gt 0 ]; then
            REPORT+="ℹ️ **Low severity issues found.** Consider addressing in future updates.\n\n"
          else
            REPORT+="✅ **No security issues detected.** Continue with good security practices.\n\n"
          fi
          
          REPORT+="\n_Scan completed at $(date -u)_\n"

          # Set output variables
          echo "SUMMARY<<EOF" >> $GITHUB_ENV
          echo "$REPORT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "ISSUES_COUNT=${ISSUES_COUNT}" >> $GITHUB_ENV
          echo "TOTAL_CRITICAL=${TOTAL_CRITICAL}" >> $GITHUB_ENV
          echo "TOTAL_HIGH=${TOTAL_HIGH}" >> $GITHUB_ENV
          echo "SCAN_FAILURE=${SCAN_FAILURE}" >> $GITHUB_ENV
          echo "ALL_FAILED=$([[ "$SCAN_FAILURE" -eq "${#DOCKERFILES[@]}" ]] && echo "true" || echo "false")" >> $GITHUB_ENV

      - name: Create Summary
        run: |
          echo "${{ env.SUMMARY }}" >> $GITHUB_STEP_SUMMARY

      - name: Add PR Comment
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const summary = process.env.SUMMARY;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

      - name: Slack Notification
        if: ${{ always() && env.SLACK_WEBHOOK_URL != '' }}
        env:
          SUMMARY: ${{ env.SUMMARY }}
          ISSUES_COUNT: ${{ env.ISSUES_COUNT || 0 }}
          TOTAL_CRITICAL: ${{ env.TOTAL_CRITICAL || 0 }}
          TOTAL_HIGH: ${{ env.TOTAL_HIGH || 0 }}
          SCAN_FAILURE: ${{ env.SCAN_FAILURE || 0 }}
          ALL_FAILED: ${{ env.ALL_FAILED || 'false' }}
        run: |
          if [ "$ALL_FAILED" = "true" ]; then
            STATUS="🔄 *Dockerfile Security Scan - All Scans Failed*"
            MESSAGE="All Dockerfile scans failed. This may indicate an issue with Snyk configuration or service availability."
          elif [ "$TOTAL_CRITICAL" -gt 0 ] || [ "$TOTAL_HIGH" -gt 0 ]; then
            STATUS="🚨 *Dockerfile Security Scan - Critical Vulnerabilities Detected*"
            MESSAGE="Critical or high severity vulnerabilities detected in base images."
          elif [ "$SCAN_FAILURE" -gt 0 ]; then
            STATUS="⚠️ *Dockerfile Security Scan - Completed with Some Errors*"
            MESSAGE="Some scans failed to complete. Review the logs for more information."
          else
            STATUS="✅ *Dockerfile Security Scan - Completed Successfully*"
            MESSAGE="No critical or high severity vulnerabilities detected."
          fi

          PAYLOAD="{\"text\":\"${STATUS}\n${MESSAGE}\n\`\`\`\n${SUMMARY}\n\`\`\`\"}"
          curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      - name: Check for critical vulnerabilities
        if: ${{ github.event_name == 'pull_request' && env.ALL_FAILED != 'true' && (env.TOTAL_CRITICAL > 0 || env.TOTAL_HIGH > 0) }}
        run: |
          echo "Critical or high severity vulnerabilities detected in base images."
          echo "Please review the security scan results and update the base images."
          exit 1