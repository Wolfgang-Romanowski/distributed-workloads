# Snyk scan for training‑runtime Dockerfiles
# push to main, nightly 03:00 UTC, fork PRs after label `run‑snyk`
# Fails on High/Critical CVEs

name: Snyk Dockerfile Scan

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 3 * * *"
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, labeled]

jobs:
  snyk-container-scan:
    if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-snyk') }}
    runs-on: ubuntu-latest
    concurrency:
      group: snyk-container-scan
      cancel-in-progress: true

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Free up disk space
        run: |
          # Remove unnecessary large packages
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          
          # Display available disk space
          echo "Available disk space before scan:"
          df -h

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Scan Dockerfiles with Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set -eu
          
          # Verify Snyk token is set
          if [ -z "$SNYK_TOKEN" ]; then
            echo "::error::SNYK_TOKEN is not set. Please add it to your repository secrets."
            exit 1
          fi
          
          # Test authentication directly
          echo "Testing Snyk authentication..."
          if ! snyk auth "$SNYK_TOKEN"; then
            echo "::error::Failed to authenticate with Snyk. Please verify your SNYK_TOKEN is correct."
            exit 1
          fi

      - name: Static Analysis of Dockerfiles
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set -eu
          
          echo "Starting Dockerfile security static analysis..."

          # Find all Dockerfiles but exclude examples and tests
          mapfile -t ALL_DOCKERFILES < <(find . -type f -iname "Dockerfile*" -not -path "*/.*" -not -path "*/examples/*" -not -path "*/tests/*" | sort)
          
          # If too many dockerfiles, only analyze a subset
          MAX_FILES=15
          if [ ${#ALL_DOCKERFILES[@]} -gt $MAX_FILES ]; then
            echo "Found ${#ALL_DOCKERFILES[@]} Dockerfiles, limiting analysis to $MAX_FILES files"
            # Take a representative sample - first few, last few, and some from the middle
            DOCKERFILES=("${ALL_DOCKERFILES[@]:0:5}" "${ALL_DOCKERFILES[@]:$((${#ALL_DOCKERFILES[@]}/2-2)):5}" "${ALL_DOCKERFILES[@]:$((${#ALL_DOCKERFILES[@]}-5)):5}")
          else
            DOCKERFILES=("${ALL_DOCKERFILES[@]}")
          fi
          
          [ ${#DOCKERFILES[@]} -eq 0 ] && { echo "No Dockerfiles found."; exit 0; }
          echo "Will analyze ${#DOCKERFILES[@]} Dockerfiles"

          SUMMARY=""
          SUMMARY_TABLE=""
          ISSUES_COUNT=0
          CURRENT_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          TRIGGER_EVENT="${{ github.event_name }}"

          # Analyze each Dockerfile
          for FILE in "${DOCKERFILES[@]}"; do
            echo "Analyzing $FILE..."
            
            # Extract base image
            FINAL_FROM=$(grep -Ei '^FROM ' "${FILE}" | tail -1 || echo "FROM scratch")
            BASE_IMAGE_NAME=$(echo "$FINAL_FROM" | sed -E 's/^FROM[[:space:]]+//I' | cut -d' ' -f1)
            
            # Check for best practices
            ISSUES=""
            ISSUE_COUNT=0
            
            # Check if using latest tag
            if [[ "$BASE_IMAGE_NAME" == *":latest"* ]]; then
              ISSUES+="- Using 'latest' tag (use specific version instead)\n"
              ISSUE_COUNT=$((ISSUE_COUNT + 1))
            fi
            
            # Check if using scratch
            if [[ "$BASE_IMAGE_NAME" == "scratch" ]]; then
              ISSUES+="- Using 'scratch' base (no security updates)\n"
              ISSUE_COUNT=$((ISSUE_COUNT + 1))
            fi
            
            # Check for sudo usage
            if grep -q "sudo " "$FILE"; then
              ISSUES+="- Using 'sudo' in Dockerfile (avoid if possible)\n"
              ISSUE_COUNT=$((ISSUE_COUNT + 1))
            fi
            
            # Check for curl | bash pattern
            if grep -q "curl.*|.*sh" "$FILE" || grep -q "wget.*|.*sh" "$FILE"; then
              ISSUES+="- Using 'curl | bash' pattern (security risk)\n"
              ISSUE_COUNT=$((ISSUE_COUNT + 1))
            fi
            
            # Check for apt-get update and install in separate lines
            if grep -q "apt-get update" "$FILE" && grep -q "apt-get install" "$FILE" && ! grep -q "apt-get update.*&&.*apt-get install" "$FILE"; then
              ISSUES+="- 'apt-get update' and 'install' on separate lines (should be combined)\n"
              ISSUE_COUNT=$((ISSUE_COUNT + 1))
            fi
            
            # Check for missing cleanup after package installation
            if (grep -q "apt-get install" "$FILE" || grep -q "yum install" "$FILE" || grep -q "dnf install" "$FILE") && ! grep -q "rm -rf /var/lib/apt/lists/\*" "$FILE" && ! grep -q "dnf clean all" "$FILE" && ! grep -q "yum clean all" "$FILE"; then
              ISSUES+="- Missing cleanup after package installation\n"
              ISSUE_COUNT=$((ISSUE_COUNT + 1))
            fi
            
            # Check for exposed ports
            if grep -q "EXPOSE " "$FILE"; then
              ISSUES+="- Exposing ports (review if necessary)\n"
              ISSUE_COUNT=$((ISSUE_COUNT + 1))
            fi
            
            # Check for running as root
            if ! grep -q "USER " "$FILE" || grep -q "USER root" "$FILE" || grep -q "USER 0" "$FILE"; then
              ISSUES+="- May be running as root (add non-root user)\n"
              ISSUE_COUNT=$((ISSUE_COUNT + 1))
            fi
            
            # Determine status based on issue count
            if [ "$ISSUE_COUNT" -gt 3 ]; then
              STATUS="🔴 High Risk"
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
            elif [ "$ISSUE_COUNT" -gt 0 ]; then
              STATUS="🟡 Low Risk"
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
            else
              STATUS="🟢 Secure"
            fi
            
            SUMMARY="$SUMMARY- $FILE: $ISSUE_COUNT issues found (base: $BASE_IMAGE_NAME)\n$ISSUES\n"
            SUMMARY_TABLE="$SUMMARY_TABLE| $FILE | $STATUS | $ISSUE_COUNT issues |\n"
          done

          REPORT="# Dockerfile Security Analysis Results\n\n"
          REPORT+="## Executive Overview\n\n"
          REPORT+="* Dockerfiles Analyzed: ${#DOCKERFILES[@]}\n"
          REPORT+="* Dockerfiles with Security Issues: $ISSUES_COUNT\n"
          REPORT+="* Analysis Date: $CURRENT_DATE\n"
          REPORT+="* Triggered by: $TRIGGER_EVENT\n\n"
          
          REPORT+="## Results by Dockerfile\n\n"
          REPORT+="| Dockerfile | Status | Issues |\n"
          REPORT+="|------------|--------|--------|\n"
          REPORT+="$SUMMARY_TABLE\n"
          
          REPORT+="## Detailed Findings\n\n"
          REPORT+="$SUMMARY\n"
          
          REPORT+="## Security Recommendations\n\n"
          
          if [ "$ISSUES_COUNT" -gt 0 ]; then
            REPORT+="⚠️ **Security issues detected.** Consider addressing the following:\n\n"
            REPORT+="* Use specific version tags instead of 'latest'\n"
            REPORT+="* Avoid running containers as root\n"
            REPORT+="* Clean up package manager caches after installation\n"
            REPORT+="* Combine RUN commands to reduce layer count\n"
            REPORT+="* Avoid using 'curl | bash' patterns\n"
          else
            REPORT+="✅ **No security issues detected.** Continue with good security practices.\n\n"
            REPORT+="* Maintain regular scanning schedule\n"
            REPORT+="* Keep base images updated\n"
          fi
          
          REPORT+="\n_Job summary generated at run-time_\n"

          echo "SUMMARY<<EOF" >> $GITHUB_ENV
          echo "$REPORT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "ISSUES_COUNT=${ISSUES_COUNT}" >> $GITHUB_ENV

      - name: Create Summary
        run: |
          echo "${{ env.SUMMARY }}" >> $GITHUB_STEP_SUMMARY

      - name: Slack Notification
        if: ${{ always() && env.SLACK_WEBHOOK_URL != '' }}
        env:
          SUMMARY: ${{ env.SUMMARY }}
          ISSUES_COUNT: ${{ env.ISSUES_COUNT }}
        run: |
          if [ "$ISSUES_COUNT" -gt 5 ]; then
            STATUS="🚨 *Dockerfile Security Scan - Multiple Issues Detected*"
            MESSAGE="Multiple security issues detected in Dockerfiles."
          elif [ "$ISSUES_COUNT" -gt 0 ]; then
            STATUS="⚠️ *Dockerfile Security Scan - Minor Issues Detected*"
            MESSAGE="Some minor security issues detected in Dockerfiles."
          else
            STATUS="✅ *Dockerfile Security Scan - Completed Successfully*"
            MESSAGE="No security issues detected in Dockerfiles."
          fi

          PAYLOAD="{\"text\":\"${STATUS}\n${MESSAGE}\n\`\`\`\n${SUMMARY}\n\`\`\`\"}"
          curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      - name: Check for critical issues
        if: ${{ github.event_name == 'pull_request' && env.ISSUES_COUNT > 5 }}
        run: |
          echo "Multiple security issues detected in Dockerfiles."
          echo "Please review the security scan results and address the issues."
          exit 1
