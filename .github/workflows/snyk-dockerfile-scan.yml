# .github/workflows/snyk-dockerfile-scan.yml
name: Snyk Dockerfile Scan

on:
  schedule:
    - cron: '0 3 * * *'          # nightly 03:00 UTC
  push:
    branches: [main]             # run on every push to main
    paths:
      - '**/Dockerfile*'
      - '.github/workflows/snyk-dockerfile-scan.yml'
  pull_request_target:           # fork PRs when maintainer adds label
    types: [labeled]

jobs:
  snyk-dockerfile-scan:
    runs-on: ubuntu-latest
    name: Snyk Dockerfile Scan

    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request_target' && github.event.label.name == 'run-snyk-scan')

    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      PY_DEF:     '3.11'   # default for ${PYTHON_VERSION}
      TAG_DEF:    'latest' # default for ${IMAGE_TAG}

    steps:
      # checkout the correct ref (handles both push and PR runs)
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Scan Dockerfiles with Snyk
        shell: bash
        run: |
          set +e   # collect all results

          images=(
            "py311-cuda121-torch241"
            "py311-cuda124-torch251"
            "py311-rocm62-torch241"
            "py311-rocm62-torch251"
          )

          echo "| Image | Mode | Status | Vulnerabilities |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ----- | ---- | ------ | --------------- |" >> "$GITHUB_STEP_SUMMARY"

          for img in "${images[@]}"; do
            df="images/runtime/training/$img/Dockerfile"
            if [[ ! -f "$df" ]]; then
              echo "| $img | - | missing | - |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            # Resolve template variables
            PY=$PY_DEF; TAG=$TAG_DEF
            arg_py=$(grep -E '^ARG[[:space:]]+PYTHON_VERSION=' "$df" | tail -1 | cut -d'=' -f2)
            arg_tag=$(grep -E '^ARG[[:space:]]+IMAGE_TAG='     "$df" | tail -1 | cut -d'=' -f2)
            [[ $arg_py  ]] && PY=$arg_py
            [[ $arg_tag ]] && TAG=$arg_tag

            base=$(grep -Ei '^FROM ' "$df" | tail -1 | awk '{print $2}')
            base=${base//\$\{PYTHON_VERSION\}/$PY}
            base=${base//\$\{IMAGE_TAG\}/$TAG}

            # Try container test mode first
            mode="container"
            echo "Scanning $img as container with base image: $base"
            output=$(snyk container test --remote "$base" --file="$df" 2>&1)
            rc=$?

            # If container scan bombs (rc >=2), fall back to IaC scan
            if [[ $rc -ge 2 ]]; then
              mode="iac"
              echo "Falling back to IaC scanning for $img"
              output=$(snyk iac test "$df" --severity-threshold=high 2>&1)
              rc=$?
            fi

            # Analyze results
            if   [[ $rc -eq 0 ]]; then 
              status="✅ passed"
              vulns="0"
            elif [[ $rc -eq 1 ]]; then 
              status="❌ failed"
              # Try to extract vulnerability count
              count=$(echo "$output" | grep -o '[0-9]* vulnerable' | head -1 | cut -d' ' -f1)
              if [[ $count ]]; then
                vulns="$count"
              else
                vulns="1+"
              fi
            else
              status="⚠️ error"
              vulns="-"
            fi

            echo "| $img | $mode | $status | $vulns |" >> "$GITHUB_STEP_SUMMARY"
            
            # Save detailed output to file for debugging
            echo "### Output for $img ($mode):" > "/tmp/${img}_output.txt"
            echo "$output" >> "/tmp/${img}_output.txt"
            
            # Print status to console
            if [[ $rc -ne 0 ]]; then
              echo "↳ $img via $mode ended with status '$status' (exit $rc)"
            fi
          done

          exit 0  # never fail workflow; purely informational

      - name: Finish summary
        run: |
          echo "**Snyk Dockerfile scan complete – see table above.**" >> "$GITHUB_STEP_SUMMARY"
          echo "Note: This workflow is in reporting mode only and will not fail PR checks." >> "$GITHUB_STEP_SUMMARY"