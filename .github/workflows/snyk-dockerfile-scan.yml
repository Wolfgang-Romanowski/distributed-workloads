name: Snyk Dockerfile Security Scan
on:
  push:
    branches: [ main ]
    paths:
      - 'images/runtime/training/*/Dockerfile'
  pull_request_target:
    types: [ labeled ]
  pull_request:
    paths:
      - 'images/runtime/training/*/Dockerfile'
  schedule:
    - cron: '0 3 * * *'  # Run nightly at 3:00 UTC as discussed in Slack
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      target_dir:
        description: 'Specific directory within training to scan (leave empty for all)'
        required: false
        default: ''
        type: string

jobs:
  snyk-dockerfile-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    # Only run PR scans if they have the appropriate label or are from the same repo
    # This addresses the security concern mentioned in Slack
    if: >
      github.event_name != 'pull_request_target' || 
      github.event.label.name == 'safe-to-test' || 
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          # For pull_request_target, checkout the PR code
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.ref || '' }}
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || '' }}

      - name: Setup Snyk
        uses: snyk/actions/setup@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Verify Snyk Token
        id: verify_token
        run: |
          # Check if SNYK_TOKEN is set
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "::error::SNYK_TOKEN is not set. Please add the SNYK_TOKEN secret to your repository."
            echo "token_present=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "::notice::SNYK_TOKEN is set."
            echo "token_present=true" >> $GITHUB_OUTPUT
          fi

      - name: Get Snyk Version and Test Connection
        id: snyk_version
        run: |
          SNYK_VERSION=$(snyk --version || echo "Unknown")
          echo "version=$SNYK_VERSION" >> $GITHUB_OUTPUT
          echo "Snyk Version: $SNYK_VERSION"
          
          # Test Snyk connection and authentication
          echo "Testing Snyk authentication..."
          snyk auth || echo "Snyk auth command not available, using token from environment"
          snyk config || echo "Unable to show Snyk config"

      - name: Scan Dockerfiles
        id: scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          DEBUG_MODE: ${{ github.event.inputs.debug == 'true' }}
          TARGET_DIR: ${{ github.event.inputs.target_dir }}
        run: |
          set -euo pipefail
          
          if [ "$DEBUG_MODE" = "true" ]; then
            set -x
            echo "Running in debug mode"
          fi
          
          # Base directory for training Dockerfiles
          TRAINING_DIR="images/runtime/training"
          
          # Track results for summary and outputs
          HAS_HIGH_SEVERITY=false
          HAS_ISSUES=false
          ROWS=""
          PASSED_COUNT=0
          ISSUES_COUNT=0
          HIGH_COUNT=0
          DEBUG_INFO=""
          SCAN_FAILURES=0
          
          # Define image types for reporting
          declare -A IMAGE_TYPES
          IMAGE_TYPES["py311-cuda121-torch241"]="CUDA 12.1 + PyTorch 2.4.1"
          IMAGE_TYPES["py311-cuda124-torch251"]="CUDA 12.4 + PyTorch 2.5.1"
          IMAGE_TYPES["py311-rocm62-torch241"]="ROCm 6.2 + PyTorch 2.4.1"
          IMAGE_TYPES["py311-rocm62-torch251"]="ROCm 6.2 + PyTorch 2.5.1"
          
          # Determine which directories to scan
          if [ -n "$TARGET_DIR" ]; then
            # Single directory mode - only scan the specified directory
            DOCKERFILE_DIRS=("$TARGET_DIR")
            echo "Scanning single directory: $TRAINING_DIR/$TARGET_DIR"
          else
            # Default - scan all training directories
            DOCKERFILE_DIRS=(
              "py311-cuda121-torch241"
              "py311-cuda124-torch251"
              "py311-rocm62-torch241"
              "py311-rocm62-torch251"
            )
            echo "Scanning all training Dockerfiles"
          fi
          
          REPORT_ROWS=()
          
          # Create results directory for scans
          mkdir -p scan_results
          
          # Function to print section headers for better readability in logs
          print_section() {
            echo "============================================================"
            echo "  $1"
            echo "============================================================"
          }
          
          # Function to log debug info
          log_debug() {
            if [ "$DEBUG_MODE" = "true" ]; then
              echo "DEBUG: $1"
              DEBUG_INFO+="$1\n"
            fi
          }
          
          # Debug: Print all Dockerfile paths we'll be scanning
          log_debug "Dockerfile paths to scan:"
          for DIR in "${DOCKERFILE_DIRS[@]}"; do
            DOCKERFILE_PATH="$TRAINING_DIR/${DIR}/Dockerfile"
            if [ -f "$DOCKERFILE_PATH" ]; then
              log_debug "  - $DOCKERFILE_PATH (exists)"
            else
              log_debug "  - $DOCKERFILE_PATH (missing)"
            fi
          done
          
          # Scan each Dockerfile
          for DIR in "${DOCKERFILE_DIRS[@]}"; do
            DOCKERFILE_PATH="$TRAINING_DIR/${DIR}/Dockerfile"
            print_section "Scanning ${DIR} Dockerfile"
            
            # Check if directory exists
            if [ ! -d "$TRAINING_DIR/${DIR}" ]; then
              echo "Directory $TRAINING_DIR/${DIR} does not exist."
              REPORT_ROWS+=("${DIR}|${IMAGE_TYPES[$DIR]}|❌ Fail|Directory not found|N/A")
              ROWS+=$'\n'"• ${DIR}: ❌ Failed (directory not found)"
              HAS_ISSUES=true
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
              continue
            fi
            
            # Check if Dockerfile exists
            if [ ! -f "$DOCKERFILE_PATH" ]; then
              echo "Dockerfile $DOCKERFILE_PATH does not exist."
              REPORT_ROWS+=("${DIR}|${IMAGE_TYPES[$DIR]}|❌ Fail|Dockerfile not found|N/A")
              ROWS+=$'\n'"• ${DIR}: ❌ Failed (not found)"
              HAS_ISSUES=true
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
              continue
            fi
            
            # Set up variables for this file's results
            VULN_ISSUES="None"
            CONFIG_ISSUES=()
            SCAN_RESULTS_DIR="scan_results/${DIR}"
            mkdir -p "$SCAN_RESULTS_DIR"
            
            echo "Content of $DOCKERFILE_PATH:"
            head -n 5 "$DOCKERFILE_PATH"
            echo "... (showing first 5 lines only)"
            
            # Try different Snyk scanning methods if needed
            print_section "Method 1: Using snyk container test --file (recommended)"
            # First method: Snyk container test with file option
            for ATTEMPT in {1..2}; do
              echo "File scan attempt $ATTEMPT of 2..."
              
              # Use the recommended syntax for Dockerfile scanning without building
              snyk container test --file="$DOCKERFILE_PATH" --app --severity-threshold=medium > "${SCAN_RESULTS_DIR}/scan_results.txt" 2>&1 || true
              SCAN_EXIT_CODE=$?
              
              # Print detailed debug info
              log_debug "Snyk container test exit code: $SCAN_EXIT_CODE"
              
              # Show output regardless of debug mode
              echo "Snyk scan output (first 10 lines):"
              head -n 10 "${SCAN_RESULTS_DIR}/scan_results.txt" || true
              
              # Check for errors in output regardless of exit code
              if grep -q "ERROR" "${SCAN_RESULTS_DIR}/scan_results.txt" || 
                 grep -q "Failed to scan" "${SCAN_RESULTS_DIR}/scan_results.txt" || 
                 grep -q "Unspecified Error" "${SCAN_RESULTS_DIR}/scan_results.txt"; then
                echo "Scan error detected. Will try again or fallback to alternative method."
                if [ $ATTEMPT -eq 2 ]; then
                  echo "First method failed after multiple attempts."
                fi
              else
                # No error message found, scan was likely successful
                echo "Scan appears successful."
                break
              fi
              
              sleep 2
            done
            
            # Check if first method failed
            if grep -q "ERROR" "${SCAN_RESULTS_DIR}/scan_results.txt" || 
               grep -q "Failed to scan" "${SCAN_RESULTS_DIR}/scan_results.txt" || 
               grep -q "Unspecified Error" "${SCAN_RESULTS_DIR}/scan_results.txt"; then
              
              print_section "Method 2: Using snyk iac test (fallback)"
              # Fallback method: Try IaC scanning
              echo "Trying alternative scanning method (iac test)..."
              snyk iac test "$DOCKERFILE_PATH" --severity-threshold=medium > "${SCAN_RESULTS_DIR}/iac_scan_results.txt" 2>&1 || true
              IAC_SCAN_EXIT_CODE=$?
              
              log_debug "Snyk iac test exit code: $IAC_SCAN_EXIT_CODE"
              
              echo "IaC scan output (first 10 lines):"
              head -n 10 "${SCAN_RESULTS_DIR}/iac_scan_results.txt" || true
              
              # If IaC scan succeeds without error message, use those results
              if ! grep -q "ERROR" "${SCAN_RESULTS_DIR}/iac_scan_results.txt" && 
                 ! grep -q "Failed to scan" "${SCAN_RESULTS_DIR}/iac_scan_results.txt" && 
                 ! grep -q "Unspecified Error" "${SCAN_RESULTS_DIR}/iac_scan_results.txt"; then
                echo "Using IaC scan results."
                cp "${SCAN_RESULTS_DIR}/iac_scan_results.txt" "${SCAN_RESULTS_DIR}/scan_results.txt"
              else
                print_section "Method 3: Manual Dockerfile analysis (last resort)"
                echo "Both automated scanning methods failed. Performing manual analysis..."
                
                # Get Dockerfile for analysis
                cp "$DOCKERFILE_PATH" "${SCAN_RESULTS_DIR}/Dockerfile"
                
                # Simple manual analysis of Dockerfile
                {
                  echo "Manual Dockerfile Analysis Results:"
                  echo ""
                  
                  # Check for common security issues
                  if grep -i "FROM.*latest" "$DOCKERFILE_PATH" >/dev/null; then
                    echo "WARNING: Using 'latest' tag (use specific versions)"
                    CONFIG_ISSUES+=("Using 'latest' tag (use specific versions)")
                  fi
                  
                  if grep -E "ENV.*(PASSWORD|SECRET|KEY|TOKEN).*=" "$DOCKERFILE_PATH" >/dev/null; then
                    echo "WARNING: Potential secrets in ENV"
                    CONFIG_ISSUES+=("Potential secrets in ENV")
                  fi
                  
                  if ! grep -q "USER" "$DOCKERFILE_PATH" >/dev/null; then
                    echo "WARNING: Missing USER instruction (runs as root)"
                    CONFIG_ISSUES+=("Missing USER instruction (runs as root)")
                  fi
                  
                  if grep -i "RUN.*curl.*\|\|.*wget.*http:" "$DOCKERFILE_PATH" >/dev/null; then
                    echo "WARNING: Insecure downloads (HTTP)"
                    CONFIG_ISSUES+=("Insecure downloads (HTTP)")
                  fi
                  
                  if grep -i "RUN.*apt-get.*-y" "$DOCKERFILE_PATH" >/dev/null && ! grep -i "apt-get clean" "$DOCKERFILE_PATH" >/dev/null; then
                    echo "WARNING: Missing cleanup after package install"
                    CONFIG_ISSUES+=("Missing cleanup after package install")
                  fi
                  
                  if grep -i "RUN.*pip install" "$DOCKERFILE_PATH" >/dev/null && ! grep -i "pip install.*==.*" "$DOCKERFILE_PATH" >/dev/null; then
                    echo "WARNING: Unpinned pip packages"
                    CONFIG_ISSUES+=("Unpinned pip packages")
                  fi
                  
                  # Base image analysis (simplified)
                  BASE_IMAGE=$(grep "^FROM" "$DOCKERFILE_PATH" | head -1 | awk '{print $2}')
                  echo "Base image: $BASE_IMAGE"
                  
                  echo ""
                  echo "NOTE: This is a simplified manual analysis as automated scanning failed."
                } > "${SCAN_RESULTS_DIR}/scan_results.txt"
                
                # Set the status for manual scan
                if [ ${#CONFIG_ISSUES[@]} -gt 0 ]; then
                  VULN_ISSUES="Manual scan found issues"
                  HAS_ISSUES=true
                  ISSUES_COUNT=$((ISSUES_COUNT + 1))
                else
                  VULN_ISSUES="Manual scan passed"
                fi
                
                # Count the failure
                SCAN_FAILURES=$((SCAN_FAILURES + 1))
              fi
            fi
            
            # Parse scan results to determine severity (check various outputs)
            if grep -qi "critical vulnerability" "${SCAN_RESULTS_DIR}/scan_results.txt" 2>/dev/null; then
              VULN_ISSUES="Critical severity"
              HAS_HIGH_SEVERITY=true
              HIGH_COUNT=$((HIGH_COUNT + 1))
            elif grep -qi "high severity" "${SCAN_RESULTS_DIR}/scan_results.txt" 2>/dev/null; then
              VULN_ISSUES="High severity"
              HAS_HIGH_SEVERITY=true
              HIGH_COUNT=$((HIGH_COUNT + 1))
            elif grep -qi "medium severity" "${SCAN_RESULTS_DIR}/scan_results.txt" 2>/dev/null; then
              VULN_ISSUES="Medium severity"
              HAS_ISSUES=true
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
            elif grep -qi "low severity" "${SCAN_RESULTS_DIR}/scan_results.txt" 2>/dev/null; then
              VULN_ISSUES="Low severity"
            elif grep -qi "ERROR" "${SCAN_RESULTS_DIR}/scan_results.txt" 2>/dev/null || 
                 grep -qi "Failed to scan" "${SCAN_RESULTS_DIR}/scan_results.txt" 2>/dev/null; then
              # Mark scan errors as issues
              VULN_ISSUES="Scan failed"
              CONFIG_ISSUES+=("Scanning error - check debug logs")
              HAS_ISSUES=true
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
              SCAN_FAILURES=$((SCAN_FAILURES + 1))
            fi
            
            # Get configuration issues from Snyk results
            # Extract Dockerfile recommendations from Snyk output
            if grep -q "Recommendations for base image" "${SCAN_RESULTS_DIR}/scan_results.txt" 2>/dev/null; then
              CONFIG_ISSUES+=("Base image recommendations available")
            fi
            
            if grep -q "Dockerfile best practices" "${SCAN_RESULTS_DIR}/scan_results.txt" 2>/dev/null; then
              # Extract best practice issues if present
              BEST_PRACTICES=$(grep -A 10 "Dockerfile best practices" "${SCAN_RESULTS_DIR}/scan_results.txt" | grep -v "Dockerfile best practices" | grep -v "^$" | head -n 3 | sed 's/^[[:space:]]*//' || echo "")
              if [ -n "$BEST_PRACTICES" ]; then
                CONFIG_ISSUES+=("$BEST_PRACTICES")
              fi
            fi
            
            # Determine final status based on results
            if [ ${#CONFIG_ISSUES[@]} -eq 0 ]; then
              CONFIG_ISSUES_STR="None"
            else
              CONFIG_ISSUES_STR=$(printf "%s; " "${CONFIG_ISSUES[@]}" | sed 's/; $//')
            fi
            
            if [ "$VULN_ISSUES" = "None" ] && [ "$CONFIG_ISSUES_STR" = "None" ]; then
              STATUS="✅ Pass"
              PASSED_COUNT=$((PASSED_COUNT + 1))
            elif [ "$VULN_ISSUES" = "Critical severity" ] || [ "$VULN_ISSUES" = "High severity" ] || [ "$VULN_ISSUES" = "Scan failed" ]; then
              STATUS="❌ Fail"
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
            else
              STATUS="⚠️ Warning"
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
            fi
            
            REPORT_ROWS+=("${DIR}|${IMAGE_TYPES[$DIR]}|${STATUS}|${VULN_ISSUES}|${CONFIG_ISSUES_STR}")
            ROWS+=$'\n'"• ${DIR}: ${STATUS}"
            
            log_debug "Scan complete for $DIR with status: $STATUS"
          done
          
          print_section "Scan Summary"
          
          # Determine overall status
          if [ $SCAN_FAILURES -gt 0 ]; then
            SCAN_STATUS="⚠️ Some scans failed"
            HAS_ISSUES=true
          elif $HAS_HIGH_SEVERITY; then
            SCAN_STATUS="❌ Security issues found"
          elif $HAS_ISSUES; then 
            SCAN_STATUS="⚠️ Issues found"
          else
            SCAN_STATUS="✅ All secure"
          fi
          
          if $HAS_HIGH_SEVERITY; then
            OVERALL_STATUS="❌ Failed"
          elif $HAS_ISSUES; then 
            OVERALL_STATUS="⚠️ Issues Found"
          else
            OVERALL_STATUS="✅ All Secure"
          fi
          
          # Set timezone for consistent reporting
          TZ=Europe/London
          export TZ
          LON_DATE="$(date '+%a %d %b %Y %T %Z')"
          
          # Create GitHub step summary
          echo "# Dockerfile Security Scan Results" > "$GITHUB_STEP_SUMMARY"
          
          echo "## Summary Overview" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|:-------|:------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Scan Date** | $LON_DATE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Status** | $OVERALL_STATUS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Scan Status** | $SCAN_STATUS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Snyk Version** | ${{ steps.snyk_version.outputs.version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Scanner Mode** | Dockerfile Analysis (no build) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Total Images** | ${#DOCKERFILE_DIRS[@]} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Passed** | $PASSED_COUNT |" >> "$GITHUB_STEP_SUMMARY" 
          echo "| **Issues** | $ISSUES_COUNT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Critical/High** | $HIGH_COUNT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Failed Scans** | $SCAN_FAILURES |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "## Detailed Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "<table>" >> "$GITHUB_STEP_SUMMARY"
          echo "  <tr>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Dockerfile</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Image Type</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='center'>Status</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Security Issues</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Configuration Issues</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "  </tr>" >> "$GITHUB_STEP_SUMMARY"
          
          for ROW in "${REPORT_ROWS[@]}"; do
            IFS='|' read -r DIR IMAGE_TYPE STATUS VULN CONFIG <<< "$ROW"
            echo "  <tr>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${DIR}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${IMAGE_TYPE}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td align='center'>${STATUS}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${VULN}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${CONFIG}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "  </tr>" >> "$GITHUB_STEP_SUMMARY"
          done
          
          echo "</table>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "## Security Checks Performed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check Type | Description | Severity |" >> "$GITHUB_STEP_SUMMARY"
          echo "|:-----------|:------------|:---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Dockerfile Analysis** | Snyk container scan with --file option (no build) | Critical/High = Fail |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Base Image** | Scans base image for vulnerabilities | Critical/High = Fail |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Best Practices** | Identifies Dockerfile best practices issues | Warning |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Fallback Analysis** | Manual checks when automated scanning fails | Warning |" >> "$GITHUB_STEP_SUMMARY"
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Notes" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow uses Snyk container testing with --file option to avoid building large images" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scans run nightly at 03:00 UTC to catch newly discovered vulnerabilities" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR scans only run on labeled PRs ('safe-to-test') to maintain security" >> "$GITHUB_STEP_SUMMARY"
          echo "- Multiple scanning methods are attempted if the primary method fails" >> "$GITHUB_STEP_SUMMARY"
          
          if [ $SCAN_FAILURES -gt 0 ]; then
            echo "- **⚠️ Some scans failed.** This could be due to Dockerfile format issues or Snyk limitations." >> "$GITHUB_STEP_SUMMARY"
          fi
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          if [ "$DEBUG_MODE" = "true" ]; then
            echo "<details>" >> "$GITHUB_STEP_SUMMARY"
            echo "<summary>Debug Information</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo -e "$DEBUG_INFO" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          fi
          
          echo "<details>" >> "$GITHUB_STEP_SUMMARY"
          echo "<summary>Technical Scan Information</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Scanner:** Snyk Container Test" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Primary Scan Command:** \`snyk container test --file=Dockerfile --app --severity-threshold=medium\`" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Fallback Scan Command:** \`snyk iac test Dockerfile --severity-threshold=medium\`" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Workflow Run ID:** \`${{ github.run_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          
          # Output results for use in later steps
          echo "results<<EOF" >> $GITHUB_OUTPUT
          echo -e "${ROWS}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Output status for Slack notification
          if $HAS_HIGH_SEVERITY; then
            echo "status=high_severity" >> $GITHUB_OUTPUT
          elif $HAS_ISSUES; then
            echo "status=issues_found" >> $GITHUB_OUTPUT
          else
            echo "status=secure" >> $GITHUB_OUTPUT
          fi
          
          echo "debug_mode=$DEBUG_MODE" >> $GITHUB_OUTPUT
          echo "snyk_version=${{ steps.snyk_version.outputs.version }}" >> $GITHUB_OUTPUT
          echo "scanner_mode=dockerfile" >> $GITHUB_OUTPUT
          echo "scan_failures=$SCAN_FAILURES" >> $GITHUB_OUTPUT
          
          # Print final scan summary to logs
          print_section "Final Results"
          echo "Scan completed with status: $OVERALL_STATUS"
          echo "Total images: ${#DOCKERFILE_DIRS[@]}"
          echo "Passed: $PASSED_COUNT"
          echo "Issues: $ISSUES_COUNT"
          echo "Critical/High: $HIGH_COUNT"
          echo "Failed scans: $SCAN_FAILURES"
          
          # Fail the workflow if high severity issues are found but not for scan failures
          # This ensures we get feedback even if scans fail
          if $HAS_HIGH_SEVERITY; then
            echo "❌ High/Critical security issues detected — failing the workflow."
            exit 1
          fi

      - name: Store Scan Results
        if: always()
        run: |
          # Archive scan results for debugging
          if [ -d "scan_results" ]; then
            echo "Archiving scan results for debugging"
            tar -czf scan_results.tar.gz scan_results
          fi

      - name: Upload Scan Results
        if: always()
        continue-on-error: true  # Don't fail the workflow if upload fails
        uses: actions/upload-artifact@v2  # Downgrade to v2 which is more stable
        with:
          name: snyk-scan-results
          path: scan_results.tar.gz
          retention-days: 5

      - name: Slack Notification
        if: >
          always() &&
          (steps.scan.outputs.status != 'secure' || 
          github.event.inputs.debug == 'true' || 
          github.event_name == 'schedule' ||
          job.status == 'failure' ||
          steps.scan.outputs.scan_failures != '0')
        continue-on-error: true
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: repo,workflow
          custom_payload: |
            {
              "attachments": [
                {
                  "color": "${{ job.status == 'failure' && 'danger' || steps.scan.outputs.status == 'secure' && 'good' || steps.scan.outputs.status == 'high_severity' && 'danger' || 'warning' }}",
                  "title": "Dockerfile Security Scan Results",
                  "text": "${{ job.status == 'failure' && '🚨 Workflow failed' || steps.scan.outputs.status == 'secure' && '✅ All Dockerfiles are secure' || steps.scan.outputs.status == 'high_severity' && '🚨 High severity issues detected' || steps.scan.outputs.scan_failures != '0' && '⚠️ Some scans failed' || '⚠️ Security issues detected' }}\n${{ steps.scan.outputs.results }}\n\n*Scanner:* Snyk Container Test | *Version:* ${{ steps.scan.outputs.snyk_version || 'Unknown' }}",
                  "mrkdwn_in": ["text"],
                  "footer": "Snyk Dockerfile Security Scan | Run ID: ${{ github.run_id }} | $(TZ=Europe/London date '+%d-%m-%Y %H:%M %Z')"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}