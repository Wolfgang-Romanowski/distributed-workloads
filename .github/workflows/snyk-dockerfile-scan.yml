# Snyk scan for training‑runtime Dockerfiles
# push to main, nightly 03:00 UTC, fork PRs after label `run‑snyk`
# Fails on High/Critical CVEs

name: Snyk Dockerfile Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]          # same repo PRs
  pull_request_target:            # fork PRs gated by label
    types: [ labeled ]
  schedule:
    - cron: "0 3 * * *"           # nightly
jobs:
  snyk_scan:
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'pull_request_target' ||
      contains(github.event.pull_request.labels.*.name, 'run-snyk')
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || '' }}

      - name: List Dockerfiles
        id: list
        run: |
          mapfile -t files < <(find images/runtime/training -type f -name Dockerfile)
          echo "files=${files[*]}" >> $GITHUB_OUTPUT

      - name: Snyk scan
        id: scan
        run: |
          IFS=' ' read -r -a dfs <<< "${{ steps.list.outputs.files }}"
          declare -A res; fail=0
          echo "::group::Snyk scans"
          for f in "${dfs[@]}"; do
            base=$(awk 'toupper($1)=="FROM"{img=$2} END{print img}' "$f")
            if [[ -z "$base" || "$base" == *'${'* ]]; then
              res["$f"]="SKIP"; continue
            fi
            echo "▶ $f (base $base)"
            snyk container test "$base" --file="$f" --severity-threshold=high --json \
              > "out-${f//\//-}.json" \
              && res["$f"]="PASS" || { res["$f"]="FAIL"; fail=1; }
          done
          echo "::endgroup::"
          for k in "${!res[@]}"; do echo "$k : ${res[$k]}"; done | tee summary.txt
          echo "failed=$fail" >> $GITHUB_OUTPUT
          exit $fail

      - uses: actions/upload-artifact@v3
        if: always()
        with:
          name: snyk-dockerfile-results
          path: |
            summary.txt
            out-*.json

      - name: Slack failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        with:
          color: '#FF4500'
          title: 'Snyk Dockerfile scan failed'
          message: |
            $(grep 'FAIL' summary.txt | sed 's/^/• /')
            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Details>

      - name: Slack success
        if: success() && github.event_name == 'push'
        uses: rtCamp/action-slack-notify@v2
        with:
          color: '#2EB886'
          title: 'Snyk Dockerfile scan passed'
          message: |
            All images clean on push to *main*.
            <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Details>
