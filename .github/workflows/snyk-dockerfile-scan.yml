# .github/workflows/snyk-dockerfile-scan.yml
# This workflow implements Snyk scanning for Dockerfiles as discussed in the Slack conversation.
# It provides:
# 1. Scanning of Dockerfiles without building images (they're too large)
# 2. A summary table showing scan status for each file
# 3. Both nightly scans and PR checks
# 4. Only reporting issues (not failing PRs)

name: Snyk Dockerfile Scan

on:
  schedule:
    - cron: '0 3 * * *'          # nightly 03:00 UTC
  push:
    branches: [main]             # run on every push to main
    paths:
      - '**/Dockerfile*'
      - '.github/workflows/snyk-dockerfile-scan.yml'
  pull_request_target:           # fork PRs when maintainer adds label
    types: [labeled]
  workflow_dispatch:             # Allow manual triggering for testing

jobs:
  snyk-dockerfile-scan:
    runs-on: ubuntu-latest
    name: Snyk Dockerfile Scan

    # Only run this job under specified conditions
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_target' && github.event.label.name == 'run-snyk-scan')

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      # Step 2: Initialize the summary table
      - name: Initialize Summary
        run: |
          echo "# Snyk Dockerfile Security Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Status | Vulnerabilities |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ----- | ------ | --------------- |" >> "$GITHUB_STEP_SUMMARY"

      # Step 3: Use snyk/actions-scan-and-follow-workflow action which is specifically designed for scanning
      - name: Scan Dockerfiles with Snyk
        uses: snyk/actions-scan-and-follow-workflow@master
        with:
          target: '.'
          args: --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # Step 4: Custom scan using docker run (which properly handles authentication)
      - name: Scan Dockerfiles Individually
        run: |
          IMAGES=("py311-cuda121-torch241" "py311-cuda124-torch251" "py311-rocm62-torch241" "py311-rocm62-torch251")
          
          for img in "${IMAGES[@]}"; do
            df="images/runtime/training/$img/Dockerfile"
            if [[ ! -f "$df" ]]; then
              echo "| $img | ⚠️ Error | Dockerfile not found |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi
            
            echo "Scanning $img Dockerfile..."
            
            # Use Docker to run Snyk CLI (this handles authentication better than direct CLI)
            SCAN_OUTPUT=$(docker run --rm -e SNYK_TOKEN=${{ secrets.SNYK_TOKEN }} \
              -v "$(pwd):/app" -w /app \
              snyk/snyk:docker \
              test --docker --file="$df" --json || true)
            
            # Check if output is valid JSON (successful scan)
            if echo "$SCAN_OUTPUT" | jq . > /dev/null 2>&1; then
              # Try to extract vulnerability count
              VULN_COUNT=$(echo "$SCAN_OUTPUT" | jq '.vulnerabilities | length')
              
              if [[ "$VULN_COUNT" == "0" || "$VULN_COUNT" == "null" ]]; then
                echo "| $img | ✅ Passed | No vulnerabilities |" >> "$GITHUB_STEP_SUMMARY"
              else
                # Extract high and critical vulnerabilities
                HIGH_VULN=$(echo "$SCAN_OUTPUT" | jq '[.vulnerabilities[] | select(.severity == "high")] | length')
                CRITICAL_VULN=$(echo "$SCAN_OUTPUT" | jq '[.vulnerabilities[] | select(.severity == "critical")] | length')
                
                if [[ "$HIGH_VULN" == "null" ]]; then HIGH_VULN=0; fi
                if [[ "$CRITICAL_VULN" == "null" ]]; then CRITICAL_VULN=0; fi
                
                echo "| $img | ⚠️ Warning | $VULN_COUNT total ($HIGH_VULN high, $CRITICAL_VULN critical) |" >> "$GITHUB_STEP_SUMMARY"
              fi
            else
              echo "| $img | ⚠️ No Results | Could not scan with Snyk |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      # Step 5: Finish summary
      - name: Finish Summary
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Scan Information" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Scan Date:** $(date)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Scan Type:** Snyk Dockerfile security scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "## Understanding Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- **✅ Passed:** No vulnerabilities or issues detected" >> "$GITHUB_STEP_SUMMARY"
          echo "- **⚠️ Warning:** Issues found but not critical for operation" >> "$GITHUB_STEP_SUMMARY"
          echo "- **❌ Failed:** Scan encountered errors or critical issues" >> "$GITHUB_STEP_SUMMARY"
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Next Steps" >> "$GITHUB_STEP_SUMMARY"
          echo "- Review any warnings or failures" >> "$GITHUB_STEP_SUMMARY"
          echo "- For detailed vulnerability information, view the job logs" >> "$GITHUB_STEP_SUMMARY"
          echo "- This workflow is in reporting mode only and will not fail PR checks" >> "$GITHUB_STEP_SUMMARY"
          
          # Add a placeholder for Slack integration (to be implemented later)
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Future Enhancements" >> "$GITHUB_STEP_SUMMARY"
          echo "- Slack notifications will be implemented to send results to a dedicated channel" >> "$GITHUB_STEP_SUMMARY"