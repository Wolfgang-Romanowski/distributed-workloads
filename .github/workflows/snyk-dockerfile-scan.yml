name: Comprehensive Snyk Security Analysis

on:
  push:
    branches: [ main ]
    paths:
      - 'images/runtime/training/*/Dockerfile'
      - 'images/runtime/training/**/requirements.txt'
      - 'images/runtime/training/**/package.json'
      - 'images/runtime/training/**/Pipfile'
  pull_request:
    paths:
      - 'images/runtime/training/*/Dockerfile'
      - 'images/runtime/training/**/requirements.txt'
      - 'images/runtime/training/**/package.json'
      - 'images/runtime/training/**/Pipfile'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      target_dir:
        description: 'Specific directory to scan (leave empty for all)'
        required: false
        default: ''
        type: string
      scan_type:
        description: 'Scan type'
        required: false
        default: 'comprehensive'
        type: choice
        options:
          - 'comprehensive'
          - 'container-only'
          - 'code-only'
          - 'dependencies-only'

jobs:
  snyk-comprehensive-scan:
    name: Comprehensive Snyk Security Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Snyk
        uses: snyk/actions/setup@master
        with:
          snyk-version: latest

      - name: Authenticate Snyk
        run: |
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "::error::SNYK_TOKEN secret is not configured"
            exit 1
          fi
          snyk auth "${{ secrets.SNYK_TOKEN }}"
          
          # Verify authentication and show account info
          snyk config get api || echo "API check failed"
          echo "Snyk organization: $(snyk config get org || echo 'default')"

      - name: Setup Analysis Environment
        run: |
          mkdir -p results/{container,code,iac,dependencies,reports}
          
          # Install additional tools for comprehensive analysis
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Discover and Analyze Components
        id: discovery
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          TARGET_DIR: ${{ github.event.inputs.target_dir }}
          SCAN_TYPE: ${{ github.event.inputs.scan_type }}
        run: |
          set -e
          
          # Target directories discovery
          TRAINING_DIR="images/runtime/training"
          if [ -n "$TARGET_DIR" ]; then
            if [ -d "$TRAINING_DIR/$TARGET_DIR" ]; then
              TARGET_DIRS=("$TARGET_DIR")
            else
              echo "::error::Directory $TARGET_DIR not found"
              exit 1
            fi
          else
            TARGET_DIRS=($(find "$TRAINING_DIR" -name "Dockerfile" -exec dirname {} \; | xargs -I {} basename {} 2>/dev/null || echo ""))
          fi
          
          if [ ${#TARGET_DIRS[@]} -eq 0 ]; then
            echo "::warning::No Dockerfiles found in $TRAINING_DIR"
            echo "Available directories:"
            find "$TRAINING_DIR" -type d -maxdepth 1 || true
            exit 0
          fi
          
          echo "Analyzing directories: ${TARGET_DIRS[*]}"
          echo "Scan type: ${SCAN_TYPE:-comprehensive}"
          
          # Enhanced base image discovery with resolution
          declare -A BASE_IMAGES DOCKERFILE_BASE_MAP DOCKERFILE_CONTEXTS
          
          for DIR in "${TARGET_DIRS[@]}"; do
            DOCKERFILE_PATH="$TRAINING_DIR/$DIR"
            DOCKERFILE="$DOCKERFILE_PATH/Dockerfile"
            
            if [ ! -f "$DOCKERFILE" ]; then
              echo "::warning::Dockerfile not found: $DOCKERFILE"
              continue
            fi
            
            echo "Analyzing $DIR..."
            
            # Store full path for context analysis
            DOCKERFILE_CONTEXTS["$DIR"]="$DOCKERFILE_PATH"
            
            # Enhanced base image resolution
            BASE_IMAGE_RAW=$(grep -m 1 "^FROM" "$DOCKERFILE" | awk '{print $2}' | cut -d' ' -f1)
            
            # Advanced variable resolution
            RESOLVED_BASE_IMAGE="$BASE_IMAGE_RAW"
            
            # Extract variables from directory context
            if [[ "$DIR" =~ py([0-9]+) ]]; then
              PYTHON_VER="${BASH_REMATCH[1]}"
              PYTHON_VERSION="${PYTHON_VER:0:1}.${PYTHON_VER:1}"
            else
              PYTHON_VERSION="3.11"
            fi
            
            # Extract CUDA/ROCm versions
            if [[ "$DIR" =~ cuda([0-9]+) ]]; then
              CUDA_VER="${BASH_REMATCH[1]}"
              CUDA_VERSION="${CUDA_VER:0:2}.${CUDA_VER:2}"
              IMAGE_TAG="${CUDA_VERSION}"
            elif [[ "$DIR" =~ rocm([0-9]+) ]]; then
              ROCM_VER="${BASH_REMATCH[1]}"
              ROCM_VERSION="${ROCM_VER:0:1}.${ROCM_VER:1}"
              IMAGE_TAG="${ROCM_VERSION}"
            else
              IMAGE_TAG="latest"
            fi
            
            # Resolve variables
            RESOLVED_BASE_IMAGE="${RESOLVED_BASE_IMAGE//\$\{PYTHON_VERSION\}/$PYTHON_VERSION}"
            RESOLVED_BASE_IMAGE="${RESOLVED_BASE_IMAGE//\$\{IMAGE_TAG\}/$IMAGE_TAG}"
            
            echo "  Raw base: $BASE_IMAGE_RAW"
            echo "  Resolved: $RESOLVED_BASE_IMAGE"
            
            BASE_IMAGES["$RESOLVED_BASE_IMAGE"]=1
            DOCKERFILE_BASE_MAP["$DIR"]="$RESOLVED_BASE_IMAGE"
          done
          
          # Save discovery results
          for key in "${!DOCKERFILE_BASE_MAP[@]}"; do
            echo "$key=${DOCKERFILE_BASE_MAP[$key]}" >> results/dockerfile_base_map.txt
          done
          
          for key in "${!DOCKERFILE_CONTEXTS[@]}"; do
            echo "$key=${DOCKERFILE_CONTEXTS[$key]}" >> results/dockerfile_contexts.txt
          done
          
          echo "discovery_complete=true" >> $GITHUB_OUTPUT
          echo "base_image_count=${#BASE_IMAGES[@]}" >> $GITHUB_OUTPUT
          echo "dockerfile_count=${#TARGET_DIRS[@]}" >> $GITHUB_OUTPUT

      - name: Container Security Scan
        if: steps.discovery.outputs.discovery_complete == 'true'
        run: |
          echo "🐳 Starting comprehensive container security analysis..."
          
          # Load discovery results
          declare -A DOCKERFILE_BASE_MAP DOCKERFILE_CONTEXTS
          
          if [ -f results/dockerfile_base_map.txt ]; then
            while IFS='=' read -r key value || [ -n "$key" ]; do
              [ -n "$key" ] && DOCKERFILE_BASE_MAP["$key"]="$value"
            done < results/dockerfile_base_map.txt
          fi
          
          if [ -f results/dockerfile_contexts.txt ]; then
            while IFS='=' read -r key value || [ -n "$key" ]; do
              [ -n "$key" ] && DOCKERFILE_CONTEXTS["$key"]="$value"
            done < results/dockerfile_contexts.txt
          fi
          
          # Get unique base images
          UNIQUE_BASES=($(cat results/dockerfile_base_map.txt | cut -d'=' -f2 | sort -u))
          
          echo "Found ${#UNIQUE_BASES[@]} unique base images to scan"
          
          # Comprehensive base image analysis
          echo "Analyzing base images with full Snyk container capabilities..."
          
          for base_image in "${UNIQUE_BASES[@]}"; do
            echo "🔍 Scanning base image: $base_image"
            base_key=$(echo "$base_image" | tr '/:.-' '_')
            
            # Full container scan with all options
            echo "  Running comprehensive container scan..."
            if snyk container test "$base_image" \
              --json \
              --severity-threshold=low \
              > "results/container/base_${base_key}.json" 2>/dev/null; then
              echo "  ✅ Base image scan completed"
            else
              echo "  ⚠️ Base image scan had issues (exit code $?)"
            fi
            
            # Monitor the image for ongoing tracking
            echo "  Setting up monitoring..."
            if snyk container monitor "$base_image" \
              --project-name="base-image-${base_key}" 2>/dev/null; then
              echo "  ✅ Monitoring enabled"
            else
              echo "  ⚠️ Monitoring setup failed"
            fi
          done
          
          # Comprehensive Dockerfile analysis
          echo "Analyzing Dockerfiles with container context..."
          
          for dockerfile in "${!DOCKERFILE_CONTEXTS[@]}"; do
            dockerfile_path="${DOCKERFILE_CONTEXTS[$dockerfile]}"
            base_image="${DOCKERFILE_BASE_MAP[$dockerfile]}"
            
            echo "🔍 Scanning Dockerfile: $dockerfile"
            
            if [ -d "$dockerfile_path" ]; then
              cd "$dockerfile_path"
              
              # Container scan with Dockerfile context
              echo "  Running Dockerfile context scan..."
              if snyk container test "$base_image" \
                --file=Dockerfile \
                --json \
                --severity-threshold=low \
                > "../../../results/container/${dockerfile}_full.json" 2>/dev/null; then
                echo "  ✅ Dockerfile scan completed"
              else
                echo "  ⚠️ Dockerfile scan had issues"
              fi
              
              # Test with app dependencies if they exist
              if [ -f "requirements.txt" ]; then
                echo "  Scanning with app dependencies..."
                snyk container test "$base_image" \
                  --file=Dockerfile \
                  --app-vulns \
                  --json \
                  > "../../../results/container/${dockerfile}_app.json" 2>/dev/null || echo "  App scan failed"
              fi
              
              # Monitor for ongoing tracking
              snyk container monitor "$base_image" \
                --file=Dockerfile \
                --project-name="dockerfile-${dockerfile}" 2>/dev/null || echo "  Monitoring failed"
              
              cd - > /dev/null
            else
              echo "  ⚠️ Directory not found: $dockerfile_path"
            fi
          done

      - name: Code Quality & Security Scan
        if: steps.discovery.outputs.discovery_complete == 'true'
        run: |
          echo "📝 Starting comprehensive code security analysis..."
          
          declare -A DOCKERFILE_CONTEXTS
          if [ -f results/dockerfile_contexts.txt ]; then
            while IFS='=' read -r key value || [ -n "$key" ]; do
              [ -n "$key" ] && DOCKERFILE_CONTEXTS["$key"]="$value"
            done < results/dockerfile_contexts.txt
          fi
          
          # Snyk Code analysis for each Dockerfile context
          for dockerfile in "${!DOCKERFILE_CONTEXTS[@]}"; do
            dockerfile_path="${DOCKERFILE_CONTEXTS[$dockerfile]}"
            
            echo "🔍 Code scanning: $dockerfile"
            
            if [ -d "$dockerfile_path" ]; then
              cd "$dockerfile_path"
              
              # Snyk Code for security issues in Dockerfiles and scripts
              echo "  Running code security analysis..."
              if snyk code test \
                --json \
                --severity-threshold=low \
                > "../../../results/code/${dockerfile}_code.json" 2>/dev/null; then
                echo "  ✅ Code scan completed"
              else
                echo "  ⚠️ Code scan had issues"
              fi
              
              # Monitor code for ongoing analysis
              snyk code monitor \
                --project-name="code-${dockerfile}" 2>/dev/null || echo "  Code monitoring failed"
              
              cd - > /dev/null
            fi
          done

      - name: Infrastructure as Code Scan
        if: steps.discovery.outputs.discovery_complete == 'true'
        run: |
          echo "🏗️ Starting Infrastructure as Code security analysis..."
          
          declare -A DOCKERFILE_CONTEXTS
          if [ -f results/dockerfile_contexts.txt ]; then
            while IFS='=' read -r key value || [ -n "$key" ]; do
              [ -n "$key" ] && DOCKERFILE_CONTEXTS["$key"]="$value"
            done < results/dockerfile_contexts.txt
          fi
          
          # IaC analysis for Dockerfiles and related infrastructure files
          for dockerfile in "${!DOCKERFILE_CONTEXTS[@]}"; do
            dockerfile_path="${DOCKERFILE_CONTEXTS[$dockerfile]}"
            
            echo "🔍 IaC scanning: $dockerfile"
            
            if [ -d "$dockerfile_path" ]; then
              cd "$dockerfile_path"
              
              # Snyk IaC for Dockerfile best practices and security configurations
              echo "  Running IaC security analysis..."
              if snyk iac test \
                --json \
                --severity-threshold=low \
                . > "../../../results/iac/${dockerfile}_iac.json" 2>/dev/null; then
                echo "  ✅ IaC scan completed"
              else
                echo "  ⚠️ IaC scan had issues"
              fi
              
              # Look for docker-compose files and scan them too
              if [ -f "docker-compose.yml" ] || [ -f "docker-compose.yaml" ]; then
                echo "  Found docker-compose, scanning..."
                snyk iac test \
                  --json \
                  --severity-threshold=low \
                  docker-compose.* > "../../../results/iac/${dockerfile}_compose.json" 2>/dev/null || echo "  Compose scan failed"
              fi
              
              cd - > /dev/null
            fi
          done

      - name: Dependency Security Scan
        if: steps.discovery.outputs.discovery_complete == 'true'
        run: |
          echo "📦 Starting comprehensive dependency security analysis..."
          
          declare -A DOCKERFILE_CONTEXTS
          if [ -f results/dockerfile_contexts.txt ]; then
            while IFS='=' read -r key value || [ -n "$key" ]; do
              [ -n "$key" ] && DOCKERFILE_CONTEXTS["$key"]="$value"
            done < results/dockerfile_contexts.txt
          fi
          
          # Dependency analysis for each context
          for dockerfile in "${!DOCKERFILE_CONTEXTS[@]}"; do
            dockerfile_path="${DOCKERFILE_CONTEXTS[$dockerfile]}"
            
            echo "🔍 Dependency scanning: $dockerfile"
            
            if [ -d "$dockerfile_path" ]; then
              cd "$dockerfile_path"
              
              # Python dependencies
              if [ -f "requirements.txt" ]; then
                echo "  Scanning requirements.txt"
                if snyk test \
                  --file=requirements.txt \
                  --json \
                  --severity-threshold=low \
                  > "../../../results/dependencies/${dockerfile}_requirements.json" 2>/dev/null; then
                  echo "  ✅ Requirements scan completed"
                else
                  echo "  ⚠️ Requirements scan had issues"
                fi
                
                snyk monitor \
                  --file=requirements.txt \
                  --project-name="deps-${dockerfile}-requirements" 2>/dev/null || echo "  Requirements monitoring failed"
              fi
              
              # Pipfile dependencies
              if [ -f "Pipfile" ]; then
                echo "  Scanning Pipfile"
                snyk test \
                  --file=Pipfile \
                  --json \
                  --severity-threshold=low \
                  > "../../../results/dependencies/${dockerfile}_pipfile.json" 2>/dev/null || echo "  Pipfile scan failed"
              fi
              
              # Node.js dependencies
              if [ -f "package.json" ]; then
                echo "  Scanning package.json"
                snyk test \
                  --file=package.json \
                  --json \
                  --severity-threshold=low \
                  > "../../../results/dependencies/${dockerfile}_npm.json" 2>/dev/null || echo "  NPM scan failed"
              fi
              
              # Generic dependency scanning
              echo "  Running generic dependency scan..."
              snyk test \
                --json \
                --all-projects \
                --severity-threshold=low \
                . > "../../../results/dependencies/${dockerfile}_all.json" 2>/dev/null || echo "  Generic scan failed"
              
              cd - > /dev/null
            fi
          done

      - name: Generate Comprehensive Report
        if: always()
        run: |
          echo "📊 Generating comprehensive security report..."
          
          {
            echo "# 🛡️ Comprehensive Snyk Security Analysis Report"
            echo ""
            echo "## 📋 Executive Summary"
            echo ""
            
            # Count total issues across all scan types
            TOTAL_CRITICAL=0
            TOTAL_HIGH=0
            TOTAL_MEDIUM=0
            TOTAL_LOW=0
            SCAN_COUNT=0
            
            # Process all JSON results
            echo "Analyzing scan results..."
            
            for json_file in $(find results -name "*.json" -type f 2>/dev/null || echo ""); do
              if [ -f "$json_file" ] && jq -e . "$json_file" >/dev/null 2>&1; then
                SCAN_COUNT=$((SCAN_COUNT + 1))
                
                # Try container vulnerabilities format
                CRITICAL=$(jq '[.vulnerabilities[]? | select(.severity == "critical")] | length' "$json_file" 2>/dev/null || echo "0")
                HIGH=$(jq '[.vulnerabilities[]? | select(.severity == "high")] | length' "$json_file" 2>/dev/null || echo "0")
                MEDIUM=$(jq '[.vulnerabilities[]? | select(.severity == "medium")] | length' "$json_file" 2>/dev/null || echo "0")
                LOW=$(jq '[.vulnerabilities[]? | select(.severity == "low")] | length' "$json_file" 2>/dev/null || echo "0")
                
                # Try IaC format if container format returns 0
                if [ "$CRITICAL" = "0" ] && [ "$HIGH" = "0" ] && [ "$MEDIUM" = "0" ] && [ "$LOW" = "0" ]; then
                  CRITICAL=$(jq '[.infrastructureAsCodeIssues[]? | select(.severity == "critical")] | length' "$json_file" 2>/dev/null || echo "0")
                  HIGH=$(jq '[.infrastructureAsCodeIssues[]? | select(.severity == "high")] | length' "$json_file" 2>/dev/null || echo "0")
                  MEDIUM=$(jq '[.infrastructureAsCodeIssues[]? | select(.severity == "medium")] | length' "$json_file" 2>/dev/null || echo "0")
                  LOW=$(jq '[.infrastructureAsCodeIssues[]? | select(.severity == "low")] | length' "$json_file" 2>/dev/null || echo "0")
                fi
                
                TOTAL_CRITICAL=$((TOTAL_CRITICAL + CRITICAL))
                TOTAL_HIGH=$((TOTAL_HIGH + HIGH))
                TOTAL_MEDIUM=$((TOTAL_MEDIUM + MEDIUM))
                TOTAL_LOW=$((TOTAL_LOW + LOW))
              fi
            done
            
            echo "Processed $SCAN_COUNT scan result files"
            echo ""
            
            echo "| Severity | Count |"
            echo "|:---------|:------|"
            echo "| 🔴 Critical | $TOTAL_CRITICAL |"
            echo "| 🟠 High | $TOTAL_HIGH |"
            echo "| 🟡 Medium | $TOTAL_MEDIUM |"
            echo "| 🔵 Low | $TOTAL_LOW |"
            echo "| **Total** | **$((TOTAL_CRITICAL + TOTAL_HIGH + TOTAL_MEDIUM + TOTAL_LOW))** |"
            echo ""
            
            # Overall risk assessment
            if [ $TOTAL_CRITICAL -gt 0 ]; then
              echo "🚨 **Risk Level: CRITICAL** - Immediate action required"
            elif [ $TOTAL_HIGH -gt 0 ]; then
              echo "⚠️ **Risk Level: HIGH** - Priority remediation needed"
            elif [ $TOTAL_MEDIUM -gt 0 ]; then
              echo "🟡 **Risk Level: MEDIUM** - Moderate risk"
            else
              echo "✅ **Risk Level: LOW** - Good security posture"
            fi
            echo ""
            
            # Container Security Section
            echo "## 🐳 Container Security Analysis"
            echo ""
            
            if ls results/container/*.json >/dev/null 2>&1; then
              echo "### Base Images"
              echo ""
              echo "| Image | Critical | High | Medium | Low | Status |"
              echo "|:------|:---------|:-----|:-------|:----|:-------|"
              
              for container_file in results/container/base_*.json; do
                if [ -f "$container_file" ] && jq -e . "$container_file" >/dev/null 2>&1; then
                  image_name=$(basename "$container_file" .json | sed 's/base_//' | tr '_' '/')
                  crit=$(jq '[.vulnerabilities[]? | select(.severity == "critical")] | length' "$container_file" 2>/dev/null || echo "0")
                  high=$(jq '[.vulnerabilities[]? | select(.severity == "high")] | length' "$container_file" 2>/dev/null || echo "0")
                  med=$(jq '[.vulnerabilities[]? | select(.severity == "medium")] | length' "$container_file" 2>/dev/null || echo "0")
                  low=$(jq '[.vulnerabilities[]? | select(.severity == "low")] | length' "$container_file" 2>/dev/null || echo "0")
                  
                  if [ $crit -gt 0 ]; then
                    status="🔴 Critical"
                  elif [ $high -gt 0 ]; then
                    status="🟠 High Risk"
                  elif [ $med -gt 0 ]; then
                    status="🟡 Medium Risk"
                  else
                    status="✅ Clean"
                  fi
                  
                  echo "| \`$image_name\` | $crit | $high | $med | $low | $status |"
                fi
              done
              echo ""
              
              echo "### Dockerfile Analysis"
              echo ""
              echo "| Dockerfile | Critical | High | Medium | Low | Status |"
              echo "|:-----------|:---------|:-----|:-------|:----|:-------|"
              
              for dockerfile_file in results/container/*_full.json; do
                if [ -f "$dockerfile_file" ] && jq -e . "$dockerfile_file" >/dev/null 2>&1; then
                  dockerfile_name=$(basename "$dockerfile_file" _full.json)
                  crit=$(jq '[.vulnerabilities[]? | select(.severity == "critical")] | length' "$dockerfile_file" 2>/dev/null || echo "0")
                  high=$(jq '[.vulnerabilities[]? | select(.severity == "high")] | length' "$dockerfile_file" 2>/dev/null || echo "0")
                  med=$(jq '[.vulnerabilities[]? | select(.severity == "medium")] | length' "$dockerfile_file" 2>/dev/null || echo "0")
                  low=$(jq '[.vulnerabilities[]? | select(.severity == "low")] | length' "$dockerfile_file" 2>/dev/null || echo "0")
                  
                  if [ $crit -gt 0 ]; then
                    status="🔴 Critical"
                  elif [ $high -gt 0 ]; then
                    status="🟠 High Risk"
                  else
                    status="✅ Acceptable"
                  fi
                  
                  echo "| \`$dockerfile_name\` | $crit | $high | $med | $low | $status |"
                fi
              done
              echo ""
            else
              echo "No container scan results found."
              echo ""
            fi
            
            # Show scan summary
            echo "## 📊 Scan Summary"
            echo ""
            echo "| Scan Type | Files Processed | Status |"
            echo "|:----------|:----------------|:-------|"
            
            CONTAINER_COUNT=$(ls results/container/*.json 2>/dev/null | wc -l || echo "0")
            CODE_COUNT=$(ls results/code/*.json 2>/dev/null | wc -l || echo "0")
            IAC_COUNT=$(ls results/iac/*.json 2>/dev/null | wc -l || echo "0")
            DEP_COUNT=$(ls results/dependencies/*.json 2>/dev/null | wc -l || echo "0")
            
            echo "| Container Security | $CONTAINER_COUNT | $([ $CONTAINER_COUNT -gt 0 ] && echo "✅ Complete" || echo "⚠️ No results") |"
            echo "| Code Security | $CODE_COUNT | $([ $CODE_COUNT -gt 0 ] && echo "✅ Complete" || echo "⚠️ No results") |"
            echo "| Infrastructure as Code | $IAC_COUNT | $([ $IAC_COUNT -gt 0 ] && echo "✅ Complete" || echo "⚠️ No results") |"
            echo "| Dependencies | $DEP_COUNT | $([ $DEP_COUNT -gt 0 ] && echo "✅ Complete" || echo "⚠️ No results") |"
            echo ""
            
            # Recommendations Section
            echo "## 🔧 Remediation Recommendations"
            echo ""
            
            if [ $TOTAL_CRITICAL -gt 0 ]; then
              echo "### 🚨 Immediate Actions Required"
              echo ""
              echo "1. **Review and update base images** to latest secure versions"
              echo "2. **Update vulnerable dependencies** to patched versions"
              echo "3. **Apply security patches** for critical issues"
              echo ""
            fi
            
            if [ $TOTAL_HIGH -gt 0 ]; then
              echo "### ⚠️ High-Priority Actions (7 days)"
              echo ""
              echo "1. **Audit high-severity findings**"
              echo "2. **Implement security best practices**"
              echo "3. **Consider alternative packages** if patches unavailable"
              echo ""
            fi
            
            echo "### 💡 Long-term Security Improvements"
            echo ""
            echo "1. **Implement continuous monitoring** with Snyk integration"
            echo "2. **Establish security gates** in CI/CD pipeline"
            echo "3. **Regular security training** for development team"
            echo "4. **Automated dependency updates** with security focus"
            echo "5. **Container image scanning** in registry"
            echo ""
            
            # Debug information
            echo "## 🔧 Debug Information"
            echo ""
            echo "| Metric | Value |"
            echo "|:-------|:------|"
            echo "| Base Images Found | $(cat results/dockerfile_base_map.txt 2>/dev/null | cut -d'=' -f2 | sort -u | wc -l || echo "0") |"
            echo "| Dockerfiles Analyzed | $(cat results/dockerfile_contexts.txt 2>/dev/null | wc -l || echo "0") |"
            echo "| Scan Result Files | $SCAN_COUNT |"
            echo ""
            
            echo "---"
            echo "*Report generated at $(date -u '+%Y-%m-%d %H:%M UTC') | Powered by Snyk Comprehensive Analysis*"
            
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload Comprehensive Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-comprehensive-results-${{ github.run_number }}
          path: results/
          retention-days: 30

      - name: Notify on Critical Issues
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            🚨 Critical security vulnerabilities detected in comprehensive scan
            View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}