# Snyk scan for training‑runtime Dockerfiles
# push to main, nightly 03:00 UTC, fork PRs after label `run‑snyk`
# Fails on High/Critical CVEs

name: Snyk Dockerfile Scan

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 3 * * *"
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, labeled]

jobs:
  snyk-container-scan:
    if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-snyk') }}
    runs-on: ubuntu-latest
    concurrency:
      group: snyk-container-scan
      cancel-in-progress: true

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Free up disk space
        run: |
          # Remove unnecessary large packages
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          
          # Display available disk space
          echo "Available disk space before scan:"
          df -h

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Verify Snyk authentication
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # Verify Snyk is properly authenticated
          if ! snyk auth; then
            echo "::error::Failed to authenticate with Snyk. Please check your SNYK_TOKEN."
            exit 1
          fi
          
          echo "Snyk authentication successful"
          snyk --version

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Scan Dockerfiles with Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set -eu
          
          echo "Starting Dockerfile security scan..."

          # Find all Dockerfiles but limit
          mapfile -t ALL_DOCKERFILES < <(find . -type f -iname "Dockerfile*" -not -path "*/.*" | sort)
          
          # If too many dockerfiles, only scan X
          MAX_FILES=10
          if [ ${#ALL_DOCKERFILES[@]} -gt $MAX_FILES ]; then
            echo "Found ${#ALL_DOCKERFILES[@]} Dockerfiles, limiting scan to $MAX_FILES files"
            # Take a representative sample - first few, last few, and some from the middle
            DOCKERFILES=("${ALL_DOCKERFILES[@]:0:3}" "${ALL_DOCKERFILES[@]:$((${#ALL_DOCKERFILES[@]}/2-2)):4}" "${ALL_DOCKERFILES[@]:$((${#ALL_DOCKERFILES[@]}-3)):3}")
          else
            DOCKERFILES=("${ALL_DOCKERFILES[@]}")
          fi
          
          [ ${#DOCKERFILES[@]} -eq 0 ] && { echo "No Dockerfiles found."; exit 0; }
          echo "Will scan ${#DOCKERFILES[@]} Dockerfiles"

          SUMMARY=""
          SUMMARY_TABLE=""
          TOTAL_CRITICAL=0
          TOTAL_HIGH=0
          TOTAL_MEDIUM=0
          TOTAL_LOW=0
          SCAN_FAILURE=0
          ISSUES_COUNT=0
          CURRENT_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          TRIGGER_EVENT="${{ github.event_name }}"

          # Test a simple image first to verify Snyk is working
          echo "Testing Snyk with a simple image..."
          if ! snyk container test alpine:latest --json > test-snyk.json 2> test-snyk-error.log; then
            echo "::warning::Initial Snyk test failed. This may indicate issues with the Snyk service or authentication."
            cat test-snyk-error.log
          else
            echo "Initial Snyk test successful."
          fi
          rm -f test-snyk.json test-snyk-error.log

          for FILE in "${DOCKERFILES[@]}"; do
            echo "Scanning $FILE..."
            
            FINAL_FROM=$(grep -Ei '^FROM ' "${FILE}" | tail -1 || echo "FROM scratch")
            BASE_IMAGE_NAME=$(echo "$FINAL_FROM" | sed -E 's/^FROM[[:space:]]+//I' | cut -d' ' -f1)
            
            if [[ "$BASE_IMAGE_NAME" == "scratch" ]]; then
              echo "Skipping scratch-based image in $FILE"
              SUMMARY="$SUMMARY- $FILE: Skipped (scratch-based image)"$'\n'
              SUMMARY_TABLE="$SUMMARY_TABLE| $FILE | ⚪ Skipped | 0 high, 0 critical |\n"
              continue
            fi
            
            # Handle ARG variables in FROM
            if [[ "$BASE_IMAGE_NAME" == *'$'* || "$BASE_IMAGE_NAME" == *'{{'* || "$BASE_IMAGE_NAME" == *'}}'* ]]; then
              BASE_IMAGE_NAME="registry.access.redhat.com/ubi8/ubi-minimal:latest"
              echo "Using fallback image for $FILE: $BASE_IMAGE_NAME"
            fi

            echo "Scanning base image: $BASE_IMAGE_NAME"
            
            # Improved error handling with retry logic
            MAX_RETRIES=3
            RETRY_COUNT=0
            SCAN_SUCCESS=false
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$SCAN_SUCCESS" = false ]; do
              if snyk container test "$BASE_IMAGE_NAME" --json > "snyk-result.json" 2> "snyk-error.log"; then
                SCAN_SUCCESS=true
              else
                RETRY_COUNT=$((RETRY_COUNT + 1))
                if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                  echo "Scan failed, retrying ($RETRY_COUNT/$MAX_RETRIES)..."
                  sleep 5
                else
                  echo "::warning::All retries failed for $BASE_IMAGE_NAME. Error:"
                  cat snyk-error.log
                fi
              fi
            done
            
            if [ "$SCAN_SUCCESS" = true ] && jq -e 'has("vulnerabilities")' snyk-result.json &>/dev/null; then
              CRIT=$(jq -r '.vulnerabilities | if . == null then 0 else map(select(.severity=="critical")) | length end' snyk-result.json)
              HIGH=$(jq -r '.vulnerabilities | if . == null then 0 else map(select(.severity=="high")) | length end' snyk-result.json)
              MED=$(jq -r '.vulnerabilities | if . == null then 0 else map(select(.severity=="medium")) | length end' snyk-result.json)
              LOW=$(jq -r '.vulnerabilities | if . == null then 0 else map(select(.severity=="low")) | length end' snyk-result.json)

              SUMMARY="$SUMMARY- $FILE: ${CRIT}C ${HIGH}H ${MED}M ${LOW}L (base: $BASE_IMAGE_NAME)"$'\n'

              if [ "$CRIT" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
                STATUS="🔴 Vulnerable"
                ISSUES_COUNT=$((ISSUES_COUNT + 1))
              elif [ "$MED" -gt 0 ] || [ "$LOW" -gt 0 ]; then
                STATUS="🟡 Low Risk"
                ISSUES_COUNT=$((ISSUES_COUNT + 1))
              else
                STATUS="🟢 Secure"
              fi
              
              SUMMARY_TABLE="$SUMMARY_TABLE| $FILE | $STATUS | $HIGH high, $CRIT critical |\n"
              
              TOTAL_CRITICAL=$((TOTAL_CRITICAL + CRIT))
              TOTAL_HIGH=$((TOTAL_HIGH + HIGH))
              TOTAL_MEDIUM=$((TOTAL_MEDIUM + MED))
              TOTAL_LOW=$((TOTAL_LOW + LOW))
            else
              ERROR_MSG=$(head -n1 snyk-error.log || echo "Unknown error")
              SUMMARY="$SUMMARY- $FILE: Scan failed - $ERROR_MSG"$'\n'
              SUMMARY_TABLE="$SUMMARY_TABLE| $FILE | ❓ Scan Failed | 0 high, 0 critical |\n"
              SCAN_FAILURE=$((SCAN_FAILURE + 1))
            fi
          
            rm -f snyk-result.json snyk-error.log

            echo "Available disk space during scan:"
            df -h
          done

          # Check if all scans failed
          if [ "$SCAN_FAILURE" -eq "${#DOCKERFILES[@]}" ]; then
            echo "::warning::All scans failed. This may indicate an issue with Snyk configuration or service availability."
          fi

          REPORT="# Dockerfile Security Analysis Results\n\n"
          REPORT+="## Executive Overview\n\n"
          REPORT+="* Dockerfiles Analyzed: ${#DOCKERFILES[@]}\n"
          REPORT+="* Dockerfiles with Security Issues: $ISSUES_COUNT\n"
          REPORT+="* Total Vulnerabilities: $TOTAL_HIGH high, $TOTAL_CRITICAL critical\n"
          REPORT+="* Scans Failed: $SCAN_FAILURE\n"
          REPORT+="* Analysis Date: $CURRENT_DATE\n"
          REPORT+="* Triggered by: $TRIGGER_EVENT\n\n"
          
          REPORT+="## Results by Dockerfile\n\n"
          REPORT+="| Dockerfile | Status | Vulnerabilities |\n"
          REPORT+="|------------|--------|----------------|\n"
          REPORT+="$SUMMARY_TABLE\n"
          
          REPORT+="## Security Recommendations\n\n"
          
          if [ "$SCAN_FAILURE" -eq "${#DOCKERFILES[@]}" ]; then
            REPORT+="⚠️ **All scans failed to complete.** This may indicate an issue with Snyk configuration or service availability.\n\n"
            REPORT+="* Verify Snyk API token is valid\n"
            REPORT+="* Check Snyk service status\n"
            REPORT+="* Ensure base images are accessible\n"
          elif [ "$TOTAL_CRITICAL" -gt 0 ] || [ "$TOTAL_HIGH" -gt 0 ]; then
            REPORT+="⚠️ **Critical security issues detected.** Immediate attention required.\n\n"
            REPORT+="* Update base images to newer versions with security patches\n"
            REPORT+="* Consider using Red Hat UBI or other security-focused base images\n"
            REPORT+="* Review the detailed scan results for specific CVEs\n"
          elif [ "$SCAN_FAILURE" -gt 0 ]; then
            REPORT+="⚠️ **Some scans failed to complete.** Review the logs for more information.\n\n"
            REPORT+="* Ensure base images are accessible\n"
            REPORT+="* Check for valid Dockerfile syntax\n"
          elif [ "$TOTAL_MEDIUM" -gt 0 ] || [ "$TOTAL_LOW" -gt 0 ]; then
            REPORT+="ℹ️ **Low severity issues found.** Consider addressing in future updates.\n\n"
            REPORT+="* Plan for base image updates in upcoming release cycles\n"
            REPORT+="* Monitor these vulnerabilities for changes in severity\n"
          else
            REPORT+="✅ **No security issues detected.** Continue with good security practices.\n\n"
            REPORT+="* Maintain regular scanning schedule\n"
            REPORT+="* Keep base images updated\n"
          fi
          
          REPORT+="\n_Job summary generated at run-time_\n"

          echo "SUMMARY<<EOF" >> $GITHUB_ENV
          echo "$REPORT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "SCAN_FAILURE=${SCAN_FAILURE}" >> $GITHUB_ENV
          echo "TOTAL_CRITICAL=${TOTAL_CRITICAL}" >> $GITHUB_ENV
          echo "TOTAL_HIGH=${TOTAL_HIGH}" >> $GITHUB_ENV
          echo "ALL_FAILED=$([[ "$SCAN_FAILURE" -eq "${#DOCKERFILES[@]}" ]] && echo "true" || echo "false")" >> $GITHUB_ENV

      - name: Create Summary
        run: |
          echo "${{ env.SUMMARY }}" >> $GITHUB_STEP_SUMMARY

      - name: Slack Notification
        if: ${{ always() && env.SLACK_WEBHOOK_URL != '' }}
        env:
          SUMMARY: ${{ env.SUMMARY }}
          SCAN_FAILURE: ${{ env.SCAN_FAILURE }}
          TOTAL_CRITICAL: ${{ env.TOTAL_CRITICAL }}
          TOTAL_HIGH: ${{ env.TOTAL_HIGH }}
          ALL_FAILED: ${{ env.ALL_FAILED }}
        run: |
          if [ "$ALL_FAILED" = "true" ]; then
            STATUS="🔄 *Dockerfile Security Scan - All Scans Failed*"
            MESSAGE="All Dockerfile scans failed. This may indicate an issue with Snyk configuration or service availability."
          elif [ "$TOTAL_CRITICAL" -gt 0 ] || [ "$TOTAL_HIGH" -gt 0 ]; then
            STATUS="🚨 *Dockerfile Security Scan - Critical Vulnerabilities Detected*"
            MESSAGE="Critical or high severity vulnerabilities detected in base images."
          elif [ "$SCAN_FAILURE" -ne 0 ]; then
            STATUS="⚠️ *Dockerfile Security Scan - Completed with Some Errors*"
            MESSAGE="Some scans failed to complete. Review the logs for more information."
          else
            STATUS="✅ *Dockerfile Security Scan - Completed Successfully*"
            MESSAGE="No critical or high severity vulnerabilities detected."
          fi

          PAYLOAD="{\"text\":\"${STATUS}\n${MESSAGE}\n\`\`\`\n${SUMMARY}\n\`\`\`\"}"
          curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      - name: Check for critical vulnerabilities
        if: ${{ github.event_name == 'pull_request' && env.ALL_FAILED != 'true' && (env.TOTAL_CRITICAL > 0 || env.TOTAL_HIGH > 0) }}
        run: |
          echo "Critical or high severity vulnerabilities detected in base images."
          echo "Please review the security scan results and update the base images."
          exit 1
