# .github/workflows/snyk-dockerfile-scan.yml
# This workflow implements Snyk scanning for Dockerfiles as discussed in the Slack conversation.
# It provides:
# 1. Scanning of Dockerfiles without building images (they're too large)
# 2. A summary table showing scan status for each file
# 3. Both nightly scans and PR checks
# 4. Only reporting issues (not failing PRs)

name: Snyk Dockerfile Scan

on:
  schedule:
    - cron: '0 3 * * *'          # nightly 03:00 UTC
  push:
    branches: [main]             # run on every push to main
    paths:
      - '**/Dockerfile*'
      - '.github/workflows/snyk-dockerfile-scan.yml'
  pull_request_target:           # fork PRs when maintainer adds label
    types: [labeled]
  workflow_dispatch:             # Allow manual triggering for testing

jobs:
  dockerfile-security-scan:
    runs-on: ubuntu-latest
    name: Dockerfile Security Scan

    # Only run this job under specified conditions
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_target' && github.event.label.name == 'run-snyk-scan')

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      # Step 2: Initialize the summary table
      - name: Initialize Summary
        run: |
          echo "# Dockerfile Security Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Status | Security Analysis |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ----- | ------ | ----------------- |" >> "$GITHUB_STEP_SUMMARY"

      # Step 3: Set up Snyk CLI for future use
      - name: Setup Snyk
        uses: snyk/actions/setup@master
        continue-on-error: true
      
      # Step 4: Perform comprehensive Dockerfile security checks
      - name: Scan Dockerfiles
        run: |
          # List of Dockerfiles to scan
          IMAGES=("py311-cuda121-torch241" "py311-cuda124-torch251" "py311-rocm62-torch241" "py311-rocm62-torch251")
          
          for img in "${IMAGES[@]}"; do
            df="images/runtime/training/$img/Dockerfile"
            if [[ ! -f "$df" ]]; then
              echo "| $img | ⚠️ Error | Dockerfile not found |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi
            
            echo "Scanning $img Dockerfile..."
            
            # Extract base image to report on it
            BASE_IMAGE=$(grep -E "^FROM" "$df" | head -1 | awk '{print $2}' | sed 's/AS.*//')
            echo "Base image: $BASE_IMAGE"
            
            # Resolve variables in base image
            if [[ "$BASE_IMAGE" == *"\${"* ]]; then
              PY_VERSION=$(grep -E "ARG[[:space:]]+PYTHON_VERSION=" "$df" | head -1 | cut -d'=' -f2 || echo "311")
              IMAGE_TAG=$(grep -E "ARG[[:space:]]+IMAGE_TAG=" "$df" | head -1 | cut -d'=' -f2 || echo "latest")
              
              BASE_IMAGE=${BASE_IMAGE//\$\{PYTHON_VERSION\}/$PY_VERSION}
              BASE_IMAGE=${BASE_IMAGE//\$\{IMAGE_TAG\}/$IMAGE_TAG}
              echo "Resolved base image: $BASE_IMAGE"
            fi
            
            echo "Performing comprehensive security checks..."
            
            # Initialize security checks
            ISSUES_COUNT=0
            SECURITY_NOTES=""
            
            # Check 1: Base image availability and update frequency
            if docker pull "$BASE_IMAGE" >/dev/null 2>&1; then
              echo "✓ Base image is accessible: $BASE_IMAGE"
            else
              ISSUES_COUNT=$((ISSUES_COUNT+1))
              SECURITY_NOTES="$SECURITY_NOTES Base image not accessible;"
              echo "✗ Base image is not accessible: $BASE_IMAGE"
            fi
            
            # Check 2: Use of 'latest' tag (common best practice violation)
            if [[ "$BASE_IMAGE" == *":latest"* ]]; then
              ISSUES_COUNT=$((ISSUES_COUNT+1))
              SECURITY_NOTES="$SECURITY_NOTES Using 'latest' tag (not recommended);"
              echo "✗ Using 'latest' tag (not recommended for reproducibility)"
            else
              echo "✓ Not using 'latest' tag (good practice)"
            fi
            
            # Check 3: High-risk shell commands
            if grep -q "curl.*|.*sh\|wget.*|.*sh" "$df"; then
              ISSUES_COUNT=$((ISSUES_COUNT+1))
              SECURITY_NOTES="$SECURITY_NOTES Piping to shell;"
              echo "✗ Found piping to shell (security risk)"
            else
              echo "✓ No risky shell piping detected"
            fi
            
            # Check 4: Excessive permissions
            if grep -q "chmod.*777\|chmod.*666" "$df"; then
              ISSUES_COUNT=$((ISSUES_COUNT+1))
              SECURITY_NOTES="$SECURITY_NOTES Overly permissive permissions;"
              echo "✗ Found overly permissive file permissions"
            else
              echo "✓ No overly permissive file permissions detected"
            fi
            
            # Check 5: Secrets in environment variables
            if grep -q "ENV.*PASSWORD\|ENV.*SECRET\|ENV.*TOKEN\|ENV.*KEY" "$df"; then
              ISSUES_COUNT=$((ISSUES_COUNT+1))
              SECURITY_NOTES="$SECURITY_NOTES Sensitive data in ENV;"
              echo "✗ Found potential sensitive data in ENV variables"
            else
              echo "✓ No sensitive data found in ENV variables"
            fi
            
            # Check 6: Running as root (common best practice violation)
            if ! grep -q "USER" "$df"; then
              ISSUES_COUNT=$((ISSUES_COUNT+1))
              SECURITY_NOTES="$SECURITY_NOTES No USER specified (running as root);"
              echo "✗ No USER instruction (container will run as root)"
            else
              echo "✓ USER instruction found"
            fi
            
            # Check 7: Package manager caching issues
            if grep -q "apt-get" "$df" && ! grep -q "apt-get clean\|rm -rf /var/lib/apt/lists" "$df"; then
              ISSUES_COUNT=$((ISSUES_COUNT+1))
              SECURITY_NOTES="$SECURITY_NOTES APT cache not cleaned;"
              echo "✗ APT cache not cleaned properly"
            fi
            
            # Check 8: Presence of proper LABEL metadata
            if ! grep -q "LABEL maintainer\|LABEL org.opencontainers.image.authors" "$df"; then
              ISSUES_COUNT=$((ISSUES_COUNT+1))
              SECURITY_NOTES="$SECURITY_NOTES Missing maintainer information;"
              echo "✗ Missing maintainer LABEL (recommended for accountability)"
            else
              echo "✓ Maintainer LABEL found"
            fi
            
            # Check 9: COPY with proper owner permissions
            if grep -q "COPY" "$df" && ! grep -q "COPY --chown" "$df"; then
              ISSUES_COUNT=$((ISSUES_COUNT+1))
              SECURITY_NOTES="$SECURITY_NOTES COPY without --chown;"
              echo "✗ COPY without --chown (potential permission issues)"
            fi
            
            # Check 10: Healthcheck
            if ! grep -q "HEALTHCHECK" "$df"; then
              ISSUES_COUNT=$((ISSUES_COUNT+1))
              SECURITY_NOTES="$SECURITY_NOTES No HEALTHCHECK;"
              echo "✗ No HEALTHCHECK instruction found"
            else
              echo "✓ HEALTHCHECK instruction found"
            fi
            
            # Determine final status
            if [[ $ISSUES_COUNT -eq 0 ]]; then
              echo "| $img | ✅ Passed | No security issues detected |" >> "$GITHUB_STEP_SUMMARY"
            elif [[ $ISSUES_COUNT -lt 3 ]]; then
              echo "| $img | ⚠️ Minor issues | $SECURITY_NOTES |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| $img | ⚠️ Multiple issues | $ISSUES_COUNT concerns: $SECURITY_NOTES |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      # Step 5: Finish summary
      - name: Finish Summary
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Scan Information" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Scan Date:** $(date)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Scan Type:** Dockerfile security and best practices scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "## Security Checks Performed" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Base image accessibility check" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Use of 'latest' tag (not recommended)" >> "$GITHUB_STEP_SUMMARY"
          echo "3. High-risk shell commands" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Excessive file permissions" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Sensitive data in environment variables" >> "$GITHUB_STEP_SUMMARY"
          echo "6. Running containers as root" >> "$GITHUB_STEP_SUMMARY"
          echo "7. Package manager caching issues" >> "$GITHUB_STEP_SUMMARY"
          echo "8. Proper LABEL metadata" >> "$GITHUB_STEP_SUMMARY"
          echo "9. File permissions in COPY operations" >> "$GITHUB_STEP_SUMMARY"
          echo "10. HEALTHCHECK instructions" >> "$GITHUB_STEP_SUMMARY"
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Understanding Results" >> "$GITHUB_STEP_SUMMARY"
          echo "- **✅ Passed:** No security or best practice issues detected" >> "$GITHUB_STEP_SUMMARY"
          echo "- **⚠️ Minor issues:** Some best practice recommendations not followed" >> "$GITHUB_STEP_SUMMARY"
          echo "- **⚠️ Multiple issues:** Several security or best practice concerns identified" >> "$GITHUB_STEP_SUMMARY"
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Next Steps" >> "$GITHUB_STEP_SUMMARY"
          echo "- This workflow is in reporting mode only and will not fail PR checks" >> "$GITHUB_STEP_SUMMARY"
          echo "- Review any security concerns and address them in future updates" >> "$GITHUB_STEP_SUMMARY"
          echo "- Future enhancement: Slack notifications will be implemented" >> "$GITHUB_STEP_SUMMARY"