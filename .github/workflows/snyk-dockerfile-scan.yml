name: Snyk Dockerfile Security Scan
on:
  push:
    branches: [ main ]
    paths:
      - 'images/runtime/training/*/Dockerfile'
  pull_request_target:
    types: [ labeled ]
  pull_request:
    paths:
      - 'images/runtime/training/*/Dockerfile'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      target_dir:
        description: 'Specific directory within training to scan (leave empty for all)'
        required: false
        default: ''
        type: string

jobs:
  snyk-dockerfile-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Snyk
        uses: snyk/actions/setup@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Verify Snyk Token
        id: verify_token
        run: |
          # Check if SNYK_TOKEN is set
          if [ -z "$SNYK_TOKEN" ]; then
            echo "::error::SNYK_TOKEN is not set. Please add the SNYK_TOKEN secret to your repository."
            echo "token_present=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "::notice::SNYK_TOKEN is set."
            echo "token_present=true" >> $GITHUB_OUTPUT
          fi
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Scan Dockerfiles
        id: scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          DEBUG_MODE: ${{ github.event.inputs.debug == 'true' }}
          TARGET_DIR: ${{ github.event.inputs.target_dir }}
        run: |
          set -euo pipefail
          
          if [ "$DEBUG_MODE" = "true" ]; then
            set -x
            echo "Running in debug mode"
          fi
          
          # Only use file scanning - no container scanning
          echo "::notice::Using file scanning mode for Dockerfile analysis"
          TRAINING_DIR="images/runtime/training"
          
          HAS_HIGH_SEVERITY=false
          HAS_ISSUES=false
          ROWS=""
          PASSED_COUNT=0
          ISSUES_COUNT=0
          HIGH_COUNT=0
          
          declare -A IMAGE_TYPES
          IMAGE_TYPES["py311-cuda121-torch241"]="CUDA 12.1 + PyTorch 2.4.1"
          IMAGE_TYPES["py311-cuda124-torch251"]="CUDA 12.4 + PyTorch 2.5.1"
          IMAGE_TYPES["py311-rocm62-torch241"]="ROCm 6.2 + PyTorch 2.4.1"
          IMAGE_TYPES["py311-rocm62-torch251"]="ROCm 6.2 + PyTorch 2.5.1"
          
          if [ -n "$TARGET_DIR" ]; then
            # Single directory mode - only scan the specified directory within training
            DOCKERFILE_DIRS=("$TARGET_DIR")
            echo "Scanning single directory: $TRAINING_DIR/$TARGET_DIR"
          else
            # Default - scan all training directories
            DOCKERFILE_DIRS=(
              "py311-cuda121-torch241"
              "py311-cuda124-torch251"
              "py311-rocm62-torch241"
              "py311-rocm62-torch251"
            )
            echo "Scanning all training Dockerfiles"
          fi
          
          REPORT_ROWS=()
          
          # Create results directory for scans
          mkdir -p scan_results
          
          for DIR in "${DOCKERFILE_DIRS[@]}"; do
            DOCKERFILE_PATH="$TRAINING_DIR/${DIR}/Dockerfile"
            echo "Scanning ${DIR} Dockerfile..."
            
            if [ ! -f "$DOCKERFILE_PATH" ]; then
              REPORT_ROWS+=("${DIR}|${IMAGE_TYPES[$DIR]}|❌ Fail|Dockerfile not found|N/A")
              ROWS+=$'\n'"• ${DIR}: ❌ Failed (not found)"
              HAS_ISSUES=true
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
              continue
            fi
            
            VULN_ISSUES="None"
            CONFIG_ISSUES=()
            SCAN_RESULTS_DIR="scan_results/${DIR}"
            mkdir -p "$SCAN_RESULTS_DIR"
            
            # Analyze Dockerfile for security issues
            echo "Analyzing Dockerfile for security issues..."
            
            # Check for common security issues in Dockerfile
            if grep -i "FROM.*latest" "$DOCKERFILE_PATH" >/dev/null; then
              CONFIG_ISSUES+=("Using 'latest' tag (use specific versions)")
            fi
            
            if grep -E "ENV.*(PASSWORD|SECRET|KEY|TOKEN).*=" "$DOCKERFILE_PATH" >/dev/null; then
              CONFIG_ISSUES+=("Potential secrets in ENV")
            fi
            
            if ! grep -q "USER" "$DOCKERFILE_PATH" >/dev/null; then
              CONFIG_ISSUES+=("Missing USER instruction (runs as root)")
            fi
            
            if grep -i "RUN.*curl.*\|\|.*wget.*http:" "$DOCKERFILE_PATH" >/dev/null; then
              CONFIG_ISSUES+=("Insecure downloads (HTTP)")
            fi
            
            if grep -i "RUN.*apt-get.*-y" "$DOCKERFILE_PATH" >/dev/null && ! grep -i "apt-get clean" "$DOCKERFILE_PATH" >/dev/null; then
              CONFIG_ISSUES+=("Missing cleanup after package install")
            fi
            
            if grep -i "RUN.*pip install" "$DOCKERFILE_PATH" >/dev/null && ! grep -i "pip install.*==.*" "$DOCKERFILE_PATH" >/dev/null; then
              CONFIG_ISSUES+=("Unpinned pip packages")
            fi
            
            # Check for multiple FROM statements (multi-stage builds are good)
            FROM_COUNT=$(grep -c "^FROM" "$DOCKERFILE_PATH" || true)
            if [ "$FROM_COUNT" -eq 1 ] && grep -q "^FROM.*as" "$DOCKERFILE_PATH"; then
              # Single FROM with 'as' stage naming but no second stage
              CONFIG_ISSUES+=("Incomplete multi-stage build")
            fi
            
            # Docker best practices
            if ! grep -q "WORKDIR" "$DOCKERFILE_PATH" >/dev/null; then
              CONFIG_ISSUES+=("Missing WORKDIR (using default root dir)")
            fi
            
            # Check for HEALTHCHECK in service containers
            if grep -q "EXPOSE" "$DOCKERFILE_PATH" >/dev/null && ! grep -q "HEALTHCHECK" "$DOCKERFILE_PATH" >/dev/null; then
              CONFIG_ISSUES+=("Service container missing HEALTHCHECK")
            fi
            
            # Use direct file scanning with Snyk
            echo "Scanning Dockerfile with Snyk..."
            
            # Try Snyk IaC scanning
            for ATTEMPT in {1..2}; do
              echo "File scan attempt $ATTEMPT of 2..."
              snyk iac test "$DOCKERFILE_PATH" --severity-threshold=medium > "${SCAN_RESULTS_DIR}/file_scan.txt" 2>&1 || true
              SCAN_EXIT_CODE=$?
              
              if [ $SCAN_EXIT_CODE -eq 0 ] || [ $SCAN_EXIT_CODE -eq 1 ]; then
                break
              fi
              sleep 2
            done
            
            # Show output in debug mode
            if [ "$DEBUG_MODE" = "true" ]; then
              echo "File scan exit code: $SCAN_EXIT_CODE"
              echo "File scan output:"
              cat "${SCAN_RESULTS_DIR}/file_scan.txt" || true
            fi
            
            # If Snyk IaC found issues, use those results
            if grep -q "issue" "${SCAN_RESULTS_DIR}/file_scan.txt" 2>/dev/null; then
              if grep -qi "critical severity" "${SCAN_RESULTS_DIR}/file_scan.txt" 2>/dev/null; then
                VULN_ISSUES="Critical severity"
                HAS_HIGH_SEVERITY=true
                HIGH_COUNT=$((HIGH_COUNT + 1))
              elif grep -qi "high severity" "${SCAN_RESULTS_DIR}/file_scan.txt" 2>/dev/null; then
                VULN_ISSUES="High severity"
                HAS_HIGH_SEVERITY=true
                HIGH_COUNT=$((HIGH_COUNT + 1))
              elif grep -qi "medium severity" "${SCAN_RESULTS_DIR}/file_scan.txt" 2>/dev/null; then
                VULN_ISSUES="Medium severity"
                HAS_ISSUES=true
                ISSUES_COUNT=$((ISSUES_COUNT + 1))
              elif grep -qi "low severity" "${SCAN_RESULTS_DIR}/file_scan.txt" 2>/dev/null; then
                VULN_ISSUES="Low severity"
              fi
            else
              # Otherwise, use the enhanced Dockerfile analysis results
              echo "Using enhanced Dockerfile analysis results"
              VULN_ISSUES="File analysis only"
            fi
            
            # Determine final status based on results
            if [ ${#CONFIG_ISSUES[@]} -eq 0 ]; then
              CONFIG_ISSUES_STR="None"
            else
              CONFIG_ISSUES_STR=$(IFS=", "; echo "${CONFIG_ISSUES[*]}")
            fi
            
            if [ "$VULN_ISSUES" = "None" ] && [ "$CONFIG_ISSUES_STR" = "None" ]; then
              STATUS="✅ Pass"
              PASSED_COUNT=$((PASSED_COUNT + 1))
            elif [ "$VULN_ISSUES" = "Critical severity" ] || [ "$VULN_ISSUES" = "High severity" ]; then
              STATUS="❌ Fail"
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
            else
              STATUS="⚠️ Warning"
              ISSUES_COUNT=$((ISSUES_COUNT + 1))
            fi
            
            REPORT_ROWS+=("${DIR}|${IMAGE_TYPES[$DIR]}|${STATUS}|${VULN_ISSUES}|${CONFIG_ISSUES_STR}")
            ROWS+=$'\n'"• ${DIR}: ${STATUS}"
          done
          
          # Determine overall status
          if $HAS_HIGH_SEVERITY; then
            OVERALL_STATUS="❌ Failed"
          elif $HAS_ISSUES; then 
            OVERALL_STATUS="⚠️ Issues Found"
          else
            OVERALL_STATUS="✅ All Secure"
          fi
          
          # Get Snyk version for reporting
          SNYK_VERSION=$(snyk --version || echo "Unknown")
          
          # Set timezone for consistent reporting
          TZ=Europe/London
          export TZ
          LON_DATE="$(date '+%a %d %b %Y %T %Z')"
          
          # Create GitHub step summary
          echo "# Dockerfile Security Scan Results" > "$GITHUB_STEP_SUMMARY"
          
          echo "## Summary Overview" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|:-------|:------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Scan Date** | $LON_DATE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Status** | $OVERALL_STATUS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Snyk Version** | $SNYK_VERSION |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Scanner Mode** | Dockerfile Analysis Only |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Total Images** | ${#DOCKERFILE_DIRS[@]} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Passed** | $PASSED_COUNT |" >> "$GITHUB_STEP_SUMMARY" 
          echo "| **Issues** | $ISSUES_COUNT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Critical/High** | $HIGH_COUNT |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "## Detailed Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "<table>" >> "$GITHUB_STEP_SUMMARY"
          echo "  <tr>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Dockerfile</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Image Type</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='center'>Status</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Security Issues</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "    <th align='left'>Configuration Issues</th>" >> "$GITHUB_STEP_SUMMARY"
          echo "  </tr>" >> "$GITHUB_STEP_SUMMARY"
          
          for ROW in "${REPORT_ROWS[@]}"; do
            IFS='|' read -r DIR IMAGE_TYPE STATUS VULN CONFIG <<< "$ROW"
            echo "  <tr>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${DIR}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${IMAGE_TYPE}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td align='center'>${STATUS}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${VULN}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "    <td>${CONFIG}</td>" >> "$GITHUB_STEP_SUMMARY"
            echo "  </tr>" >> "$GITHUB_STEP_SUMMARY"
          done
          
          echo "</table>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          echo "## Security Checks Performed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check Type | Description | Severity |" >> "$GITHUB_STEP_SUMMARY"
          echo "|:-----------|:------------|:---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Dockerfile Scan** | Detects security issues in Dockerfile configuration | Critical/High = Fail |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Secret Detection** | Identifies potential secrets in ENV variables | Warning |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **User Configuration** | Verifies non-root USER instruction | Warning |" >> "$GITHUB_STEP_SUMMARY"
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Notes" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow uses file analysis only to avoid building large images" >> "$GITHUB_STEP_SUMMARY"
          echo "- File scanning checks for Dockerfile best practices and common security issues" >> "$GITHUB_STEP_SUMMARY"
          echo "- Setting a specific USER in Dockerfiles is recommended (avoids running as root)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Always pin package versions for better security and reproducibility" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scans run nightly at 03:00 UTC" >> "$GITHUB_STEP_SUMMARY"
          
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details>" >> "$GITHUB_STEP_SUMMARY"
          echo "<summary>Technical Scan Information</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Scanner:** Snyk IaC/File Analysis" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Scan Parameters:** \`--severity-threshold=medium\`" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Scan Type:** Dockerfile static analysis" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Workflow Run ID:** \`${{ github.run_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          
          # Output results for use in later steps
          echo "results<<EOF" >> $GITHUB_OUTPUT
          echo -e "${ROWS}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          # Output status for Slack notification
          if $HAS_HIGH_SEVERITY; then
            echo "status=high_severity" >> $GITHUB_OUTPUT
          elif $HAS_ISSUES; then
            echo "status=issues_found" >> $GITHUB_OUTPUT
          else
            echo "status=secure" >> $GITHUB_OUTPUT
          fi
          
          echo "debug_mode=$DEBUG_MODE" >> $GITHUB_OUTPUT
          echo "snyk_version=$SNYK_VERSION" >> $GITHUB_OUTPUT
          echo "scanner_mode=file" >> $GITHUB_OUTPUT
          
          # Fail the workflow if high severity issues are found
          if $HAS_HIGH_SEVERITY; then
            echo "❌ High/Critical security issues detected — failing the workflow."
            exit 1
          fi

      - name: Slack Notification
        if: >
          always() &&
          (steps.scan.outputs.status != 'secure' || 
          github.event.inputs.debug == 'true' || 
          github.event_name == 'schedule' ||
          job.status == 'failure')
        continue-on-error: true
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          fields: repo,workflow
          custom_payload: |
            {
              "attachments": [
                {
                  "color": "${{ job.status == 'failure' && 'danger' || steps.scan.outputs.status == 'secure' && 'good' || steps.scan.outputs.status == 'high_severity' && 'danger' || 'warning' }}",
                  "title": "Dockerfile Security Scan Results",
                  "text": "${{ job.status == 'failure' && '🚨 Workflow failed' || steps.scan.outputs.status == 'secure' && '✅ All Dockerfiles are secure' || steps.scan.outputs.status == 'high_severity' && '🚨 High severity issues detected' || '⚠️ Security issues detected' }}\n${{ steps.scan.outputs.results }}\n\n*Scanner:* Dockerfile Analysis | *Snyk Version:* ${{ steps.scan.outputs.snyk_version || 'Unknown' }}",
                  "mrkdwn_in": ["text"],
                  "footer": "Snyk Dockerfile Security Scan | Run ID: ${{ github.run_id }} | $(TZ=Europe/London date '+%d-%m-%Y %H:%M %Z')"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}