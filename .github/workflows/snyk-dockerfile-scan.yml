# Snyk scan for training‑runtime Dockerfiles
# Push to main, nightly 03:00 UTC, fork PRs after label `run‑snyk`
# Fails on High/Critical CVEs

name: Snyk Dockerfile Scan

on:
  push:
    branches: ["main"]
    paths:
      - '**/Dockerfile*'
      - '.github/workflows/snyk-dockerfile-scan.yml'
  schedule:
    - cron: "0 3 * * *"
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, labeled]
    paths:
      - '**/Dockerfile*'

jobs:
  snyk-container-scan:
    if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-snyk') }}
    runs-on: ubuntu-latest
    concurrency:
      group: snyk-container-scan
      cancel-in-progress: true

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Find Dockerfiles
        id: find-dockerfiles
        run: |
          set -eu
          
          echo "Finding Dockerfiles for analysis..."
          
          # Find all Dockerfiles but exclude examples and tests
          mapfile -t ALL_DOCKERFILES < <(find . -type f -iname "Dockerfile*" -not -path "*/.*" -not -path "*/examples/*" -not -path "*/tests/*" | sort)
          
          # If too many dockerfiles, only analyze a subset
          MAX_FILES=15
          if [ ${#ALL_DOCKERFILES[@]} -gt $MAX_FILES ]; then
            echo "Found ${#ALL_DOCKERFILES[@]} Dockerfiles, limiting analysis to $MAX_FILES files"
            # Take a representative sample - first few, last few, and some from the middle
            DOCKERFILES=("${ALL_DOCKERFILES[@]:0:5}" "${ALL_DOCKERFILES[@]:$((${#ALL_DOCKERFILES[@]}/2-2)):5}" "${ALL_DOCKERFILES[@]:$((${#ALL_DOCKERFILES[@]}-5)):5}")
          else
            DOCKERFILES=("${ALL_DOCKERFILES[@]}")
          fi
          
          [ ${#DOCKERFILES[@]} -eq 0 ] && { echo "No Dockerfiles found."; exit 0; }
          echo "Will analyze ${#DOCKERFILES[@]} Dockerfiles"
          
          # Create a JSON array of Dockerfile paths to pass to the next step
          JSON_ARRAY=$(printf '%s\n' "${DOCKERFILES[@]}" | jq -R . | jq -s .)
          echo "dockerfiles=$JSON_ARRAY" >> $GITHUB_OUTPUT

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Setup node (required for Snyk)
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Authenticate with Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Scan Dockerfiles with Snyk
        id: snyk-scan
        env:
          DOCKERFILES: ${{ steps.find-dockerfiles.outputs.dockerfiles }}
        run: |
          set -eu
          
          echo "Starting Snyk Dockerfile security analysis..."
          
          # Parse the JSON array of Dockerfiles
          readarray -t DOCKERFILES < <(echo "$DOCKERFILES" | jq -r '.[]')
          
          CURRENT_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          TRIGGER_EVENT="${{ github.event_name }}"
          
          # Create structured table headers for summary
          SUMMARY_TABLE="| Dockerfile | Base Image | Status | Issues |\n"
          SUMMARY_TABLE+="|------------|------------|--------|--------|\n"
          
          # Create detailed findings table
          DETAILS_TABLE="| Dockerfile | Issue | Severity | Package | Fix Version |\n"
          DETAILS_TABLE+="|------------|-------|----------|---------|-------------|\n"

          ISSUES_COUNT=0
          HIGH_RISK_COUNT=0
          
          # Analyze each Dockerfile
          for FILE in "${DOCKERFILES[@]}"; do
            echo "Analyzing $FILE..."
            
            # Extract base image for reporting
            FINAL_FROM=$(grep -Ei '^FROM ' "${FILE}" | tail -1 || echo "FROM scratch")
            BASE_IMAGE_NAME=$(echo "$FINAL_FROM" | sed -E 's/^FROM[[:space:]]+//I' | cut -d' ' -f1)
            
            # Run Snyk container test without building the image (--file option)
            # Note: This scans the Dockerfile, not a built image
            TEMP_OUTPUT_FILE=$(mktemp)
            if snyk container test --file=${FILE} --json > "$TEMP_OUTPUT_FILE" 2>&1; then
              echo "$FILE - No vulnerabilities found"
              STATUS="🟢 Secure"
              ISSUE_COUNT=0
              SUMMARY_TABLE+="| $FILE | $BASE_IMAGE_NAME | $STATUS | $ISSUE_COUNT |\n"
            else
              # Extract vulnerabilities from Snyk JSON output
              if [ -s "$TEMP_OUTPUT_FILE" ]; then
                # Try to parse JSON output
                if jq -e . "$TEMP_OUTPUT_FILE" >/dev/null 2>&1; then
                  VULNERABILITIES=$(jq -r '.vulnerabilities // []' "$TEMP_OUTPUT_FILE")
                  HIGH_VULNS=$(jq -r '[.vulnerabilities[] | select(.severity == "high" or .severity == "critical")] | length' "$TEMP_OUTPUT_FILE")
                  TOTAL_VULNS=$(jq -r '.vulnerabilities | length // 0' "$TEMP_OUTPUT_FILE")
                  
                  HIGH_RISK_COUNT=$((HIGH_RISK_COUNT + HIGH_VULNS))
                  ISSUES_COUNT=$((ISSUES_COUNT + 1))
                  
                  if [ "$HIGH_VULNS" -gt 0 ]; then
                    STATUS="🔴 High Risk"
                  else
                    STATUS="🟡 Low Risk"
                  fi
                  
                  SUMMARY_TABLE+="| $FILE | $BASE_IMAGE_NAME | $STATUS | $TOTAL_VULNS |\n"
                  
                  # Add top 5 most severe vulnerabilities to the detailed findings table
                  TOP_VULNS=$(jq -r '.vulnerabilities | sort_by(.cvssScore) | reverse | .[0:5]' "$TEMP_OUTPUT_FILE")
                  
                  for VULN in $(echo "$TOP_VULNS" | jq -c '.[]'); do
                    VULN_ID=$(echo "$VULN" | jq -r '.id')
                    SEVERITY=$(echo "$VULN" | jq -r '.severity')
                    PACKAGE=$(echo "$VULN" | jq -r '.packageName')
                    FIX_VERSION=$(echo "$VULN" | jq -r '.fixedIn[0] // "Not available"')
                    
                    SEVERITY_ICON="⚠️"
                    if [[ "$SEVERITY" == "high" ]]; then
                      SEVERITY_ICON="🟠"
                    elif [[ "$SEVERITY" == "critical" ]]; then
                      SEVERITY_ICON="🔴"
                    fi
                    
                    DETAILS_TABLE+="| $FILE | $VULN_ID | $SEVERITY_ICON ${SEVERITY^^} | $PACKAGE | $FIX_VERSION |\n"
                  done
                else
                  # If JSON parsing failed, do static analysis as fallback
                  echo "Warning: Could not parse Snyk output for $FILE, falling back to static analysis"
                  STATIC_ISSUES=0
                  
                  # Perform minimal static analysis for critical issues
                  if [[ "$BASE_IMAGE_NAME" == *":latest"* ]]; then
                    STATIC_ISSUES=$((STATIC_ISSUES + 1))
                    DETAILS_TABLE+="| $FILE | Using 'latest' tag | 🔴 HIGH | Base image | Use specific version |\n"
                  fi
                  
                  if ! grep -q "USER " "$FILE" || grep -q "USER root" "$FILE" || grep -q "USER 0" "$FILE"; then
                    STATIC_ISSUES=$((STATIC_ISSUES + 1))
                    DETAILS_TABLE+="| $FILE | Running as root | 🔴 HIGH | Container security | Add non-root user |\n"
                  fi
                  
                  if [ "$STATIC_ISSUES" -gt 0 ]; then
                    STATUS="🔴 High Risk (Static Analysis)"
                    HIGH_RISK_COUNT=$((HIGH_RISK_COUNT + 1))
                  else
                    STATUS="⚠️ Unknown (Snyk Scan Failed)"
                  fi
                  
                  ISSUES_COUNT=$((ISSUES_COUNT + 1))
                  SUMMARY_TABLE+="| $FILE | $BASE_IMAGE_NAME | $STATUS | $STATIC_ISSUES |\n"
                fi
              else
                echo "Warning: Empty output from Snyk for $FILE"
                STATUS="⚠️ Scan Failed"
                SUMMARY_TABLE+="| $FILE | $BASE_IMAGE_NAME | $STATUS | Unknown |\n"
                ISSUES_COUNT=$((ISSUES_COUNT + 1))
              fi
            fi
            
            rm -f "$TEMP_OUTPUT_FILE"
          done

          # Create report
          REPORT="# Dockerfile Security Analysis Results\n\n"
          
          # Executive summary section
          REPORT+="## Executive Summary\n\n"
          REPORT+="* **Dockerfiles Analyzed:** ${#DOCKERFILES[@]}\n"
          REPORT+="* **Dockerfiles with Issues:** $ISSUES_COUNT\n"
          REPORT+="* **Dockerfiles with High/Critical Risk:** $HIGH_RISK_COUNT\n"
          REPORT+="* **Analysis Date:** $CURRENT_DATE\n"
          REPORT+="* **Triggered by:** $TRIGGER_EVENT\n\n"
          
          # Summary table
          REPORT+="## Overview\n\n"
          REPORT+="$SUMMARY_TABLE\n"
          
          # Detailed findings
          REPORT+="## Detailed Findings\n\n"
          REPORT+="$DETAILS_TABLE\n"
          
          # Recommendations based on findings
          REPORT+="## Key Recommendations\n\n"
          
          if [ "$HIGH_RISK_COUNT" -gt 0 ]; then
            REPORT+="🚨 **High risk vulnerabilities detected. Priority actions:**\n\n"
            REPORT+="1. Update base images to versions without high/critical CVEs\n"
            REPORT+="2. Create and use non-root users\n"
            REPORT+="3. Avoid using 'latest' tags\n\n"
          elif [ "$ISSUES_COUNT" -gt 0 ]; then
            REPORT+="⚠️ **Security improvements recommended:**\n\n"
            REPORT+="1. Review base images for known vulnerabilities\n"
            REPORT+="2. Follow Dockerfile best practices\n"
            REPORT+="3. Add HEALTHCHECK instructions\n\n"
          else
            REPORT+="✅ **No security issues detected.**\n\n"
          fi
          
          REPORT+="_Scan performed by Snyk at $(date)_\n"

          echo "SUMMARY<<EOF" >> $GITHUB_ENV
          echo "$REPORT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "ISSUES_COUNT=${ISSUES_COUNT}" >> $GITHUB_ENV
          echo "HIGH_RISK_COUNT=${HIGH_RISK_COUNT}" >> $GITHUB_ENV

      - name: Add Analysis to PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const summary = process.env.SUMMARY;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

      - name: Create Summary
        run: |
          echo "${{ env.SUMMARY }}" >> $GITHUB_STEP_SUMMARY

      - name: Slack Notification
        if: ${{ always() && env.SLACK_WEBHOOK_URL != '' }}
        env:
          SUMMARY: ${{ env.SUMMARY }}
          ISSUES_COUNT: ${{ env.ISSUES_COUNT }}
          HIGH_RISK_COUNT: ${{ env.HIGH_RISK_COUNT }}
        run: |
          if [ "$HIGH_RISK_COUNT" -gt 0 ]; then
            STATUS="🚨 *Dockerfile Security Scan - High Risk Issues Detected*"
            MESSAGE="High risk security issues detected in Dockerfiles."
          elif [ "$ISSUES_COUNT" -gt 0 ]; then
            STATUS="⚠️ *Dockerfile Security Scan - Minor Issues Detected*"
            MESSAGE="Some minor security issues detected in Dockerfiles."
          else
            STATUS="✅ *Dockerfile Security Scan - Completed Successfully*"
            MESSAGE="No security issues detected in Dockerfiles."
          fi

          PAYLOAD="{\"text\":\"${STATUS}\n${MESSAGE}\n\`\`\`\n${SUMMARY}\n\`\`\`\"}"
          curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      - name: Check for critical issues
        if: ${{ github.event_name == 'pull_request' && env.HIGH_RISK_COUNT > 0 }}
        run: |
          echo "High risk security issues detected in Dockerfiles."
          echo "Please review the security scan results and address the issues."
          exit 1